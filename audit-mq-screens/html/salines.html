          <p><em>Prévisions sargasses pour Plage des Salines, Sainte-Anne, Martinique. Données satellite Sentinel-3 mises à jour quotidiennement.</em></p>

        <section>
          <h2>État actuel et surveillance satellite</h2>
          <p>La plage de <strong>Plage des Salines</strong>, située à Sainte-Anne en Martinique, fait l'objet d'une surveillance satellite continue dans le cadre de notre service de prévisions sargasses. L'indice AFAI (Alternative Floating Algae Index), dérivé des images Sentinel-3 du programme Copernicus Marine, permet de détecter la présence et la densité des radeaux de sargasses flottantes jusqu'à 40 km au large de la côte. Cette plage de Sainte-Anne est adaptée aux enfants, parking accessible à proximité. Elle se situe à environ <strong>52 minutes</strong> en voiture du chef-lieu, ce qui en fait une destination accessible pour une sortie à la journée.</p>
          <p>Les données sont mises à jour toutes les 3 heures via notre pipeline automatisé, ce qui permet aux visiteurs de Plage des Salines de consulter l'état le plus récent avant de se déplacer. La carte interactive affiche les plages propres, modérément touchées et en alerte, avec un code couleur conforme aux seuils NOAA/AOML (Wang & Hu 2016).</p>
        </section>

        <section>
          <h2>Historique récent des sargasses à Plage des Salines</h2>
          <p>La plage de <strong>Plage des Salines</strong> est surveillée en continu par les satellites Sentinel-3 du programme européen Copernicus. L'historique des observations est actualisé chaque jour, ce qui permet de repérer rapidement les fenêtres de baignade favorables et d'anticiper l'arrivée éventuelle de sargasses sur la côte.</p>
          <p>Les sargasses suivent des cycles saisonniers marqués par les courants du Gulf Stream et les vents d'alizé. En Martinique, la saison principale s'étend typiquement d'avril à septembre, avec des pics d'échouage souvent observés entre mai et juillet. Toutefois, l'évolution du climat et la variabilité des courants peuvent décaler ces fenêtres : c'est précisément pour cette raison que nous proposons une surveillance 365 jours par an plutôt qu'une information saisonnière figée.</p>
        </section>

        <section>
          <h2>Comment lire les prévisions de Plage des Salines</h2>
          <p>Pour chaque plage surveillée, trois états sont possibles selon l'indice AFAI observé :</p>
          <ul>
            <li><strong>Propre (vert)</strong> — AFAI inférieur à 0,15. Pas de sargasses détectées ou présence très faible. Baignade recommandée.</li>
            <li><strong>Modéré (orange)</strong> — AFAI entre 0,15 et 0,40. Présence variable, vigilance recommandée surtout pour les enfants et les personnes sensibles aux émanations de sulfure d'hydrogène.</li>
            <li><strong>Alerte (rouge)</strong> — AFAI supérieur à 0,40. Échouage significatif probable ou en cours. Baignade déconseillée tant que la situation n'est pas revenue à la normale.</li>
          </ul>
          <p>Notre système combine plusieurs signaux pour chaque prévision : observation satellite du jour, indice AFAI continu (qui différencie 0,05 de 0,14, tous deux classés « propre »), prévision à J+1 et J+3, détection de bancs en approche dans un rayon de 40 km, et mémoire des plages régulièrement impactées. Le Beach Score 0-100 synthétise ces facteurs pour permettre une comparaison rapide entre plages voisines.</p>
        </section>

        <section>
          <h2>Plages proches de Plage des Salines</h2>
          <p>Si Plage des Salines n'est pas accessible pour une raison ou une autre — échouage en cours, marée défavorable, fréquentation — vous pouvez vous rabattre sur Anse Trabaud (3 km), Anse Meunier (3 km), Anse Caritan (4 km). Ces plages proches partagent souvent des conditions similaires mais peuvent présenter un état sargasses différent selon l'orientation de la côte et les courants locaux.</p>

        <section>
          <h2>Sources et méthodologie</h2>
          <p>Les prévisions sargasses pour Plage des Salines s'appuient sur les données publiques du programme Copernicus Marine Service (Union Européenne), via l'API ERDDAP de la NOAA/AOML (Atlantic Oceanographic and Meteorological Laboratory). Les seuils d'interprétation de l'indice AFAI suivent les recommandations de la publication scientifique de Wang & Hu (2016, Geophysical Research Letters) ainsi que le Sargassum Inundation Report v1.4 du NOAA. Notre application ne remplace pas l'observation terrain : en cas de doute, nous recommandons de consulter les bulletins locaux des communes et les signalements citoyens.</p>
          <p>Pour explorer l'ensemble des plages de Martinique, consultez notre <a href="https://sargasses-martinique.com/carte-sargasses/">carte interactive des sargasses</a>, nos <a href="https://sargasses-martinique.com/previsions/">prévisions 7 jours</a>, ou notre <a href="https://sargasses-martinique.com/alertes/">système d'alertes instantanées</a>. Pour ne plus avoir à vérifier manuellement chaque matin, le service premium envoie un brief quotidien à 7h avec la meilleure plage du jour.</p>
