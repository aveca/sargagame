    <noscript><article><h1>Punta Cana Sargassum Forecast — Next 7 Days, Beach by Beach</h1><p><em>Updated June 10, 2026 from Copernicus satellite data — refreshed 4× per day.</em></p><p>Most sargassum forecasts for Punta Cana give you one verdict for the whole coast — usually based on government imagery that is days old by the time it is published. This page works differently. We run a dedicated forecast for each of the 12 beaches we track, from Uvero Alto down to Juanillo, because conditions genuinely diverge: a mat that buries Macao can miss Cap Cana entirely. Every morning the model ingests the latest Copernicus satellite pass, checks what is drifting offshore, and projects landings for the next seven days. You get a day-by-day outlook per beach, not a regional average. And because four satellite updates a day feed the model, what you read here reflects today's ocean, not last week's. Use it to pick your beach days before the seaweed picks them for you.</p>
<h2>7-day forecast — Punta Cana</h2>

<h2>How our forecast works</h2><p>We start with AFAI (Alternative Floating Algae Index), the spectral signature that lets Copernicus and NOAA satellites detect floating sargassum mats from orbit. Each detected mat is projected forward using wind and surface-current data — sargassum drifts at roughly 2.5% of wind speed plus the local current. For seaweed already on a beach, we apply exponential persistence with a 3.5-day half-life: it decays unless new material arrives. The model then scores each beach daily, from clean to avoid. Community reports from beachgoers correct the satellite view when clouds block a pass. Accuracy is highest for days 1–3, and the entire forecast is recalculated every day.</p>
