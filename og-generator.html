<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#023E8A 0%,#0077B6 40%,#00B4D8 100%);overflow:hidden;position:relative}
.overlay{position:absolute;inset:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="50" cy="50" r="1" fill="rgba(255,255,255,0.1)"/></svg>')}
.content{position:relative;z-index:2;padding:60px 80px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;justify-content:space-between;align-items:flex-start}
.logo{font-size:42px;font-weight:900;color:white;letter-spacing:4px}
.badge{background:#C4830A;color:white;padding:12px 28px;border-radius:30px;font-size:18px;font-weight:700}
.main{text-align:center}
.title{font-size:64px;font-weight:800;color:white;line-height:1.15;text-shadow:0 4px 20px rgba(0,0,0,0.3)}
.title span{color:#FFD166}
.sub{font-size:26px;color:rgba(255,255,255,0.9);margin-top:16px;font-weight:400}
.bottom{display:flex;justify-content:space-between;align-items:flex-end}
.features{display:flex;gap:40px}
.feat{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.85);font-size:18px}
.dot{width:12px;height:12px;border-radius:50%}
.green{background:#06D6A0}
.orange{background:#FFD166}
.red{background:#EF476F}
.source{color:rgba(255,255,255,0.5);font-size:14px}
.wave{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,rgba(0,0,0,0.2))}
</style></head>
<body>
<div class="wave"></div>
<div class="content">
  <div class="top">
    <div class="logo">🌊 SARGASSES</div>
    <div class="badge">🔴 EN DIRECT</div>
  </div>
  <div class="main">
    <div class="title">Martinique & <span>Guadeloupe</span></div>
    <div class="sub">Carte en temps réel · Plages propres · Prévisions 7 jours</div>
  </div>
  <div class="bottom">
    <div class="features">
      <div class="feat"><div class="dot green"></div> Propre</div>
      <div class="feat"><div class="dot orange"></div> Modéré</div>
      <div class="feat"><div class="dot red"></div> À éviter</div>
    </div>
    <div class="source">Données Copernicus Marine · Mise à jour quotidienne</div>
  </div>
</div>
</body></html>
