  <h1 style="font-size:28px;font-weight:900;margin:0 0 12px;color:#0A1714">Sargasses près de moi — Plages propres autour de ma position</h1>
  <p style="font-size:16px;color:#555;margin:0 0 24px;line-height:1.6">Trouvez la <strong>plage sans sargasses la plus proche de vous</strong> en Martinique ou Guadeloupe. Notre application détecte automatiquement votre position et trie les plages par distance, en affichant d'abord les plus propres selon les données satellite du jour.</p>

  <h2 style="font-size:20px;font-weight:800;color:#0A1714;margin:32px 0 10px">Comment ça marche ?</h2>
  <p style="font-size:15px;color:#555;line-height:1.6">L'application utilise votre géolocalisation GPS pour calculer la distance en ligne droite entre vous et chaque plage suivie (53 en Martinique, 83 en Guadeloupe). Elle les classe ensuite par distance, en mettant en avant celles qui sont propres au regard du satellite ce matin. Résultat : la plage idéale en 10 secondes, sans chercher sur une carte.</p>

  <h2 style="font-size:20px;font-weight:800;color:#0A1714;margin:32px 0 10px">Martinique — Plages typiquement propres en toute saison</h2>

    <li><a href="/plages/anse-dufour/" style="color:#E8A800;font-weight:600">Anse Dufour</a> — crique abritée, eau turquoise, snorkeling avec tortues</li>
    <li><a href="/plages/anse-mitan/" style="color:#E8A800;font-weight:600">Anse Mitan</a> (Trois-Îlets) — ferry depuis Fort-de-France, animée</li>
    <li><a href="/plages/anse-noire/" style="color:#E8A800;font-weight:600">Anse Noire</a> — sable noir volcanique, souvent propre</li>

  <h2 style="font-size:20px;font-weight:800;color:#0A1714;margin:32px 0 10px">Côte Caraïbe vs Atlantique : quelle différence ?</h2>
  <p style="font-size:15px;color:#555;line-height:1.6">La <strong>côte Caraïbe</strong> (ouest et sud-ouest de la Martinique, côte sous-le-vent de Guadeloupe) est naturellement moins exposée aux courants porteurs de sargasses. La <strong>côte Atlantique</strong> (est de la Martinique, Grande-Terre de Guadeloupe) reçoit davantage d'échouages, surtout d'avril à septembre. Nos données satellite vous donnent l'état exact du jour, quelle que soit la côte.</p>
