  <h1 style="font-size:28px;font-weight:900;margin:0 0 12px;color:#0A1714">Sargasses aujourd'hui en Martinique et Guadeloupe</h1>
  <p style="font-size:16px;color:#555;margin:0 0 24px;line-height:1.6">L'état des sargasses <strong>aujourd'hui</strong> sur 136 plages de Martinique et Guadeloupe, recalculé 4 fois par jour à partir des données satellite Copernicus et NOAA (indice AFAI). Chaque matin, Le Veilleur regarde la mer pour toi : propre, à surveiller ou à éviter, en un coup d'œil avant de partir. Mesuré au satellite, pas deviné — et quand on se trompe, on l'écrit.</p>

  <h2 style="font-size:20px;font-weight:800;color:#0A1714;margin:32px 0 10px">Comment fonctionne la mise à jour quotidienne ?</h2>
  <p style="font-size:15px;color:#555;line-height:1.6">Pendant que tu dors, Le Veilleur croise les passages satellite (Sentinel-3 OLCI, MODIS/VIIRS) 4 fois par jour. L'indice <strong>AFAI</strong> (Alternative Floating Algae Index) repère les radeaux de sargasses flottants au large, avant qu'ils ne touchent la côte. Quand un banc approche d'une plage, l'état bascule « à surveiller » puis « à éviter » — c'est le matin où ça bascule, et tu le sais avant les sargasses. Donnée publique, auditable : rien de magique.</p>

  <h2 style="font-size:20px;font-weight:800;color:#0A1714;margin:32px 0 10px">Être prévenu avant de partir</h2>
  <p style="font-size:15px;color:#555;line-height:1.6">Plutôt que de vérifier toi-même chaque matin, laisse <a href="/alertes/" style="color:#E8A800;font-weight:600">Le Veilleur</a> veiller la mer : il regarde la mer, jamais toi, et te livre une dépêche chaque matin avec le verdict du jour et l'aperçu 7 jours. Gratuit, sans carte bancaire — juste ton email.</p>

  <h2 style="font-size:20px;font-weight:800;color:#0A1714;margin:32px 0 10px">Quelle est la fiabilité des données ?</h2>
  <p style="font-size:15px;color:#555;line-height:1.6">Notre taux de réussite mesuré est d'environ <strong>75 à 78 % tous régimes confondus</strong> sur un horizon 24h ; en saison calme, les alertes sont rares et affichées en faible confiance — on te le dit franchement. Détail daté et par régime sur notre <a href="/fiabilite/" style="color:#E8A800;font-weight:600">page fiabilité</a>. Données publiées brutes, jamais retouchées : quand on se trompe, on l'écrit.
