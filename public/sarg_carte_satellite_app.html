<style>
/* ── DARK (default) ── */
:root{
  --bg:#060D14;
  --glass:rgba(6,13,20,.86); --glassMid:rgba(6,13,20,.68);
  --b:rgba(255,255,255,.1); --bD:rgba(255,255,255,.06);
  --w:#EEF4FA; --mid:#7AAFC8; --mute:#3D6480;
  --cyan:#00D4C8; --cyanL:#00F0E4; --cyanD:#007A74;
  --safe:#22C55E; --warn:#E8A800; --danger:#E8522A; --h2s:#CC28FF;
  --topbar-grad:rgba(6,13,20,.92);
  --item-hover:rgba(255,255,255,.04);
  --item-active:rgba(0,212,200,.07);
  --ss-bg:rgba(255,255,255,.05);
  --scrollthumb:rgba(255,255,255,.15);
}
/* ── LIGHT ── */
html.light{
  --bg:#FDFCF7;
  --glass:rgba(245,249,253,.93); --glassMid:rgba(245,249,253,.78);
  --b:rgba(0,30,60,.1); --bD:rgba(0,30,60,.06);
  --w:#0A1420; --mid:#2A6080; --mute:#7AA8C0;
  --cyan:#007A74; --cyanL:#009990; --cyanD:#004A46;
  --topbar-grad:rgba(238,243,248,.96);
  --item-hover:rgba(0,30,60,.04);
  --item-active:rgba(0,122,116,.08);
  --ss-bg:rgba(0,30,60,.06);
  --scrollthumb:rgba(0,30,60,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);overflow:hidden;font-family:'Bricolage Grotesque',sans-serif;color:var(--w);transition:background .3s,color .3s}
::-webkit-scrollbar{width:3px;background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollthumb);border-radius:2px}

/* MAP */
#map{position:fixed;top:0;left:0;right:0;bottom:calc(72px + env(safe-area-inset-bottom, 0));z-index:0}
.leaflet-container{background:#D0ECF4!important}
html.light .leaflet-tile-pane{filter:brightness(1.02) saturate(1.15)}
.leaflet-tile-pane{filter:saturate(1.3) brightness(1.05)}
.leaflet-control-zoom{background:var(--glass)!important;border:1px solid var(--b)!important;border-radius:12px!important;overflow:hidden;backdrop-filter:blur(14px)!important}
.leaflet-control-zoom a{background:transparent!important;color:var(--cyan)!important;border-bottom:1px solid var(--b)!important;font-weight:700!important;width:34px!important;height:34px!important;line-height:34px!important;font-size:16px!important;transition:.15s!important}
.leaflet-control-zoom a:hover{background:rgba(0,122,116,.12)!important}
.leaflet-control-attribution{background:var(--glass)!important;color:var(--mute)!important;font-size:9px!important}
.leaflet-control-attribution a{color:var(--cyan)!important}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{display:none!important}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:800;
  padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:linear-gradient(to bottom,var(--topbar-grad) 0%,transparent 100%);
  pointer-events:none;
}
#topbar>*{pointer-events:all}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.logo-mark{width:30px;height:30px;border-radius:50%;background:conic-gradient(from -10deg,#FFE898 0deg 25deg,#E8A800 25deg 65deg,#FFD040 65deg 110deg,#B87A00 110deg 155deg,#FFE07A 155deg 195deg,#E09000 195deg 240deg,#FFC72C 240deg 285deg,#B07000 285deg 325deg,#FFE898 325deg 360deg);animation:spin 18s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-text{font-family:'Anton',sans-serif;font-size:17px;letter-spacing:.1em}
.logo-sub{font-size:9px;color:var(--mute);letter-spacing:.06em}
.spacer{flex:1}

/* Search */
.search-wrap{position:relative;width:220px;flex-shrink:0}
#srch{
  width:100%;padding:8px 12px 8px 30px;
  background:var(--glass);border:1px solid var(--b);border-radius:100px;
  font-family:'Bricolage Grotesque',sans-serif;font-size:13px;color:var(--w);outline:none;
  backdrop-filter:blur(14px);transition:border-color .2s;
}
#srch::placeholder{color:var(--mute)}
#srch:focus{border-color:rgba(232,168,0,.5)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;opacity:.5}
#sr{
  position:absolute;top:calc(100% + 5px);left:0;right:0;
  background:var(--glass);border:1px solid var(--b);border-radius:12px;
  max-height:240px;overflow-y:auto;backdrop-filter:blur(18px);
  display:none;z-index:900;
}
#sr.open{display:block}
.sri{padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--bD);display:flex;align-items:center;gap:8px;transition:.13s}
.sri:last-child{border-bottom:none}
.sri:hover{background:var(--item-hover)}
.sri-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sri-name{font-size:12px;font-weight:600}
.sri-info{font-size:10px;color:var(--mute)}

/* Pill groups */
.pills{display:flex;gap:3px;background:var(--glass);border:1px solid var(--b);border-radius:100px;padding:3px;backdrop-filter:blur(14px);flex-shrink:0}
.pill{padding:5px 12px;border-radius:100px;border:none;background:transparent;font-family:'Bricolage Grotesque',sans-serif;font-size:11px;font-weight:600;color:var(--mid);cursor:pointer;transition:.2s;white-space:nowrap}
.pill:hover{color:var(--w)}
.pill.on{background:rgba(232,168,0,.15);color:#E8A800;box-shadow:inset 0 0 0 1px rgba(232,168,0,.3)}
.pill .ei{font-style:normal}

/* Left panel */
#panel{
  position:fixed;left:12px;top:68px;bottom:calc(72px + env(safe-area-inset-bottom, 0));width:255px;
  z-index:700;background:var(--glass);border:1px solid var(--b);border-radius:16px;
  backdrop-filter:blur(18px);display:flex;flex-direction:column;overflow:hidden;
  transition:opacity .25s,transform .25s;
}
#panel.hide{opacity:0;pointer-events:none;transform:translateX(-10px)}
.panel-head{padding:11px 13px 8px;border-bottom:1px solid var(--bD);flex-shrink:0}
.panel-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-bottom:6px}
.fchips{display:flex;gap:3px;flex-wrap:wrap}
.fchip{padding:3px 8px;border-radius:100px;border:1px solid var(--b);font-size:10px;font-weight:600;color:var(--mute);cursor:pointer;transition:.15s;background:transparent;font-family:'Bricolage Grotesque',sans-serif}
.fchip.on{background:rgba(232,168,0,.13);border-color:rgba(232,168,0,.32);color:#E8A800}
.panel-count{font-size:10px;color:var(--mute);margin-top:5px}
.panel-list{flex:1;overflow-y:auto;padding:3px 0}
.pi{padding:8px 13px;cursor:pointer;border-left:2px solid transparent;transition:.12s;display:flex;align-items:center;gap:8px}
.pi:hover{background:var(--item-hover);border-left-color:var(--cyan)}
.pi.active{background:var(--item-active);border-left-color:var(--cyanL)}
.pi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pi-name{font-size:12px;font-weight:600;line-height:1.2}
.pi-info{font-size:10px;color:var(--mute)}
.pi-pct{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;margin-left:auto;flex-shrink:0}

/* Toggle panel btn */
#tog{position:fixed;left:12px;top:68px;z-index:710;background:var(--glass);border:1px solid var(--b);border-radius:10px;padding:7px 12px;font-size:11px;font-weight:600;color:var(--mid);cursor:pointer;backdrop-filter:blur(14px);display:none}

/* Bottom bar */
#bbar{
  position:fixed;bottom:calc(14px + env(safe-area-inset-bottom, 0));left:50%;transform:translateX(-50%);
  display:flex;gap:8px;align-items:center;z-index:700;
  pointer-events:none;
}
#bbar>*{pointer-events:all}
.count-chip{
  background:var(--glass);border:1px solid var(--b);border-radius:100px;
  padding:6px 14px;font-size:11px;font-weight:600;color:var(--mid);
  backdrop-filter:blur(14px);white-space:nowrap;
}

/* Legend */
/* Legend */
#legend{
  position:fixed;right:12px;bottom:calc(100px + env(safe-area-inset-bottom, 0));
  background:var(--glass);border:1px solid var(--b);border-radius:14px;
  padding:10px 13px;backdrop-filter:blur(14px);z-index:801;
}
.leg-t{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-bottom:7px}
.leg-r{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;font-weight:600;color:var(--mid)}
.leg-r:last-child{margin-bottom:0}
.leg-d{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* BEACH SHEET */
#sheet{
  position:fixed;bottom:0;left:0;right:0;
  height:0;z-index:750;
  background:var(--glass);border-top:1px solid var(--b);
  backdrop-filter:blur(22px) saturate(1.4);
  overflow:hidden;border-radius:20px 20px 0 0;
  transition:height .42s cubic-bezier(.16,1,.3,1);
}
#sheet.open{height:330px}
.s-drag{width:100%;padding:9px;display:flex;justify-content:center;cursor:pointer;flex-shrink:0}
.s-drag-bar{width:38px;height:4px;border-radius:2px;background:var(--b)}
.s-inner{display:flex;gap:0;height:calc(100% - 28px);padding:0 0 14px 0}
.s-photo{
  width:230px;min-width:230px;margin:0 0 0 14px;
  border-radius:12px;overflow:hidden;position:relative;background:var(--ss-bg);flex-shrink:0;
}
.s-photo img{width:100%;height:100%;min-height:120px;object-fit:cover;display:block;opacity:0;transition:opacity .35s}
.s-photo img.loaded{opacity:1}
.s-photo img[src=""],.s-photo img:not([src]){opacity:0}
.s-photo-ghost{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.25;transition:.3s}
.s-photo-ghost.hide{opacity:0}
.s-photo-lbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.65));padding:22px 9px 7px;font-size:8px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,.45);text-transform:uppercase}
.s-sat-btn{
  position:absolute;top:7px;right:7px;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.14);
  border-radius:8px;padding:5px 8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.65);
  cursor:pointer;backdrop-filter:blur(6px);transition:.2s;
}
.s-sat-btn:hover{background:rgba(0,212,200,.22);color:var(--cyan);border-color:rgba(0,212,200,.3)}

.s-info{flex:1;padding:4px 16px 0;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.s-risk{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;width:fit-content}
.s-name{font-family:'Anton',sans-serif;font-size:clamp(20px,4vw,28px);letter-spacing:.04em;text-transform:uppercase;line-height:1;color:var(--w)}
.s-loc{font-size:12px;color:var(--mid)}
.h2s-badge{display:flex;align-items:center;gap:6px;background:rgba(204,40,255,.1);border:1px solid rgba(204,40,255,.2);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:#DD60FF}
.s-desc{font-size:12px;color:var(--mid);line-height:1.65}
.s-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ss{background:var(--ss-bg);border:1px solid var(--bD);border-radius:8px;padding:7px 9px}
.ss-l{font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-bottom:2px}
.ss-v{font-size:13px;font-weight:700}
.s-coord{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mute)}
/* sat tiles strip */
.sat-strip{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-top:2px}
.sat-strip::-webkit-scrollbar{height:2px}
.s-tile{width:68px;height:68px;border-radius:8px;overflow:hidden;flex-shrink:0;border:1px solid var(--b);cursor:pointer;transition:.18s;position:relative}
.s-tile:hover{border-color:var(--cyan);transform:scale(1.05)}
.s-tile img{width:100%;height:100%;object-fit:cover;display:block}
.s-tile-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);font-size:8px;font-weight:700;color:rgba(255,255,255,.55);text-align:center;padding:2px;letter-spacing:.06em}

@keyframes ping{0%{transform:translate(-50%,-50%) scale(1);opacity:.65}100%{transform:translate(-50%,-50%) scale(2.6);opacity:0}}
/* Uber markers: show label on hover/select */
.uber-mk:hover .uber-label,.uber-mk.selected .uber-label{opacity:1!important;transform:translateX(-50%) scale(1)!important}
.uber-mk:hover .uber-dot,.uber-mk.selected .uber-dot{transform:scale(1.3)}
.uber-mk.selected .uber-label{border-color:#E8A800!important}
.uber-mk.selected .uber-dot{border-color:#E8A800!important;box-shadow:0 0 14px #E8A80066}

/* RESPONSIVE */
@media(max-width:680px){
  #panel{display:none}
  #tog{display:block}
  .s-photo{width:130px;min-width:130px}
  .s-stats{grid-template-columns:repeat(2,1fr)}
  .search-wrap{width:160px}
  .pill{padding:5px 8px;font-size:10px}
  #legend{bottom:calc(140px + env(safe-area-inset-bottom, 0))}
}
@media(max-width:400px){
  .search-wrap{width:100%;min-width:0;max-width:100%}
  #topbar{gap:6px}
  .pill{font-size:9px;padding:4px 6px}
}

/* Theme toggle btn */
#theme-btn{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--b);
  background:var(--glass);backdrop-filter:blur(14px);
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:all .25s;flex-shrink:0;line-height:1;
}
#theme-btn:hover{border-color:var(--cyan);transform:scale(1.08) rotate(15deg)}
html.light #theme-btn{filter:none}
</style>
</head>
<body>
<div id="map"></div>

<div id="topbar">
  <a class="logo" href="#">
    <div class="logo-mark"></div>
    <div><div class="logo-text">SARG</div><div class="logo-sub" id="logo-sub">Carte Satellite</div></div>
  </a>
  <div class="spacer"></div>
  <button id="lang-btn" class="pill" onclick="setLang(currentLang==='fr'?'en':'fr')" title="FR / EN">FR</button>
  <button id="theme-btn" onclick="toggleTheme()" title="Changer le thème">🌙</button>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input id="srch" type="text" placeholder="Rechercher…" autocomplete="off" oninput="doSearch()" onfocus="openSR()" onblur="setTimeout(closeSR,180)">

  </div>
  <div class="pills" id="ip">
    <button class="pill on" id="ip-both" onclick="setIsland('both')">🌍 Tout</button>
    <button class="pill" id="ip-MQ"  onclick="setIsland('MQ')">🗺 Martinique</button>
    <button class="pill" id="ip-GP"  onclick="setIsland('GP')">🗺 Guadeloupe</button>
  </div>
  <div class="pills" id="lp" style="display:none">
    <button class="pill on" id="lp-sat"  onclick="setLayer('sat')">🛰 Satellite</button>
    <button class="pill"    id="lp-hyb"  onclick="setLayer('hyb')">🗺 Hybride</button>
    <button class="pill"    id="lp-dark" onclick="setLayer('dark')">🌊 Sombre</button>
    <button class="pill"    id="lp-ter"  onclick="setLayer('ter')">⛰ Relief</button>
  </div>
</div>

<div id="panel">
  <div class="panel-head">
    <div class="panel-title" id="panel-title">Plages</div>
    <div class="fchips">
      <button class="fchip on" id="fc-all"    onclick="setFilter('all')">Toutes</button>
      <button class="fchip"    id="fc-safe"   onclick="setFilter('safe')">🟢 Propre</button>
      <button class="fchip"    id="fc-warn"   onclick="setFilter('warn')">🟡 Modéré</button>
      <button class="fchip"    id="fc-danger" onclick="setFilter('danger')">🔴 Élevé</button>
      <button class="fchip"    id="fc-h2s"    onclick="setFilter('h2s')">☣️ H2S</button>
      <button class="fchip"    id="fc-nudiste" onclick="setFilter('nudiste')">🌿 Naturiste</button>
    </div>
    <div class="panel-count" id="pc">—</div>
  </div>
  <div class="panel-list" id="pl"></div>
</div>
<button id="tog" onclick="togglePanel()">☰</button>

<div id="bbar">
  <div class="pills">
    <button class="pill on" id="vb-both" onclick="flyTo('both')">🌍 Vue ensemble</button>
    <button class="pill"    id="vb-MQ"   onclick="flyTo('MQ')">Martinique</button>
    <button class="pill"    id="vb-GP"   onclick="flyTo('GP')">Guadeloupe</button>
  </div>
  <div class="count-chip" id="cc">— plages</div>
</div>

<div id="legend">
  <div class="leg-t" id="leg-title">Risque sargasses</div>
  <div class="leg-r"><div class="leg-d" style="background:#22C55E;box-shadow:0 0 5px #22C55E88"></div><span id="leg-low">Faible</span></div>

</div>

<div id="sheet">
  <div class="s-drag" onclick="closeSheet()"><div class="s-drag-bar"></div></div>
  <div class="s-inner">
    <div class="s-photo" id="sphoto">
      <div class="s-photo-ghost" id="spghost">🏖️</div>
      <img id="spimg" src="" alt="" onload="imgOK()" onerror="imgFail()">
      <div class="s-photo-lbl" id="splbl"></div>

      </div>
      <div class="s-coord" id="scoord">—</div>
      <div class="sat-strip" id="sstrip"></div>
    </div>
  </div>
</div>

<script>
const BEACHES = [

// ══════════════════════════════
// MARTINIQUE — 102 plages
// ══════════════════════════════

// ── SUD / SAINTE-ANNE ──

// ── MARKERS ──
function makeMarker(b){
  const c=col(b);
  const isDanger=b.risk==='danger'||b.h2s;
  const html=`<div class="uber-mk" data-bid="${b.id}" style="transform:translate(-50%,-50%);pointer-events:auto;cursor:pointer;position:relative;width:28px;height:28px">
    <div class="uber-label" style="position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%) scale(.92);opacity:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1.5px solid ${c}44;border-radius:10px;padding:4px 10px;font:600 11px 'Bricolage Grotesque',system-ui;color:#0D0D0D;white-space:nowrap;box-shadow:0 3px 12px rgba(0,0,0,.12);display:flex;align-items:center;gap:5px;transition:all .18s ease;pointer-events:none">
      <div style="width:6px;height:6px;border-radius:50%;background:${c};flex-shrink:0"></div>
      ${b.name}
    </div>
    <div class="uber-ring" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;border:2px solid ${c}44;animation:pin-pulse 2.5s ease-out infinite"></div>
    <div class="uber-dot" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:${c};border:2px solid white;box-shadow:0 1px 6px rgba(0,0,0,.22);transition:all .18s ease;${isDanger?'animation:beacon 2s ease-in-out infinite':''}"></div>
  </div>`;
  const icon=L.divIcon({className:'',html,iconSize:[28,28],iconAnchor:[14,14]});
  const mk=L.marker([b.lat,b.lng],{icon});
  mk.on('click',()=>select(b.id));
  mk._bid=b.id;
  return mk;
}

function filtered(){
  return BEACHES.filter(b=>{
    if(island!=='both'&&b.ile!==island) return false;
    if(filter==='safe'&&b.risk!=='safe') return false;
    if(filter==='warn'&&b.risk!=='warn') return false;
    if(filter==='danger'&&b.risk!=='danger') return false;
    if(filter==='h2s'&&!b.h2s) return false;
    if(filter==='nudiste'&&!b.naturiste) return false;
    if(query&&!b.name.toLowerCase().includes(query)&&!b.commune.toLowerCase().includes(query)) return false;
    return true;
  });
}

function render(){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  const list=filtered();
  list.forEach(b=>{const m=makeMarker(b);m.addTo(map);markers.push(m);});
  document.getElementById('cc').textContent = list.length + ' ' + (list.length > 1 ? t('beachesCount') : t('beachOne'));
  renderPanel(list);
}

function renderPanel(list){
  const sorted=[...list].sort((a,b)=>({danger:0,warn:1,safe:2}[a.risk]||3)-({danger:0,warn:1,safe:2}[b.risk]||3));
  document.getElementById('pc').textContent = sorted.length + ' ' + (sorted.length > 1 ? t('resultCountPlural') : t('resultCount'));
  document.getElementById('pl').innerHTML=sorted.map(b=>{
    const c=col(b);
    return `<div class="pi" data-id="${b.id}" onclick="select('${b.id}')">
      <div class="pi-dot" style="background:${c};box-shadow:0 0 5px ${c}99"></div>
      <div style="flex:1;min-width:0"><div class="pi-name">${b.name}</div><div class="pi-info">${b.commune}${island==='both'?' · '+b.ile:''}</div></div>
      <div class="pi-pct" style="color:${c}">${(AFAI[b.id]*100).toFixed(0)}%</div>
    </div>`;
  }).join('');
}

// ── SELECT ──
function select(id){
  curB=BEACHES.find(b=>b.id===id); if(!curB) return;
  openSheet(curB);
  markers.forEach(m=>{
    const el=m.getElement()?.querySelector('.uber-mk');
    if(el){
      if(m._bid===id) el.classList.add('selected');
      else el.classList.remove('selected');
    }
  });
  document.querySelectorAll('.pi').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  document.querySelector(`.pi[data-id="${id}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function openSheet(b){
  const c=col(b);
  // risk pill
  const rEl=document.getElementById('srisk');
  rEl.style.cssText=`background:${b.h2s?'rgba(204,40,255,.14)':RISK_BG[b.risk]};color:${c};box-shadow:inset 0 0 0 1px ${c}40`;
  rEl.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${c};display:inline-block;box-shadow:0 0 5px ${c}"></span> ${b.h2s ? '☣️ H2S' : RISK_L[b.risk]()}`;
  document.getElementById('sname').textContent = b.name;
  document.getElementById('sloc').textContent = '📍 ' + b.commune + ' · ' + (b.ile === 'MQ' ? t('martinique') : t('guadeloupe'));
  document.getElementById('sh2s').style.display = b.h2s ? 'flex' : 'none';
  document.getElementById('sdesc').textContent = b.desc;
  document.getElementById('sv-afai').textContent = (AFAI[b.id] * 100).toFixed(1) + '%';
  document.getElementById('sv-type').textContent = b.type;
  document.getElementById('sv-ile').textContent = b.ile === 'MQ' ? t('martinique') : t('guadeloupe');
  document.getElementById('scoord').textContent = b.lat.toFixed(5) + '° N  ' + Math.abs(b.lng).toFixed(5) + '° ' + t('west');
  document.getElementById('splbl').textContent = b.name;
  // photo
  const img=document.getElementById('spimg');
  img.classList.remove('loaded');
  document.getElementById('spghost').classList.remove('hide');
  img.src=PHOTOS[b.id]||'';
  if(!img.src||img.src==='about:blank'){imgFail();}
  // sat strips
  const strip=document.getElementById('sstrip'); strip.innerHTML='';
  [[17,.003],[15,.01],[13,.04]].forEach(([z,p],i)=>{
    const tile=document.createElement('div'); tile.className='s-tile';
    tile.onclick=()=>{setLayer('sat');map.flyTo([b.lat,b.lng],z,{duration:1.2});};
    const im=document.createElement('img');
    im.src=`https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/export?bbox=${b.lng-p},${b.lat-p*.75},${b.lng+p},${b.lat+p*.75}&bboxSR=4326&size=136,136&imageSR=4326&format=png&f=image`;
    im.loading='lazy'; im.onerror=()=>tile.remove();
    const lbl=document.createElement('div'); lbl.className='s-tile-lbl';
    lbl.textContent = [t('tileMax'), t('tileBeach'), t('tileCoast')][i];
    tile.appendChild(im); tile.appendChild(lbl); strip.appendChild(tile);
  });
  document.getElementById('sheet').classList.add('open');
}

function imgOK(){
  document.getElementById('spghost').classList.add('hide');
  document.getElementById('spimg').classList.add('loaded');
}
function imgFail(){
  const img=document.getElementById('spimg');
  if(!img) return;
  // Si l'image locale (/beaches/xxx) a échoué, essayer d'abord la photo Wikimedia pour cette plage
  const wikiUrl = curB && PHOTOS_WIKI[curB.id];
  if (wikiUrl && img.src !== wikiUrl && !img.src.endsWith('.svg')) {
    img.onerror=null;
    img.src=wikiUrl;
    img.onerror=function(){ this.onerror=null; imgFail(); };
    return;
  }
  const fb=FALLBACK[curB?.ile||'MQ'];
  if(img.src!==fb){
    img.src=fb;
    img.onerror=function(){ this.onerror=null; this.src='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"><rect width="64" height="64" fill="%23007a74" opacity=".2"/><text x="32" y="38" text-anchor="middle" font-size="28">🏖️</text></svg>'); this.classList.add('loaded'); };
  }else{ img.style.display='none'; }
}
function zoomBeach(){if(!curB)return;setLayer('sat');map.flyTo([curB.lat,curB.lng],16,{duration:1.3});}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  markers.forEach(m=>{const d=m.getElement()?.querySelector('div>div:last-child');if(d)d.style.transform='translate(-50%,-50%) scale(1)';});
  document.querySelectorAll('.pi').forEach(el=>el.classList.remove('active'));
}

// ── ISLAND / FILTER / SEARCH ──
function setIsland(k){
  island=k;
  document.querySelectorAll('#ip .pill').forEach(b=>b.classList.remove('on'));
  document.getElementById('ip-'+k).classList.add('on');
  render(); if(k!=='both') map.flyTo(VIEWS[k].c,VIEWS[k].z,{duration:1.4});
  closeSheet();
}
function setFilter(f){
  filter=f;
  document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));
  document.getElementById('fc-'+f).classList.add('on');
  render();
}
function doSearch(){
  query=document.getElementById('srch').value.trim().toLowerCase();
  const matches=BEACHES.filter(b=>b.name.toLowerCase().includes(query)||b.commune.toLowerCase().includes(query)).slice(0,10);
  const sr=document.getElementById('sr');
  if(!query){sr.classList.remove('open');render();return;}
  sr.innerHTML=matches.length?matches.map(b=>{
    const c=col(b);
    return `<div class="sri" onclick="srPick('${b.id}')">
      <div class="sri-dot" style="background:${c};box-shadow:0 0 4px ${c}88"></div>
      <div><div class="sri-name">${b.name}</div><div class="sri-info">${b.commune} · ${b.ile === 'MQ' ? t('martinique') : t('guadeloupe')}</div></div>
    </div>`;
  }).join('') : '<div class="sri" style="color:var(--mute);cursor:default">' + t('noResults') + '</div>';
  sr.classList.add('open'); render();
}
function srPick(id){
  const b=BEACHES.find(x=>x.id===id); if(!b)return;
  document.getElementById('srch').value=b.name; query=''; closeSR();
  map.flyTo([b.lat,b.lng],15,{duration:1.3}); select(id);
}
function openSR(){if(document.getElementById('srch').value.trim())document.getElementById('sr').classList.add('open');}
function closeSR(){document.getElementById('sr').classList.remove('open');}

// ── PANEL TOGGLE ──
function togglePanel(){
  panelVisible=!panelVisible;
  document.getElementById('panel').classList.toggle('hide',!panelVisible);
}

// ── MAP CLICK ──
map.on('click',e=>{
  if(!e.originalEvent.target.closest('#sheet')&&!e.originalEvent.target.closest('.leaflet-marker-icon'))
    closeSheet();
});

// ── PING KEYFRAME ──
const ps=document.createElement('style');
ps.textContent='@keyframes ping{0%{transform:translate(-50%,-50%) scale(1);opacity:.65}100%{transform:translate(-50%,-50%) scale(2.6);opacity:0}}';
document.head.appendChild(ps);


// ── THEME TOGGLE ──
let darkMode = true;
function toggleTheme(){
  darkMode = !darkMode;
  document.documentElement.classList.toggle('light', !darkMode);
  document.getElementById('theme-btn').textContent = darkMode ? '🌙' : '☀️';
  // swap tile layer to match theme if on dark layer
  if(!darkMode && document.getElementById('lp-dark').classList.contains('on')){
    setLayer('sat');
  }
}

// INIT
applyLang();
document.getElementById('lang-btn').textContent = currentLang === 'fr' ? 'FR' : 'EN';
document.getElementById('lang-btn').title = currentLang === 'fr' ? 'English' : 'Français';
(function(){
  try {
    const params = new URLSearchParams(window.location.search);
    const islandParam = (params.get('island') || '').toUpperCase();
    if (islandParam === 'MQ') { island = 'MQ'; document.querySelectorAll('#ip .pill').forEach(b=>b.classList.remove('on')); const el=document.getElementById('ip-MQ'); if(el) el.classList.add('on'); }
    if (islandParam === 'GP') { island = 'GP'; document.querySelectorAll('#ip .pill').forEach(b=>b.classList.remove('on')); const el=document.getElementById('ip-GP'); if(el) el.classList.add('on'); }
    render();
    if (island !== 'both' && typeof map !== 'undefined' && VIEWS[island]) {
      setTimeout(function(){
        try { map.flyTo(VIEWS[island].c, VIEWS[island].z, {duration:0.8}); } catch(e) {}
        document.querySelectorAll('#bbar .pill').forEach(b=>b.classList.remove('on'));
        const vb=document.getElementById('vb-'+island); if(vb) vb.classList.add('on');
      }, 150);
    }
  } catch(e) { console.error('Carte init:', e); }
})();
</script>
</body>
