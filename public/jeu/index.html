<!DOCTYPE html>

<head>

<meta property="og:title" content="SargaCatch 🌊 Sauve la plage !">

<style>
  :root{ --gold:#FFC72C; --ink:#0A1714; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  body{ background:var(--ink); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#fff; overflow:hidden; }
  #stage{ position:fixed; inset:0; max-width:560px; margin:0 auto; overflow:hidden; touch-action:manipulation; background:#0d2230; }
  #bg{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrim{ position:absolute; inset:0; background:linear-gradient(180deg,rgba(10,23,20,.62) 0%,rgba(10,23,20,.1) 22%,rgba(10,23,20,0) 45%,rgba(10,23,20,.25) 100%); pointer-events:none; }
  #hud{ position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center;
    padding:calc(12px + env(safe-area-inset-top)) 16px 0; z-index:50; pointer-events:none; }
  .pill{ background:rgba(10,23,20,.55); border:1px solid rgba(255,255,255,.2); border-radius:999px;
    padding:7px 13px; font-size:13px; font-weight:800; backdrop-filter:blur(6px); }
  #score{ color:var(--gold); font-family:'Anton',sans-serif; font-size:17px; letter-spacing:.04em; }
  #lives{ letter-spacing:2px; }
  .sg{ position:absolute; width:64px; height:48px; cursor:pointer; z-index:10; filter:drop-shadow(0 3px 6px rgba(0,0,0,.35)); }
  .sg svg{ width:100%; height:100%; pointer-events:none; }
  .sg.pop{ animation:pop .32s ease-out forwards; pointer-events:none; }
  @keyframes pop{ 40%{transform:scale(1.45) rotate(8deg);opacity:1} 100%{transform:scale(.1) rotate(-20deg);opacity:0} }
  .pts{ position:absolute; font-family:'Anton',sans-serif; font-size:22px; color:var(--gold); z-index:40;
    pointer-events:none; animation:rise .7s ease-out forwards; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  .pts.heal{ color:#7ee2a8; font-size:19px; animation:rise 1s ease-out forwards; }
  @keyframes rise{ to{ transform:translateY(-46px); opacity:0 } }
  .splat{ position:absolute; bottom:0; width:90px; height:26px; background:radial-gradient(ellipse at center,#6b4a12 0%,#523808 60%,transparent 75%); opacity:.92; z-index:5; pointer-events:none; }
  .panel{ position:absolute; inset:0; z-index:100; display:flex; flex-direction:column; justify-content:flex-end;
    padding:0 22px calc(26px + env(safe-area-inset-bottom)); background:linear-gradient(180deg,rgba(10,23,20,.35),rgba(10,23,20,.92) 70%); }
  .panel h1{ font-family:'Anton',sans-serif; font-weight:400; font-size:clamp(40px,11vw,64px); line-height:.95; text-transform:uppercase; margin-bottom:10px; }
  .panel h1 .g{ color:var(--gold); }
  .panel p{ font-size:14px; color:rgba(255,255,255,.75); line-height:1.45; margin-bottom:16px; }
  .defi{ display:none; align-items:center; gap:8px; background:rgba(255,199,44,.12); border:1px solid rgba(255,199,44,.35);
    border-radius:12px; padding:9px 13px; font-size:13px; margin-bottom:12px; }
  .defi b{ color:var(--gold); font-family:'Anton',sans-serif; font-size:16px; letter-spacing:.03em; }
  .btn{ display:block; width:100%; text-align:center; background:var(--gold); color:var(--ink); border:none; cursor:pointer;
    font-family:inherit; font-weight:800; font-size:17px; padding:16px 24px; border-radius:18px; box-shadow:0 8px 28px rgba(255,199,44,.32); }
  .btn.ghost{ background:rgba(10,23,20,.45); color:#fff; border:1.5px solid rgba(255,255,255,.35); box-shadow:none; margin-top:10px; font-size:14px; padding:13px; }
  .verdict{ display:inline-flex; align-items:center; gap:8px; background:var(--gold); color:var(--ink); font-weight:800;
    font-size:13px; padding:7px 13px; border-radius:999px; margin-bottom:10px; }
  #endPanel,#flash{ display:none; }
  #flash{ position:absolute; inset:0; background:rgba(232,82,42,.25); z-index:60; pointer-events:none; animation:fl .3s ease-out; }
  @keyframes fl{ from{opacity:1} to{opacity:0} }
  .wordmark{ position:absolute; top:calc(14px + env(safe-area-inset-top)); left:0; right:0; text-align:center;
    font-family:'Anton',sans-serif; font-size:11px; letter-spacing:.16em; opacity:.8; z-index:45; pointer-events:none; }
  #comboPill{ display:none; position:absolute; top:calc(56px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    z-index:55; background:rgba(255,120,30,.16); border:1px solid rgba(255,160,60,.45); border-radius:999px; padding:5px 13px;
    font-family:'Anton',sans-serif; font-size:15px; letter-spacing:.05em; color:#FFB347; pointer-events:none; }
  #stage.shake{ animation:shake .3s linear; }
  @keyframes shake{ 20%{transform:translate(-8px,4px)} 40%{transform:translate(7px,-5px)} 60%{transform:translate(-5px,3px)} 80%{transform:translate(4px,-2px)} }
  .btn.pulse{ animation:pulse 1.1s ease-in-out infinite; }
  .btn.ghost.pulse{ border-color:var(--gold); color:var(--gold); }
  @keyframes pulse{ 50%{ transform:scale(1.035); box-shadow:0 8px 30px rgba(255,199,44,.4) } }
  .mailRow{ display:none; gap:8px; margin-bottom:10px; }
  .mailRow input{ flex:1; min-width:0; user-select:text; -webkit-user-select:text; background:rgba(255,255,255,.09);
    border:1px solid rgba(255,255,255,.28); border-radius:14px; padding:13px 14px; color:#fff; font-size:14px; font-family:inherit; }
  .mailRow input::placeholder{ color:rgba(255,255,255,.45); }
  .mailRow .btn{ width:auto; padding:13px 16px; font-size:14px; border-radius:14px; box-shadow:none; }
  .panel p.mailOk{ background:rgba(46,204,113,.13); border:1px solid rgba(46,204,113,.4); border-radius:12px;
    padding:10px 13px; font-size:13px; font-weight:700; color:#7ee2a8; margin-bottom:10px; }
  /* ── Coach (chat guidé, même pattern que SargaChat app : statique, chips, donnée réelle) ── */
  .coachLink{ display:block; width:100%; background:none; border:none; cursor:pointer; font-family:inherit;
    color:rgba(255,255,255,.55); font-size:13px; padding:12px 0 2px; text-align:center; }
  .coachLink b{ color:rgba(255,255,255,.8); font-weight:700; }
  #coach{ position:absolute; left:0; right:0; bottom:0; z-index:200; background:#10231e;
    border-radius:22px 22px 0 0; border:1px solid rgba(255,255,255,.12); border-bottom:none;
    padding:18px 18px calc(18px + env(safe-area-inset-bottom)); transform:translateY(102%);
    transition:transform .28s cubic-bezier(.32,.72,.33,1); box-shadow:0 -12px 40px rgba(0,0,0,.45); }
  #coach.open{ transform:translateY(0); }
  @media (prefers-reduced-motion:reduce){ #coach{ transition:none } }
  #coachHead{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  #coachHead .av{ width:34px; height:34px; border-radius:50%; background:rgba(255,199,44,.16);
    border:1px solid rgba(255,199,44,.4); display:flex; align-items:center; justify-content:center; font-size:17px; }
  #coachHead b{ font-size:14px; }
  #coachClose{ margin-left:auto; background:rgba(255,255,255,.08); border:none; color:rgba(255,255,255,.7);
    width:30px; height:30px; border-radius:50%; font-size:15px; cursor:pointer; font-family:inherit; }
  #coachMsg{ font-size:14px; line-height:1.5; color:rgba(255,255,255,.88); min-height:42px; margin-bottom:12px; }
  #coachMsg .dots::after{ content:'…'; animation:dots 1s steps(3) infinite; }
  @keyframes dots{ 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
  #coachChips{ display:flex; flex-wrap:wrap; gap:8px; }
  .cchip{ background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.22); color:#fff; cursor:pointer;
    font-family:inherit; font-size:13px; font-weight:600; padding:9px 13px; border-radius:999px; }
  .cchip.gold{ background:rgba(255,199,44,.14); border-color:rgba(255,199,44,.45); color:var(--gold); }
</style>
</head>

// Mapping ids sargassum.json MQ/GP → beaches-list (noms) — copie de l'app
const SARG_TO_BEACH={'grande-anse':'mq014','anse-mitan':'mq011','anse-noire':'mq012','tartane':'mq034','anse-madame':'mq024','diamant':'mq016','pt-marin':'mq008','sainte-anne':'mq004','les-salines':'mq001','vauclin':'mq044','gp-grande-anse':'gp021','gp-malendure':'gp031','gp-sainte-anne':'gp010','gp-pt-chateaux':'gp005','gp-gosier':'gp012','gp-caravelle':'gp009','gp-bas-du-fort':'gp014','gp-deshaies':'gp024','gp-moule':'gp080','gp-vieux-fort':'gp042'}
const IS_GP=/guadeloupe/.test(HOST)
const IS_MQGP=/martinique|guadeloupe/.test(HOST)||IS_LOCAL
const ISLAND=/guadeloupe/.test(HOST)?'GP':/puntacana/.test(HOST)?'PUNTACANA':/miami/.test(HOST)?'FLORIDA':/cancun/.test(HOST)?'RIVIERAMAYA':'MQ'

// ── KPI série : beacons Apps Script, même enveloppe analytics_event que l'app.
// Fire-and-forget — la série jeu (parties, scores, partages, clics carte) se lit
// dans la sheet events, indépendamment de GA4.
const TRACK_URL='https://script.google.com/macros/s/AKfycbwkV1tQSEmrZ_zFPcIHBXh1EidFy16z72lx6ztABtVp4Ae3AikFHeGwN6JFMccbpoU07w/exec'
function gtrack(e,p){try{
  const b=JSON.stringify({type:'analytics_event',e,p:p||{},t:Date.now(),island:ISLAND})
  if(navigator.sendBeacon)navigator.sendBeacon(TRACK_URL,b)
  else fetch(TRACK_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:b}).catch(()=>{})
}catch{}}

// ── Donnée LIVE : meilleure plage propre + plus belle photo ──
const TODAY={beach:null,score:null}
Promise.all([
  fetch('/api/copernicus/sargassum.json').then(r=>r.json()).catch(()=>null),
  fetch('/data/beaches-images.json').then(r=>r.json()).catch(()=>({})),
  fetch('/data/beaches-images-quality.json').then(r=>r.json()).catch(()=>({})),
  IS_MQGP?fetch('/data/beaches-list.json').then(r=>r.json()).catch(()=>[]):Promise.resolve([]),
]).then(([sarg,imgs,q,list])=>{
  const nameOf=id=>{
    if(IS_MQGP){const bid=SARG_TO_BEACH[id];const b=(list||[]).find(x=>x.id===bid);return b?b.name:null}
    return null // nouvelles régions : pas de noms côté statique (v1)
  }
  const imgIdOf=id=>IS_MQGP?SARG_TO_BEACH[id]:id
  let lvls=(sarg&&sarg.levels)||[]
  if(IS_MQGP)lvls=lvls.filter(l=>IS_GP?String(l.id).startsWith('gp-'):!String(l.id).startsWith('gp-'))
  const cleans=lvls.filter(l=>l.status==='clean')
  const pool=(cleans.length?cleans:lvls).map(l=>({l,img:imgs[imgIdOf(l.id)],qs:q[imgIdOf(l.id)]||0}))
    .filter(x=>x.img&&!String(x.img).startsWith('sat-'))
  if(pool.length){
    const best=[...pool].sort((a,b)=>((b.l.score||0)+(b.qs||0)*.6)-((a.l.score||0)+(a.qs||0)*.6))[0]
    TODAY.beach=nameOf(best.l.id);TODAY.score=best.l.score||null
    // Fond = SVG illustré statique dans le HTML (décisions user 2026-06-11 :
    // pas d'animation — mal de tête — et pas de photo — pas assez HD).
    // best ne sert plus qu'à TODAY (verdict fin de partie + coach).
  }
}).catch(()=>{})

// ── Défi par URL (?defi=N) — viral sans backend ──
const DEFI=(()=>{const m=location.search.match(/[?&]defi=(\d{1,5})/);return m?parseInt(m[1]):null})()

// ── Défi du jour (pattern Wordle) : numéro public + seed quotidien → mêmes vagues pour tous ──
const EPOCH=Date.parse('2026-06-01T00:00:00Z')
const DAYN=Math.max(1,Math.floor((Date.now()-EPOCH)/864e5)+1)
const _d=new Date()
const SEED=_d.getUTCFullYear()*1e4+(_d.getUTCMonth()+1)*100+_d.getUTCDate()
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
let rng=mulberry32(SEED)

// ── UI strings ──
const $=id=>document.getElementById(id)
$('wordmark').textContent='SARGACATCH #'+DAYN+' · '+SITE
const h1s=$('startTitle');h1s.textContent=''
h1s.appendChild(document.createTextNode(T.title1));h1s.appendChild(document.createElement('br'))
const gs=document.createElement('span');gs.className='g';gs.textContent=T.title2;h1s.appendChild(gs)
$('startMsg').textContent=T.msg;$('btnStart').textContent=T.start
$('btnSite').textContent=T.cta;$('btnShare').textContent=T.share;$('btnReplay').textContent=T.replay
$('defiBox').style.display='flex'
$('defiTxt').textContent=DEFI?T.defi(DEFI):T.day(DAYN)
$('mailIn').placeholder=T.mailPh;$('mailBtn').textContent=T.mailBtn

// ── Jeu ──
const stage=$('stage'),tpl=$('sgTpl')
let blobs=[],score=0,lives=3,t=45,combo=0,maxCombo=0,comboT=0,running=false,raf=null,spawnAcc=0,last=0,timerIv=null
function hud(){$('score').textContent=score;$('timer').textContent=Math.ceil(t)+'s'
  $('lives').textContent='🏖️'.repeat(lives)+'💀'.repeat(3-lives)}
function spawn(){
  const el=document.createElement('div');el.className='sg'
  el.appendChild(tpl.content.firstElementChild.cloneNode(true))
  const W=stage.clientWidth
  const b={el,x:20+rng()*(W-100),y:-60,vy:42+rng()*34+(45-t)*1.25,wob:rng()*6.28,alive:true}
  el.style.transform='translate('+b.x+'px,'+b.y+'px)'
  el.addEventListener('pointerdown',e=>{e.preventDefault();if(!b.alive||!running)return;b.alive=false
    combo=(comboT>0)?combo+1:1;comboT=1.6;if(combo>maxCombo)maxCombo=combo
    // Siphon de vie : 8 prises d'affilée = 1 plage récupérée (cap 3) —
    // récompense la maîtrise, allonge les parties des bons joueurs
    if(combo>0&&combo%8===0&&lives<3){lives++
      const hp=document.createElement('div');hp.className='pts heal';hp.textContent='+🏖️ '+T.siphon
      hp.style.left=Math.max(8,b.x-26)+'px';hp.style.top=(b.y-30)+'px';stage.appendChild(hp);setTimeout(()=>hp.remove(),1000)}
    const cp=$('comboPill');if(combo>=2){cp.style.display='block';cp.textContent='🔥 ×'+combo}
    const pts=10*(combo>=3?2:1);score+=pts
    const p=document.createElement('div');p.className='pts';p.textContent='+'+pts+(combo>=3?' ×2':'')
    p.style.left=(b.x+8)+'px';p.style.top=(b.y-6)+'px';stage.appendChild(p);setTimeout(()=>p.remove(),700)
    el.classList.add('pop');setTimeout(()=>el.remove(),330);hud()})
  stage.appendChild(el);blobs.push(b)
}
function loop(ts){
  if(!running)return
  const dt=Math.min(.05,(ts-last)/1000)||0;last=ts
  comboT-=dt;if(comboT<=0){combo=0;$('comboPill').style.display='none'}
  spawnAcc+=dt
  if(spawnAcc>Math.max(.36,.70-(45-t)*.010)){spawnAcc=0;spawn()}
  const H=stage.clientHeight
  for(const b of blobs){
    if(!b.alive)continue
    b.y+=b.vy*dt;b.wob+=dt*2.2
    b.el.style.transform='translate('+(b.x+Math.sin(b.wob)*9)+'px,'+b.y+'px) rotate('+(Math.sin(b.wob)*9)+'deg)'
    if(b.y>H-66){b.alive=false;b.el.remove();lives--
      const s=document.createElement('div');s.className='splat';s.style.left=(b.x-12)+'px';stage.appendChild(s)
      const f=$('flash');f.style.display='block';f.style.animation='none';void f.offsetWidth;f.style.animation='fl .3s ease-out'
      stage.classList.remove('shake');void stage.offsetWidth;stage.classList.add('shake')
      hud();if(lives<=0)return end(false)}
  }
  blobs=blobs.filter(x=>x.alive)
  raf=requestAnimationFrame(loop)
}
function start(){
  $('startPanel').style.display='none';$('endPanel').style.display='none';$('hud').style.display='flex'
  document.querySelectorAll('.sg,.splat,.pts').forEach(e=>e.remove())
  blobs=[];score=0;lives=3;t=45;combo=0;maxCombo=0;spawnAcc=.5;last=performance.now();running=true
  rng=mulberry32(SEED);$('comboPill').style.display='none';hud()
  clearInterval(timerIv);timerIv=setInterval(()=>{t--;hud();if(t<=0)end(true)},1000)
  raf=requestAnimationFrame(loop)
  spawn()
  gtrack('sg_game_start',{day:DAYN})
}
function end(won){
  running=false;clearInterval(timerIv);cancelAnimationFrame(raf)
  gtrack('sg_game_end',{score,day:DAYN,combo:maxCombo,win:won?1:0})
  $('hud').style.display='none';$('comboPill').style.display='none';$('endPanel').style.display='flex'
  $('endVerdict').textContent=T.verdict(TODAY.beach,TODAY.score)
  const h=$('endTitle');h.textContent=''
  const g=document.createElement('span');g.className='g';g.textContent=score
  if(won){h.appendChild(g);h.appendChild(document.createTextNode(' '+T.win))}
  else{h.appendChild(document.createTextNode(T.lose+' '));h.appendChild(g);h.appendChild(document.createTextNode(' '+T.pts))}
  const beat=DEFI!=null&&score>DEFI
  // Record perso → jalon de partage (pattern Duolingo : prompt sur milestone, pas en continu)
  let best=0;try{best=parseInt(localStorage.getItem('sg_best')||'0')}catch{}
  const rec=score>0&&score>best
  if(rec)try{localStorage.setItem('sg_best',String(score))}catch{}
  $('endMsg').textContent=(beat?'🏆 ':'')+(rec?T.record+' ':'')+(won?T.winMsg:T.loseMsg(TODAY.beach))
  $('btnShare').classList.toggle('pulse',rec||beat)
  // Capture email post-score (play-first) : 1 champ, masqué si déjà capturé
  let has=false;try{has=!!localStorage.getItem('sg_email')}catch{}
  $('mailRow').style.display=has?'none':'flex';$('mailOk').style.display='none'
}
function share(){
  gtrack('sg_game_share',{score,day:DAYN})
  const url=location.origin+'/jeu/?defi='+score+'&utm_source=share&utm_medium=sargacatch'
  const txt=T.shareTxt(DAYN,score,maxCombo)
  if(navigator.share)navigator.share({title:'SargaCatch',text:txt,url}).catch(()=>{})
  else if(navigator.clipboard)try{navigator.clipboard.writeText(txt+' '+url).then(()=>alert(T.copied)).catch(()=>{})}catch{}
}
$('mailRow').addEventListener('submit',e=>{
  e.preventDefault()
  const em=$('mailIn').value.trim()
  if(!em||!em.includes('@'))return
  try{fetch(TRACK_URL,{
    method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({email:em,island:ISLAND,source:'sargacatch',date:new Date().toISOString(),score,day:DAYN})
  }).catch(()=>{})}catch{}
  try{localStorage.setItem('sg_email',em)}catch{}
  $('mailRow').style.display='none';const ok=$('mailOk');ok.textContent=T.mailOk;ok.style.display='block'
})
$('btnStart').addEventListener('click',start)
$('btnReplay').addEventListener('click',start)
$('btnShare').addEventListener('click',share)
$('btnSite').addEventListener('click',()=>{gtrack('sg_game_cta',{score});location.href=location.origin+'/?utm_source=game&utm_medium=sargacatch'})

// ── Coach : chat guidé statique (pattern SargaChat — chips, donnée réelle TODAY, zéro LLM).
// Déclencheur inline dans les panneaux (pas de FAB sur le jeu : pas de mis-taps).
// DOM pur partout (pas d'innerHTML), textes 100 % statiques de T.
const coach=$('coach')
$('coachName').textContent=T.coachName
for(const id of ['coachLink1','coachLink2']){
  const l=$(id);l.textContent=''
  l.appendChild(document.createTextNode(T.coachLink))
  const b=document.createElement('b');b.textContent=T.coachLinkB;l.appendChild(b)
}
let coachTimer=null
const back=()=>({t:T.cBack,fn:coachRoot})
function coachSay(txt,chips){
  clearTimeout(coachTimer)
  const m=$('coachMsg');m.textContent=''
  const d=document.createElement('span');d.className='dots';m.appendChild(d)
  $('coachChips').textContent=''
  coachTimer=setTimeout(()=>{
    m.textContent=txt
    const c=$('coachChips')
    for(const ch of chips){
      const b=document.createElement('button');b.className='cchip'+(ch.gold?' gold':'')
      b.textContent=ch.t;b.addEventListener('click',ch.fn);c.appendChild(b)
    }
  },450)
}
function coachRoot(){
  coachSay(T.coachHi,[
    {t:T.cTips,fn:()=>coachSay(T.aTips,[back()])},
    {t:T.cData,fn:()=>coachSay(T.aData(TODAY.beach,TODAY.score),[
      {t:T.cMap,gold:1,fn:()=>{location.href=location.origin+'/?utm_source=game&utm_medium=coach'}},back()])},
    {t:T.cDefi,fn:()=>coachSay(T.aDefi(DAYN),[
      {t:T.cShare,gold:1,fn:share},back()])},
  ])
}
function coachOpen(){coach.classList.add('open');coach.setAttribute('aria-hidden','false');coachRoot()}
function coachShut(){coach.classList.remove('open');coach.setAttribute('aria-hidden','true');clearTimeout(coachTimer)}
$('coachLink1').addEventListener('click',coachOpen)
$('coachLink2').addEventListener('click',coachOpen)
$('coachClose').addEventListener('click',coachShut)
</script>
