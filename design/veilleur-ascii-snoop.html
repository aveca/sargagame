<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LE VEILLEUR — ASCII WORLD · west-coast vibe (proto v3)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0d0b14;overflow:hidden;font-family:ui-monospace,Menlo,monospace}
  #c{position:fixed;inset:0;display:block}
  .hud{position:fixed;top:max(14px,env(safe-area-inset-top));left:0;right:0;display:flex;
       justify-content:space-between;align-items:center;padding:0 16px;pointer-events:none}
  .hud .l{font:800 11px/1 ui-monospace,monospace;letter-spacing:3px;color:#ffd23f;text-shadow:0 0 12px rgba(255,210,63,.8)}
  .hud .r{font:900 12px/1 ui-monospace,monospace;color:#0d0b14;background:#2bff88;border:2px solid #0d0b14;
       border-radius:999px;padding:6px 11px;box-shadow:3px 3px 0 #0d0b14}
  .foot{position:fixed;left:0;right:0;bottom:7vh;text-align:center;pointer-events:none}
  .foot h1{font-family:"Arial Black",Impact,sans-serif;font-weight:900;color:#fff;font-size:12vw;line-height:.88;
       letter-spacing:-1px;text-shadow:3px 3px 0 #0d0b14,0 0 26px rgba(255,60,160,.45)}
  .foot h1 b{color:#ffd23f}
  .foot p{margin-top:8px;font:800 13px/1.2 ui-monospace,monospace;letter-spacing:3px;color:#ff79c6}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud"><div class="l">◍ WEST-COAST SCAN</div><div class="r" id="cnt">0 PROPRES</div></div>
<div class="foot"><h1>LE <b>VEILLEUR</b></h1><p>MARTINIQUE · SUNSET MODE</p></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d'), cntEl=document.getElementById('cnt');
const DPR=Math.min(devicePixelRatio||1,2);
let W=innerWidth,H=innerHeight,charW=5.8,charH=9.2,cols=Math.ceil(W/charW),rows=Math.ceil(H/charH);
const F=9, RAMP=" .·:-=+*coxX#%@█";
cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);
ctx.font=`${F}px ui-monospace,Menlo,monospace`; ctx.textBaseline='top';
const s=document.createElement('canvas'); s.width=cols; s.height=rows; const x=s.getContext('2d');
const seaTop=Math.round(rows*0.48);
const beaches=[{nx:.16,ny:.74},{nx:.28,ny:.86},{nx:.42,ny:.66},{nx:.55,ny:.90},{nx:.66,ny:.74},{nx:.77,ny:.83},{nx:.36,ny:.79}].map(b=>({...b,st:0}));
let cleanCount=0;

function palm(px,py,t,sc,sway){
  x.strokeStyle='#3a2a14'; x.lineWidth=Math.max(1,sc*0.5); x.lineCap='round';
  const tx=px+sc*0.9+Math.sin(t*1.2+sway)*sc*0.4, ty=py-sc*4.2;
  x.beginPath(); x.moveTo(px,py); x.quadraticCurveTo(px+sc*0.4,py-sc*2,tx,ty); x.stroke();
  x.strokeStyle='#1fcf6a';
  for(let a=-2;a<=2;a++){ x.beginPath(); x.moveTo(tx,ty);
    x.quadraticCurveTo(tx+a*sc*0.9,ty-sc*0.7+Math.sin(t*2+a+sway)*sc*0.3, tx+a*sc*1.8, ty+sc*0.5); x.stroke(); }
  // noix de coco dorées
  x.fillStyle='#ffd23f'; x.beginPath(); x.arc(tx-1,ty+1,Math.max(1,sc*0.4),0,7); x.fill();
}
function veilleur(t){ // LE PERSO — flotte avec swagger, lunettes de soleil + chaîne
  const vx=cols*(0.18+0.64*(0.5+0.5*Math.sin(t*0.42))), vy=rows*0.18+Math.sin(t*1.6)*rows*0.022, vr=cols*0.065;
  // halo néon
  const hl=x.createRadialGradient(vx,vy,0,vx,vy,vr*2.4); hl.addColorStop(0,'rgba(255,121,198,.5)'); hl.addColorStop(1,'rgba(255,121,198,0)');
  x.fillStyle=hl; x.beginPath(); x.arc(vx,vy,vr*2.4,0,7); x.fill();
  // panneaux solaires
  x.fillStyle='#27a9e3'; x.fillRect(vx-vr*1.7,vy-vr*0.3,vr*0.8,vr*0.6); x.fillRect(vx+vr*0.9,vy-vr*0.3,vr*0.8,vr*0.6);
  // corps crème + contour
  x.fillStyle='#fdf6e3'; x.beginPath(); x.arc(vx,vy,vr,0,7); x.fill();
  // LUNETTES DE SOLEIL (la swagger)
  x.fillStyle='#0d0b14'; x.fillRect(vx-vr*0.85,vy-vr*0.18,vr*1.7,vr*0.46);
  x.fillStyle='#2bff88'; x.fillRect(vx-vr*0.7,vy-vr*0.08,vr*0.45,vr*0.18); x.fillRect(vx+vr*0.18,vy-vr*0.08,vr*0.45,vr*0.18); // reflets verts
  // antenne + boule
  x.strokeStyle='#0d0b14'; x.lineWidth=1; x.beginPath(); x.moveTo(vx,vy-vr); x.lineTo(vx,vy-vr*1.7); x.stroke();
  x.fillStyle='#ffd23f'; x.beginPath(); x.arc(vx,vy-vr*1.8,Math.max(1,vr*0.28),0,7); x.fill();
  // CHAÎNE EN OR (bling)
  x.fillStyle='#ffd23f'; for(let i=-2;i<=2;i++){ x.beginPath(); x.arc(vx+i*vr*0.32, vy+vr*0.9+Math.abs(i)*vr*0.14, Math.max(.8,vr*0.13),0,7); x.fill(); }
}
function scene(t){
  // CIEL SUNSET néon
  const g=x.createLinearGradient(0,0,0,rows);
  g.addColorStop(0,'#ff2e7e'); g.addColorStop(.14,'#ff5e3a'); g.addColorStop(.28,'#ff9f1c'); g.addColorStop(.40,'#ffd23f');
  g.addColorStop(.47,'#8be0c0'); g.addColorStop(.56,'#27a9e3'); g.addColorStop(.78,'#1264a3'); g.addColorStop(1,'#0a1f3a');
  x.fillStyle=g; x.fillRect(0,0,cols,rows);
  // gros soleil sunset
  const cx=cols*.5, cy=rows*.34, R=rows*(.16+.012*Math.sin(t*1.6));
  const sun=x.createRadialGradient(cx,cy,0,cx,cy,R*1.6); sun.addColorStop(0,'#fff3c0'); sun.addColorStop(.45,'#ffcf66'); sun.addColorStop(1,'rgba(255,150,40,0)');
  x.fillStyle=sun; x.beginPath(); x.arc(cx,cy,R*1.6,0,7); x.fill();
  // bandes rétro dans le soleil (synthwave)
  x.fillStyle='#ff2e7e'; for(let i=0;i<4;i++){ x.fillRect(cx-R, cy+R*0.2+i*R*0.32, R*2, R*0.12); }
  // MER VIVANTE
  for(let i=0;i<16;i++){ const yy=seaTop+(((i*6-t*15)%(rows-seaTop))+(rows-seaTop))%(rows-seaTop);
    x.strokeStyle='rgba(190,255,240,'+(0.05+0.06*Math.abs(Math.sin(t*2+i)))+')'; x.lineWidth=1; x.beginPath();
    for(let c=0;c<=cols;c+=2){ const py=yy+Math.sin(c*0.28+t*3+i)*1.3; c===0?x.moveTo(c,py):x.lineTo(c,py); } x.stroke(); }
  // ÎLE
  (function(col,off){ x.fillStyle=col; const ix=cols*.47,iy=rows*.76,w=cols*.36,h=rows*.28; x.save(); x.translate(off,off); x.beginPath();
    x.ellipse(ix,iy,w*.58,h*.6,-.16,0,7); x.ellipse(ix-w*.22,iy+h*.26,w*.32,h*.34,.12,0,7);
    x.ellipse(ix+w*.26,iy-h*.24,w*.30,h*.32,-.3,0,7); x.ellipse(ix+w*.04,iy+h*.40,w*.26,h*.26,0,0,7); x.fill(); x.restore(); })('#127a42',0);
  (function(col,off){ x.fillStyle=col; const ix=cols*.47,iy=rows*.76,w=cols*.36,h=rows*.28; x.save(); x.translate(off,off); x.beginPath();
    x.ellipse(ix,iy,w*.58,h*.6,-.16,0,7); x.ellipse(ix-w*.22,iy+h*.26,w*.32,h*.34,.12,0,7);
    x.ellipse(ix+w*.26,iy-h*.24,w*.30,h*.32,-.3,0,7); x.ellipse(ix+w*.04,iy+h*.40,w*.26,h*.26,0,0,7); x.fill(); x.restore(); })('#1fcf6a',-cols*.005);
  // PALMIERS qui ondulent
  palm(cols*0.16,rows*0.80,t,rows*0.05,0); palm(cols*0.78,rows*0.82,t,rows*0.055,1.5); palm(cols*0.55,rows*0.88,t,rows*0.045,3);
  // PLAGES pop vert
  let cnt=0; for(const b of beaches){ const bx=cols*b.nx, py=rows*b.ny;
    const vx=cols*(0.18+0.64*(0.5+0.5*Math.sin(t*0.42)));
    if(Math.abs(bx-vx)<cols*0.11 && b.st<1) b.st=Math.min(1,b.st+0.1);
    const col=b.st>=1?'#2bff88':b.st>0?'#ffd23f':'#e8c98a'; const pr=Math.max(1.3,cols*0.013)*(1+(b.st>=1?0.5*Math.abs(Math.sin(t*4)):0));
    x.fillStyle=col; x.beginPath(); x.arc(bx,py,pr,0,7); x.fill(); if(b.st>=1)cnt++; }
  cleanCount=cnt;
  // PERSO baigneur qui longe la plage
  const ax=cols*0.1+(t*7)%(cols*0.8), ay=rows*0.965+Math.sin(t*6)*0.6;
  x.fillStyle='#ffd23f'; x.fillRect(ax,ay-2.6,1.6,2.8); x.fillRect(ax-0.6,ay-0.3,2.8,1);
  // BLING — paillettes dorées qui montent
  for(let i=0;i<10;i++){ const px=(i*cols*0.11+Math.sin(t+i)*3)%cols, py=rows-((t*10+i*40)%rows);
    x.fillStyle='rgba(255,215,80,'+(0.5+0.5*Math.sin(t*3+i))+')'; x.fillRect(px,py,1,1); }
  // LE VEILLEUR perso
  veilleur(t);
}
function render(){
  const d=x.getImageData(0,0,cols,rows).data; ctx.fillStyle='#0d0b14'; ctx.fillRect(0,0,W,H);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){ const i=(r*cols+c)*4, R=d[i],G=d[i+1],B=d[i+2];
    const lum=(0.299*R+0.587*G+0.114*B)/255, ch=RAMP[(lum*(RAMP.length-1))|0]; if(ch===' ')continue;
    // NÉON : on pousse la saturation
    const avg=(R+G+B)/3, sat=1.5, cl=v=>Math.max(0,Math.min(255,38+(avg+(v-avg)*sat)*0.93));
    ctx.fillStyle=`rgb(${cl(R)|0},${cl(G)|0},${cl(B)|0})`; ctx.fillText(ch,c*charW,r*charH);
  }
}
let t0; (function loop(ts){ if(!t0)t0=ts; const t=(ts-t0)/1000; scene(t); render(); cntEl.textContent=cleanCount+' PROPRES'; requestAnimationFrame(loop); })();
</script>
</body>
</html>
