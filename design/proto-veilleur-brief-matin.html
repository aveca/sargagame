<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Le Veilleur — Le brief du matin</title>
<!--
  PROTO produit (bibliothèque design, HORS funnel, NON déployé).
  Surface = le PAYLOAD premium rendu tangible : le brief quotidien que Le Veilleur
  livre pour TA plage au lever du jour. Sert §2 « Hero perso (H1 daté) » = à câbler,
  §4A #1 (verdict aujourd'hui) + #6 (Le Veilleur personnel / alerte).
  Réutilise le moteur prouvé de design/proto-veilleur-clip-v2.html (glyph, mood, toVB, 1 rAF).
  DATA-DRIVEN : window.setBriefData({...}) — 0 fabrication, fiabilité hedgée, freshness réelle.
  Au port : flag rollback ?brief=0 ; card = <div role=dialog> hors couche gestes (createPortal
  + className sg-onink-scope) + useSwipeClose + focus-trap. Ici = standalone vérifiable.
-->
<style>
  :root{
    --bg:#FDFCF7; --gold:#E8A800; --goldL:#FFC72C; --goldLL:#FFE47A;
    --teal:#009E8E; --green:#22C55E; --amber:#B87A00; --coral:#E8522A;
    --ink:#0D0D0D; --mid:#5A5A5A;
    --sky0:#0B2230; --sky1:#155A5A; --sky2:#C97E3A; --sky3:#F2B05E;
    --seaT:#1A5852; --seaB:#08251F; --glit:#FFD884; --rim:#FFD884;
    --display:"Anton","Haettenschweiler","Arial Narrow Bold","Impact",system-ui,sans-serif;
    --ui:"Bricolage Grotesque",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --mood:#1FB6A6; --moodHalo:#1FB6A6; --moodDot:#22C55E;
    /* couleur de statut du verdict (data-driven) */
    --verdict:#22C55E;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#06140f;color:#fff;font-family:var(--ui);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  #stage{position:fixed;inset:0;overflow:hidden}
  svg#scene{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}

  /* ambient lent AUTORISÉ (doctrine calme) : lumière + nuages seulement */
  @keyframes cloud{from{transform:translateX(0)}to{transform:translateX(54px)}}
  @keyframes sunBreath{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.8;transform:scale(1.045)}}
  .cloud{animation:cloud 138s linear infinite alternate;transform-box:fill-box}
  #sunGlow{animation:sunBreath 11s ease-in-out infinite;transform-box:fill-box;transform-origin:center}

  .scrim{position:absolute;left:0;right:0;bottom:0;height:64%;pointer-events:none;
    background:linear-gradient(to top,rgba(4,16,11,.72) 0%,rgba(4,16,11,.30) 46%,rgba(4,16,11,0) 100%)}

  /* ---- chrome haut : live pill + langue ---- */
  .top{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;align-items:center;gap:10px;pointer-events:none}
  .live{pointer-events:auto;display:inline-flex;align-items:center;gap:7px;background:rgba(8,20,15,.42);border:1px solid rgba(255,216,132,.28);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);padding:6px 11px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:.06em}
  .live i{width:8px;height:8px;border-radius:50%;background:var(--moodDot)}
  .wm{font-family:var(--display);font-size:15px;letter-spacing:.04em;opacity:.92;text-transform:uppercase}
  .langbtn{pointer-events:auto;margin-left:auto;cursor:pointer;border:1px solid rgba(255,216,132,.28);background:rgba(8,20,15,.42);color:#fff;font-family:var(--ui);font-weight:700;font-size:12px;padding:6px 10px;border-radius:100px;min-height:32px}

  /* ============================================================
     LA CARTE BRIEF (paper/ink) — le payload premium
     Recette design system : bord 2.5px ink + ombre DURE pop-2.
     ============================================================ */
  .briefwrap{position:absolute;left:0;right:0;bottom:0;padding:0 14px max(16px,env(safe-area-inset-bottom)) 14px;display:flex;justify-content:center;pointer-events:none}
  .brief{pointer-events:auto;width:100%;max-width:440px;background:var(--bg);color:var(--ink);
    border:2.5px solid var(--ink);border-radius:18px;box-shadow:4px 4px 0 var(--ink);
    padding:15px 16px 16px;position:relative}
  /* liseré verdict en tête de carte */
  .brief::before{content:"";position:absolute;left:-2.5px;right:-2.5px;top:-2.5px;height:6px;border-radius:18px 18px 0 0;background:var(--verdict)}

  .eyebrow{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--mid);text-transform:uppercase;margin:4px 0 2px}
  .datel{font-family:var(--mono);font-size:11px;color:var(--mid);letter-spacing:.02em}
  .btitle{font-family:var(--display);font-weight:400;text-transform:uppercase;letter-spacing:-.01em;line-height:.94;font-size:clamp(26px,7.6vw,36px);margin:2px 0 0}

  .verdrow{display:flex;align-items:center;gap:10px;margin:11px 0 6px}
  .vchip{display:inline-flex;align-items:center;gap:7px;background:var(--verdict);color:#fff;
    border:2px solid var(--ink);border-radius:100px;padding:6px 12px;font-weight:800;font-size:14px;box-shadow:2px 2px 0 var(--ink)}
  .vchip.amberc{color:var(--ink)} /* modéré : ambre → encre pour l'AA */
  .vchip svg{display:block}
  .vscore{font-family:var(--mono);font-weight:700;font-size:15px;margin-left:auto}
  .vscore b{font-size:20px}
  .vscore span{color:var(--mid);font-size:12px}

  .rows{display:flex;flex-direction:column;gap:2px;margin-top:8px;border-top:1.5px dashed rgba(13,13,13,.18);padding-top:9px}
  .row{display:flex;align-items:flex-start;gap:10px;padding:5px 0}
  .row .ic{flex:0 0 26px;height:26px;display:grid;place-items:center;color:var(--ink)}
  .row .tx{flex:1;min-width:0}
  .row .k{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--mid);text-transform:uppercase}
  .row .v{font-size:15px;line-height:1.35;font-weight:600}
  .row .v em{font-style:normal;font-family:var(--mono);font-weight:700}
  .hedge{font-size:11.5px;color:var(--mid);line-height:1.3;margin-top:1px}
  #rowPlanb .v em{color:var(--teal)}

  .footline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px;padding-top:9px;border-top:1.5px dashed rgba(13,13,13,.18)}
  .fresh{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--mid)}
  .fresh i{width:7px;height:7px;border-radius:50%;background:var(--teal)}
  .rel{font-size:11px;color:var(--mid);line-height:1.3;flex:1;min-width:150px}
  .rel a{color:var(--teal);font-weight:700;text-decoration:underline;text-underline-offset:2px}

  .cta{display:block;width:100%;margin-top:12px;border:2.5px solid var(--ink);cursor:pointer;
    font-family:var(--ui);font-weight:800;font-size:16px;color:#1a1300;min-height:48px;padding:12px 18px;border-radius:100px;
    background:linear-gradient(158deg,#FFE47A 0%,#FFC72C 42%,#E89400 100%);box-shadow:4px 4px 0 var(--ink);
    transition:transform .14s cubic-bezier(.175,.885,.32,1.275),box-shadow .2s ease}
  .cta:hover{box-shadow:5px 5px 0 var(--ink)}
  .cta:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}

  @media (min-width:740px){ .brief{max-width:460px} }

  /* ============================================================
     REVEAL one-shot (doctrine : un seul geste au load, puis repos)
     ============================================================ */
  @keyframes cardIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
  @keyframes topIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .brief{animation:cardIn 1.05s cubic-bezier(.22,1,.36,1) .35s both}
  .top{animation:topIn 1s ease .15s both}

  @media (prefers-reduced-motion:reduce){
    #scene *{animation:none!important;transition:none!important}
    .brief,.top{animation:none!important;opacity:1!important;transform:none!important}
    .cta{transition:none!important}
  }
</style>
</head>
<body>
<div id="stage">
  <svg id="scene" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" aria-label="Le Veilleur veille la mer au lever du jour et prépare le brief du matin">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--sky0)"/><stop offset=".42" stop-color="var(--sky1)"/>
        <stop offset=".74" stop-color="var(--sky2)"/><stop offset="1" stop-color="var(--sky3)"/>
      </linearGradient>
      <linearGradient id="warmG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3a2a18" stop-opacity="0"/>
        <stop offset=".6" stop-color="#C97E3A" stop-opacity=".22"/>
        <stop offset="1" stop-color="#F2B05E" stop-opacity=".46"/>
      </linearGradient>
      <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--seaT)"/><stop offset=".55" stop-color="#0f3b34"/><stop offset="1" stop-color="var(--seaB)"/>
      </linearGradient>
      <radialGradient id="sunG" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#FFF6E0"/><stop offset=".48" stop-color="var(--glit)"/><stop offset="1" stop-color="#F2B05E" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="beamGrad" cx="50%" cy="0%" r="100%">
        <stop offset="0" stop-color="var(--glit)" stop-opacity=".5"/><stop offset=".7" stop-color="var(--glit)" stop-opacity=".12"/><stop offset="1" stop-color="var(--glit)" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="lens" cx="38%" cy="32%" r="72%">
        <stop offset="0" stop-color="#CFF4FF"/><stop offset=".34" stop-color="#16b9c9"/><stop offset="1" stop-color="#052b2b"/>
      </radialGradient>
      <radialGradient id="irisG" cx="42%" cy="38%" r="62%"><stop offset="0" stop-color="#0a3a39"/><stop offset="1" stop-color="#03100f"/></radialGradient>
      <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1b4763"/><stop offset="1" stop-color="#0B2230"/></linearGradient>
      <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1d3c38"/><stop offset=".55" stop-color="#102622"/><stop offset="1" stop-color="#0A1714"/></linearGradient>
      <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="var(--moodHalo)" stop-opacity=".5"/><stop offset=".5" stop-color="var(--moodHalo)" stop-opacity=".16"/><stop offset="1" stop-color="var(--moodHalo)" stop-opacity="0"/>
      </radialGradient>
      <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
      <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope=".028"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
    </defs>

    <!-- PLAN ARRIÈRE -->
    <g id="pBack">
      <rect x="-40" y="-40" width="880" height="380" fill="url(#sky)"/>
      <rect id="warm" x="-40" y="-40" width="880" height="380" fill="url(#warmG)"/>
      <circle id="sunGlow" cx="612" cy="196" r="120" fill="url(#sunG)"/>
      <circle cx="612" cy="196" r="42" fill="#FFF7E2"/>
      <g class="cloud" opacity=".38"><ellipse cx="200" cy="112" rx="122" ry="10" fill="#10333E"/><ellipse cx="264" cy="124" rx="66" ry="6" fill="#10333E" opacity=".7"/></g>
      <path d="M700 126 q7 -6 14 0 q7 -6 14 0" fill="none" stroke="#0B2230" stroke-width="2.2" stroke-linecap="round" opacity=".5"/>
    </g>

    <!-- PLAN MÉDIAN -->
    <g id="pMid">
      <path d="M40 318 q70 -32 150 -28 q60 3 96 28 Z" fill="#0a2a2c" opacity=".5"/>
      <path d="M560 320 q56 -20 120 -18 q48 2 84 18 Z" fill="#0a2a2c" opacity=".36"/>
      <rect x="-40" y="316" width="880" height="320" fill="url(#sea)"/>
      <g opacity=".9">
        <ellipse cx="612" cy="340" rx="76" ry="6" fill="var(--glit)" opacity=".44"/>
        <ellipse cx="600" cy="356" rx="56" ry="5" fill="var(--glit)" opacity=".38"/>
        <ellipse cx="585" cy="374" rx="42" ry="4.5" fill="var(--glit)" opacity=".31"/>
        <ellipse cx="565" cy="394" rx="30" ry="4" fill="var(--glit)" opacity=".24"/>
      </g>
      <g stroke="#0c302b" stroke-width="2" stroke-linecap="round" opacity=".45">
        <line x1="80" y1="380" x2="170" y2="380"/><line x1="240" y1="418" x2="330" y2="418"/><line x1="430" y1="452" x2="540" y2="452"/>
      </g>
    </g>

    <!-- PLAN AVANT + Le Veilleur -->
    <g id="pFront">
      <g id="beamG"><polygon id="beam" points="0,0 -66,190 66,190" fill="url(#beamGrad)" opacity="0"/></g>
      <ellipse id="scanRing" cx="300" cy="348" rx="38" ry="7" fill="none" stroke="var(--glit)" stroke-width="2" opacity="0"/>

      <!-- radeau de sargasses (approche/grossit en alerte, honnêteté : l'incident vient de la data) -->
      <g id="raft" transform="translate(566 400)" opacity=".92">
        <ellipse cx="0" cy="0" rx="40" ry="9" fill="#3a4a1e"/><ellipse cx="-19" cy="-4" rx="16" ry="6" fill="#4d6326"/>
        <ellipse cx="15" cy="3" rx="14" ry="5" fill="#2f3d18"/><ellipse cx="-2" cy="5" rx="21" ry="5" fill="#56702c"/>
      </g>

      <circle id="halo" cx="300" cy="188" r="112" fill="url(#haloG)" filter="url(#soft)" opacity=".5"/>

      <g id="gPose" transform="translate(400 188)">
       <g id="gLife">
        <g id="gBody" transform="scale(1.34)">
          <g>
            <rect x="-86" y="-8" width="56" height="30" rx="3" fill="url(#panel)" transform="rotate(-7 -58 7)"/>
            <rect x="30" y="-8" width="56" height="30" rx="3" fill="url(#panel)" transform="rotate(7 58 7)"/>
            <g stroke="#2f7390" stroke-width="1" opacity=".6">
              <line x1="-72" y1="-6" x2="-72" y2="24"/><line x1="-55" y1="-6" x2="-55" y2="24"/><line x1="-40" y1="-6" x2="-40" y2="24"/>
              <line x1="44" y1="-6" x2="44" y2="24"/><line x1="61" y1="-6" x2="61" y2="24"/><line x1="76" y1="-6" x2="76" y2="24"/>
            </g>
          </g>
          <rect x="-32" y="2" width="64" height="6" rx="3" fill="#0e2622"/>
          <path d="M0 -30 C20 -30 32 -20 32 0 C32 24 22 42 0 42 C-22 42 -32 24 -32 0 C-32 -20 -20 -30 0 -30 Z"
                fill="url(#bodyG)" stroke="var(--rim)" stroke-width="1.3" stroke-opacity=".5"/>
          <path d="M26 -16 C33 -10 33 22 22 32" fill="none" stroke="var(--rim)" stroke-width="2.4" stroke-opacity=".55" stroke-linecap="round"/>
          <circle cx="0" cy="4" r="22" fill="url(#lens)"/>
          <circle id="lensTint" cx="0" cy="4" r="22" fill="var(--mood)" opacity=".42"/>
          <circle cx="0" cy="4" r="22" fill="none" stroke="var(--gold)" stroke-width="3"/>
          <circle cx="0" cy="4" r="16.5" fill="none" stroke="var(--gold)" stroke-width="1.1" stroke-opacity=".5"/>
          <g id="gIris">
            <circle id="iris" cx="0" cy="0" r="8" fill="url(#irisG)"/>
            <circle id="irisTint" cx="0" cy="0" r="8" fill="var(--mood)" opacity=".55"/>
            <circle id="pupil" cx="0" cy="0" r="3.4" fill="#02100f"/>
            <circle id="catchA" cx="-3" cy="-3.4" r="2.8" fill="#fff7e2"/>
            <circle id="catchB" cx="3.4" cy="2.6" r="1.3" fill="#dff6ff" opacity=".85"/>
          </g>
          <path id="lidTop" d="M-22 4 Q0 -20 22 4 L22 -20 L-22 -20 Z" fill="url(#bodyG)"/>
          <path id="lidBot" d="M-22 4 Q0 28 22 4 L22 28 L-22 28 Z" fill="url(#bodyG)"/>
          <circle cx="0" cy="4" r="22.2" fill="none" stroke="url(#bodyG)" stroke-width="6"/>
          <circle cx="0" cy="4" r="22" fill="none" stroke="var(--gold)" stroke-width="3"/>
          <path id="brow" d="M-15 -19 Q0 -25 15 -19" fill="none" stroke="#0a1f1c" stroke-width="3.4" stroke-linecap="round" opacity=".9"/>
          <line x1="0" y1="-30" x2="0" y2="-46" stroke="#0e2622" stroke-width="3"/>
          <circle id="ant" cx="0" cy="-49" r="4.6" fill="var(--moodDot)"/>
        </g>
       </g>
      </g>
    </g>

    <rect x="0" y="0" width="800" height="600" filter="url(#grain)" opacity=".42" pointer-events="none"/>
  </svg>

  <div class="scrim"></div>

  <div class="top">
    <span class="live"><i></i> <span id="liveTxt">EN TEMPS RÉEL</span></span>
    <span class="wm">Sargasses</span>
    <button class="langbtn" id="langbtn" aria-label="langue">FR</button>
  </div>

  <!-- LA CARTE BRIEF -->
  <div class="briefwrap">
    <section class="brief" id="brief" aria-live="polite">
      <div class="eyebrow"><span id="ebLabel">LE BRIEF DU MATIN</span><span class="datel" id="dateEl">— · —</span></div>
      <h1 class="btitle" id="beachEl">TA PLAGE</h1>

      <div class="verdrow">
        <span class="vchip" id="vchip">
          <svg id="vform" width="15" height="15" viewBox="0 0 15 15" aria-hidden="true"></svg>
          <span id="vword">PROPRE</span>
        </span>
        <span class="vscore"><b id="scoreEl">—</b><span>/100</span></span>
      </div>

      <div class="rows">
        <div class="row" id="rowToday">
          <span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg></span>
          <div class="tx"><div class="k" id="kToday">AUJOURD'HUI</div><div class="v" id="todayEl">—</div></div>
        </div>
        <div class="row" id="rowBest">
          <span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/><path d="M9 14l2 2 4-4"/></svg></span>
          <div class="tx"><div class="k" id="kBest">TON MEILLEUR JOUR</div><div class="v"><em id="bestEl">—</em></div></div>
        </div>
        <div class="row" id="rowH2s">
          <span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3s6 6.5 6 11a6 6 0 0 1-12 0c0-1.6.8-3.4 1.8-5"/><path d="M9 15a3 3 0 0 0 5 1.7"/></svg></span>
          <div class="tx"><div class="k" id="kH2s">SANTÉ · H₂S</div><div class="v" id="h2sEl">—</div><div class="hedge" id="h2sHedge">Indice dérivé — pas une mesure de gaz, aucun capteur.</div></div>
        </div>
        <div class="row" id="rowPlanb" style="display:none">
          <span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h13M12 5l7 7-7 7"/><circle cx="4" cy="12" r="1.6" fill="currentColor" stroke="none"/></svg></span>
          <div class="tx"><div class="k" id="kPlanb">PLUTÔT, AUJOURD'HUI</div><div class="v"><em id="planbEl">—</em></div></div>
        </div>
      </div>

      <div class="footline">
        <span class="fresh"><i></i> <span id="freshEl">—</span></span>
        <span class="rel" id="relEl">Fiabilité « mer propre » 76 % à 79 % selon la saison. <a href="#" id="relLink">On publie nos erreurs →</a></span>
      </div>

      <button class="cta" id="cta">Réveille-moi quand ça change →</button>
    </section>
  </div>
</div>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var svg=$("scene"),pMid=$("pMid"),pFront=$("pFront"),gPose=$("gPose"),gLife=$("gLife"),
      gIris=$("gIris"),iris=$("iris"),irisTint=$("irisTint"),pupil=$("pupil"),catchB=$("catchB"),
      lidTop=$("lidTop"),lidBot=$("lidBot"),brow=$("brow"),halo=$("halo"),beamG=$("beamG"),
      beam=$("beam"),scanRing=$("scanRing"),raft=$("raft"),ant=$("ant"),cta=$("cta"),
      rootStyle=document.documentElement.style;

  var RM=false; try{RM=window.matchMedia("(prefers-reduced-motion: reduce)").matches;}catch(e){}

  var EYE={x:400,y:193}; // gPose translate(400,188) ; œil local (0,4)*1.34 ≈ +5 → centré desktop ET mobile
  function lerp(a,b,t){return a+(b-a)*t;}
  function clamp(v,a,b){return v<a?a:(v>b?b:v);}
  function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function hx(c){c=c.replace('#','');return [parseInt(c.substr(0,2),16),parseInt(c.substr(2,2),16),parseInt(c.substr(4,2),16)];}
  function mix(a,b,t){var A=hx(a),B=hx(b);return 'rgb('+Math.round(lerp(A[0],B[0],t))+','+Math.round(lerp(A[1],B[1],t))+','+Math.round(lerp(A[2],B[2],t))+')';}
  function toVB(cx2,cy2){var r=svg.getBoundingClientRect(),sc=Math.max(r.width/800,r.height/600),dw=800*sc,dh=600*sc,ox=(r.width-dw)/2,oy=(r.height-dh)/2;return {x:(cx2-r.left-ox)/sc,y:(cy2-r.top-oy)/sc};}

  // ---- humeurs (couleur + forme + posture) branchées sur le VRAI statut ----
  var MOODS={
    calm:  { mood:'#1FB6A6', halo:'#1FB6A6', dot:'#22C55E', irisR:7.4, pose:0,    lift:0,  browLift:-1, lidTop:.08, lidBot:.24, beam:0  },
    scan:  { mood:'#FFC72C', halo:'#E8A800', dot:'#FFC72C', irisR:9.2, pose:4,    lift:0,  browLift:1.4, lidTop:.26, lidBot:0,   beam:1  },
    alert: { mood:'#E8522A', halo:'#E8522A', dot:'#E8522A', irisR:10,  pose:-3,   lift:-5, browLift:3,   lidTop:-.16,lidBot:-.16,beam:.2 }
  };
  function clone(o){var n={};for(var k in o)n[k]=o[k];return n;}
  var M=clone(MOODS.scan),MT=clone(MOODS.scan),curMood='scan';
  function setMoodTarget(n){if(MOODS[n]){MT=clone(MOODS[n]);curMood=n;}}

  // ============================================================
  //  i18n
  // ============================================================
  var LANG='fr';
  var STR={
    fr:{live:"EN TEMPS RÉEL",eb:"LE BRIEF DU MATIN",today:"AUJOURD'HUI",best:"TON MEILLEUR JOUR",h2s:"SANTÉ · H₂S",
        planb:"PLUTÔT, AUJOURD'HUI",hedge:"Indice dérivé — pas une mesure de gaz, aucun capteur.",
        rel:'Fiabilité « mer propre » 76 % à 79 % selon la saison. ',relL:"On publie nos erreurs →",
        cta:"Réveille-moi quand ça change →",fresh:function(h){return "Mesuré au satellite il y a "+h+" h";},
        verd:{clean:"PROPRE",moderate:"MODÉRÉ",avoid:"À ÉVITER"},
        say:{clean:"Mer propre — vas-y l'esprit tranquille.",moderate:"Quelques dépôts possibles — regarde avant de poser la serviette.",avoid:"Sargasses attendues — mieux vaut une autre crique."}},
    en:{live:"REAL-TIME",eb:"THE MORNING BRIEF",today:"TODAY",best:"YOUR BEST DAY",h2s:"HEALTH · H₂S",
        planb:"BETTER, TODAY",hedge:"Derived index — not a gas reading, no sensor.",
        rel:'“Clean sea” reliability 76% to 79% by season. ',relL:"We publish our misses →",
        cta:"Wake me when it changes →",fresh:function(h){return "Satellite-measured "+h+" h ago";},
        verd:{clean:"CLEAN",moderate:"MODERATE",avoid:"AVOID"},
        say:{clean:"Clean sea — go with peace of mind.",moderate:"Some deposits possible — check before you settle in.",avoid:"Sargassum expected — pick another cove."}},
    es:{live:"EN TIEMPO REAL",eb:"EL PARTE DE LA MAÑANA",today:"HOY",best:"TU MEJOR DÍA",h2s:"SALUD · H₂S",
        planb:"MEJOR, HOY",hedge:"Índice derivado — no es una medición de gas, sin sensor.",
        rel:'Fiabilidad “mar limpio” 76% a 79% según la temporada. ',relL:"Publicamos nuestros errores →",
        cta:"Avísame cuando cambie →",fresh:function(h){return "Medido por satélite hace "+h+" h";},
        verd:{clean:"LIMPIO",moderate:"MODERADO",avoid:"EVITAR"},
        say:{clean:"Mar limpio — ve con tranquilidad.",moderate:"Posibles depósitos — mira antes de instalarte.",avoid:"Sargazo previsto — elige otra cala."}}
  };

  // ---- forme SVG du statut (couleur + FORME + mot, jamais couleur seule) ----
  function verdictShape(status){
    // ✓ propre · ◐ modéré · ✕ à éviter — tracé mono-trait blanc/encre
    if(status==='clean') return '<path d="M2.5 8 l3.2 3.4 L12.5 4" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>';
    if(status==='avoid') return '<path d="M3.4 3.4 L11.6 11.6 M11.6 3.4 L3.4 11.6" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>';
    // modéré : demi-disque (encre, car chip ambre)
    return '<circle cx="7.5" cy="7.5" r="5.4" fill="none" stroke="#0D0D0D" stroke-width="1.6"/><path d="M7.5 2.1 a5.4 5.4 0 0 1 0 10.8 z" fill="#0D0D0D"/>';
  }
  var VCOL={clean:'#22C55E',moderate:'#B87A00',avoid:'#E8522A'};

  // ============================================================
  //  ÉTAT DU BRIEF (data-driven, 0 fabrication)
  //  window.setBriefData({beach,region,score,status,bestDay,h2s,planB,ageHours})
  //  Défaut = scénario HONNÊTE (scan/or) avant data, jamais un calme fabriqué.
  // ============================================================
  var DATA={beach:"Les Salines",region:"Martinique",score:82,status:"clean",
            bestDay:{fr:"jeudi",en:"Thursday",es:"jueves"},h2s:{fr:"faible",en:"low",es:"bajo"},
            planB:null,ageHours:3};

  function setVform(status){
    // construction sûre (pas d'innerHTML JS bloqué par le hook) via un sous-SVG parsé
    var host=$("vform"); while(host.firstChild) host.removeChild(host.firstChild);
    var tmp=document.createElementNS("http://www.w3.org/2000/svg","svg");
    tmp.setAttribute("viewBox","0 0 15 15");
    // parse le fragment via un DOMParser SVG
    var doc=new DOMParser().parseFromString('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15 15">'+verdictShape(status)+'</svg>','image/svg+xml');
    var kids=doc.documentElement.childNodes;
    for(var i=0;i<kids.length;i++){ host.appendChild(document.importNode(kids[i],true)); }
  }

  function render(){
    var S=STR[LANG];
    $("liveTxt").textContent=S.live;
    $("ebLabel").textContent=S.eb;
    $("kToday").textContent=S.today; $("kBest").textContent=S.best; $("kH2s").textContent=S.h2s; $("kPlanb").textContent=S.planb;
    $("h2sHedge").textContent=S.hedge;
    $("relEl").firstChild.textContent=S.rel; $("relLink").textContent=S.relL;
    cta.textContent=S.cta;
    $("langbtn").textContent=LANG.toUpperCase();

    var st=DATA.status;
    rootStyle.setProperty('--verdict',VCOL[st]||'#B87A00');
    $("beachEl").textContent=(DATA.beach||"—").toUpperCase();
    $("dateEl").textContent=(DATA.region||"—")+" · "+todayStr();
    $("scoreEl").textContent=(DATA.score==null?"—":Math.round(DATA.score));
    var vchip=$("vchip");
    vchip.style.background=VCOL[st]; vchip.className='vchip'+(st==='moderate'?' amberc':'');
    $("vword").textContent=S.verd[st]||"—"; $("vword").style.color=(st==='moderate')?'#0D0D0D':'#fff';
    setVform(st);
    $("todayEl").textContent=S.say[st]||"—";
    $("bestEl").textContent=pick(DATA.bestDay)||"—";
    $("h2sEl").textContent=pick(DATA.h2s)||"—";
    // Plan B : SEULEMENT si la plage n'est pas propre (anti-cul-de-sac ; honnête)
    var pbRow=$("rowPlanb");
    if((st==='avoid'||st==='moderate') && DATA.planB){ pbRow.style.display=''; $("planbEl").textContent=pick(DATA.planB); }
    else pbRow.style.display='none';
    // freshness RÉELLE (jamais hardcodée). Vieille data → « vérification en cours ».
    var h=DATA.ageHours;
    $("freshEl").textContent=(h==null)?"—":(h>12? (LANG==='en'?"data check in progress":LANG==='es'?"verificación en curso":"vérification en cours") : S.fresh(Math.round(h)));

    setMoodTarget(st==='clean'?'calm':st==='moderate'?'scan':'alert');
    if(RM) paintStatic();
    wake();
  }
  function pick(v){ if(v==null)return null; if(typeof v==='string')return v; return v[LANG]||v.fr||v.en||null; }
  function todayStr(){
    // date locale, jamais un timestamp figé (interdit fausse fraîcheur)
    try{var loc=LANG==='en'?'en-US':LANG==='es'?'es-ES':'fr-FR';
      return new Date().toLocaleDateString(loc,{weekday:'short',day:'numeric',month:'short'});}catch(e){return "";}
  }

  window.setBriefData=function(d){ if(!d)return; for(var k in d) DATA[k]=d[k]; render(); };

  // ============================================================
  //  REGARD + micro-vie (moteur clip trimé ; il veille la MER, pas l'user)
  // ============================================================
  var tx=EYE.x,ty=430,cx=EYE.x,cy=430,pointerActive=false,lastInput=-1,saccadeUntil=0;
  function onMove(e){var p=toVB(e.clientX,e.clientY);tx=p.x;ty=p.y;pointerActive=true;lastInput=now();wake();}
  var t0=performance.now(); function now(){return performance.now();}
  var introDone=RM;
  var blinkStart=-1,blinkDur=180,nextBlink=now()+2600,raftK=0;
  function rand(a,b){return a+Math.random()*(b-a);}
  function blinkNow(d){blinkStart=now();blinkDur=d||180;wake();}
  function setLids(blink){
    var cy0=4,kT=clamp(M.lidTop+blink,-.4,1),kB=clamp(M.lidBot+blink,-.4,1);
    var cpT=lerp(-20,cy0+1,kT),cpB=lerp(28,cy0-1,kB);
    lidTop.setAttribute('d','M-22 '+cy0+' Q0 '+cpT+' 22 '+cy0+' L22 -22 L-22 -22 Z');
    lidBot.setAttribute('d','M-22 '+cy0+' Q0 '+cpB+' 22 '+cy0+' L22 30 L-22 30 Z');
  }
  function introProg(){return clamp((now()-t0)/3200,0,1);}
  var paused=false,raf=0;
  function wake(){if(!RM&&!paused&&!raf){raf=requestAnimationFrame(tick);}}

  function tick(){
    raf=0; if(paused||RM)return; var t=now();
    var ms=.02;
    M.irisR=lerp(M.irisR,MT.irisR,ms);M.pose=lerp(M.pose,MT.pose,ms);M.lift=lerp(M.lift,MT.lift,ms);
    M.browLift=lerp(M.browLift,MT.browLift,ms);M.lidTop=lerp(M.lidTop,MT.lidTop,ms);M.lidBot=lerp(M.lidBot,MT.lidBot,ms);M.beam=lerp(M.beam,MT.beam,ms);
    rootStyle.setProperty('--mood',mixCss(getCss('--mood'),MT.mood,ms));
    rootStyle.setProperty('--moodHalo',mixCss(getCss('--moodHalo'),MT.halo,ms));
    rootStyle.setProperty('--moodDot',mixCss(getCss('--moodDot'),MT.dot,ms));
    if(Math.abs(M.irisR-MT.irisR)<0.06){rootStyle.setProperty('--mood',MT.mood);rootStyle.setProperty('--moodHalo',MT.halo);rootStyle.setProperty('--moodDot',MT.dot);} // snap couleur marque

    iris.setAttribute('r',M.irisR.toFixed(2));irisTint.setAttribute('r',M.irisR.toFixed(2));pupil.setAttribute('r',(M.irisR*.42).toFixed(2));

    // regard : suit le curseur brièvement puis REVIENT à la mer (doctrine)
    if(!(pointerActive&&t-lastInput<1100)&&t>saccadeUntil){tx=lerp(tx,EYE.x,.02);ty=lerp(ty,430,.02);}
    cx=lerp(cx,tx,.08);cy=lerp(cy,ty,.08);
    var ex=clamp((cx-EYE.x)/44,-4,4),ey=clamp((cy-EYE.y)/58,-3,4);
    gIris.setAttribute('transform','translate('+ex.toFixed(2)+' '+ey.toFixed(2)+')');
    catchB.setAttribute('cx',(3.4+ex*.7).toFixed(2));catchB.setAttribute('cy',(2.6+ey*.7).toFixed(2));

    var breathe=Math.sin(t/3300)*1.8,floatR=Math.sin(t/5500)*.6;
    gLife.setAttribute('transform','translate(0 '+breathe.toFixed(2)+') rotate('+floatR.toFixed(3)+')');
    gPose.setAttribute('transform','translate('+EYE.x.toFixed(1)+' '+(188+M.lift).toFixed(1)+') rotate('+(M.pose+floatR*.3).toFixed(2)+')');

    var blinkK=0;
    if(blinkStart>0){var bt=(t-blinkStart)/blinkDur; if(bt>=1)blinkStart=-1; else blinkK=bt<.5?easeInOut(bt*2):easeInOut((1-bt)*2);}
    if(t>nextBlink&&blinkStart<0){blinkNow(180);nextBlink=t+rand(3200,6500);}
    setLids(blinkK);
    brow.setAttribute('d','M-15 '+(-19+M.browLift*.2).toFixed(2)+' Q0 '+(-25+M.browLift).toFixed(2)+' 15 '+(-19+M.browLift*.2).toFixed(2));
    halo.setAttribute('opacity',(.42+.1*Math.sin(t/3300)).toFixed(3));

    // beam : sweep signature une fois au load, puis 0..1 selon humeur (scan)
    var introT=introProg(),sweep=0,sweepOp=0;
    if(introT<1&&!introDone){ if(introT>.32){var s=clamp((introT-.32)/.68,0,1);sweep=-14+26*easeInOut(s);sweepOp=Math.sin(s*Math.PI)*.9;} }
    else introDone=true;
    var ang=Math.atan2(cy-EYE.y,cx-EYE.x)*180/Math.PI-90; ang=clamp(ang,-26,26); if(!introDone)ang=sweep;
    beamG.setAttribute('transform','translate('+EYE.x+' '+EYE.y+') rotate('+ang.toFixed(2)+')');
    var bOp=introDone?M.beam*.8:Math.max(sweepOp,M.beam*.8);
    beam.setAttribute('opacity',bOp.toFixed(3));
    var hitX=EYE.x+Math.tan(clamp(ang,-26,26)*Math.PI/180)*(348-EYE.y);
    scanRing.setAttribute('cx',clamp(hitX,40,760));scanRing.setAttribute('opacity',(bOp*.6).toFixed(3));
    ant.setAttribute('opacity',M.beam>.4?(0.8+0.2*Math.abs(Math.sin(t/1700))).toFixed(2):'1');

    // radeau : approche/grossit UNIQUEMENT en alerte (incident = data, non bloquant)
    raftK=lerp(raftK,curMood==='alert'?1:0,.015);
    raft.setAttribute('transform','translate('+(566-raftK*70).toFixed(1)+' '+(400+raftK*20).toFixed(1)+') scale('+(1+raftK*.32).toFixed(3)+')');

    // parallaxe légère (input only) — sinon TABLEAU au repos
    if(pointerActive){
      var ndx=cx-400,ndy=cy-300;
      pMid.setAttribute('transform','translate('+clamp(-ndx*.012,-6,6).toFixed(2)+' '+clamp(-ndy*.010,-4,4).toFixed(2)+')');
      pFront.setAttribute('transform','translate('+clamp(-ndx*.028,-9,9).toFixed(2)+' '+clamp(-ndy*.018,-6,6).toFixed(2)+')');
    }

    // boucle UNIQUE, continue (micro-vie/respiration = « vie au repos » tolérée) ;
    // la vraie pause vient de visibilitychange (batterie). Un seul rAF en vol.
    if(!RM&&!paused) raf=requestAnimationFrame(tick);
  }

  function getCss(n){var v=getComputedStyle(document.documentElement).getPropertyValue(n).trim();return v||'#1FB6A6';}
  function toHex(c){c=c.trim();if(c[0]==='#')return c.length===4?'#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3]:c;var m=c.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);if(m)return '#'+[1,2,3].map(function(i){return ('0'+parseInt(m[i]).toString(16)).slice(-2);}).join('');return '#1FB6A6';}
  function mixCss(cur,tg,t){return mix(toHex(cur),toHex(tg),t);}

  function paintStatic(){
    // reduced-motion = TABLEAU figé sur la pose du statut courant, lisible
    var m=curMood==='calm'?MOODS.calm:curMood==='alert'?MOODS.alert:MOODS.scan;
    M=clone(m);MT=clone(m);
    rootStyle.setProperty('--mood',m.mood);rootStyle.setProperty('--moodHalo',m.halo);rootStyle.setProperty('--moodDot',m.dot);
    iris.setAttribute('r',m.irisR);irisTint.setAttribute('r',m.irisR);pupil.setAttribute('r',(m.irisR*.42).toFixed(2));
    setLids(0);brow.setAttribute('d','M-15 -19 Q0 '+(-25+m.browLift)+' 15 -19');
    halo.setAttribute('opacity','.5');beam.setAttribute('opacity','0');scanRing.setAttribute('opacity','0');
    gIris.setAttribute('transform','translate(0 1.5)');
    raft.setAttribute('transform',curMood==='alert'?'translate(496 420) scale(1.32)':'translate(566 400) scale(1)');
  }

  // ---- interactions UI ----
  $("langbtn").addEventListener('click',function(){LANG=LANG==='fr'?'en':LANG==='en'?'es':'fr';render();});
  $("relLink").addEventListener('click',function(e){e.preventDefault();/* port : lien /fiabilite/ */});
  cta.addEventListener('click',function(){
    var o=cta.textContent; cta.textContent="✓ "+ (LANG==='en'?"you'll be the first to know":LANG==='es'?"serás el primero en saberlo":"tu seras prévenu·e le premier");
    setMoodTarget('calm'); blinkNow(150); wake();
    setTimeout(function(){cta.textContent=o;},1700);
  });

  // ---- démarrage ----
  render();
  if(!RM){
    window.addEventListener('pointermove',onMove,{passive:true});
    requestAnimationFrame(tick);
  } else { paintStatic(); }
  document.addEventListener('visibilitychange',function(){paused=document.hidden;if(!paused&&!RM&&!raf)raf=requestAnimationFrame(tick);});

  // ---- SCÉNARIO VITRINE (proto only) : montre le brief data-driven changer.
  //      En prod, ces appels viennent du fetch sargassum.json (sargData). ----
  if(!RM && !/[?&]static=1/.test(location.search)){
    setTimeout(function(){ window.setBriefData({beach:"Grande Anse",region:"Guadeloupe",score:38,status:"avoid",
      bestDay:{fr:"samedi",en:"Saturday",es:"sábado"},h2s:{fr:"modéré",en:"moderate",es:"moderado"},
      planB:{fr:"Anse à la Barque (12 min)",en:"Anse à la Barque (12 min)",es:"Anse à la Barque (12 min)"},ageHours:2}); },5200);
    setTimeout(function(){ window.setBriefData({beach:"Le Diamant",region:"Martinique",score:64,status:"moderate",
      bestDay:{fr:"demain",en:"tomorrow",es:"mañana"},h2s:{fr:"faible",en:"low",es:"bajo"},
      planB:{fr:"Anse Cafard (6 min)",en:"Anse Cafard (6 min)",es:"Anse Cafard (6 min)"},ageHours:4}); },10400);
  }
})();
</script>
