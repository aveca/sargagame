<!doctype html>
<!-- EFFET FINAL "WOW" échouage — gagnant jury = paint-splat ("Le Grand Splat") + 5 greffes :
     G1 foam-particles : ~8 gouttes routées le long de la TANGENTE du rivage (perspective) qui
        S'ABSORBENT dans le sable ; ~6 gardent la parabole splash.
     G2 impact-bloom  : (a) dépôt CLIPPÉ sur le sable (ne déborde jamais en mer) ;
        (b) 1 onde concentrique encre+reflet ×4 fade 0.26s.
     G3 foam-particles : PULSE du liseré d'écume du rivage à l'impact (stroke 6→10).
     G4 ink-bleed     : halftone du dépôt RÉVÉLÉ progressivement (opacity 0→.34 synchro scale).
     G5 shatter/tide  : dépôt orienté le long de la côte (rotate COAST_DEG).
     1 SEUL rAF · transform/opacity only · reduced-motion = pose figée · createElementNS only. -->
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Échouage WOW — Le Grand Splat + greffes</title>
<style>
  html,body{margin:0;background:#0b0a12;font-family:system-ui,sans-serif;color:#fff}
  .stage{position:relative;width:800px;max-width:100vw;aspect-ratio:800/600;margin:0 auto;overflow:hidden}
  .lbl{position:fixed;top:8px;left:10px;z-index:99;font:700 12px/1.4 ui-monospace,monospace;background:rgba(0,0,0,.58);padding:6px 10px;border-radius:7px}
  .lbl b{color:#FFE9A8}
  .sea{position:absolute;inset:0;background:
    radial-gradient(120% 80% at 78% 2%, rgba(255,214,140,.62), rgba(255,140,80,.26) 34%, transparent 62%),
    radial-gradient(130% 120% at 4% 118%, rgba(42,21,80,.72), rgba(58,28,90,.28) 42%, transparent 64%),
    linear-gradient(164deg,#ff8a4d 0%,#ff7a4d 16%,#8a4a8e 38%,#6a2f9e 58%,#3e2470 82%,#2e1a5e 100%)}
  svg{position:absolute;inset:0;width:100%;height:100%;display:block}
</style></head>
<body>
<div class="lbl" id="lbl">Le Grand Splat + greffes — <b>clic = pause</b></div>
<div class="stage">
  <div class="sea"></div>
  <svg id="scene" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <defs>
      <radialGradient id="sargG" cx="40%" cy="32%" r="70%">
        <stop offset="0" stop-color="#E3B743"/><stop offset=".48" stop-color="#B08A2A"/><stop offset="1" stop-color="#7C6A22"/>
      </radialGradient>
      <radialGradient id="splatG" cx="42%" cy="36%" r="72%">
        <stop offset="0" stop-color="#E3B743"/><stop offset=".4" stop-color="#B08A2A"/><stop offset=".82" stop-color="#7C6A22"/><stop offset="1" stop-color="#5d5a1e"/>
      </radialGradient>
      <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FBE9B8"/><stop offset="1" stop-color="#E9C77E"/>
      </linearGradient>
      <pattern id="halftone" width="7" height="7" patternUnits="userSpaceOnUse">
        <circle cx="1.6" cy="1.6" r="1.1" fill="#2c2a12" opacity=".42"/>
      </pattern>
      <!-- G2a : clip du dépôt sur le sable -->
      <clipPath id="sandClip"><path id="sandClipPath" d=""/></clipPath>
    </defs>

    <!-- ── CÔTE : sable + liseré d'écume (le rivage passe PAR le point d'impact) ── -->
    <g id="coast">
      <path id="sandFill" d="" fill="url(#sand)" stroke="#0d0b14" stroke-width="4" stroke-linejoin="round"/>
      <path id="sandShade" d="" fill="#caa45a" opacity=".32"/>
      <path id="shoreFoam"  d="" fill="none" stroke="#eafcff" stroke-width="6" stroke-linecap="round" opacity=".85"/>
      <path id="shoreFoam2" d="" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity=".9"/>
      <ellipse cx="742" cy="300" rx="40" ry="22" fill="#2BAE66" opacity=".5"/>
      <ellipse cx="704" cy="334" rx="26" ry="15" fill="#157F49" opacity=".5"/>
    </g>

    <g id="depositLayer" clip-path="url(#sandClip)"></g>  <!-- dépôt, clippé sur le sable -->
    <g id="rippleLayer"></g>                              <!-- onde concentrique -->
    <g id="foamLayer"></g>                                <!-- écume d'impact -->
    <g id="dropLayer"></g>                                <!-- gouttes -->
    <g id="bankLayer"></g>                                <!-- banc -->
    <g id="lineLayer"></g>                                <!-- speed-lines -->
    <g id="pinLayer"></g>                                 <!-- pin avoid -->
  </svg>
</div>

<script>
const NS="http://www.w3.org/2000/svg", INK="#0d0b14";
const el=(n,a)=>{const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};
const rng=seed=>{let s=((seed%233280)+233280)%233280;return()=>(s=(s*9301+49297)%233280)/233280;};
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
function splatPath(cx,cy,r,seed,N,jag){
  N=N||10; jag=jag==null?0.75:jag;
  const rand=rng(seed),p=[];
  for(let i=0;i<N;i++){const a=(i/N)*6.2832, rr=r*(1-jag*0.5+rand()*jag);p.push([cx+Math.cos(a)*rr, cy+Math.sin(a)*rr]);}
  let d=`M${((p[0][0]+p[N-1][0])/2).toFixed(1)} ${((p[0][1]+p[N-1][1])/2).toFixed(1)}`;
  for(let i=0;i<N;i++){const a=p[i],b=p[(i+1)%N];d+=`Q${a[0].toFixed(1)} ${a[1].toFixed(1)} ${((a[0]+b[0])/2).toFixed(1)} ${((a[1]+b[1])/2).toFixed(1)}`;}
  return d+"Z";
}

// ── GÉOMÉTRIE : le rivage passe PAR l'impact ; tangente côte = COAST ──
const IMPACT={x:400,y:384}, ORIGIN={x:150,y:90};
const SHORE="M800 250 C650 282 520 330 400 384 C300 428 150 448 0 466";
document.getElementById("shoreFoam").setAttribute("d",SHORE);
document.getElementById("shoreFoam2").setAttribute("d",SHORE);
document.getElementById("sandFill").setAttribute("d",SHORE+" L0 600 L800 600 Z");
document.getElementById("sandClipPath").setAttribute("d",SHORE+" L0 600 L800 600 Z");
document.getElementById("sandShade").setAttribute("d","M800 312 C660 342 540 386 420 436 C330 474 170 492 0 510 L0 600 L800 600 Z");
const COAST_DEG=-15, COAST_RAD=COAST_DEG*Math.PI/180;       // tangente du rivage (monte à droite)
const TAN={x:Math.cos(COAST_RAD), y:Math.sin(COAST_RAD)};   // axe le long du rivage
const SINK={x:0.259, y:0.966};                               // normale vers le sable (où s'absorber)

// ── BANC avant impact ──
function makeBank(seed){
  const g=el("g",{}), R=22, sil=splatPath(0,0,R,seed,11,0.55);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".30",transform:"translate(2.5 3.5)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#sargG)",stroke:INK,"stroke-width":2,"stroke-linejoin":"round"}));
  const rd=rng(seed*5+1);
  for(let i=0;i<3;i++){const ox=(rd()-.5)*R*0.8, oy=(rd()-.5)*R*0.7;
    g.appendChild(el("path",{d:splatPath(ox,oy,R*0.32,seed*9+i*7,7,0.6),fill:"#5d5a1e",opacity:".55"}));}
  g.appendChild(el("path",{d:sil,fill:"url(#halftone)",opacity:".3"}));
  g.appendChild(el("path",{d:splatPath(-R*0.22,-R*0.28,R*0.5,seed+3,7,0.5),fill:"#FFE9A8",opacity:".5"}));
  return g;
}
// ── DÉPÔT étalé : renvoie {g, ht} (G4 : halftone révélé) ──
function makeDeposit(seed){
  const g=el("g",{opacity:"0"}), R=66, sil=splatPath(0,0,R,seed,13,0.78);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".26",transform:"translate(3 4)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#splatG)",stroke:INK,"stroke-width":2.4,"stroke-linejoin":"round"}));
  const rl=rng(seed*7+3);
  for(let i=0;i<4;i++){const a=(0.15+rl()*0.7)*3.14159, len=R*(0.95+rl()*0.6);
    const x=Math.cos(a)*len, y=Math.abs(Math.sin(a))*len*0.7+R*0.3, w=10+rl()*9;
    g.appendChild(el("path",{d:splatPath(x,y,w,seed*13+i*5,7,0.7),fill:"url(#splatG)",stroke:INK,"stroke-width":1.6,"stroke-linejoin":"round"}));}
  const rd=rng(seed*11+2);
  for(let i=0;i<5;i++){const ox=(rd()-.5)*R*1.1, oy=(rd()-.5)*R*0.9;
    g.appendChild(el("path",{d:splatPath(ox,oy,R*(0.18+rd()*0.12),seed*17+i*9,7,0.6),fill:"#5d5a1e",opacity:".5"}));}
  const ht=el("path",{d:sil,fill:"url(#halftone)",opacity:"0"});  // G4 : démarre à 0, révélé
  g.appendChild(ht);
  g.appendChild(el("path",{d:splatPath(-R*0.28,-R*0.34,R*0.42,seed+5,8,0.5),fill:"#FFE9A8",opacity:".45"}));
  return {g, ht};
}
function makeFoam(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,4,40,seed+1,12,0.6),fill:"none",stroke:"#eafcff","stroke-width":7,opacity:".9","stroke-linejoin":"round"}));
  g.appendChild(el("path",{d:splatPath(0,4,40,seed+1,12,0.6),fill:"none",stroke:"#ffffff","stroke-width":2.6,opacity:".95","stroke-linejoin":"round"}));
  const rf=rng(seed*3+4);
  for(let i=0;i<8;i++){const a=(i/8)*6.28+rf()*0.4, rr=46+rf()*16;
    g.appendChild(el("circle",{cx:(Math.cos(a)*rr).toFixed(1),cy:(Math.sin(a)*rr*0.7+6).toFixed(1),r:(2+rf()*2).toFixed(1),fill:"#fff",opacity:".85"}));}
  return g;
}
// ── G2b : onde concentrique encre + reflet ──
function makeRipple(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,0,30,seed+9,14,0.18),fill:"none",stroke:INK,"stroke-width":3,opacity:".7"}));
  g.appendChild(el("path",{d:splatPath(0,0,30,seed+9,14,0.18),fill:"none",stroke:"#FFE9A8","stroke-width":1.4,opacity:".9"}));
  return g;
}
function makePin(x,y){
  const g=el("g",{transform:`translate(${x} ${y})`});
  g.appendChild(el("ellipse",{cx:0,cy:1,rx:6,ry:2.4,fill:"#062033",opacity:".4"}));
  g.appendChild(el("path",{d:"M0 0 C-6 -8 -9 -11.6 -9 -16 A9 9 0 1 1 9 -16 C9 -11.6 6 -8 0 0 Z",fill:"#E8472A",stroke:INK,"stroke-width":1.8,"stroke-linejoin":"round"}));
  g.appendChild(el("circle",{cx:0,cy:-16,r:3.4,fill:"#fff",stroke:INK,"stroke-width":.8}));
  return g;
}

// ── GOUTTES : 8 "rivage" (tangente + absorption) + 6 "splash" (parabole) — G1 ──
const drops=[];
function makeDrops(){
  const layer=document.getElementById("dropLayer");
  // 8 gouttes le long du rivage (±tangente, perspective)
  for(let i=0;i<8;i++){
    const seed=i*37+11, rand=rng(seed);
    const L=(i/7-0.5)*2;                        // -1..1 le long de la côte
    const dist=46+Math.abs(L)*104;              // bords plus loin (perspective)
    const tx=IMPACT.x + TAN.x*L*dist + SINK.x*(Math.abs(L)*10);   // un cran "plus bas"=vers le sable
    const ty=IMPACT.y + TAN.y*L*dist + SINK.y*(Math.abs(L)*10);
    const rr=2.6+rand()*3.6;
    const g=el("g",{opacity:"0"});
    g.appendChild(el("path",{d:splatPath(0,0,rr,seed,7,0.55),fill:"url(#sargG)",stroke:INK,"stroke-width":1.1,"stroke-linejoin":"round"}));
    layer.appendChild(g);
    drops.push({g,type:"shore",tx,ty,delay:Math.abs(L)*0.06,rot:(rand()*2-1)*120});
  }
  // 6 gouttes splash (parabole, jaillissement vers le haut)
  for(let i=0;i<6;i++){
    const seed=i*53+200, rand=rng(seed);
    const ang=-2.5+rand()*1.9, spd=90+rand()*140, rr=2.4+rand()*3.4;
    const g=el("g",{opacity:"0"});
    g.appendChild(el("path",{d:splatPath(0,0,rr,seed,7,0.55),fill:"url(#sargG)",stroke:INK,"stroke-width":1.1,"stroke-linejoin":"round"}));
    layer.appendChild(g);
    drops.push({g,type:"splash",vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,delay:rand()*0.05,rot:(rand()*2-1)*180});
  }
}
const lines=[];
function makeLines(){
  const layer=document.getElementById("lineLayer"), rand=rng(99);
  for(let i=0;i<10;i++){const a=(i/10)*6.28+rand()*0.25;
    const x1=Math.cos(a)*30,y1=Math.sin(a)*30,x2=Math.cos(a)*(70+rand()*34),y2=Math.sin(a)*(70+rand()*34);
    const ln=el("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),stroke:"#FFE9A8","stroke-width":(2.6+rand()*1.6).toFixed(1),"stroke-linecap":"round",opacity:"0"});
    layer.appendChild(ln); lines.push(ln);}
}

const SEED=42;
const bank=makeBank(SEED); document.getElementById("bankLayer").appendChild(bank);
const dep=makeDeposit(SEED), deposit=dep.g, depHt=dep.ht;
document.getElementById("depositLayer").appendChild(deposit);
const foam=makeFoam(SEED); foam.setAttribute("transform",`translate(${IMPACT.x} ${IMPACT.y})`); document.getElementById("foamLayer").appendChild(foam);
const ripple=makeRipple(SEED); ripple.setAttribute("transform",`translate(${IMPACT.x} ${IMPACT.y})`); document.getElementById("rippleLayer").appendChild(ripple);
makeDrops(); makeLines();
document.getElementById("lineLayer").setAttribute("transform",`translate(${IMPACT.x} ${IMPACT.y})`);
document.getElementById("pinLayer").appendChild(makePin(IMPACT.x,IMPACT.y));
const shoreFoam=document.getElementById("shoreFoam");

// ── timeline ──
const T_APPROACH=1.10,T_IMPACT=1.18,T_SETTLE=1.55,T_FADE=3.05,T_LOOP=3.35;
const ease=p=>p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
const easeOut=p=>1-Math.pow(1-p,3);
const REDUCED=matchMedia("(prefers-reduced-motion:reduce)").matches;

function render(t){
  // BANC
  if(t<T_IMPACT){
    const p=ease(clamp(t/T_APPROACH,0,1));
    const x=ORIGIN.x+(IMPACT.x-ORIGIN.x)*p, y=ORIGIN.y+(IMPACT.y-ORIGIN.y)*p, sc=0.7+p*0.55;
    const squash=t>T_APPROACH?1+(t-T_APPROACH)/(T_IMPACT-T_APPROACH)*0.7:1;
    const bob=REDUCED?0:Math.sin(t*5)*4*(1-p);
    bank.setAttribute("transform",`translate(${x.toFixed(1)} ${(y+bob).toFixed(1)}) scale(${(sc*squash).toFixed(3)} ${(sc/squash).toFixed(3)})`);
    bank.setAttribute("opacity",t>T_APPROACH?(1-(t-T_APPROACH)/(T_IMPACT-T_APPROACH)).toFixed(2):"1");
  } else bank.setAttribute("opacity","0");

  // DÉPÔT (G5 rotate côte + G4 halftone révélé)
  if(t>=T_IMPACT){
    const pg=clamp((t-T_IMPACT)/(T_SETTLE-T_IMPACT),0,1);
    const sc=(0.25+easeOut(pg)*0.75)*(1+0.12*Math.sin(pg*Math.PI));
    let op=1; if(t>T_FADE) op=clamp(1-(t-T_FADE)/(T_LOOP-T_FADE),0,1);
    deposit.setAttribute("transform",`translate(${IMPACT.x} ${IMPACT.y}) rotate(${COAST_DEG}) scale(${sc.toFixed(3)})`);
    deposit.setAttribute("opacity",op.toFixed(2));
    depHt.setAttribute("opacity",(easeOut(pg)*0.34*op).toFixed(2));
  } else deposit.setAttribute("opacity","0");

  // SPEED-LINES
  {const dt=t-T_IMPACT; let lp=dt<0?0:dt<0.05?dt/0.05:dt<0.30?1-(dt-0.05)/0.25:0; lp=clamp(lp,0,1);
   document.getElementById("lineLayer").setAttribute("transform",`translate(${IMPACT.x} ${IMPACT.y}) scale(${(0.6+lp*0.6).toFixed(3)})`);
   for(const ln of lines) ln.setAttribute("opacity",(lp*0.9).toFixed(2));}

  // ONDE concentrique (G2b) : scale 1→4, fade 0.26s
  {const dt=t-T_IMPACT; let rp=dt<0||dt>0.26?0:1-dt/0.26;
   const rsc=1+easeOut(clamp(dt/0.26,0,1))*3;
   ripple.setAttribute("transform",`translate(${IMPACT.x} ${IMPACT.y}) scale(${rsc.toFixed(3)})`);
   ripple.setAttribute("opacity",clamp(rp,0,1).toFixed(2));}

  // ÉCUME impact
  {const dt=t-T_IMPACT; let fp=dt<0?0:dt<0.5?Math.sin((dt/0.5)*Math.PI*0.9):0; fp=clamp(fp,0,1);
   foam.setAttribute("transform",`translate(${IMPACT.x} ${IMPACT.y}) scale(${(0.5+easeOut(clamp(dt/0.5,0,1))*0.9).toFixed(3)})`);
   foam.setAttribute("opacity",fp.toFixed(2));}

  // G3 : PULSE du liseré d'écume du rivage à l'impact (stroke 6→10, sin(π)/0.18s)
  {const dt=t-T_IMPACT; const pulse=dt>=0&&dt<0.18?Math.sin(dt/0.18*Math.PI):0;
   shoreFoam.setAttribute("stroke-width",(6+pulse*4).toFixed(2));}

  // GOUTTES (G1) : shore=tangente+absorption ; splash=parabole
  {const dt=t-T_IMPACT;
   for(const d of drops){
     const lt=dt-d.delay;
     if(lt<0||lt>0.9){ d.g.setAttribute("opacity","0"); continue; }
     if(d.type==="shore"){
       const fly=easeOut(clamp(lt/0.34,0,1));                 // vole vers sa cible le long du rivage
       const x=IMPACT.x+(d.tx-IMPACT.x)*fly, y=IMPACT.y+(d.ty-IMPACT.y)*fly;
       const ab=clamp((lt-0.55)/0.3,0,1);                     // puis s'absorbe dans le sable
       const sc=clamp(1-lt*0.45,0.4,1)*(1-ab*0.55);
       const op=ab<1?1-ab:0;
       d.g.setAttribute("transform",`translate(${x.toFixed(1)} ${(y+ab*4).toFixed(1)}) scale(${sc.toFixed(2)}) rotate(${(d.rot*fly).toFixed(0)})`);
       d.g.setAttribute("opacity",clamp(op,0,1).toFixed(2));
     } else {
       const x=IMPACT.x+d.vx*lt, y=IMPACT.y+d.vy*lt+320*lt*lt;
       const sc=clamp(1-lt*0.5,0.4,1), op=lt<0.6?1:1-(lt-0.6)/0.25;
       d.g.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${sc.toFixed(2)}) rotate(${(d.rot*lt).toFixed(0)})`);
       d.g.setAttribute("opacity",clamp(op,0,1).toFixed(2));
     }
   }}
}
function renderFrozen(){
  bank.setAttribute("opacity","0");
  for(const ln of lines) ln.setAttribute("opacity","0");
  for(const d of drops) d.g.setAttribute("opacity","0");
  ripple.setAttribute("opacity","0");
  deposit.setAttribute("transform",`translate(${IMPACT.x} ${IMPACT.y}) rotate(${COAST_DEG}) scale(1)`);
  deposit.setAttribute("opacity","1"); depHt.setAttribute("opacity","0.34");
  foam.setAttribute("transform",`translate(${IMPACT.x} ${IMPACT.y}) scale(1.1)`); foam.setAttribute("opacity",".3");
}

let raf=0,paused=false,t0=0;
function frame(tms){ if(!t0)t0=tms; let t=(tms-t0)/1000; if(t>=T_LOOP){t0=tms;t=0;} render(t); if(!paused)raf=requestAnimationFrame(frame); }
if(REDUCED) renderFrozen(); else raf=requestAnimationFrame(frame);
document.body.addEventListener("click",()=>{ if(REDUCED)return; paused=!paused; if(paused)cancelAnimationFrame(raf); else{t0=0;raf=requestAnimationFrame(frame);} });
document.addEventListener("visibilitychange",()=>{ if(REDUCED)return; if(document.hidden)cancelAnimationFrame(raf); else if(!paused){t0=0;raf=requestAnimationFrame(frame);} });
</script>
</body></html>
