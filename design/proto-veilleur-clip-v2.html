<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Le Veilleur — clip de marque (v2)</title>
<style>
  /* ============================================================
     TOKENS MARQUE
     ============================================================ */
  :root{
    --bg:#FDFCF7; --gold:#E8A800; --goldL:#FFC72C; --goldLL:#FFE47A;
    --teal:#009E8E; --green:#22C55E; --amber:#B87A00; --coral:#E8522A;
    --ink:#0D0D0D; --mid:#686868;
    --sky0:#0B2230; --sky1:#155A5A; --sky2:#C97E3A; --sky3:#F2B05E;
    --seaT:#1A5852; --seaB:#08251F; --glit:#FFD884; --sand:#1C1712; --rim:#FFD884;
    --display:"Anton","Haettenschweiler","Arial Narrow Bold","Impact",system-ui,sans-serif;
    --ui:"Bricolage Grotesque",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    /* couleur d'humeur courante (mutée par JS pour crossfades doux) */
    --mood:#16b9c9;       /* iris/halo teint */
    --moodHalo:#1FB6A6;   /* halo veilleur */
    --moodDot:#22C55E;    /* pastille antenne */
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#06140f;color:#fff;font-family:var(--ui);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  #stage{position:fixed;inset:0;overflow:hidden}
  svg#scene{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}

  /* ============================================================
     INTRO — déléguée au timeline JS (1 horloge). Seuls 2 fades
     CSS très simples restent pour l'overlay HTML (skippables).
     ============================================================ */
  @keyframes uiIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fadeIn{animation:uiIn 1.5s cubic-bezier(.22,1,.36,1) .35s both}

  /* ============================================================
     AMBIENT lent autorisé (doctrine calme) — lumière + nuages
     uniquement. La micro-vie du perso est gérée dans le rAF.
     ============================================================ */
  @keyframes cloud{from{transform:translateX(0)}to{transform:translateX(64px)}}
  @keyframes cloud2{from{transform:translateX(0)}to{transform:translateX(-46px)}}
  @keyframes sunBreath{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.82;transform:scale(1.05)}}
  .cloud{animation:cloud 132s linear infinite alternate;transform-box:fill-box}
  .cloud-b{animation:cloud2 168s linear infinite alternate;transform-box:fill-box}
  #sunGlow{animation:sunBreath 11s ease-in-out infinite;transform-box:fill-box;transform-origin:center}

  /* ---- Ripple barrage (transitoire au clic) ---- */
  @keyframes ripple{from{r:2;opacity:.65;stroke-width:3}to{r:52;opacity:0;stroke-width:.5}}
  .ripple{animation:ripple 1.2s cubic-bezier(.2,.6,.2,1) forwards}
  @keyframes boomIn{from{opacity:0;transform:scale(.55) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .boom{animation:boomIn .5s cubic-bezier(.34,1.56,.64,1) both;transform-box:fill-box;transform-origin:center}

  /* ============================================================
     OVERLAY UI
     ============================================================ */
  .ov{position:absolute;left:0;right:0;pointer-events:none}
  .top{top:0;padding:16px 18px;display:flex;align-items:center;gap:12px}
  .live{pointer-events:auto;display:inline-flex;align-items:center;gap:7px;background:rgba(8,20,15,.42);border:1px solid rgba(255,216,132,.28);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);padding:6px 11px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:.08em}
  .live i{width:8px;height:8px;border-radius:50%;background:var(--moodDot);box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:dot 2.6s ease-out infinite}
  @keyframes dot{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 9px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .wm{font-family:var(--display);font-size:15px;letter-spacing:.04em;opacity:.92;text-transform:uppercase}

  /* assombrissement local sous le bloc texte pour la lisibilité */
  .scrim{position:absolute;left:0;right:0;bottom:0;height:46%;pointer-events:none;
    background:linear-gradient(to top,rgba(4,16,11,.62) 0%,rgba(4,16,11,.28) 42%,rgba(4,16,11,0) 100%)}

  .bottom{bottom:0;padding:0 20px max(22px,env(safe-area-inset-bottom)) 20px;display:flex;flex-direction:column;gap:10px}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;color:var(--goldLL);text-transform:uppercase;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .title{font-family:var(--display);font-weight:400;text-transform:uppercase;letter-spacing:-.02em;line-height:.9;margin:0;font-size:clamp(40px,11.5vw,80px);text-shadow:0 2px 26px rgba(0,0,0,.5)}
  .sub{max-width:30ch;font-size:15px;line-height:1.45;color:rgba(255,255,255,.92);text-shadow:0 1px 10px rgba(0,0,0,.6)}
  .cta{pointer-events:auto;align-self:flex-start;margin-top:8px;border:0;cursor:pointer;font-family:var(--ui);font-weight:800;font-size:16px;color:#1a1300;padding:14px 24px;border-radius:100px;
    background:linear-gradient(158deg,#FFE47A 0%,#FFC72C 40%,#E89400 100%);
    box-shadow:0 8px 26px rgba(232,148,0,.4),inset 0 1px 0 rgba(255,255,255,.55);
    transition:transform .16s cubic-bezier(.175,.885,.32,1.275),box-shadow .25s ease}
  .cta:hover{box-shadow:0 12px 32px rgba(232,148,0,.55),inset 0 1px 0 rgba(255,255,255,.6)}
  .cta:active{transform:scale(.96)}
  .hint{position:absolute;left:50%;bottom:104px;transform:translateX(-50%);font-size:11.5px;letter-spacing:.06em;color:rgba(255,255,255,.62);pointer-events:none;text-shadow:0 1px 8px rgba(0,0,0,.6);white-space:nowrap}

  @media (min-width:740px){
    .bottom{padding-bottom:40px} .sub{font-size:17px} .hint{bottom:112px}
  }

  /* ============================================================
     PLANCHER DUR reduced-motion — tableau figé, lisible, cliquable
     ============================================================ */
  @media (prefers-reduced-motion:reduce){
    #scene *{animation:none!important;transition:none!important}
    .fadeIn{animation:none!important;opacity:1!important;transform:none!important}
    .live i{animation:none!important}
  }
</style>
</head>
<body>
<div id="stage">
  <svg id="scene" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" aria-label="Le Veilleur veille la mer au lever du jour">
    <defs>
      <!-- CIEL golden-hour imposé -->
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--sky0)"/>
        <stop offset=".42" stop-color="var(--sky1)"/>
        <stop offset=".74" stop-color="var(--sky2)"/>
        <stop offset="1" stop-color="var(--sky3)"/>
      </linearGradient>
      <linearGradient id="warmG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3a2a18" stop-opacity="0"/>
        <stop offset=".6" stop-color="#C97E3A" stop-opacity=".22"/>
        <stop offset="1" stop-color="#F2B05E" stop-opacity=".46"/>
      </linearGradient>
      <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--seaT)"/>
        <stop offset=".55" stop-color="#0f3b34"/>
        <stop offset="1" stop-color="var(--seaB)"/>
      </linearGradient>
      <radialGradient id="sunG" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#FFF6E0"/>
        <stop offset=".48" stop-color="var(--glit)"/>
        <stop offset="1" stop-color="#F2B05E" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="beamGrad" cx="50%" cy="0%" r="100%">
        <stop offset="0" stop-color="var(--glit)" stop-opacity=".5"/>
        <stop offset=".7" stop-color="var(--glit)" stop-opacity=".12"/>
        <stop offset="1" stop-color="var(--glit)" stop-opacity="0"/>
      </radialGradient>

      <!-- LENTILLE de l'œil : dégradé marque conservé -->
      <radialGradient id="lens" cx="38%" cy="32%" r="72%">
        <stop offset="0" stop-color="#CFF4FF"/>
        <stop offset=".34" stop-color="#16b9c9"/>
        <stop offset="1" stop-color="#052b2b"/>
      </radialGradient>
      <!-- iris : teinté par var(--mood) via overlay, mais base sombre profonde -->
      <radialGradient id="irisG" cx="42%" cy="38%" r="62%">
        <stop offset="0" stop-color="#0a3a39"/>
        <stop offset="1" stop-color="#03100f"/>
      </radialGradient>

      <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#1b4763"/>
        <stop offset="1" stop-color="#0B2230"/>
      </linearGradient>
      <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#1d3c38"/>
        <stop offset=".55" stop-color="#102622"/>
        <stop offset="1" stop-color="#0A1714"/>
      </linearGradient>
      <!-- halo veilleur (couleur d'humeur) -->
      <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="var(--moodHalo)" stop-opacity=".55"/>
        <stop offset=".5" stop-color="var(--moodHalo)" stop-opacity=".18"/>
        <stop offset="1" stop-color="var(--moodHalo)" stop-opacity="0"/>
      </radialGradient>

      <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
      <filter id="softS" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3"/></filter>
      <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope=".03"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>

      <!-- ============================================================
           SYMBOLE RÉDUCTIBLE — la marque (test silhouette 24px→1024px)
           œil-lentille + iris + UN catchlight + encoche-scan + antenne
           Réutilisé via <use> dans la scène (enrichi en sur-couche).
           ============================================================ -->
      <symbol id="veilleur-glyph" viewBox="0 0 120 120">
        <!-- corps squircle (superellipse Bézier, joues larges = baby-schema) -->
        <path d="M60 8
                 C92 8 108 24 108 56
                 C108 92 92 112 60 112
                 C28 112 12 92 12 56
                 C12 24 28 8 60 8 Z" fill="url(#bodyG)"/>
        <!-- antenne -->
        <line x1="60" y1="8" x2="60" y2="-12" stroke="#0e2622" stroke-width="5"/>
        <circle cx="60" cy="-16" r="7" fill="var(--moodDot)"/>
        <!-- œil-lentille -->
        <circle cx="60" cy="58" r="34" fill="url(#lens)"/>
        <circle cx="60" cy="58" r="34" fill="none" stroke="var(--gold)" stroke-width="5"/>
        <circle cx="60" cy="58" r="18" fill="url(#irisG)"/>
        <circle cx="52" cy="50" r="6" fill="#eafcff"/>
      </symbol>
    </defs>

    <!-- ===================== PLAN ARRIÈRE (parallaxe ~0) ===================== -->
    <g id="pBack">
      <rect x="-40" y="-40" width="880" height="420" fill="url(#sky)"/>
      <rect id="warm" x="-40" y="-40" width="880" height="420" fill="url(#warmG)"/>

      <!-- soleil bas + halo qui respire -->
      <circle id="sunGlow" cx="612" cy="206" r="124" fill="url(#sunG)"/>
      <circle cx="612" cy="206" r="44" fill="#FFF7E2"/>

      <!-- nuages longs lents (2 couches déphasées) -->
      <g class="cloud" opacity=".42">
        <ellipse cx="180" cy="116" rx="128" ry="11" fill="#10333E"/>
        <ellipse cx="250" cy="128" rx="70" ry="7" fill="#10333E" opacity=".7"/>
      </g>
      <g class="cloud-b" opacity=".32">
        <ellipse cx="500" cy="150" rx="100" ry="8" fill="#0d2c36"/>
      </g>

      <!-- oiseau lointain -->
      <path d="M698 132 q7 -6 14 0 q7 -6 14 0" fill="none" stroke="#0B2230" stroke-width="2.4" stroke-linecap="round" opacity=".5"/>
    </g>

    <!-- ===================== PLAN MÉDIAN (parallaxe légère) ===================== -->
    <g id="pMid">
      <!-- île-silhouette lointaine, très basse opacité -->
      <path d="M40 332 q70 -34 150 -30 q60 3 96 30 Z" fill="#0a2a2c" opacity=".5"/>
      <path d="M560 333 q56 -22 120 -20 q48 2 84 20 Z" fill="#0a2a2c" opacity=".38"/>

      <!-- mer -->
      <rect x="-40" y="330" width="880" height="312" fill="url(#sea)"/>

      <!-- allée scintillante du soleil (5 ellipses or décroissantes vers le perso) -->
      <g id="sunPath" opacity=".9">
        <ellipse cx="612" cy="352" rx="78" ry="6" fill="var(--glit)" opacity=".46"/>
        <ellipse cx="600" cy="368" rx="58" ry="5" fill="var(--glit)" opacity=".4"/>
        <ellipse cx="585" cy="386" rx="44" ry="4.5" fill="var(--glit)" opacity=".33"/>
        <ellipse cx="565" cy="406" rx="32" ry="4" fill="var(--glit)" opacity=".26"/>
        <ellipse cx="540" cy="428" rx="22" ry="3.5" fill="var(--glit)" opacity=".2"/>
      </g>

      <!-- houle douce (traits horizontaux discrets) -->
      <g stroke="#0c302b" stroke-width="2" stroke-linecap="round" opacity=".5">
        <line x1="80" y1="392" x2="170" y2="392"/>
        <line x1="240" y1="430" x2="330" y2="430"/>
        <line x1="430" y1="470" x2="540" y2="470"/>
        <line x1="120" y1="500" x2="230" y2="500"/>
      </g>
    </g>

    <!-- ===================== PLAN AVANT (parallaxe + acteurs) ===================== -->
    <g id="pFront">
      <!-- faisceau de scan (pivote vers le curseur, émis du VRAI œil) -->
      <g id="beamG">
        <polygon id="beam" points="0,0 -70,196 70,196" fill="url(#beamGrad)" opacity="0"/>
      </g>
      <!-- anneau de scan sur l'eau -->
      <ellipse id="scanRing" cx="300" cy="362" rx="40" ry="8" fill="none" stroke="var(--glit)" stroke-width="2" opacity="0"/>

      <!-- radeau de sargasses (se rapproche/grossit en alerte) -->
      <g id="raft" transform="translate(560 414)" opacity=".95">
        <ellipse cx="0" cy="0" rx="42" ry="9" fill="#3a4a1e"/>
        <ellipse cx="-20" cy="-4" rx="17" ry="6" fill="#4d6326"/>
        <ellipse cx="16" cy="3" rx="15" ry="5" fill="#2f3d18"/>
        <ellipse cx="-2" cy="5" rx="22" ry="5" fill="#56702c"/>
        <ellipse cx="24" cy="-2" rx="11" ry="4" fill="#445a24"/>
      </g>

      <!-- tortue qui glisse (translée par cycle très long via JS, pas d'anim infinie) -->
      <g id="turtle" transform="translate(150 492)" opacity=".9">
        <ellipse cx="0" cy="0" rx="30" ry="19" fill="#0c4b44"/>
        <ellipse cx="0" cy="-2" rx="22" ry="13" fill="#11635a"/>
        <path d="M-2 -13 l4 0 l3 8 l-10 0 z" fill="#0a423c"/>
        <path d="M-9 9 l5 8 M9 9 l5 8 M-22 -4 l-9 3 M22 -4 l9 3" stroke="#0c4b44" stroke-width="6" stroke-linecap="round"/>
        <ellipse cx="26" cy="-3" rx="8" ry="6" fill="#0c4b44"/>
        <circle cx="29" cy="-4" r="1.6" fill="#06140f"/>
      </g>

      <!-- poisson (s'éloigne au tap) -->
      <g id="fish" transform="translate(430 452)" style="cursor:pointer">
        <path d="M0 0 q14 -9 30 0 q-14 9 -30 0 z" fill="#1EC8B0"/>
        <path d="M0 0 l-12 -7 l3 7 l-3 7 z" fill="#0f8f7e"/>
        <circle cx="22" cy="-1" r="2" fill="#06140f"/>
      </g>

      <!-- ============================================================
           LE VEILLEUR
           gPose  = posture émotionnelle (translate+rotate) — JS
             gLife  = micro-vie (respiration/flottaison) — JS
               gBody = corps statique + œil expressif (paupières path,
                       iris dilatable, double catchlight, anneaux d'objectif)
           Ancre scène : translate(300 196). Œil au centre local (0,0).
           ============================================================ -->
      <!-- halo veilleur DERRIÈRE le perso (couleur d'humeur, blur) -->
      <circle id="halo" cx="300" cy="196" r="118" fill="url(#haloG)" filter="url(#soft)" opacity=".5"/>

      <g id="gPose" transform="translate(400 196)">
       <g id="gLife">
        <g id="gBody" transform="scale(1.42)">

          <!-- panneaux solaires -->
          <g>
            <rect x="-86" y="-8" width="56" height="30" rx="3" fill="url(#panel)" transform="rotate(-7 -58 7)"/>
            <rect x="30" y="-8" width="56" height="30" rx="3" fill="url(#panel)" transform="rotate(7 58 7)"/>
            <g stroke="#2f7390" stroke-width="1" opacity=".65">
              <line x1="-72" y1="-6" x2="-72" y2="24"/><line x1="-55" y1="-6" x2="-55" y2="24"/><line x1="-40" y1="-6" x2="-40" y2="24"/>
              <line x1="44" y1="-6" x2="44" y2="24"/><line x1="61" y1="-6" x2="61" y2="24"/><line x1="76" y1="-6" x2="76" y2="24"/>
            </g>
          </g>
          <!-- bras -->
          <rect x="-32" y="2" width="64" height="6" rx="3" fill="#0e2622"/>

          <!-- CORPS = vrai squircle (superellipse), joues > sommet (baby-schema) -->
          <path d="M0 -30
                   C20 -30 32 -20 32 0
                   C32 24 22 42 0 42
                   C-22 42 -32 24 -32 0
                   C-32 -20 -20 -30 0 -30 Z"
                fill="url(#bodyG)" stroke="var(--rim)" stroke-width="1.3" stroke-opacity=".5"/>
          <!-- rim-light chaud sur le bord droit -->
          <path d="M26 -16 C33 -10 33 22 22 32" fill="none" stroke="var(--rim)" stroke-width="2.4" stroke-opacity=".55" stroke-linecap="round"/>

          <!-- ===== ŒIL (cœur du perso) ===== -->
          <!-- lentille -->
          <circle cx="0" cy="4" r="22" fill="url(#lens)"/>
          <!-- FIX blocker : la LENTILLE (plus grand élément) porte la couleur d'humeur -->
          <circle id="lensTint" cx="0" cy="4" r="22" fill="var(--mood)" opacity=".42"/>
          <!-- 2 anneaux d'objectif métalliques (crédibilité instrument) -->
          <circle cx="0" cy="4" r="22" fill="none" stroke="var(--gold)" stroke-width="3"/>
          <circle cx="0" cy="4" r="22" fill="none" stroke="#06201f" stroke-width="1" stroke-opacity=".8"/>
          <circle cx="0" cy="4" r="16.5" fill="none" stroke="var(--gold)" stroke-width="1.1" stroke-opacity=".5"/>

          <!-- groupe iris (translaté par le regard) -->
          <g id="gIris">
            <!-- iris -->
            <circle id="iris" cx="0" cy="0" r="8" fill="url(#irisG)"/>
            <!-- teinte d'humeur posée sur l'iris (opacité douce) -->
            <circle id="irisTint" cx="0" cy="0" r="8" fill="var(--mood)" opacity=".55"/>
            <!-- pupille profonde -->
            <circle id="pupil" cx="0" cy="0" r="3.4" fill="#02100f"/>
            <!-- double catchlight : gros chaud fixe + petit froid qui dérive -->
            <circle id="catchA" cx="-3" cy="-3.4" r="2.8" fill="#fff7e2"/>
            <circle id="catchB" cx="3.4" cy="2.6" r="1.3" fill="#dff6ff" opacity=".85"/>
          </g>

          <!-- PAUPIÈRES expressives = 2 path arcs (couleur corps) réécrits par JS -->
          <path id="lidTop" d="M-22 4 Q0 -20 22 4 L22 -20 L-22 -20 Z" fill="url(#bodyG)"/>
          <path id="lidBot" d="M-22 4 Q0 28 22 4 L22 28 L-22 28 Z" fill="url(#bodyG)"/>
          <!-- masque circulaire : on borne les paupières au disque de lentille -->
          <circle cx="0" cy="4" r="22.2" fill="none" stroke="url(#bodyG)" stroke-width="6" opacity="1"/>
          <circle cx="0" cy="4" r="22" fill="none" stroke="var(--gold)" stroke-width="3"/>

          <!-- ARC-SOURCIL / casquette-capteur au-dessus de l'œil (émotion cheap) -->
          <path id="brow" d="M-15 -19 Q0 -25 15 -19" fill="none" stroke="#0a1f1c" stroke-width="3.4" stroke-linecap="round" opacity=".9"/>

          <!-- antenne -->
          <line x1="0" y1="-30" x2="0" y2="-46" stroke="#0e2622" stroke-width="3"/>
          <circle id="antGlow" cx="0" cy="-49" r="10" fill="var(--moodDot)" opacity=".22" filter="url(#softS)"/>
          <circle id="ant" cx="0" cy="-49" r="4.6" fill="var(--moodDot)"/>
        </g>
       </g>
      </g>
    </g>

    <!-- grain -->
    <rect x="0" y="0" width="800" height="600" filter="url(#grain)" opacity=".45" pointer-events="none"/>
  </svg>

  <!-- assombrissement local sous le texte -->
  <div class="scrim"></div>

  <!-- Overlay marque -->
  <div class="ov top fadeIn">
    <span class="live"><i></i> EN TEMPS RÉEL</span>
    <span class="wm">Sargasses</span>
  </div>

  <div class="hint fadeIn" id="hint">bouge — il te suit du regard · touche la mer</div>

  <div class="ov bottom fadeIn">
    <span class="eyebrow" id="eyebrow">Martinique · Aujourd'hui</span>
    <h1 class="title">La mer,<br>en direct.</h1>
    <p class="sub">Le Veilleur veille tes plages au lever du jour. Propre, ou pas — tu le sais avant d'y aller.</p>
    <button class="cta" id="cta">Voir ma plage →</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---- noeuds ----
  var svg      = document.getElementById("scene");
  var pMid     = document.getElementById("pMid");
  var pFront   = document.getElementById("pFront");
  var gPose    = document.getElementById("gPose");
  var gLife    = document.getElementById("gLife");
  var gIris    = document.getElementById("gIris");
  var iris     = document.getElementById("iris");
  var irisTint = document.getElementById("irisTint");
  var pupil    = document.getElementById("pupil");
  var catchA   = document.getElementById("catchA");
  var catchB   = document.getElementById("catchB");
  var lidTop   = document.getElementById("lidTop");
  var lidBot   = document.getElementById("lidBot");
  var brow     = document.getElementById("brow");
  var halo     = document.getElementById("halo");
  var beamG    = document.getElementById("beamG");
  var beam     = document.getElementById("beam");
  var scanRing = document.getElementById("scanRing");
  var raft     = document.getElementById("raft");
  var fish     = document.getElementById("fish");
  var turtle   = document.getElementById("turtle");
  var ant      = document.getElementById("ant");
  var cta      = document.getElementById("cta");
  var hint     = document.getElementById("hint");
  var eyebrow  = document.getElementById("eyebrow");
  var rootStyle= document.documentElement.style;

  var RM=false; try{RM=window.matchMedia("(prefers-reduced-motion: reduce)").matches;}catch(e){}

  // ---- géométrie : le VRAI œil en coords viewBox ----
  // ancre gPose translate(300,196) ; œil local (0, 4)*scale(1.42) ≈ (0, 5.7)
  var EYE = {x:400, y:201.7}; /* FIX cadrage : centré (viewBox center) → centré desktop ET mobile portrait */

  // ---- utils ----
  function lerp(a,b,t){return a+(b-a)*t;}
  function clamp(v,a,b){return v<a?a:(v>b?b:v);}
  function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  // mélange 2 couleurs hex
  function hx(c){c=c.replace('#','');return [parseInt(c.substr(0,2),16),parseInt(c.substr(2,2),16),parseInt(c.substr(4,2),16)];}
  function mix(a,b,t){var A=hx(a),B=hx(b);return 'rgb('+Math.round(lerp(A[0],B[0],t))+','+Math.round(lerp(A[1],B[1],t))+','+Math.round(lerp(A[2],B[2],t))+')';}

  // clientXY -> coords viewBox (slice = cover) — précis mobile ET desktop
  function toVB(clientX,clientY){
    var r=svg.getBoundingClientRect();
    var vw=800,vh=600, sc=Math.max(r.width/vw,r.height/vh);
    var dw=vw*sc,dh=vh*sc, ox=(r.width-dw)/2, oy=(r.height-dh)/2;
    return {x:(clientX-r.left-ox)/sc, y:(clientY-r.top-oy)/sc};
  }

  // ============================================================
  //  PALETTES D'HUMEUR (couleur + forme + posture, jamais couleur seule)
  // ============================================================
  var MOODS = {
    calm:  { mood:'#1FB6A6', halo:'#1FB6A6', dot:'#22C55E', irisR:7.2,  pose:0,    lift:0,  browLift:-1, lidTop:0.08, lidBot:0.24, beam:0   },
    scan:  { mood:'#FFC72C', halo:'#E8A800', dot:'#FFC72C', irisR:9.3,  pose:4.5,  lift:0,  browLift:1.5,  lidTop:.28, lidBot:0,   beam:1   },
    alert: { mood:'#E8522A', halo:'#E8522A', dot:'#E8522A', irisR:10.2, pose:-3.5, lift:-6, browLift:3.2,  lidTop:-.18,lidBot:-.18,beam:.2  }
  };
  // état d'humeur courant (valeurs animées) + cible
  var M = clone(MOODS.calm), MT = clone(MOODS.calm);
  function clone(o){var n={};for(var k in o)n[k]=o[k];return n;}
  function setMoodTarget(name){ if(MOODS[name]) MT=clone(MOODS[name]); curMoodName=name; }
  var curMoodName='calm';

  // setMood public : branché sur le VRAI score plage (honnêteté = pricing)
  // score >=70 calme · 40-69 scan · <40 alerte. En vitrine : scénario SCAN->CALME.
  function setMoodFromScore(score){
    if(score>=70) setMoodTarget('calm');
    else if(score>=40) setMoodTarget('scan');
    else setMoodTarget('alert');
  }
  window.setVeilleurScore = setMoodFromScore; // hook data-driven externe

  // ============================================================
  //  PAUPIÈRES expressives — 'd' réécrit selon mood + blink (Q quadratique)
  //  k = facteur de fermeture (0 ouvert .. 1 fermé) appliqué au point de contrôle
  // ============================================================
  function setLids(blink){
    // bornes : œil centré local (0,4), r≈22
    var cy=4, top=-20, bot=28;
    // fermeture haut/bas (mood déforme la paupière, blink la ferme)
    var kT = clamp(M.lidTop + blink, -0.4, 1);
    var kB = clamp(M.lidBot + blink, -0.4, 1);
    // paupière sup : control point descend de (cy-20) vers cy quand kT->1
    var cpTop = lerp(-20, cy+1, kT);
    var cpBot = lerp(28,  cy-1, kB);
    lidTop.setAttribute('d','M-22 '+cy+' Q0 '+cpTop+' 22 '+cy+' L22 -22 L-22 -22 Z');
    lidBot.setAttribute('d','M-22 '+cy+' Q0 '+cpBot+' 22 '+cy+' L22 30 L-22 30 Z');
  }

  // ============================================================
  //  REGARD lissé + cible (curseur / point d'intérêt par saccade)
  // ============================================================
  var tx=EYE.x, ty=420, cx=EYE.x, cy=420;     // cible & courant (viewBox)
  var pointerActive=false;
  // points d'intérêt pour les saccades de curiosité (viewBox)
  var POI = [ {x:430,y:452}, {x:560,y:414}, {x:150,y:492}, {x:612,y:300}, {x:EYE.x,y:430} ];

  function onMove(e){
    var p=toVB(e.clientX,e.clientY);
    tx=p.x; ty=p.y; pointerActive=true; lastInput=now(); saccadeUntil=0;
    wake();
  }

  // ============================================================
  //  INTERACTIONS calmes (non-jeu)
  // ============================================================
  // clic mer = barrage + ripple ; le Veilleur valide d'un cligne complice
  svg.addEventListener("pointerdown",function(e){
    var p=toVB(e.clientX,e.clientY);
    if(e.target===fish || fish.contains(e.target)){ flee(); return; }
    if(p.y<334) { tapVeilleurMaybe(p); return; }   // au-dessus de l'eau
    dropBarrage(p.x,p.y);
    blinkNow(170, true);   // cligne de complicité
    // regarde le barrage 1.4s
    tx=clamp(p.x,40,760); ty=clamp(p.y,340,560); saccadeUntil=now()+1400;
    wake();
  });

  // tap sur le Veilleur = micro-réaction d'humeur (cycle calm->scan->alert)
  function tapVeilleurMaybe(p){
    var dx=p.x-EYE.x, dy=p.y-EYE.y;
    if(dx*dx+dy*dy < 64*64){
      var order=['calm','scan','alert'];
      var i=(order.indexOf(curMoodName)+1)%3;
      setMoodTarget(order[i]);
      blinkNow(150,true);
      updateHint(order[i]);
      wake();
    }
  }

  function updateHint(m){
    var t = m==='calm' ? "mer propre — il veille, serein"
          : m==='scan' ? "il mesure ta plage en direct"
          : "sargasses repérées — il te prévient";
    hint.textContent=t;
    hint.style.opacity='1';
  }

  function flee(){
    var dx=(Math.random()*130-30), dy=(Math.random()*40-26);
    var nx=clamp(430+dx,60,720), ny=clamp(452+dy,360,540);
    fishX=nx; fishY=ny; fishFlip=(dx<0?-1:1); fishTween=now();
    // l'œil suit le poisson
    tx=nx; ty=ny; saccadeUntil=now()+1300;
    wake();
  }
  var fishX=430,fishY=452,fishFlip=1,fishTween=-1,fishFromX=430,fishFromY=452;

  function dropBarrage(x,y){
    y=clamp(y,338,560);
    var ns="http://www.w3.org/2000/svg";
    var rip=document.createElementNS(ns,"circle");
    rip.setAttribute("cx",x);rip.setAttribute("cy",y);
    rip.setAttribute("fill","none");rip.setAttribute("stroke","var(--glit)");
    rip.setAttribute("stroke-width","2");rip.setAttribute("class","ripple");
    pFront.appendChild(rip);
    setTimeout(function(){rip.remove();},1250);
    if(RM) return;
    var g=document.createElementNS(ns,"g");g.setAttribute("class","boom");g.setAttribute("opacity",".96");
    var line=document.createElementNS(ns,"line");
    line.setAttribute("x1",x-26);line.setAttribute("y1",y);line.setAttribute("x2",x+26);line.setAttribute("y2",y);
    line.setAttribute("stroke","#0e2622");line.setAttribute("stroke-width","3");g.appendChild(line);
    for(var i=-2;i<=2;i++){
      var b=document.createElementNS(ns,"circle");
      b.setAttribute("cx",x+i*13);b.setAttribute("cy",y);b.setAttribute("r","4.4");
      b.setAttribute("fill",i%2?"#FFC72C":"#1FB6A6");g.appendChild(b);
    }
    pFront.appendChild(g);
    var booms=pFront.querySelectorAll(".boom");
    if(booms.length>6) booms[0].remove();
  }

  // CTA : le Veilleur le "désigne" quand le curseur approche (no UI in UI)
  var ctaR=null;
  function refreshCtaRect(){ ctaR=cta.getBoundingClientRect(); }
  refreshCtaRect();
  window.addEventListener("resize",function(){ refreshCtaRect(); refreshCtaRect(); });
  cta.addEventListener("pointerenter",function(){ ctaHot=now(); });
  var ctaHot=0;
  cta.addEventListener("click",function(){
    var o=cta.textContent;
    cta.textContent="✓ ouverture de ta plage…";
    blinkNow(140,true);
    setMoodTarget('calm');
    setTimeout(function(){cta.textContent=o;},1500);
  });

  // ============================================================
  //  TIMELINE INTRO (même horloge que la boucle réactive)
  //  segments t en secondes depuis t0. Skippable au 1er input.
  // ============================================================
  var t0=performance.now();
  function now(){return performance.now();}
  var introDone=RM; // RM : pas d'intro animée
  var lastInput=-1, saccadeUntil=0;

  // beam-sweep signature à l'arrivée : géré dans le rendu via introT
  function introProgress(){ return clamp((now()-t0)/3600,0,1); }

  // ============================================================
  //  BLINK + SACCADES + RESPIRATION (micro-vie)
  // ============================================================
  var blinkStart=-1, blinkDur=180, blinkComplice=false, nextBlink=now()+rand(2600,4200);
  var nextSaccade=now()+rand(4000,7000);
  function rand(a,b){return a+Math.random()*(b-a);}
  function blinkNow(dur,complice){ blinkStart=now(); blinkDur=dur||180; blinkComplice=!!complice; wake(); }

  // ============================================================
  //  PARALLAXE légère (input only) — respecte la doctrine calme
  // ============================================================
  var paMidX=0,paMidY=0, paFrX=0,paFrY=0;

  // ============================================================
  //  IDLE-STOP du rAF : s'éteint au repos (CSS gère l'ambient lent),
  //  réveil sur input / visibilitychange.
  // ============================================================
  var paused=false, raf=0, lastFrame=0;
  function wake(){ if(!RM && !paused && !raf){ raf=requestAnimationFrame(tick); } }

  // ============================================================
  //  BOUCLE UNIQUE
  // ============================================================
  function tick(ts){
    raf=0;
    if(paused||RM) return;
    var t=now();

    // ---------- humeur : lerp lent (1.2-1.8s) des cibles ----------
    var ms=.02; // ~ vitesse de crossfade
    M.irisR  = lerp(M.irisR, MT.irisR, ms);
    M.pose   = lerp(M.pose, MT.pose, ms);
    M.lift   = lerp(M.lift, MT.lift, ms);
    M.browLift=lerp(M.browLift, MT.browLift, ms);
    M.lidTop = lerp(M.lidTop, MT.lidTop, ms);
    M.lidBot = lerp(M.lidBot, MT.lidBot, ms);
    M.beam   = lerp(M.beam, MT.beam, ms);
    // couleurs (crossfade via custom props)
    M.mood = M.mood||MT.mood;
    var cmix=ms;
    var moodCol = mixCss(getCss('--mood'), MT.mood, cmix);
    var haloCol = mixCss(getCss('--moodHalo'), MT.halo, cmix);
    var dotCol  = mixCss(getCss('--moodDot'), MT.dot, cmix);
    rootStyle.setProperty('--mood', moodCol);
    rootStyle.setProperty('--moodHalo', haloCol);
    rootStyle.setProperty('--moodDot', dotCol);
    // FIX blocker : une fois l'humeur stabilisée, snap aux VRAIES couleurs marque
    // (le lerp exponentiel n'atteignait jamais le corail #E8522A exact = alerte "brune").
    if(Math.abs(M.irisR-MT.irisR)<0.06){ rootStyle.setProperty('--mood',MT.mood); rootStyle.setProperty('--moodHalo',MT.halo); rootStyle.setProperty('--moodDot',MT.dot); }

    // iris dilatation
    iris.setAttribute('r', M.irisR.toFixed(2));
    irisTint.setAttribute('r', M.irisR.toFixed(2));
    pupil.setAttribute('r', (M.irisR*0.42).toFixed(2));

    // ---------- saccade de curiosité (sans input) ----------
    if(pointerActive && t-lastInput<1100){
      // glance doux vers le curseur, puis retour à la mer (il veille l'eau, pas toi)
    } else if(t>saccadeUntil){
      // FIX doctrine calme : AUCUNE saccade autonome au repos. Le regard revient
      // doucement vers la mer devant ; la vie vient de l'interaction (curseur/tap).
      tx=lerp(tx,EYE.x,.02); ty=lerp(ty,430,.02);
    }

    // ---------- regard lissé ----------
    cx=lerp(cx,tx,.08); cy=lerp(cy,ty,.08);
    // décalage iris (depuis le VRAI œil)
    var ex=clamp((cx-EYE.x)/44, -4, 4);
    var ey=clamp((cy-EYE.y)/58, -3, 4);
    gIris.setAttribute('transform','translate('+ex.toFixed(2)+' '+(ey+0).toFixed(2)+')');
    // catchlight A fixe (soleil), B dérive avec le regard (amplitude .7)
    catchB.setAttribute('cx',(3.4+ex*.7).toFixed(2));
    catchB.setAttribute('cy',(2.6+ey*.7).toFixed(2));

    // ---------- micro-vie : respiration + flottaison (déphasées) ----------
    var breathe = Math.sin(t/3300)*2.0;          // ±2px sur ~6.6s
    var floatR  = Math.sin(t/5500)*0.6;          // ±0.6° sur ~11s
    gLife.setAttribute('transform','translate(0 '+breathe.toFixed(2)+') rotate('+floatR.toFixed(3)+')');

    // ---------- posture émotionnelle (g externe) ----------
    var poseAng = M.pose + floatR*0.3;
    gPose.setAttribute('transform','translate('+(EYE.x).toFixed(1)+' '+(196+M.lift).toFixed(1)+') rotate('+poseAng.toFixed(2)+')'); /* FIX blocker : pivot autour du centre du perso ; le translate(-EYE.x) parasite l'expulsait hors-champ (perso invisible) */

    // ---------- blink ----------
    var blinkK=0;
    if(blinkStart>0){
      var bt=(t-blinkStart)/blinkDur;
      if(bt>=1){ blinkStart=-1; }
      else { blinkK = bt<.5 ? easeInOut(bt*2) : easeInOut((1-bt)*2); }
    }
    if(t>nextBlink && blinkStart<0){ blinkNow(180,false); nextBlink=t+rand(3200,6500); }
    setLids(blinkK);

    // sourcil : inclinaison par humeur
    var bl = M.browLift;
    brow.setAttribute('d','M-15 '+(-19+bl*0.2).toFixed(2)+' Q0 '+(-25+bl).toFixed(2)+' 15 '+(-19+bl*0.2).toFixed(2));

    // ---------- halo : suit la respiration ----------
    halo.setAttribute('opacity',(0.42+0.12*Math.sin(t/3300)+0.05).toFixed(3));

    // ---------- faisceau de scan (émis du VRAI œil, pivote vers la cible) ----------
    var introT=introProgress();
    var beamOn = M.beam; // 0..1 selon humeur (scan=1)
    // sweep signature à l'arrivée : balaye -14° -> +12° -> repos
    var sweep=0, sweepOp=0;
    if(introT<1 && !introDone){
      if(introT>0.32){
        var s=clamp((introT-0.32)/0.68,0,1);
        sweep = (-14 + 26*easeInOut(s)); // gauche -> droite
        sweepOp = Math.sin(s*Math.PI)*0.9;
      }
    } else { introDone=true; }

    var ang=Math.atan2(cy-EYE.y, cx-EYE.x)*180/Math.PI-90;
    ang=clamp(ang,-26,26);
    if(!introDone) ang=sweep;
    beamG.setAttribute('transform','translate('+EYE.x+' '+EYE.y+') rotate('+ang.toFixed(2)+')');
    var bOp = introDone ? beamOn*0.85 : Math.max(sweepOp,beamOn*0.85);
    beam.setAttribute('opacity',bOp.toFixed(3));

    // anneau de scan au niveau de l'eau (y≈362)
    var hitX=EYE.x+Math.tan(clamp(ang,-26,26)*Math.PI/180)*(362-EYE.y);
    scanRing.setAttribute('cx',clamp(hitX,40,760));
    scanRing.setAttribute('opacity',(bOp*0.6).toFixed(3));
    // l'anneau "balaye" : ry pulse léger en scan
    scanRing.setAttribute('ry',(8+2*Math.abs(Math.sin(t/1700))*beamOn).toFixed(2)); /* FIX: pulse lent ~3.4s, plus frénétique */

    // antenne : pulse une fois par balayage en scan
    if(beamOn>0.4){
      var ap=0.8+0.2*Math.abs(Math.sin(t/1700));
      ant.setAttribute('opacity',ap.toFixed(2));
    } else ant.setAttribute('opacity','1');

    // ---------- radeau : se rapproche/grossit en alerte ----------
    var alertK = curMoodName==='alert' ? 1 : 0;
    // approche lerpée vers l'état d'alerte
    raftK = lerp(raftK, alertK, .015);
    var rx=560 - raftK*70, ry=414 + raftK*22, rs=1+raftK*0.35;
    raft.setAttribute('transform','translate('+rx.toFixed(1)+' '+ry.toFixed(1)+') scale('+rs.toFixed(3)+')');
    // en alerte, l'œil fixe le radeau par intermittence
    if(curMoodName==='alert' && t>nextSaccade-3000 && Math.sin(t/2000)>0.4){
      tx=rx; ty=ry; saccadeUntil=t+1200;
    }

    // ---------- poisson tween (fuite douce) ----------
    if(fishTween>0){
      var ft=clamp((t-fishTween)/900,0,1);
      var e=easeInOut(ft);
      var fx=lerp(fishFromX,fishX,e), fy=lerp(fishFromY,fishY,e);
      fish.setAttribute('transform','translate('+fx.toFixed(1)+' '+fy.toFixed(1)+') scale('+fishFlip+' 1)');
      if(ft>=1){ fishTween=-1; fishFromX=fishX; fishFromY=fishY; }
    }

    // ---------- tortue : FIX doctrine calme = FIGÉE au repos (tableau).
    // Elle reste posée à sa position d'origine (translate 150 492 du SVG) ;
    // plus de traversée autonome qui faisait "aquarium".

    // ---------- parallaxe légère (input only) ----------
    if(pointerActive){
      var ndx=(cx-400), ndy=(cy-300);
      paMidX=lerp(paMidX, clamp(-ndx*0.012,-6,6), .06);
      paMidY=lerp(paMidY, clamp(-ndy*0.010,-4,4), .06);
      paFrX =lerp(paFrX,  clamp(-ndx*0.030,-10,10), .06);
      paFrY =lerp(paFrY,  clamp(-ndy*0.020,-6,6), .06);
    } else {
      paMidX=lerp(paMidX,0,.04); paMidY=lerp(paMidY,0,.04);
      paFrX=lerp(paFrX,0,.04);   paFrY=lerp(paFrY,0,.04);
    }
    pMid.setAttribute('transform','translate('+paMidX.toFixed(2)+' '+paMidY.toFixed(2)+')');
    // pFront garde sa parallaxe ; les acteurs ont leurs transforms propres
    pFront.setAttribute('transform','translate('+paFrX.toFixed(2)+' '+paFrY.toFixed(2)+')');

    // ---------- CTA "désigné" : antenne pulse + œil regarde le bouton ----------
    if(ctaHot && t-ctaHot<1800 && ctaR){
      var c=toVB(ctaR.left+ctaR.width/2, ctaR.top+ctaR.height/2);
      tx=c.x; ty=c.y; saccadeUntil=t+800;
    }

    // ---------- micro-vie SOUS doctrine calme : la boucle reste vivante
    // (respiration/saccade/tortue = "la vie au repos" tolérée). La pause
    // réelle vient de visibilitychange (économie batterie). ----------
    if(!RM) requestAnimationFrame(tick);
  }

  // ---- helpers couleur sur custom props ----
  function getCss(name){
    var v=getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v||'#1FB6A6';
  }
  function mixCss(curr, target, t){
    var a=toHex(curr), b=toHex(target);
    return mix(a,b,t);
  }
  function toHex(c){
    c=c.trim();
    if(c[0]==='#') return c.length===4 ? '#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3] : c;
    var m=c.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
    if(m){ return '#'+([1,2,3].map(function(i){return ('0'+parseInt(m[i]).toString(16)).slice(-2);}).join('')); }
    return '#1FB6A6';
  }
  var raftK=0;

  // ============================================================
  //  DÉMARRAGE
  // ============================================================
  if(!RM){
    window.addEventListener("pointermove",onMove,{passive:true});
    // scénario vitrine : SCAN -> CALME (montre qu'il travaille, puis rassure)
    // FIX doctrine calme : on OUVRE en CALME (tableau), pas en scan pulsant.
    // Unique signature au load = le beam-sweep (intro), puis repos.
    setMoodTarget('calm'); updateHint('calm');
    requestAnimationFrame(tick);
  } else {
    // reduced-motion = TABLEAU figé sur une belle pose d'humeur CALME
    M=clone(MOODS.calm); MT=clone(MOODS.calm); curMoodName='calm';
    rootStyle.setProperty('--mood', MOODS.calm.mood);
    rootStyle.setProperty('--moodHalo', MOODS.calm.halo);
    rootStyle.setProperty('--moodDot', MOODS.calm.dot);
    iris.setAttribute('r', MOODS.calm.irisR);
    irisTint.setAttribute('r', MOODS.calm.irisR);
    pupil.setAttribute('r', (MOODS.calm.irisR*0.42).toFixed(2));
    setLids(0);
    brow.setAttribute('d','M-15 -19 Q0 '+(-25+MOODS.calm.browLift)+' 15 -19');
    halo.setAttribute('opacity','.5');
    beam.setAttribute('opacity','0');
    scanRing.setAttribute('opacity','0');
    // regard posé doux vers la mer
    gIris.setAttribute('transform','translate(0 1.5)');
  }

  // pause sur visibilitychange (unique rAF)
  document.addEventListener("visibilitychange",function(){
    paused=document.hidden;
    if(!paused && !RM && !raf){ raf=requestAnimationFrame(tick); }
  });

  // recalcul rect CTA après layout
  setTimeout(refreshCtaRect, 400);
})();
</script>
</body>
</html>
