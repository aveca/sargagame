<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Le Veilleur — hero cinématique</title>
<style>
  html,body{margin:0;height:100%;background:#0b0716;display:grid;place-items:center;font-family:"Arial Black",Impact,sans-serif}
  .stage{width:390px;height:844px;position:relative;overflow:hidden}
  svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .grain{position:absolute;inset:0;opacity:.06;mix-blend-mode:overlay;pointer-events:none}
  .wm{position:absolute;left:0;right:0;bottom:118px;text-align:center;z-index:5}
  .wm h1{margin:0;font-size:58px;line-height:.84;letter-spacing:-2px;color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.35), 0 0 34px rgba(255,150,90,.65)}
  .wm h1 b{color:#ffd27a}
  .wm p{margin:14px 0 0;font:800 12px/1 ui-monospace,monospace;letter-spacing:4px;color:#ffd9b0;opacity:.95}
  .cta{position:absolute;left:24px;right:24px;bottom:54px;z-index:5;text-align:center;
    background:linear-gradient(180deg,#ffe07a,#ffb338);color:#2a1230;border:0;border-radius:16px;
    padding:16px;font:900 16px/1 system-ui;letter-spacing:.3px;box-shadow:0 10px 30px rgba(255,140,60,.45),0 2px 0 rgba(0,0,0,.25)}
</style></head>
<body>
<div class="stage">
  <svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3a1f63"/><stop offset=".22" stop-color="#7a2f7e"/>
        <stop offset=".42" stop-color="#c34a83"/><stop offset=".60" stop-color="#ff7a5e"/>
        <stop offset=".74" stop-color="#ffaa4d"/><stop offset=".83" stop-color="#ffe2a0"/>
        <stop offset="1" stop-color="#ffd27a"/>
      </linearGradient>
      <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffd27a"/><stop offset=".10" stop-color="#ff9f5e"/>
        <stop offset=".34" stop-color="#c8487f"/><stop offset=".7" stop-color="#5e2a73"/>
        <stop offset="1" stop-color="#2a1540"/>
      </linearGradient>
      <radialGradient id="sun" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#fff6dc"/><stop offset=".3" stop-color="#ffe6a6"/>
        <stop offset=".6" stop-color="#ffb24d" stop-opacity=".7"/><stop offset="1" stop-color="#ff8a4d" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="eyeglow" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#bdfff0" stop-opacity=".9"/><stop offset="1" stop-color="#bdfff0" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ff9f5e" stop-opacity="0"/><stop offset=".62" stop-color="#ff9f5e" stop-opacity=".0"/>
        <stop offset=".72" stop-color="#ffd27a" stop-opacity=".55"/><stop offset=".8" stop-color="#ffb24d" stop-opacity="0"/>
      </linearGradient>
      <filter id="blurS"><feGaussianBlur stdDeviation="9"/></filter>
      <filter id="blurM"><feGaussianBlur stdDeviation="3"/></filter>
      <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="grainF"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/></filter>
    </defs>

    <!-- CIEL -->
    <rect width="390" height="560" fill="url(#sky)"/>
    <!-- nuages (wisps magenta/violet, flous) -->
    <g filter="url(#blurS)" opacity=".55">
      <ellipse cx="90" cy="120" rx="120" ry="22" fill="#9a3a86"/>
      <ellipse cx="300" cy="80" rx="120" ry="18" fill="#6a2f7e"/>
      <ellipse cx="250" cy="180" rx="150" ry="20" fill="#d65a86"/>
      <ellipse cx="70" cy="230" rx="120" ry="16" fill="#ff7a6b" opacity=".7"/>
    </g>

    <!-- SOLEIL bas + bloom -->
    <circle cx="206" cy="430" r="190" fill="url(#sun)"/>
    <circle cx="206" cy="430" r="58" fill="#fff3cf"/>
    <circle cx="206" cy="430" r="58" fill="#ffe39a" opacity=".5"/>

    <!-- SKYLINE/MONTAGNES lointaines (silhouette + rim doré) -->
    <g>
      <path d="M0 470 L0 430 L26 432 L30 412 L48 414 L52 430 L92 426 L96 470Z" fill="#3a1c52" opacity=".7"/>
      <path d="M300 470 L300 420 L322 422 L326 400 L344 402 L348 422 L390 418 L390 470Z" fill="#3a1c52" opacity=".7"/>
    </g>

    <!-- MER -->
    <rect y="470" width="390" height="374" fill="url(#sea)"/>
    <!-- reflet du soleil sur l'eau -->
    <g opacity=".8">
      <path d="M188 470 q18 90 -10 374 l40 0 q26 -284 0 -374Z" fill="#ffd27a" filter="url(#blurM)" opacity=".5"/>
    </g>
    <!-- scintillement néon horizontal -->
    <g stroke="#ffe2a0" stroke-width="1.4" opacity=".35">
      <line x1="40" y1="500" x2="120" y2="500"/><line x1="250" y1="512" x2="350" y2="512"/>
      <line x1="120" y1="540" x2="240" y2="540"/><line x1="60" y1="580" x2="150" y2="580"/>
      <line x1="230" y1="600" x2="330" y2="600"/>
    </g>

    <!-- VEILLEUR — œil-satellite qui veille, halo + rim -->
    <g transform="translate(300 150)">
      <circle cx="0" cy="0" r="62" fill="url(#eyeglow)"/>
      <g filter="url(#glow)">
        <circle cx="0" cy="0" r="30" fill="#1a0f2e"/>
        <circle cx="0" cy="0" r="19" fill="#34e0b0"/>
        <circle cx="4" cy="3" r="9" fill="#08121f"/>
        <circle cx="8" cy="-2" r="3.4" fill="#eafff8"/>
      </g>
      <!-- rim doré côté soleil -->
      <path d="M-26 14 A30 30 0 0 1 -8 -28" fill="none" stroke="#ffd27a" stroke-width="3" stroke-linecap="round" opacity=".9"/>
      <line x1="-30" y1="0" x2="-46" y2="-4" stroke="#1a0f2e" stroke-width="4"/>
      <rect x="-58" y="-10" width="14" height="20" rx="3" fill="#1a0f2e"/>
    </g>

    <!-- PREMIER PLAN : île + palmiers en contre-jour, rim doré -->
    <g>
      <!-- relief île bas -->
      <path d="M0 700 q120 -70 230 -36 q90 28 160 6 L390 844 L0 844Z" fill="#1c0f30"/>
      <path d="M0 700 q120 -70 230 -36" fill="none" stroke="#ff9f5e" stroke-width="2.5" opacity=".7"/>
      <!-- palmiers silhouette + rim -->
      <g stroke="#160a26" stroke-width="6" fill="none" stroke-linecap="round">
        <path d="M70 720 q-6 -64 6 -96"/><g fill="#160a26" stroke="none">
          <path d="M76 624 q-44 -14 -58 4 q40 -2 58 14Z"/><path d="M76 624 q44 -14 58 4 q-40 -2 -58 14Z"/>
          <path d="M76 624 q-20 -40 -52 -44 q26 22 52 58Z"/><path d="M76 624 q20 -40 52 -44 q-26 22 -52 58Z"/>
        </g>
      </g>
      <path d="M76 624 q44 -14 58 4" stroke="#ffb24d" stroke-width="2.5" fill="none" opacity=".8"/>
      <g stroke="#160a26" stroke-width="5" fill="none" stroke-linecap="round">
        <path d="M330 740 q8 -54 -4 -82"/><g fill="#160a26" stroke="none">
          <path d="M326 658 q-38 -12 -50 4 q34 -2 50 12Z"/><path d="M326 658 q38 -12 50 4 q-34 -2 -50 12Z"/>
          <path d="M326 658 q-16 -34 -44 -38 q22 20 44 50Z"/><path d="M326 658 q16 -34 44 -38 q-22 20 -44 50Z"/>
        </g>
      </g>
      <path d="M326 658 q-38 -12 -50 4" stroke="#ffb24d" stroke-width="2.2" fill="none" opacity=".7"/>
    </g>

    <!-- HAZE atmosphérique à l'horizon -->
    <rect width="390" height="844" fill="url(#haze)" style="mix-blend-mode:screen"/>
    <!-- vignette -->
    <rect width="390" height="844" fill="url(#sky)" opacity="0"/>
    <radialGradient id="vig" cx="50%" cy="46%" r="70%"><stop offset=".6" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#0b0716" stop-opacity=".55"/></radialGradient>
    <rect width="390" height="844" fill="url(#vig)"/>
  </svg>
  <svg class="grain" viewBox="0 0 390 844" preserveAspectRatio="none"><rect width="390" height="844" filter="url(#grainF)"/></svg>

  <div class="wm"><h1>LE <b>VEILLEUR</b></h1><p>OÙ TE BAIGNER · AUJOURD'HUI</p></div>
  <div class="cta">🛟 Voir les plages propres →</div>
</div>
</body></html>
