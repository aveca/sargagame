<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bricolage+Grotesque:wght@600;700;800&display=swap" rel="stylesheet">
<title>UX clic plage — bottom sheet comic pop</title>
<style>
  *{margin:0;box-sizing:border-box;font-family:'Bricolage Grotesque',sans-serif}
  body{background:#0b0716;display:flex;gap:30px;justify-content:center;padding:30px}
  .phone{width:360px;height:780px;position:relative;overflow:hidden;border-radius:32px;outline:6px solid #000}
  /* carte derrière (assombrie) */
  .map{position:absolute;inset:0;background:radial-gradient(120% 70% at 80% 6%,#ffd27a,#ff9f43 30%,transparent 60%),linear-gradient(170deg,#ff7a4d 0%,#ff5e8e 30%,#c33a82 55%,#7a2f7e 78%,#3a1f63 100%)}
  .map .isl{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);width:120px;height:170px;background:#34d979;border:4px solid #0d0b14;border-radius:50% 44% 52% 48%/40% 42% 58% 56%;box-shadow:5px 5px 0 rgba(13,11,20,.35)}
  .scrim{position:absolute;inset:0;background:rgba(11,7,22,.42)}
  /* BOTTOM SHEET comic */
  .sheet{position:absolute;left:0;right:0;bottom:0;height:70%;background:#fdf6e3;
    border-top:4px solid #0d0b14;border-radius:26px 26px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.4);
    padding:10px 18px 18px;display:flex;flex-direction:column;
    background-image:radial-gradient(rgba(13,11,20,.05) 1.3px,transparent 1.5px);background-size:11px 11px}
  .grip{width:44px;height:5px;border-radius:5px;background:#0d0b14;opacity:.35;margin:2px auto 12px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .bname{font-family:'Anton';font-size:24px;line-height:.95;color:#0d0b14;text-transform:uppercase;letter-spacing:-.5px}
  .bsub{font:700 11px/1 'Bricolage Grotesque';color:#6b6478;margin-top:3px}
  .badge{font:800 11px/1;padding:7px 11px;border-radius:999px;border:2.5px solid #0d0b14;box-shadow:2px 2px 0 #0d0b14;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .badge.ok{background:#27c46b;color:#0d0b14}
  .verdict{font-family:'Anton';font-size:40px;line-height:.86;color:#0d0b14;text-transform:uppercase;letter-spacing:-1px;margin:14px 0 6px}
  .verdict b{color:#1c8f4e}
  .lede{font:600 13px/1.4 'Bricolage Grotesque';color:#41414a;margin-bottom:14px}
  .scorecard{display:flex;align-items:center;gap:14px;background:#fff;border:3px solid #0d0b14;border-radius:16px;box-shadow:3px 3px 0 #0d0b14;padding:13px 15px;margin-bottom:12px}
  .scn{font-family:'Anton';font-size:38px;color:#0d0b14;line-height:.9}.scn small{font-size:15px;color:#9a93a8}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font:800 11px/1;color:#0d0b14;background:#fff;border:2.5px solid #0d0b14;border-radius:999px;padding:7px 10px;display:inline-flex;align-items:center;gap:5px}
  .chip i{width:8px;height:8px;border-radius:50%}
  .fc{display:flex;gap:5px;margin:14px 0 4px}
  .fc div{flex:1;text-align:center}
  .fc b{display:block;height:34px;border-radius:7px;border:2.5px solid #0d0b14}
  .fc span{font:800 9px/1;color:#6b6478;margin-top:4px;display:block}
  .cta{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:12px}
  .btn{width:100%;text-align:center;font:800 16px/1;padding:15px;border-radius:16px;border:3px solid #0d0b14;box-shadow:3px 3px 0 #0d0b14;cursor:pointer}
  .btn.gold{background:linear-gradient(180deg,#ffe07a,#ffc72c);color:#0d0b14}
  .btn.ghost{background:transparent;color:#0d0b14;border-style:solid;box-shadow:none;font-size:13px;border-width:0;text-decoration:underline}
</style></head>
<body>
<div class="phone">
  <div class="map"><div class="isl"></div></div>
  <div class="scrim"></div>
  <div class="sheet">
    <div class="grip"></div>
    <div class="row">
      <div><div class="bname">Plage de<br>Saint-Pierre</div><div class="bsub">📍 Saint-Pierre · à 22 min · côte caraïbe</div></div>
      <span class="badge ok">● PROPRE</span>
    </div>
    <div class="verdict">Baignade <b>OK</b><br>ce matin</div>
    <div class="lede">L'état réel de l'eau ce matin — mesuré au satellite, pas deviné.</div>
    <div class="scorecard">
      <div class="scn">86<small>/100</small></div>
      <div class="chips">
        <span class="chip"><i style="background:#27c46b"></i>Sargasses faibles</span>
        <span class="chip"><i style="background:#27c46b"></i>Houle calme</span>
        <span class="chip"><i style="background:#ffd23f"></i>Vent modéré</span>
        <span class="chip"><i style="background:#27c46b"></i>Eau 28°</span>
      </div>
    </div>
    <div class="fc">
      <div><b style="background:#27c46b"></b><span>Auj</span></div>
      <div><b style="background:#27c46b"></b><span>Sam</span></div>
      <div><b style="background:#ffd23f"></b><span>Dim</span></div>
      <div><b style="background:#ffd23f"></b><span>Lun</span></div>
      <div><b style="background:#e8322a"></b><span>Mar</span></div>
      <div><b style="background:#27c46b"></b><span>Mer</span></div>
      <div><b style="background:#27c46b"></b><span>Jeu</span></div>
    </div>
    <div class="cta">
      <button class="btn gold">⭐ M'alerter avant que ça tourne →</button>
      <button class="btn ghost">Voir la preuve · 7 facteurs détaillés</button>
    </div>
  </div>
</div>
</body></html>
