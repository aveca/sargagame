<!doctype html>
<!-- field-auto-fit — DA: champ de sargasses RÉEL au large + cadrage auto + dérive LENTE + échouage "prévu" comic.
     · Données réelles embarquées depuis _mq-scene.json (cells satellite afai, islandPath, arrivals).
     · CADRAGE AUTO : la caméra (viewBox via transform sur #world) recadre pour englober île + champ ACTIF
       (révèle le sud quand il y a de la matière là-bas), respire avec la donnée.
     · DÉRIVE LENTE : le champ traverse en ~plusieurs minutes (NW, courant Caraïbe). À peine perceptible/frame.
     · ÉCHOUAGE : SEULS les bancs "prévus atterrir" (gate calcul = proches d'un point arrivals) remontent
       vers la côte et jouent "Le Grand Splat" (squash→splat→onde→speed-lines→dépôt incliné figé→fade).
       Les autres bancs dérivent au large, ne s'échouent jamais.
     · 1 SEUL rAF pausable + visibilitychange · transform/opacity UNIQUEMENT (aucun filtre/blur/'d' par frame)
       · reduced-motion = PLANCHER DUR (champ figé, cadré, lisible) · createElementNS only (PAS d'innerHTML). -->
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Champ de sargasses au large — cadrage auto + dérive lente</title>
<style>
  html,body{margin:0;background:#0b0a12;font-family:system-ui,sans-serif;color:#fff}
  .stage{position:relative;width:800px;max-width:100vw;aspect-ratio:800/600;margin:0 auto;overflow:hidden;border-radius:14px}
  .lbl{position:fixed;top:8px;left:10px;z-index:99;font:700 12px/1.45 ui-monospace,monospace;background:rgba(0,0,0,.58);padding:6px 10px;border-radius:7px;max-width:60vw}
  .lbl b{color:#FFE9A8}
  .sea{position:absolute;inset:0;background:
    radial-gradient(120% 80% at 78% 2%, rgba(255,214,140,.60), rgba(255,140,80,.24) 34%, transparent 62%),
    radial-gradient(130% 120% at 6% 120%, rgba(42,21,80,.74), rgba(58,28,90,.28) 42%, transparent 64%),
    linear-gradient(164deg,#ff8a4d 0%,#ff7a4d 15%,#8a4a8e 37%,#6a2f9e 57%,#3e2470 82%,#2e1a5e 100%)}
  svg{position:absolute;inset:0;width:100%;height:100%;display:block}
</style></head>
<body>
<div class="lbl" id="lbl">Champ au large — cadrage auto + dérive lente — <b>clic = pause</b></div>
<div class="stage">
  <div class="sea"></div>
  <svg id="scene" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <radialGradient id="sargG" cx="40%" cy="32%" r="70%">
        <stop offset="0" stop-color="#E3B743"/><stop offset=".48" stop-color="#B08A2A"/><stop offset="1" stop-color="#7C6A22"/>
      </radialGradient>
      <radialGradient id="splatG" cx="42%" cy="36%" r="72%">
        <stop offset="0" stop-color="#E3B743"/><stop offset=".4" stop-color="#B08A2A"/><stop offset=".82" stop-color="#7C6A22"/><stop offset="1" stop-color="#5d5a1e"/>
      </radialGradient>
      <radialGradient id="islG" cx="38%" cy="30%" r="80%">
        <stop offset="0" stop-color="#74D89E"/><stop offset=".55" stop-color="#3BAE72"/><stop offset="1" stop-color="#157F49"/>
      </radialGradient>
      <pattern id="halftone" width="7" height="7" patternUnits="userSpaceOnUse">
        <circle cx="1.6" cy="1.6" r="1.1" fill="#2c2a12" opacity=".42"/>
      </pattern>
      <clipPath id="sandClip"><path id="sandClipPath" d=""/></clipPath>
    </defs>

    <!-- #world : tout le monde géographique. Le CADRAGE AUTO = transform (scale+translate) appliqué ici. -->
    <g id="world">
      <!-- côte sud (rivage) sous le champ : sable + écume — ne sert que de surface d'échouage -->
      <g id="coast">
        <path id="sandFill"  d="" fill="#FBE9B8" stroke="#0d0b14" stroke-width="3.4" stroke-linejoin="round" opacity=".96"/>
        <path id="sandShade" d="" fill="#caa45a" opacity=".30"/>
        <path id="shoreFoam" d="" fill="none" stroke="#eafcff" stroke-width="5" stroke-linecap="round" opacity=".82"/>
        <path id="shoreFoam2" d="" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity=".9"/>
      </g>

      <!-- ÎLE : contour Martinique jade, encrée comic -->
      <g id="island">
        <path id="islShadow" d="" fill="#0d0b14" opacity=".24"/>
        <path id="islBody"   d="" fill="url(#islG)" stroke="#0d0b14" stroke-width="3.2" stroke-linejoin="round"/>
        <path id="islHalf"   d="" fill="url(#halftone)" opacity=".18"/>
      </g>

      <g id="depositLayer" clip-path="url(#sandClip)"></g> <!-- dépôt échoué (clippé sur le sable) -->
      <g id="rippleLayer"></g>                             <!-- ondes d'impact -->
      <g id="foamLayer"></g>                               <!-- écume d'impact -->
      <g id="fieldLayer"></g>                              <!-- LE CHAMP au large (bancs qui dérivent) -->

      <g id="lineLayer"></g>                               <!-- speed-lines (par échouage) -->
    </g>
  </svg>
</div>

<script>

const rng=seed=>{let s=((seed%233280)+233280)%233280;return()=>(s=(s*9301+49297)%233280)/233280;};

const ISLAND_PATH="M206.4 105.8 L208.0 123.6 L218.1 140.1 L226.8 143.2 L232.5 154.2 L250.6 172.9 L244.1 206.2 L251.1 224.4 L272.1 257.6 L282.5 263.1 L285.6 271.1 L306.3 277.8 L322.2 301.4 L341.2 298.0 L344.1 302.5 L344.2 297.5 L348.1 299.8 L350.5 295.7 L348.8 304.7 L351.3 306.3 L355.8 301.2 L359.1 303.0 L357.8 308.7 L361.2 308.2 L363.7 300.7 L369.2 304.7 L365.9 296.3 L369.3 291.1 L373.8 294.8 L381.4 285.6 L388.9 288.9 L394.5 284.2 L390.2 297.9 L379.0 301.2 L398.8 298.6 L393.3 306.2 L380.0 306.9 L379.4 313.1 L382.6 314.5 L385.4 310.7 L392.3 310.0 L390.0 313.3 L399.6 320.4 L395.1 330.0 L398.4 333.1 L407.1 321.8 L405.1 328.0 L407.5 330.0 L404.7 332.1 L412.3 333.8 L408.0 337.5 L419.7 339.4 L413.6 344.1 L418.3 346.6 L409.0 348.0 L411.0 350.5 L418.3 348.6 L412.2 354.0 L413.2 357.4 L408.6 355.5 L410.1 361.7 L405.1 360.0 L404.0 354.7 L402.5 359.6 L390.4 357.8 L395.0 353.1 L393.3 350.7 L385.1 358.8 L384.2 353.0 L377.0 356.8 L373.1 355.3 L374.7 351.8 L368.4 352.6 L362.5 346.8 L368.7 343.6 L367.9 338.2 L364.9 343.2 L356.5 342.6 L359.0 335.6 L356.9 337.5 L356.1 333.0 L354.8 341.4 L348.2 343.2 L344.2 352.0 L335.7 350.3 L326.0 357.3 L326.1 363.3 L320.4 365.7 L314.7 380.3 L328.0 382.9 L328.9 388.5 L324.3 389.2 L323.6 393.5 L332.7 396.6 L333.2 405.5 L330.1 408.3 L332.5 414.7 L340.8 414.8 L345.3 424.6 L353.2 427.6 L359.2 423.4 L361.8 413.5 L373.2 407.1 L384.2 404.1 L395.2 412.5 L394.2 401.8 L394.2 407.5 L397.3 405.8 L400.9 414.4 L407.4 416.6 L408.3 413.2 L404.1 412.1 L408.6 411.5 L406.7 401.5 L412.6 411.0 L414.3 406.4 L411.4 403.8 L413.9 404.7 L414.3 397.8 L420.3 407.2 L419.9 414.3 L425.9 413.2 L425.8 408.9 L425.4 411.8 L428.3 410.7 L426.7 406.3 L430.0 406.8 L431.2 412.5 L436.9 417.5 L443.8 416.0 L455.3 420.0 L468.5 415.9 L469.7 412.0 L470.4 415.0 L474.8 414.6 L474.2 419.0 L475.5 414.5 L474.4 421.9 L485.2 432.9 L504.3 412.1 L507.6 414.6 L513.0 412.9 L518.8 417.3 L511.8 423.7 L517.8 424.2 L515.5 431.4 L508.6 423.8 L505.1 429.5 L507.6 432.8 L502.7 433.8 L498.1 429.3 L501.5 440.9 L490.0 457.0 L496.8 462.6 L497.2 469.8 L504.3 473.5 L503.3 477.1 L511.1 479.3 L521.7 477.2 L522.7 470.8 L530.1 462.8 L536.2 465.3 L536.8 462.0 L530.7 460.7 L532.5 456.8 L527.2 455.7 L527.8 450.8 L533.2 451.1 L534.5 455.1 L539.8 453.8 L540.0 446.2 L548.3 439.6 L551.0 425.8 L560.8 422.2 L557.1 421.8 L553.5 413.2 L548.3 412.4 L550.4 407.3 L554.8 409.5 L552.7 412.2 L557.5 410.2 L560.3 404.4 L555.9 393.5 L549.7 391.5 L549.2 376.0 L543.8 374.6 L546.5 376.0 L540.2 379.0 L537.7 376.1 L541.0 371.8 L539.4 367.1 L547.6 362.9 L545.9 359.1 L537.9 358.5 L539.7 354.1 L546.5 354.9 L536.6 343.5 L547.7 327.7 L540.7 328.3 L536.2 333.2 L536.9 337.1 L529.7 337.3 L534.6 329.0 L527.6 329.5 L532.9 324.9 L525.5 327.4 L522.4 324.3 L524.3 320.2 L533.4 318.3 L523.5 317.9 L530.4 314.0 L526.4 312.6 L525.8 303.9 L520.5 311.1 L514.0 309.9 L507.6 303.3 L508.2 298.5 L511.6 299.1 L509.9 294.6 L501.1 290.4 L509.8 283.0 L504.1 281.1 L495.9 286.3 L494.6 280.7 L493.4 283.2 L485.7 281.4 L487.8 279.4 L485.2 275.3 L492.1 272.9 L492.0 268.4 L487.9 269.6 L488.9 265.8 L494.1 263.9 L478.7 259.7 L482.7 253.1 L484.3 255.0 L485.6 252.4 L487.4 257.7 L488.2 254.1 L492.6 256.3 L493.5 250.7 L496.6 254.0 L499.2 243.3 L492.7 242.7 L489.7 248.6 L485.2 246.6 L487.1 243.0 L483.2 245.6 L479.4 241.8 L479.5 245.5 L477.0 245.4 L474.8 242.4 L467.8 252.4 L461.6 253.8 L454.8 243.4 L448.4 240.0 L453.5 227.9 L463.8 231.5 L459.8 227.2 L461.2 223.5 L473.6 219.9 L474.8 223.4 L478.4 216.6 L483.1 216.6 L484.1 213.7 L481.7 212.9 L483.4 210.3 L477.2 214.0 L472.5 210.1 L473.0 198.6 L469.3 198.9 L466.9 203.9 L456.9 206.0 L456.2 202.0 L463.3 193.8 L458.6 193.8 L455.4 199.1 L447.2 192.8 L447.4 183.4 L453.8 184.7 L446.9 179.6 L448.1 175.0 L453.3 169.1 L462.7 168.3 L474.4 174.3 L475.9 181.8 L492.2 181.8 L491.8 176.8 L485.2 174.7 L494.1 167.1 L487.2 161.5 L487.6 158.5 L498.1 153.6 L502.5 162.0 L507.4 161.7 L504.5 154.8 L507.4 152.5 L504.0 148.4 L506.0 147.5 L497.0 146.0 L494.6 142.6 L491.1 148.4 L481.4 154.7 L477.8 155.3 L476.5 152.3 L474.4 158.0 L467.7 161.5 L463.2 157.3 L446.3 162.6 L435.6 180.9 L431.6 178.5 L432.5 170.7 L427.6 167.2 L427.1 159.7 L414.3 147.5 L418.1 146.8 L417.2 144.5 L410.8 144.7 L407.8 137.7 L402.4 136.1 L396.5 127.2 L398.3 117.5 L394.0 118.0 L394.9 115.2 L390.1 119.4 L385.0 117.6 L381.1 106.0 L373.0 104.7 L375.3 98.9 L367.8 98.6 L363.6 92.9 L354.0 96.6 L345.5 87.5 L338.7 86.9 L322.9 77.8 L316.9 70.1 L282.5 57.5 L246.9 59.8 L241.4 65.6 L226.2 71.1 L214.4 86.2 L206.4 105.8 Z";
const ISLAND_CENTER=[400,300];
// cells = [vx, vy, afai]
const CELLS=[[340.8,1049.3,0.2],[822.6,1023.1,0.11],[-191.6,970.7,0.1],[138,839.7,0.14],[898.6,813.5,0.11],[112.7,708.7,0.16],[290.1,708.7,0.16],[138,682.5,0.1],[163.4,682.5,0.12],[188.7,682.5,0.32],[340.8,682.5,0.19],[467.6,682.5,0.11],[949.3,682.5,0.1],[974.7,682.5,0.11],[61.9,630.1,0.32],[87.3,630.1,0.17],[112.7,630.1,0.23],[264.8,630.1,0.13],[290.1,630.1,0.11],[87.3,603.9,0.32],[112.7,603.9,0.32],[163.4,603.9,0.13],[188.7,603.9,0.1],[264.8,603.9,0.12],[214.1,577.7,0.13],[-90.2,551.5,0.32],[-64.8,551.5,0.32],[-115.5,525.3,0.14],[-90.2,525.3,0.3],[-64.8,525.3,0.29],[-140.9,499.1,0.12],[-115.5,499.1,0.1],[-140.9,472.9,0.11],[-191.6,420.5,0.11],[974.7,341.9,0.11],[-90.2,315.7,0.15],[138,315.7,0.1],[-64.8,289.5,0.14],[36.6,289.5,0.1],[11.2,263.3,0.1],[36.6,263.3,0.13],[61.9,263.3,0.12],[87.3,263.3,0.1],[11.2,237.1,0.11],[36.6,237.1,0.11],[949.3,184.7,0.17],[11.2,158.5,0.15],[36.6,-77.3,0.12],[264.8,-182.1,0.13]];
// arrivals = points de côte sud prévus touchés (gate calcul) — exemple MQ sud
const ARRIVALS=[[340.8,560]];

/* ── 1) FILTRE le champ ACTIF : afai significatif + dans un rayon plausible de l'île (anti-bruit lointain). ──
   Le bruit (vx 900+, vx<-180, vy 1000+) est écarté du cadrage ET non rendu. */
const AFAI_MIN=0.12, MAX_R=560; // rayon depuis le centre île au-delà duquel on considère du bruit isolé
function dist(ax,ay,bx,by){const dx=ax-bx,dy=ay-by;return Math.hypot(dx,dy);}
const ACTIVE = CELLS
  .filter(c=>c[2]>=AFAI_MIN)
  .filter(c=>dist(c[0],c[1],ISLAND_CENTER[0],ISLAND_CENTER[1])<=MAX_R)
  // borne le champ à la fenêtre du produit : le sud (le champ à révéler) + abords de l'île.
  // exclut les cellules-bruit au nord (vy<120) qui dilateraient le cadrage vers le haut,
  // et garde X raisonnable pour ne pas qu'une cellule isolée étire le cadre.
  .filter(c=>c[0]>-180 && c[0]<560 && c[1]>=120);

/* ── 2) CADRAGE AUTO : bbox(île + champ actif), marge, clampé à un ratio 4:3, borné au monde réel.
   On garde l'île toujours visible et on révèle le sud quand ACTIVE descend bas. ── */
function computeFitView(){
  // bbox île approx via son centre + extent connu (l'île tient dans ~200..560 x, 55..480 y)
  let minX=200,maxX=565,minY=55,maxY=485;
  for(const c of ACTIVE){ minX=Math.min(minX,c[0]); maxX=Math.max(maxX,c[0]); minY=Math.min(minY,c[1]); maxY=Math.max(maxY,c[1]); }
  // marge
  const mx=70,my=70; minX-=mx; maxX+=mx; minY-=my; maxY+=my;
  let w=maxX-minX, h=maxY-minY;
  // force ratio 4:3 (800/600) autour du centre
  const R=800/600, cx=(minX+maxX)/2, cy=(minY+maxY)/2;
  if(w/h>R){ h=w/R; } else { w=h*R; }
  return {x:cx-w/2, y:cy-h/2, w, h};
}
// vue de départ = le cadre actuel (0..800 / 0..600) ; vue cible = fit auto (révèle le sud)
const VIEW_START={x:0,y:0,w:800,h:600};
const VIEW_FIT=computeFitView();
// transform pour mapper une vue {x,y,w,h} dans le viewBox 0 0 800 600 : scale puis translate
function viewToTransform(v){
  const s=800/v.w; // (h suit le ratio)
  return `scale(${s.toFixed(5)}) translate(${(-v.x).toFixed(2)} ${(-v.y).toFixed(2)})`;
}
const world=document.getElementById("world");

/* ── 3) GÉOMÉTRIE côte sud + île ── */
document.getElementById("islShadow").setAttribute("d",ISLAND_PATH);
document.getElementById("islShadow").setAttribute("transform","translate(3 5)");
document.getElementById("islBody").setAttribute("d",ISLAND_PATH);
document.getElementById("islHalf").setAttribute("d",ISLAND_PATH);

// rivage sud : courbe qui passe par le point d'arrivée (pour l'échouage). Tangente côte ~ -10°.
const ARR=ARRIVALS[0]; // [340.8,560]
const SHORE=`M120 612 C220 575 300 562 ${ARR[0]} ${ARR[1]} C470 556 600 575 720 600`;
document.getElementById("shoreFoam").setAttribute("d",SHORE);
document.getElementById("shoreFoam2").setAttribute("d",SHORE);
document.getElementById("sandFill").setAttribute("d",SHORE+" L760 760 L80 760 Z");
document.getElementById("sandClipPath").setAttribute("d",SHORE+" L760 760 L80 760 Z");
document.getElementById("sandShade").setAttribute("d",`M120 628 C240 596 330 584 ${ARR[0]} 582 C480 580 610 596 720 616 L760 760 L80 760 Z`);
const COAST_DEG=-9, COAST_RAD=COAST_DEG*Math.PI/180;

/* ── 4) helpers comic (banc / dépôt / écume / onde) — reprend proto-sarga-beaching-wow ── */
function splatPath(cx,cy,r,seed,N,jag){
  N=N||10; jag=jag==null?0.75:jag;
  const rand=rng(seed),p=[];
  for(let i=0;i<N;i++){const a=(i/N)*6.2832, rr=r*(1-jag*0.5+rand()*jag);p.push([cx+Math.cos(a)*rr, cy+Math.sin(a)*rr]);}
  let d=`M${((p[0][0]+p[N-1][0])/2).toFixed(1)} ${((p[0][1]+p[N-1][1])/2).toFixed(1)}`;
  for(let i=0;i<N;i++){const a=p[i],b=p[(i+1)%N];d+=`Q${a[0].toFixed(1)} ${a[1].toFixed(1)} ${((a[0]+b[0])/2).toFixed(1)} ${((a[1]+b[1])/2).toFixed(1)}`;}
  return d+"Z";
}
// banc de champ : taille ~ afai. Statique en forme (jamais regénéré).
function makeBank(seed,R){
  const g=el("g",{}), sil=splatPath(0,0,R,seed,11,0.55);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".28",transform:"translate(2 3)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#sargG)",stroke:INK,"stroke-width":1.8,"stroke-linejoin":"round"}));
  const rd=rng(seed*5+1);
  for(let i=0;i<2;i++){const ox=(rd()-.5)*R*0.7, oy=(rd()-.5)*R*0.6;
    g.appendChild(el("path",{d:splatPath(ox,oy,R*0.3,seed*9+i*7,7,0.6),fill:"#5d5a1e",opacity:".5"}));}
  g.appendChild(el("path",{d:sil,fill:"url(#halftone)",opacity:".26"}));
  g.appendChild(el("path",{d:splatPath(-R*0.22,-R*0.28,R*0.46,seed+3,7,0.5),fill:"#FFE9A8",opacity:".46"}));
  return g;
}
function makeDeposit(seed){
  const g=el("g",{opacity:"0"}), R=58, sil=splatPath(0,0,R,seed,13,0.78);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".26",transform:"translate(3 4)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#splatG)",stroke:INK,"stroke-width":2.2,"stroke-linejoin":"round"}));
  const rl=rng(seed*7+3);
  for(let i=0;i<4;i++){const a=(0.15+rl()*0.7)*3.14159, len=R*(0.9+rl()*0.55);
    const x=Math.cos(a)*len, y=Math.abs(Math.sin(a))*len*0.66+R*0.3, w=9+rl()*8;
    g.appendChild(el("path",{d:splatPath(x,y,w,seed*13+i*5,7,0.7),fill:"url(#splatG)",stroke:INK,"stroke-width":1.5,"stroke-linejoin":"round"}));}
  const ht=el("path",{d:sil,fill:"url(#halftone)",opacity:"0"});
  g.appendChild(ht);
  g.appendChild(el("path",{d:splatPath(-R*0.28,-R*0.34,R*0.4,seed+5,8,0.5),fill:"#FFE9A8",opacity:".42"}));
  return {g, ht};
}
function makeFoam(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,3,34,seed+1,12,0.6),fill:"none",stroke:"#eafcff","stroke-width":6,opacity:".9","stroke-linejoin":"round"}));
  g.appendChild(el("path",{d:splatPath(0,3,34,seed+1,12,0.6),fill:"none",stroke:"#ffffff","stroke-width":2.2,opacity:".95","stroke-linejoin":"round"}));
  const rf=rng(seed*3+4);
  for(let i=0;i<7;i++){const a=(i/7)*6.28+rf()*0.4, rr=40+rf()*14;
    g.appendChild(el("circle",{cx:(Math.cos(a)*rr).toFixed(1),cy:(Math.sin(a)*rr*0.66+4).toFixed(1),r:(2+rf()*1.8).toFixed(1),fill:"#fff",opacity:".85"}));}
  return g;
}
function makeRipple(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,0,26,seed+9,14,0.18),fill:"none",stroke:INK,"stroke-width":2.6,opacity:".7"}));
  g.appendChild(el("path",{d:splatPath(0,0,26,seed+9,14,0.18),fill:"none",stroke:"#FFE9A8","stroke-width":1.3,opacity:".9"}));
  return g;
}

/* ── 5) LE CHAMP : un banc par cellule active. On classe en "drift" (au large) vs "predicted" (échoue). ──
   gate calcul = la cellule est à portée d'un point arrivals ET assez au sud (descend vers la côte).
   On choisit jusqu'à 2 bancs "prévus" (les plus proches d'un arrivals). */
const BEACH_GATE_R=160; // une cellule "compte" pour un arrivals si dans ce rayon
function nearestArrivalDist(c){let m=1e9;for(const a of ARRIVALS)m=Math.min(m,dist(c[0],c[1],a[0],a[1]));return m;}

// candidats échouage = cellules actives proches d'un arrivals, triées par proximité ; cap à 2
let predicted = ACTIVE
  .map((c,i)=>({c,i,da:nearestArrivalDist(c)}))
  .filter(o=>o.da<=BEACH_GATE_R)
  .sort((a,b)=>a.da-b.da)
  .slice(0,2);
const predictedSet = new Set(predicted.map(o=>o.i));

// LOD : cap mobile sur le nombre de bancs au large rendus (garde les plus forts en afai)
const isMobile = Math.min(window.innerWidth,window.innerHeight) < 540 || matchMedia("(pointer:coarse)").matches;
const FIELD_CAP = isMobile ? 16 : 30;
let driftCells = ACTIVE
  .map((c,i)=>({c,i}))
  .filter(o=>!predictedSet.has(o.i))
  .sort((a,b)=>b.c[2]-a.c[2])
  .slice(0,FIELD_CAP);

// DÉRIVE : courant Caraïbe lent vers le NORD-OUEST. Vecteur en unités viewBox/seconde (TRÈS petit).
// ~plusieurs minutes pour traverser : 800px / DRIFT ≈ 800/2.4 ≈ 333s ≈ 5.5 min. À peine perceptible/frame.
const DRIFT={x:-2.4, y:-1.2}; // px par seconde (NW). 60fps => 0.04px/frame.
const fieldLayer=document.getElementById("fieldLayer");
const fieldBanks=[];
for(const o of driftCells){
  const afai=o.c[2];
  const R=clamp(9+afai*46, 9, 26);               // taille ∝ densité
  const seed=Math.round(o.c[0]*7+o.c[1]*3+o.i*31);
  const g=makeBank(seed, R);
  g.setAttribute("opacity","0.92");
  fieldLayer.appendChild(g);
  // bob (calme) très léger, désactivé en reduced-motion
  fieldBanks.push({g, x0:o.c[0], y0:o.c[1], bobAmp: REDUCED?0:(0.8+afai*1.4), bobPh:(seed%628)/100});
}

/* ── 6) BANCS "PRÉVUS" : démarrent dans le champ (leur cellule), dérivent un peu, puis remontent vers
   l'arrivals et jouent Le Grand Splat. Échelonnés. ── */
const beachLayer=document.getElementById("beachLayer");
const lineLayer=document.getElementById("lineLayer");
const depositLayer=document.getElementById("depositLayer");
const rippleLayer=document.getElementById("rippleLayer");
const foamLayer=document.getElementById("foamLayer");
const shoreFoamEl=document.getElementById("shoreFoam");

const beachers=[];
predicted.forEach((o,k)=>{
  const afai=o.c[2];
  const R=clamp(11+afai*46, 12, 28);
  const seed=Math.round(o.c[0]*5+o.c[1]*9+k*53+7);
  const bank=makeBank(seed,R); beachLayer.appendChild(bank);
  const dep=makeDeposit(seed); depositLayer.appendChild(dep.g);
  // point d'arrivée sur la côte (l'arrivals le plus proche), légèrement réparti si 2 bancs
  let best=ARRIVALS[0],bd=1e9; for(const a of ARRIVALS){const d=dist(o.c[0],o.c[1],a[0],a[1]); if(d<bd){bd=d;best=a;}}
  const impact={x:best[0]+(k-0.5)*40, y:best[1]-2};
  const foam=makeFoam(seed); foam.setAttribute("transform",`translate(${impact.x} ${impact.y})`); foamLayer.appendChild(foam);
  const ripple=makeRipple(seed); ripple.setAttribute("transform",`translate(${impact.x} ${impact.y})`); rippleLayer.appendChild(ripple);
  // speed-lines
  const lines=[]; const lg=el("g",{}); lineLayer.appendChild(lg);
  const lr=rng(seed*3+9);
  for(let i=0;i<9;i++){const a=(i/9)*6.28+lr()*0.25;
    const x1=Math.cos(a)*26,y1=Math.sin(a)*26,x2=Math.cos(a)*(60+lr()*28),y2=Math.sin(a)*(60+lr()*28);
    const ln=el("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),stroke:"#FFE9A8","stroke-width":(2.2+lr()*1.4).toFixed(1),"stroke-linecap":"round",opacity:"0"});
    lg.appendChild(ln); lines.push(ln);}
  beachers.push({
    bank, dep:dep.g, depHt:dep.ht, foam, ripple, lg, lines,
    origin:{x:o.c[0],y:o.c[1]}, impact, R, afai,
    // timeline propre, échelonnée : approche lente (longue) puis splat rapide
    tApproach: 7 + k*4,   // sec : remontée LENTE vers la côte
    tImpact:   7.6 + k*4,
    tSettle:   8.0 + k*4,
    tFade:     12.5 + k*4,
    tLoop:     14.0 + k*4
  });
});

/* ── 7) timeline globale & rendu ── */
// Phase cadrage : 0..T_FIT s la caméra passe de VIEW_START → VIEW_FIT (révèle le sud), puis tient.
const T_FIT = 4.0;
function renderCamera(t){
  const p = ease(clamp(t/T_FIT, 0, 1));
  const v={ x:lerp(VIEW_START.x,VIEW_FIT.x,p), y:lerp(VIEW_START.y,VIEW_FIT.y,p),
            w:lerp(VIEW_START.w,VIEW_FIT.w,p), h:lerp(VIEW_START.h,VIEW_FIT.h,p) };
  world.setAttribute("transform", viewToTransform(v));
}

function renderField(t){
  for(const b of fieldBanks){
    // dérive lente continue (pas de wrap visible : le cadre fit tient le champ ; on borne juste)
    const dx=DRIFT.x*t, dy=DRIFT.y*t;
    const bob = b.bobAmp ? Math.sin(t*0.5 + b.bobPh)*b.bobAmp : 0;
    const x=b.x0+dx, y=b.y0+dy+bob;
    b.g.setAttribute("transform",`translate(${x.toFixed(2)} ${y.toFixed(2)})`);
  }
}

function renderBeacher(b,t){
  // tps local bouclé sur la durée du beacher
  const tl = b.tLoop, lt = ((t % tl)+tl)%tl;
  // 1) approche : part de origin (qui dérive avec le champ) → impact (remontée LENTE vers côte)
  if(lt < b.tImpact){
    const p = ease(clamp(lt/b.tApproach,0,1));
    // l'origine dérive comme le champ jusqu'au début de la remontée pour cohérence
    const ox=b.origin.x+DRIFT.x*Math.min(lt,b.tApproach), oy=b.origin.y+DRIFT.y*Math.min(lt,b.tApproach);
    const x=lerp(ox,b.impact.x,p), y=lerp(oy,b.impact.y,p);
    const sc=lerp(0.85,1.0,p);
    const squash = lt>b.tApproach ? 1+(lt-b.tApproach)/(b.tImpact-b.tApproach)*0.55 : 1;
    b.bank.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${(sc*squash).toFixed(3)} ${(sc/squash).toFixed(3)})`);
    b.bank.setAttribute("opacity", lt>b.tApproach ? (1-(lt-b.tApproach)/(b.tImpact-b.tApproach)).toFixed(2) : "0.92");
  } else b.bank.setAttribute("opacity","0");

  // 2) dépôt figé incliné côte (G5) + halftone révélé (G4) + fade boucle
  if(lt>=b.tImpact){
    const pg=clamp((lt-b.tImpact)/(b.tSettle-b.tImpact),0,1);
    const sc=(0.25+easeOut(pg)*0.75)*(1+0.1*Math.sin(pg*Math.PI));
    let op=1; if(lt>b.tFade) op=clamp(1-(lt-b.tFade)/(b.tLoop-b.tFade),0,1);
    b.dep.setAttribute("transform",`translate(${b.impact.x} ${b.impact.y}) rotate(${COAST_DEG}) scale(${(sc*(b.R/58)*1.05).toFixed(3)})`);
    b.dep.setAttribute("opacity",op.toFixed(2));
    b.depHt.setAttribute("opacity",(easeOut(pg)*0.32*op).toFixed(2));
  } else b.dep.setAttribute("opacity","0");

  // 3) speed-lines
  {const dt=lt-b.tImpact; let lp=dt<0?0:dt<0.05?dt/0.05:dt<0.30?1-(dt-0.05)/0.25:0; lp=clamp(lp,0,1);
   b.lg.setAttribute("transform",`translate(${b.impact.x} ${b.impact.y}) scale(${(0.6+lp*0.55).toFixed(3)})`);
   for(const ln of b.lines) ln.setAttribute("opacity",(lp*0.85).toFixed(2));}

  // 4) onde concentrique
  {const dt=lt-b.tImpact; let rp=dt<0||dt>0.26?0:1-dt/0.26;
   const rsc=1+easeOut(clamp(dt/0.26,0,1))*3;
   b.ripple.setAttribute("transform",`translate(${b.impact.x} ${b.impact.y}) scale(${rsc.toFixed(3)})`);
   b.ripple.setAttribute("opacity",clamp(rp,0,1).toFixed(2));}

  // 5) écume d'impact
  {const dt=lt-b.tImpact; let fp=dt<0?0:dt<0.5?Math.sin((dt/0.5)*Math.PI*0.9):0; fp=clamp(fp,0,1);
   b.foam.setAttribute("transform",`translate(${b.impact.x} ${b.impact.y}) scale(${(0.5+easeOut(clamp(dt/0.5,0,1))*0.85).toFixed(3)})`);
   b.foam.setAttribute("opacity",fp.toFixed(2));}
}

function render(t){
  renderCamera(t);
  renderField(t);
  for(const b of beachers) renderBeacher(b,t);
}

/* ── PLANCHER reduced-motion : tout figé, cadré sur le fit (champ + île visibles), 1 dépôt posé, lisible. ── */
function renderFrozen(){
  world.setAttribute("transform", viewToTransform(VIEW_FIT));
  for(const b of fieldBanks){ b.g.setAttribute("transform",`translate(${b.x0} ${b.y0})`); }
  for(const b of beachers){
    b.bank.setAttribute("opacity","0");
    for(const ln of b.lines) ln.setAttribute("opacity","0");
    b.ripple.setAttribute("opacity","0");
    b.foam.setAttribute("opacity","0");
    // dépôt posé, figé incliné côte
    b.dep.setAttribute("transform",`translate(${b.impact.x} ${b.impact.y}) rotate(${COAST_DEG}) scale(${(b.R/58*1.05).toFixed(3)})`);
    b.dep.setAttribute("opacity","1"); b.depHt.setAttribute("opacity","0.32");
  }
}

/* ── 1 SEUL rAF, pausable, visibilitychange ── */
let raf=0, paused=false, t0=0;
function frame(tms){ if(!t0)t0=tms; const t=(tms-t0)/1000; render(t); if(!paused) raf=requestAnimationFrame(frame); }
if(REDUCED){ renderFrozen(); }
else { raf=requestAnimationFrame(frame); }
document.body.addEventListener("click",()=>{ if(REDUCED)return; paused=!paused; if(paused)cancelAnimationFrame(raf); else raf=requestAnimationFrame(frame); });
document.addEventListener("visibilitychange",()=>{ if(REDUCED)return; if(document.hidden)cancelAnimationFrame(raf); else if(!paused)raf=requestAnimationFrame(frame); });
</script>
</body></html>
