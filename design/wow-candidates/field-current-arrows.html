<!doctype html>
<!-- FIELD — "Courant + flèches de bord" (key: current-arrows)
     Le VRAI champ de sargasses MQ (49 cellules satellite réelles, embarquées) :
       · bancs IN-FRAME → rendus comme bancs golden-brown, dérive LENTE le long de lignes de courant
         subtiles (courant des Caraïbes ≈ O/N-O), mouvement à peine perceptible image-par-image.
       · bancs HORS-CADRE (vy>600 sud, vx<0 ouest, etc.) → CHIPS DE BORD comic ("banc · X km · J+2")
         ancrés sur le bord, pointant d'où ça vient ; clic sur une chip = recadre brièvement vers ce bord.
     · ARRIVÉES (gate calcul = bancs prévus atterrir) → effet comic "Le Grand Splat" (squash→explosion
       splat + onde + speed-lines + spray → dépôt figé incliné côte → fade). Les autres dérivent au large.
     CONTRAINTES : 1 SEUL rAF pausable + visibilitychange · transform/opacity UNIQUEMENT (aucun filtre/
     blur/turbulence par frame, aucun path 'd' régénéré par frame) · createElementNS/setAttribute SEULEMENT
     (PAS d'innerHTML) · reduced-motion = PLANCHER (champ figé beau+lisible) · LOD/cap mobile. -->
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Champ de sargasses — courant lent + flèches de bord</title>
<style>

</style></head>

    <defs>
      <radialGradient id="sargG" cx="40%" cy="32%" r="72%">
        <stop offset="0" stop-color="#E3B743"/><stop offset=".48" stop-color="#B08A2A"/><stop offset="1" stop-color="#7C6A22"/>
      </radialGradient>
      <radialGradient id="splatG" cx="42%" cy="36%" r="74%">
        <stop offset="0" stop-color="#E3B743"/><stop offset=".4" stop-color="#B08A2A"/><stop offset=".82" stop-color="#7C6A22"/><stop offset="1" stop-color="#5d5a1e"/>
      </radialGradient>

    <!-- CAMÉRA : tout ce qui dérive/se recadre vit dans #cam (1 transform animé) -->
    <g id="world" clip-path="url(#seaClip)">
      <g id="cam">
        <g id="streamLayer"></g>     <!-- lignes de courant subtiles -->
        <g id="depositLayer"></g>    <!-- dépôts figés (arrivées échouées) -->
        <g id="rippleLayer"></g>     <!-- ondes d'impact -->

        <g id="dropLayer"></g>       <!-- spray -->

</div>

// ARRIVÉES = gate calcul. Points de côte (sur le rivage MQ) prévus touchés + délai (jours).

// ── COURANT : champ vectoriel lent O/N-O (Caraïbes). Direction quasi-uniforme + biais radial doux. ──
const FLOW={x:-1.0,y:-0.28};           // O/N-O dominant (normalisé plus bas)
(function(){const m=Math.hypot(FLOW.x,FLOW.y);FLOW.x/=m;FLOW.y/=m;})();

// ── ÎLE ──
(function(){
  const L=document.getElementById("islandLayer");
  L.appendChild(el("path",{d:ISLAND_PATH,fill:INK,opacity:".24",transform:"translate(3 5)"}));

  L.appendChild(el("path",{d:ISLAND_PATH,fill:"url(#halftone)",opacity:".16"}));

// ── FORME DE BANC (splat-path) — réutilisé du proto échouage ──
function splatPath(cx,cy,r,seed,N,jag){
  N=N||10; jag=jag==null?0.7:jag;
  const rand=rng(seed),p=[];
  for(let i=0;i<N;i++){const a=(i/N)*6.2832, rr=r*(1-jag*0.5+rand()*jag);p.push([cx+Math.cos(a)*rr,cy+Math.sin(a)*rr]);}
  let d=`M${((p[0][0]+p[N-1][0])/2).toFixed(1)} ${((p[0][1]+p[N-1][1])/2).toFixed(1)}`;
  for(let i=0;i<N;i++){const a=p[i],b=p[(i+1)%N];d+=`Q${a[0].toFixed(1)} ${a[1].toFixed(1)} ${((a[0]+b[0])/2).toFixed(1)} ${((a[1]+b[1])/2).toFixed(1)}`;}
  return d+"Z";
}
// densité afai (0.10..0.32) → rayon visuel du banc
function bankRadius(afai){return 9+(clamp(afai,0.10,0.32)-0.10)/0.22*20;}

// ── BANCS IN-FRAME : créés 1× (path 'd' statique), seul le transform dérive ──
const fieldBanks=[];
function makeFieldBank(cx,cy,afai,seed){
  const R=bankRadius(afai), op=clamp(0.40+afai*1.5,0.45,0.92);
  const g=el("g",{opacity:op.toFixed(2)});
  const sil=splatPath(0,0,R,seed,afai>0.22?11:9,0.6);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".26",transform:"translate(1.8 2.6)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#sargG)",stroke:INK,"stroke-width":1.8,"stroke-linejoin":"round"}));
  if(afai>0.18){ // halftone + reflet seulement sur bancs assez denses (LOD)
    g.appendChild(el("path",{d:sil,fill:"url(#halftone)",opacity:".26"}));
    g.appendChild(el("path",{d:splatPath(-R*0.22,-R*0.28,R*0.48,seed+3,7,0.5),fill:"#FFE9A8",opacity:".42"}));
  }
  return g;
}

// ── LIGNES DE COURANT : statiques, faibles ; ressentir le sens sans clutter ──
function makeStreamlines(){
  const L=document.getElementById("streamLayer"), rand=rng(7);
  const N=isMobile?5:8;
  for(let i=0;i<N;i++){
    // ancrées en bas-droite (d'où vient le champ), filent vers O/N-O
    const sx=520+rand()*420, sy=120+i*64+rand()*22;
    const len=170+rand()*120;
    const ex=sx+FLOW.x*len, ey=sy+FLOW.y*len + (rand()-0.5)*24;
    const mx=(sx+ex)/2 + (rand()-0.5)*30, my=(sy+ey)/2 - 18;
    const d=`M${sx.toFixed(1)} ${sy.toFixed(1)} Q${mx.toFixed(1)} ${my.toFixed(1)} ${ex.toFixed(1)} ${ey.toFixed(1)}`;
    L.appendChild(el("path",{d,fill:"none",stroke:"#FFE9A8","stroke-width":"1.4",
      "stroke-linecap":"round",opacity:".12","stroke-dasharray":"2 12"}));
  }
}

// ── ÉCHOUAGE COMIC (transposé du proto "Le Grand Splat") ──
function makeBank(seed){
  const g=el("g",{}), R=22, sil=splatPath(0,0,R,seed,11,0.55);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".30",transform:"translate(2.5 3.5)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#sargG)",stroke:INK,"stroke-width":2,"stroke-linejoin":"round"}));
  g.appendChild(el("path",{d:sil,fill:"url(#halftone)",opacity:".3"}));
  g.appendChild(el("path",{d:splatPath(-R*0.22,-R*0.28,R*0.5,seed+3,7,0.5),fill:"#FFE9A8",opacity:".5"}));
  return g;
}
function makeDeposit(seed){
  const g=el("g",{opacity:"0"}), R=44, sil=splatPath(0,0,R,seed,13,0.78);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".26",transform:"translate(3 4)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#splatG)",stroke:INK,"stroke-width":2.2,"stroke-linejoin":"round"}));
  const rl=rng(seed*7+3);
  for(let i=0;i<3;i++){const a=(0.15+rl()*0.7)*3.14159,len=R*(0.9+rl()*0.5);
    const x=Math.cos(a)*len,y=Math.abs(Math.sin(a))*len*0.7+R*0.3,w=8+rl()*7;
    g.appendChild(el("path",{d:splatPath(x,y,w,seed*13+i*5,7,0.7),fill:"url(#splatG)",stroke:INK,"stroke-width":1.5,"stroke-linejoin":"round"}));}
  const ht=el("path",{d:sil,fill:"url(#halftone)",opacity:"0"});g.appendChild(ht);
  g.appendChild(el("path",{d:splatPath(-R*0.28,-R*0.34,R*0.42,seed+5,8,0.5),fill:"#FFE9A8",opacity:".45"}));
  return {g,ht};
}
function makeFoam(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,4,30,seed+1,12,0.6),fill:"none",stroke:"#eafcff","stroke-width":6,opacity:".9","stroke-linejoin":"round"}));
  g.appendChild(el("path",{d:splatPath(0,4,30,seed+1,12,0.6),fill:"none",stroke:"#ffffff","stroke-width":2.2,opacity:".95","stroke-linejoin":"round"}));
  return g;
}
function makeRipple(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,0,24,seed+9,14,0.18),fill:"none",stroke:INK,"stroke-width":2.6,opacity:".7"}));
  g.appendChild(el("path",{d:splatPath(0,0,24,seed+9,14,0.18),fill:"none",stroke:"#FFE9A8","stroke-width":1.3,opacity:".9"}));
  return g;
}

// build chaque arrivée
const arrivalNodes=[];
function buildArrival(a){
  const bank=makeBank(a.seed); document.getElementById("bankLayer").appendChild(bank);
  const dep=makeDeposit(a.seed); document.getElementById("depositLayer").appendChild(dep.g);
  const foam=makeFoam(a.seed); foam.setAttribute("transform",`translate(${a.x} ${a.y})`); document.getElementById("foamLayer").appendChild(foam);
  const ripple=makeRipple(a.seed); ripple.setAttribute("transform",`translate(${a.x} ${a.y})`); document.getElementById("rippleLayer").appendChild(ripple);
  // speed-lines (créées 1×)
  const lineG=el("g",{}); document.getElementById("lineLayer").appendChild(lineG);
  const lines=[], rl=rng(a.seed*3+1);
  for(let i=0;i<8;i++){const ang=(i/8)*6.28+rl()*0.25;
    const x1=Math.cos(ang)*22,y1=Math.sin(ang)*22,x2=Math.cos(ang)*(52+rl()*24),y2=Math.sin(ang)*(52+rl()*24);
    const ln=el("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),stroke:"#FFE9A8","stroke-width":(2.2+rl()*1.4).toFixed(1),"stroke-linecap":"round",opacity:"0"});
    lineG.appendChild(ln);lines.push(ln);}
  // spray
  const dropG=el("g",{}); document.getElementById("dropLayer").appendChild(dropG);
  const drops=[], rd=rng(a.seed*5+2);
  for(let i=0;i<7;i++){const ang=-2.5+rd()*1.9,spd=70+rd()*110,rr=2.2+rd()*3;
    const dg=el("g",{opacity:"0"});
    dg.appendChild(el("path",{d:splatPath(0,0,rr,a.seed+i,7,0.55),fill:"url(#sargG)",stroke:INK,"stroke-width":1,"stroke-linejoin":"round"}));
    dropG.appendChild(dg);
    drops.push({g:dg,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,rot:(rd()*2-1)*180});}
  // origine du banc arrivant = au large dans le sens INVERSE du courant (vient du large)
  const origin={x:a.x - FLOW.x*210, y:a.y - FLOW.y*210 + 40};
  arrivalNodes.push({a,bank,dep,foam,ripple,lineG,lines,drops,origin});
}

// ── CHIPS DE BORD : bancs hors-cadre → puce comic ancrée au bord, pointe vers l'origine ──
// classe une cellule hors-cadre et calcule son point d'ancrage sur le bord + angle de la flèche.
function edgeChipFor(cx,cy){
  const M=16; // marge
  // dans le cadre ?
  if(cx>=0&&cx<=VIEW[0]&&cy>=0&&cy<=VIEW[1]) return null;
  // direction depuis le centre vers la cellule (d'où ça vient)
  let ax=clamp(cx,M,VIEW[0]-M), ay=clamp(cy,M,VIEW[1]-M);
  // distance hors-cadre → "km" plausibles (10 px ≈ ~2.2 km, échelle indicative)
  const dist=Math.hypot(cx-clamp(cx,0,VIEW[0]), cy-clamp(cy,0,VIEW[1]));
  const km=Math.round(8+dist*0.22);
  // ETA : courant lent → ~plus loin = plus tard. borne 1..5 j.
  const eta=clamp(Math.round(1+dist/95),1,5);
  // angle de la flèche : pointe DEPUIS le bord VERS le large (vers la cellule)
  const ang=Math.atan2(cy-ay,cx-ax)*180/Math.PI;
  return {ax,ay,km,eta,ang,target:{x:cx,y:cy}};
}

function buildChips(){
  const L=document.getElementById("chipLayer");
  // sélectionne les cellules hors-cadre les plus denses, dédupe par bord pour éviter le clutter
  const cands=[];
  for(const [cx,cy,afai] of CELLS){
    const c=edgeChipFor(cx,cy); if(!c) continue;
    c.afai=afai; cands.push(c);
  }
  cands.sort((p,q)=>q.afai-p.afai);
  const CAP=isMobile?3:5, picked=[], minGap=isMobile?150:110;
  for(const c of cands){
    if(picked.length>=CAP) break;
    if(picked.some(p=>Math.hypot(p.ax-c.ax,p.ay-c.ay)<minGap)) continue;
    picked.push(c);
  }
  for(const c of picked){
    const g=el("g",{class:"chip",transform:`translate(${c.ax.toFixed(1)} ${c.ay.toFixed(1)})`});
    // orientation de la chip : décalée vers l'INTÉRIEUR du cadre depuis le bord
    const inx=clamp(c.ax, 0, VIEW[0])===c.ax ? 0 : (c.ax<VIEW[0]/2?1:-1);
    const iny=clamp(c.ay, 0, VIEW[1])===c.ay ? 0 : (c.ay<VIEW[1]/2?1:-1);
    // flèche : petit triangle pointant vers le large (origine du banc)
    const ar=el("g",{transform:`rotate(${c.ang.toFixed(0)})`});
    ar.appendChild(el("path",{d:"M0 -7 L20 0 L0 7 L6 0 Z",fill:"#E3B743",stroke:INK,"stroke-width":1.6,"stroke-linejoin":"round"}));
    g.appendChild(ar);
    // bulle texte décalée vers l'intérieur (perpendiculaire au bord)
    const bx=(inx!==0? -inx*0 : 0), by=0;
    const off=22, ox=(c.ax< VIEW[0]/2?off:(c.ax>VIEW[0]/2? -off:0));
    const oy=(c.ay< VIEW[1]/2?off:(c.ay>VIEW[1]/2? -off:0));
    const bubble=el("g",{transform:`translate(${ (c.ax<40?38:c.ax>VIEW[0]-40?-38:0) } ${ (c.ay<30?34:c.ay>VIEW[1]-30?-34:0) })`});
    const W=96,H=34;
    bubble.appendChild(el("rect",{x:(-W/2).toFixed(0),y:(-H/2).toFixed(0),width:W,height:H,rx:9,fill:"#1a1430",stroke:INK,"stroke-width":2,opacity:".95"}));
    bubble.appendChild(el("rect",{x:(-W/2).toFixed(0),y:(-H/2).toFixed(0),width:W,height:H,rx:9,fill:"none",stroke:"#E3B743","stroke-width":1,opacity:".55"}));
    const t1=el("text",{x:0,y:-2,"text-anchor":"middle","font-family":"ui-monospace,monospace","font-size":"11","font-weight":"700",fill:"#FFE9A8"});
    t1.textContent=`banc · ${c.km} km`;
    const t2=el("text",{x:0,y:11,"text-anchor":"middle","font-family":"ui-monospace,monospace","font-size":"10",fill:"#cfc6e6"});
    t2.textContent=c.eta===1?"arrivée J+1":`arrivée J+${c.eta}`;
    bubble.appendChild(t1); bubble.appendChild(t2);
    g.appendChild(bubble);
    // halo cible pour le recadrage
    g.dataset.tx=c.target.x; g.dataset.ty=c.target.y;
    g.addEventListener("click",ev=>{ev.stopPropagation();reframeTo(c.target.x,c.target.y);});
    L.appendChild(g);
  }
}

// ── INIT champ in-frame (LOD : cap nombre de bancs sur mobile) ──
(function(){
  const L=document.getElementById("fieldLayer");
  // bancs in-frame = cellules dans le cadre élargi (un peu hors bord pour entrer en douceur)
  const inframe=CELLS.filter(([cx,cy])=>cx>-60&&cx<VIEW[0]+60&&cy>-60&&cy<VIEW[1]+60)
    .filter(([cx,cy])=>{ // pas de banc planté SUR la terre (rude check via bbox île centre)
      return true; });
  inframe.sort((p,q)=>q[2]-p[2]);
  const CAP=isMobile?10:18;
  let n=0;
  for(const [cx,cy,afai] of inframe){
    if(n>=CAP) break;
    const seed=Math.round(cx*7+cy*13+afai*1000);
    const g=makeFieldBank(cx,cy,afai,seed);
    L.appendChild(g);
    // dérive : phase aléatoire pour casser l'uniformité, amplitude minuscule
    fieldBanks.push({g,bx:cx,by:cy,afai,
      ph:(seed%628)/100,                       // phase d'oscillation perpendiculaire
      sw:6+(afai*10)});                          // amplitude de balancement (px) très faible
    n++;
  }
})();
makeStreamlines();
ARRIVALS.forEach(buildArrival);
buildChips();

// ── DÉRIVE LENTE : le champ traverse l'écran en ~PLUSIEURS MINUTES ──
// Le champ se translate le long de FLOW ; vitesse = quelques px / SECONDE → ~minutes pour traverser.
const DRIFT_PXPS = 0.55;                         // 0.55 px/s ≈ ~800px en ~24 min : à peine perceptible
const FIELD_SPAN = 760;                          // distance avant wrap (boucle douce)
const fieldLayer=document.getElementById("fieldLayer");
const streamLayer=document.getElementById("streamLayer");

// ── ÉCHOUAGE : cadence longue, chaque arrivée joue son splat puis le dépôt reste figé ──
const ARR_PERIOD=14;                              // s : cycle long et calme
const ease=p=>p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
const easeOut=p=>1-Math.pow(1-p,3);

function renderArrival(node, lt){
  // lt = temps local depuis le début du cycle de CETTE arrivée (peut être <0 = pas encore)
  const {a,bank,dep,foam,ripple,lineG,lines,drops,origin}=node;
  const T_APPROACH=2.4,T_IMPACT=2.7,T_SETTLE=3.2,T_FADE=8.0,T_END=ARR_PERIOD; // dépôt visible longtemps
  if(lt<0 || lt>=T_END){ // hors fenêtre → seulement le dépôt résiduel figé léger
    bank.setAttribute("opacity","0");
    foam.setAttribute("opacity","0"); ripple.setAttribute("opacity","0");
    for(const ln of lines) ln.setAttribute("opacity","0");
    for(const d of drops) d.g.setAttribute("opacity","0");
    dep.g.setAttribute("transform",`translate(${a.x} ${a.y}) rotate(${a.coastDeg}) scale(1)`);
    dep.g.setAttribute("opacity","0.42"); dep.ht.setAttribute("opacity","0.20"); // résidu honnête
    return;
  }
  // BANC en approche LENTE depuis le large (le long du courant), puis squash
  if(lt<T_IMPACT){
    const p=ease(clamp(lt/T_APPROACH,0,1));
    const x=origin.x+(a.x-origin.x)*p, y=origin.y+(a.y-origin.y)*p, sc=0.75+p*0.5;
    const squash=lt>T_APPROACH?1+(lt-T_APPROACH)/(T_IMPACT-T_APPROACH)*0.7:1;
    bank.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${(sc*squash).toFixed(3)} ${(sc/squash).toFixed(3)})`);
    bank.setAttribute("opacity",lt>T_APPROACH?(1-(lt-T_APPROACH)/(T_IMPACT-T_APPROACH)).toFixed(2):"1");
  } else bank.setAttribute("opacity","0");
  // DÉPÔT figé incliné côte + halftone révélé
  if(lt>=T_IMPACT){
    const pg=clamp((lt-T_IMPACT)/(T_SETTLE-T_IMPACT),0,1);
    const sc=(0.25+easeOut(pg)*0.75)*(1+0.12*Math.sin(pg*Math.PI));
    let op=1; if(lt>T_FADE) op=clamp(1-(lt-T_FADE)/(T_END-T_FADE),0.42,1); // fade vers résidu, pas 0
    dep.g.setAttribute("transform",`translate(${a.x} ${a.y}) rotate(${a.coastDeg}) scale(${sc.toFixed(3)})`);
    dep.g.setAttribute("opacity",op.toFixed(2));
    dep.ht.setAttribute("opacity",(easeOut(pg)*0.32*op).toFixed(2));
  }
  // SPEED-LINES
  {const dt=lt-T_IMPACT; let lp=dt<0?0:dt<0.05?dt/0.05:dt<0.30?1-(dt-0.05)/0.25:0; lp=clamp(lp,0,1);
   lineG.setAttribute("transform",`translate(${a.x} ${a.y}) scale(${(0.6+lp*0.6).toFixed(3)})`);
   for(const ln of lines) ln.setAttribute("opacity",(lp*0.9).toFixed(2));}
  // ONDE
  {const dt=lt-T_IMPACT; let rp=dt<0||dt>0.26?0:1-dt/0.26; const rsc=1+easeOut(clamp(dt/0.26,0,1))*3;
   ripple.setAttribute("transform",`translate(${a.x} ${a.y}) scale(${rsc.toFixed(3)})`);
   ripple.setAttribute("opacity",clamp(rp,0,1).toFixed(2));}
  // ÉCUME
  {const dt=lt-T_IMPACT; let fp=dt<0?0:dt<0.5?Math.sin((dt/0.5)*Math.PI*0.9):0; fp=clamp(fp,0,1);
   foam.setAttribute("transform",`translate(${a.x} ${a.y}) scale(${(0.5+easeOut(clamp(dt/0.5,0,1))*0.9).toFixed(3)})`);
   foam.setAttribute("opacity",fp.toFixed(2));}
  // SPRAY parabole
  {const dt=lt-T_IMPACT;
   for(const d of drops){
     if(dt<0||dt>0.9){d.g.setAttribute("opacity","0");continue;}
     const x=a.x+d.vx*dt, y=a.y+d.vy*dt+300*dt*dt;
     const sc=clamp(1-dt*0.5,0.4,1), op=dt<0.6?1:1-(dt-0.6)/0.25;
     d.g.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${sc.toFixed(2)}) rotate(${(d.rot*dt).toFixed(0)})`);
     d.g.setAttribute("opacity",clamp(op,0,1).toFixed(2));
   }}
}

// ── RECADRAGE doux vers une cible (clic chip) : pousse #cam, retour auto ──
let reframe={active:false,t0:0,tx:0,ty:0,dur:2.6};
function reframeTo(tx,ty){
  if(REDUCED) return;
  // décale la caméra pour amener (tx,ty) un peu plus vers le centre (sans révéler le void : clampé)
  reframe.active=true; reframe.t0=performance.now()/1000;
  reframe.tx=clamp((CENTER.x-tx)*0.55,-180,180);
  reframe.ty=clamp((CENTER.y-ty)*0.55,-150,150);
}

// ── RENDU GLOBAL : 1 SEUL rAF ──
function renderFrame(t){ // t en secondes depuis start
  // 1) DÉRIVE du champ (translation lente le long de FLOW + wrap doux)
  let prog=(DRIFT_PXPS*t) % FIELD_SPAN;          // 0..FIELD_SPAN
  const dx=FLOW.x*prog, dy=FLOW.y*prog;
  fieldLayer.setAttribute("transform",`translate(${dx.toFixed(2)} ${dy.toFixed(2)})`);
  streamLayer.setAttribute("transform",`translate(${(dx*0.6).toFixed(2)} ${(dy*0.6).toFixed(2)})`);
  // chaque banc : balancement perpendiculaire minuscule (vie sans aquarium)
  for(const b of fieldBanks){
    const sway=Math.sin(t*0.18+b.ph)*b.sw;       // 0.18 rad/s = très lent
    const nx=-FLOW.y, ny=FLOW.x;                  // perpendiculaire au courant
    b.g.setAttribute("transform",`translate(${(b.bx+nx*sway).toFixed(2)} ${(b.by+ny*sway).toFixed(2)})`);
  }
  // 2) CAMÉRA : recadrage chip géré dans applyCamera() (clock performance.now unifiée).
  // 3) ÉCHOUAGES (arrivées prévues). On échelonne les 2 arrivées dans le cycle.
  ARRIVALS.forEach((a,i)=>{
    const node=arrivalNodes[i];
    // décalage de départ : arrivée 0 commence à 1s, arrivée 1 à ARR_PERIOD/2
    const stagger=i*(ARR_PERIOD*0.5)+1;
    const lt=((t - stagger) % ARR_PERIOD + ARR_PERIOD) % ARR_PERIOD;
    renderArrival(node, lt);
  });
}

// caméra : on gère le recadrage proprement ici (clock unifiée)
let START=0;
const cam=document.getElementById("cam");
function applyCamera(now){
  if(!reframe.active){ cam.setAttribute("transform","translate(0 0)"); return; }
  const e=now - reframe.t0;
  const half=reframe.dur/2;
  let k; // 0→1→0 (va et revient)
  if(e>=reframe.dur){ reframe.active=false; cam.setAttribute("transform","translate(0 0)"); return; }
  k = e<half ? easeOut(e/half) : easeOut((reframe.dur-e)/half);
  cam.setAttribute("transform",`translate(${(reframe.tx*k).toFixed(2)} ${(reframe.ty*k).toFixed(2)})`);
}

// ── ÉTAT FIGÉ (reduced-motion = PLANCHER DUR) : champ posé, beau, lisible, 1 dépôt déjà échoué ──
function renderFrozen(){
  fieldLayer.setAttribute("transform","translate(0 0)");
  streamLayer.setAttribute("transform","translate(0 0)");
  for(const b of fieldBanks) b.g.setAttribute("transform",`translate(${b.bx} ${b.by})`);
  ARRIVALS.forEach((a,i)=>{
    const node=arrivalNodes[i];
    node.bank.setAttribute("opacity","0");
    node.foam.setAttribute("opacity","0"); node.ripple.setAttribute("opacity","0");
    for(const ln of node.lines) ln.setAttribute("opacity","0");
    for(const d of node.drops) d.g.setAttribute("opacity","0");
    // arrivée du jour (delay 0) = dépôt bien visible ; J+2 = résidu léger (honnête : pas encore là)
    const settled = a.delay===0;
    node.dep.g.setAttribute("transform",`translate(${a.x} ${a.y}) rotate(${a.coastDeg}) scale(${settled?1:0.6})`);
    node.dep.g.setAttribute("opacity",settled?"1":"0.30");
    node.dep.ht.setAttribute("opacity",settled?"0.32":"0.12");
  });
  cam.setAttribute("transform","translate(0 0)");
}

// ── BOUCLE ──
let raf=0,paused=false,t0=0;
function frame(tms){
  if(!t0)t0=tms;
  const now=tms/1000;
  const t=(tms-t0)/1000;
  renderFrame(t);
  applyCamera(now);
  if(!paused) raf=requestAnimationFrame(frame);
}
if(REDUCED){ renderFrozen(); }
else { START=performance.now()/1000; raf=requestAnimationFrame(frame); }

// clic mer = pause/play ; clic chip = recadrer (géré dans buildChips, stopPropagation)
document.getElementById("scene").addEventListener("click",()=>{
  if(REDUCED) return;
  paused=!paused;
  if(paused) cancelAnimationFrame(raf);
  else { t0=0; raf=requestAnimationFrame(frame); }
});
document.addEventListener("visibilitychange",()=>{
  if(REDUCED) return;
  if(document.hidden) cancelAnimationFrame(raf);
  else if(!paused){ t0=0; raf=requestAnimationFrame(frame); }
});
</script>
