<!doctype html>

     Le VRAI champ satellite (49 cellules _mq-scene.json, ~24 au sud hors-cadre d'origine) est
     révélé d'un coup, comme une carte météo marine. Dérive LENTE (courant Caraïbe ≈ O/N-O) :
     le champ traverse l'écran en ~plusieurs minutes (mouvement à peine perceptible image/image).
     SEULES 2 cellules que le CALCUL prévoit atterrir (sud-ouest, densité max) se détachent et
     jouent "Le Grand Splat" (proto-sarga-beaching-wow) sur la côte. Le reste dérive au large.
     Densité gérée par LOD/clustering (afai → taille + halftone, faibles afai = petits points).
     1 SEUL rAF pausable + visibilitychange · transform/opacity STRICTEMENT · createElementNS only
     (PAS d'innerHTML) · prefers-reduced-motion = champ FIGÉ beau & lisible. -->
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Champ régional large — dérive lente + échouage prévu</title>

<div class="stage">

    <!-- bandeau côtier sud-ouest : sable + écume (zone d'échouage prévu) -->

0 457.0 L496.8 462.6 L497.2 469.8 L504.3 473.5 L503.3 477.1 L511.1 479.3 L521.7 477.2 L522.7 470.8 L530.1 462.8 L536.2 465.3 L536.8 462.0 L530.7 460.7 L532.5 456.8 L527.2 455.7 L527.8 450.8 L533.2 451.1 L534.5 455.1 L539.8 453.8 L540.0 446.2 L548.3 439.6 L551.0 425.8 L560.8 422.2 L557.1 421.8 L553.5 413.2 L548.3 412.4 L550.4 407.3 L554.8 409.5 L552.7 412.2 L557.5 410.2 L560.3 404.4 L555.9 393.5 L549.7 391.5 L549.2 376.0 L543.8 374.6 L546.5 376.0 L540.2 379.0 L537.7 376.1 L541.0 371.8 L539.4 367.1 L547.6 362.9 L545.9 359.1 L537.9 358.5 L539.7 354.1 L546.5 354.9 L536.6 343.5 L547.7 327.7 L540.7 328.3 L536.2 333.2 L536.9 337.1 L529.7 337.3 L534.6 329.0 L527.6 329.5 L532.9 324.9 L525.5 327.4 L522.4 324.3 L524.3 320.2 L533.4 318.3 L523.5 317.9 L530.4 314.0 L526.4 312.6 L525.8 303.9 L520.5 311.1 L514.0 309.9 L507.6 303.3 L508.2 298.5 L511.6 299.1 L509.9 294.6 L501.1 290.4 L509.8 283.0 L504.1 281.1 L495.9 286.3 L494.6 280.7 L493.4 283.2 L485.7 281.4 L487.8 279.4 L485.2 275.3 L492.1 272.9 L492.0 268.4 L487.9 269.6 L488.9 265.8 L494.1 263.9 L478.7 259.7 L482.7 253.1 L484.3 255.0 L485.6 252.4 L487.4 257.7 L488.2 254.1 L492.6 256.3 L493.5 250.7 L496.6 254.0 L499.2 243.3 L492.7 242.7 L489.7 248.6 L485.2 246.6 L487.1 243.0 L483.2 245.6 L479.4 241.8 L479.5 245.5 L477.0 245.4 L474.8 242.4 L467.8 252.4 L461.6 253.8 L454.8 243.4 L448.4 240.0 L453.5 227.9 L463.8 231.5 L459.8 227.2 L461.2 223.5 L473.6 219.9 L474.8 223.4 L478.4 216.6 L483.1 216.6 L484.1 213.7 L481.7 212.9 L483.4 210.3 L477.2 214.0 L472.5 210.1 L473.0 198.6 L469.3 198.9 L466.9 203.9 L456.9 206.0 L456.2 202.0 L463.3 193.8 L458.6 193.8 L455.4 199.1 L447.2 192.8 L447.4 183.4 L453.8 184.7 L446.9 179.6 L448.1 175.0 L453.3 169.1 L462.7 168.3 L474.4 174.3 L475.9 181.8 L492.2 181.8 L491.8 176.8 L485.2 174.7 L494.1 167.1 L487.2 161.5 L487.6 158.5 L498.1 153.6 L502.5 162.0 L507.4 161.7 L504.5 154.8 L507.4 152.5 L504.0 148.4 L506.0 147.5 L497.0 146.0 L494.6 142.6 L491.1 148.4 L481.4 154.7 L477.8 155.3 L476.5 152.3 L474.4 158.0 L467.7 161.5 L463.2 157.3 L446.3 162.6 L435.6 180.9 L431.6 178.5 L432.5 170.7 L427.6 167.2 L427.1 159.7 L414.3 147.5 L418.1 146.8 L417.2 144.5 L410.8 144.7 L407.8 137.7 L402.4 136.1 L396.5 127.2 L398.3 117.5 L394.0 118.0 L394.9 115.2 L390.1 119.4 L385.0 117.6 L381.1 106.0 L373.0 104.7 L375.3 98.9 L367.8 98.6 L363.6 92.9 L354.0 96.6 L345.5 87.5 L338.7 86.9 L322.9 77.8 L316.9 70.1 L282.5 57.5 L246.9 59.8 L241.4 65.6 L226.2 71.1 L214.4 86.2 L206.4 105.8 Z";

// [vx, vy, afai] — 49 cellules satellite réelles (afai 0.10..0.32)
const CELLS=[[340.8,1049.3,0.2],[822.6,1023.1,0.11],[-191.6,970.7,0.1],[138,839.7,0.14],[898.6,813.5,0.11],[112.7,708.7,0.16],[290.1,708.7,0.16],[138,682.5,0.1],[163.4,682.5,0.12],[188.7,682.5,0.32],[340.8,682.5,0.19],[467.6,682.5,0.11],[949.3,682.5,0.1],[974.7,682.5,0.11],[61.9,630.1,0.32],[87.3,630.1,0.17],[112.7,630.1,0.23],[264.8,630.1,0.13],[290.1,630.1,0.11],[87.3,603.9,0.32],[112.7,603.9,0.32],[163.4,603.9,0.13],[188.7,603.9,0.1],[264.8,603.9,0.12],[214.1,577.7,0.13],[-90.2,551.5,0.32],[-64.8,551.5,0.32],[-115.5,525.3,0.14],[-90.2,525.3,0.3],[-64.8,525.3,0.29],[-140.9,499.1,0.12],[-115.5,499.1,0.1],[-140.9,472.9,0.11],[-191.6,420.5,0.11],[974.7,341.9,0.11],[-90.2,315.7,0.15],[138,315.7,0.1],[-64.8,289.5,0.14],[36.6,289.5,0.1],[11.2,263.3,0.1],[36.6,263.3,0.13],[61.9,263.3,0.12],[87.3,263.3,0.1],[11.2,237.1,0.11],[36.6,237.1,0.11],[949.3,184.7,0.17],[11.2,158.5,0.15],[36.6,-77.3,0.12],[264.8,-182.1,0.13]];

/* ───────── CAMÉRA RÉGIONALE : dézoom autour du centre île ───────── */
const CAM_S=0.42, CAM_OX=400, CAM_OY=300;          // échelle + recentrage vertical
const camX=x=>(x-ISLAND_CENTER[0])*CAM_S+CAM_OX;
const camY=y=>(y-ISLAND_CENTER[1])*CAM_S+CAM_OY;

const REDUCED=matchMedia("(prefers-reduced-motion:reduce)").matches;

/* ───────── ÎLE jade comic (path réel transformé par la caméra) ───────── */
(function buildIsland(){
  const L=get("islandLayer");
  const g=el("g",{transform:`translate(${CAM_OX} ${CAM_OY}) scale(${CAM_S}) translate(${-ISLAND_CENTER[0]} ${-ISLAND_CENTER[1]})`});
  g.appendChild(el("path",{d:ISLAND_PATH,fill:INK,opacity:".34",transform:"translate(6 9)"})); // ombre portée

  g.appendChild(el("path",{d:ISLAND_PATH,fill:"url(#halftone)",opacity:".12"}));
  L.appendChild(g);

  lab.appendChild(document.createTextNode("Martinique"));
  L.appendChild(lab);

/* ───────── CÔTE sud-ouest : zone d'échouage prévu ─────────
   Bandeau sable dans le coin bas-gauche (sud-ouest), orienté ~ tangente côte. */
const SHORE="M0 470 C70 452 150 452 232 478 C300 500 330 540 360 600 L0 600 Z";
const SHORE_LINE="M0 470 C70 452 150 452 232 478 C300 500 330 540 360 600";
get("sandFill").setAttribute("d",SHORE);
get("sandClipPath").setAttribute("d",SHORE);
get("shoreFoam").setAttribute("d",SHORE_LINE);
get("shoreFoam2").setAttribute("d",SHORE_LINE);
const shoreFoam=get("shoreFoam");

/* ───────── grille carte-marine (statique, discrète) ───────── */
(function grid(){
  const G=get("grid");
  for(let x=100;x<800;x+=140) G.appendChild(el("line",{x1:x,y1:0,x2:x,y2:600}));
  for(let y=100;y<600;y+=140) G.appendChild(el("line",{x1:0,y1:y,x2:800,y2:y}));
})();

/* ───────── outils dessin ───────── */
function blobPath(cx,cy,r,seed,N,jag){
  N=N||9; jag=jag==null?0.6:jag;
  const rand=rng(seed),p=[];
  for(let i=0;i<N;i++){const a=(i/N)*6.2832,rr=r*(1-jag*0.5+rand()*jag);p.push([cx+Math.cos(a)*rr,cy+Math.sin(a)*rr]);}
  let d=`M${((p[0][0]+p[N-1][0])/2).toFixed(1)} ${((p[0][1]+p[N-1][1])/2).toFixed(1)}`;
  for(let i=0;i<N;i++){const a=p[i],b=p[(i+1)%N];d+=`Q${a[0].toFixed(1)} ${a[1].toFixed(1)} ${((a[0]+b[0])/2).toFixed(1)} ${((a[1]+b[1])/2).toFixed(1)}`;}
  return d+"Z";
}
// banc sargasse comic (golden-brown halftone). r ~ densité afai.
function makeBank(r,seed,detail){
  const g=el("g",{}), sil=blobPath(0,0,r,seed,detail?11:8,0.55);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".28",transform:"translate(2 3)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#sargG)",stroke:INK,"stroke-width":Math.max(1.4,r*0.10),"stroke-linejoin":"round"}));
  if(detail){
    const rd=rng(seed*5+1);
    for(let i=0;i<2;i++){const ox=(rd()-.5)*r*0.7,oy=(rd()-.5)*r*0.6;
      g.appendChild(el("path",{d:blobPath(ox,oy,r*0.3,seed*9+i*7,7,0.6),fill:"#5d5a1e",opacity:".5"}));}
    g.appendChild(el("path",{d:sil,fill:"url(#halftone)",opacity:".3"}));
    g.appendChild(el("path",{d:blobPath(-r*0.22,-r*0.26,r*0.46,seed+3,7,0.5),fill:"#FFE9A8",opacity:".48"}));
  }
  return g;
}

/* ───────── CHAMP : place les cellules dans le conteneur de dérive ─────────
   LOD/clustering : afai → rayon ; faibles afai = petit point (peu de détail).
   Pour la dérive infinie sans re-générer de path, on tuile le champ horizontalement :
   chaque cellule est posée 1× ; le conteshell driftLayer translate lentement vers
   l'OUEST/N-O ; on duplique le champ en 3 colonnes (−W, 0, +W) pour un wrap continu. */
const driftLayer=get("driftLayer");
// bornes du champ mappé (pour la largeur de tuilage)
let minX=1e9,maxX=-1e9;
for(const c of CELLS){const x=camX(c[0]);if(x<minX)minX=x;if(x>maxX)maxX=x;}
const FIELD_W=(maxX-minX)+260;     // période de répétition horizontale
// cap mobile : si petit écran, on retire les cellules de très faible afai (déclutter)
const MOBILE=Math.min(window.innerWidth,window.innerHeight)<560;
const AFAI_MIN=MOBILE?0.12:0.10;

// 2 cellules "PRÉVUES ATTERRIR" (gate calcul) : densité max ET trajectoire vers la côte SO.
// On choisit 2 cellules denses au sud-ouest (afai 0.32) proches du couloir de dérive côtier.
// Indices dans CELLS : 19 ([87.3,603.9,.32]) et 14 ([61.9,630.1,.32]) — sud-ouest dense.
const BEACH_IDX=new Set([19,14]);

const fieldCols=[]; // {g, baseX}
function buildFieldColumn(offsetX){
  const col=el("g",{transform:`translate(${offsetX} 0)`});
  CELLS.forEach((c,i)=>{
    if(BEACH_IDX.has(i)) return;            // celles-ci sont gérées par l'anim d'échouage
    if(c[2]<AFAI_MIN) return;               // LOD déclutter
    const x=camX(c[0]), y=camY(c[1]), afai=c[2];
    // afai 0.10..0.32 → rayon 5..20 ; détail seulement pour afai élevé (perf)
    const r=5+(afai-0.10)/0.22*15;
    const detail=afai>=0.20;
    const b=makeBank(r,i*131+7,detail);
    b.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)})`);
    col.appendChild(b);
  });
  driftLayer.appendChild(col);
  fieldCols.push({g:col,baseX:offsetX});
}
// 3 colonnes pour wrap continu (gauche / centre / droite)
buildFieldColumn(-FIELD_W);
buildFieldColumn(0);
buildFieldColumn(FIELD_W);

/* ───────── LÉGENDE régime (statique, honnêteté = on montre le réel) ───────── */

  const r2=el("circle",{cx:78,cy:36,r:8,fill:"url(#sargG)",stroke:INK,"stroke-width":1.4}); card.appendChild(r2);
  const t2=el("text",{x:96,y:40,fill:"#fff","font-size":11,"font-family":"system-ui,sans-serif",opacity:".85"});

/* ═════════ ÉCHOUAGE "Le Grand Splat" (gate calcul) ═════════
   2 cellules prévues atterrir. Chacune : banc qui descend lentement le long du couloir
   de dérive jusqu'à la côte SO → squash → splat (onde + speed-lines + dépôt incliné) → fade.
   Cadence DÉCALÉE et LENTE (un échouage prend ~14 s, cycle complet ~plusieurs min). */
const COAST_DEG=-26, COAST_RAD=COAST_DEG*Math.PI/180; // tangente côte SO (monte vers la droite)

// point d'impact sur la côte (dans le bandeau sable bas-gauche)
const IMPACTS=[{x:150,y:470},{x:255,y:498}];

function makeDeposit(seed){
  const g=el("g",{opacity:"0"}), R=46, sil=blobPath(0,0,R,seed,13,0.78);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".26",transform:"translate(2.4 3.4)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#splatG)",stroke:INK,"stroke-width":2.2,"stroke-linejoin":"round"}));
  const rl=rng(seed*7+3);
  for(let i=0;i<3;i++){const a=(0.15+rl()*0.7)*3.14159,len=R*(0.9+rl()*0.5);
    const x=Math.cos(a)*len,y=Math.abs(Math.sin(a))*len*0.7+R*0.3,w=8+rl()*7;
    g.appendChild(el("path",{d:blobPath(x,y,w,seed*13+i*5,7,0.7),fill:"url(#splatG)",stroke:INK,"stroke-width":1.4,"stroke-linejoin":"round"}));}
  const rd=rng(seed*11+2);
  for(let i=0;i<4;i++){const ox=(rd()-.5)*R*1.05,oy=(rd()-.5)*R*0.85;
    g.appendChild(el("path",{d:blobPath(ox,oy,R*(0.16+rd()*0.1),seed*17+i*9,7,0.6),fill:"#5d5a1e",opacity:".48"}));}
  const ht=el("path",{d:sil,fill:"url(#halftone)",opacity:"0"});
  g.appendChild(ht);
  g.appendChild(el("path",{d:blobPath(-R*0.28,-R*0.32,R*0.4,seed+5,8,0.5),fill:"#FFE9A8",opacity:".44"}));
  return {g,ht};
}
function makeFoam(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:blobPath(0,3,30,seed+1,12,0.6),fill:"none",stroke:"#eafcff","stroke-width":6,opacity:".9","stroke-linejoin":"round"}));
  g.appendChild(el("path",{d:blobPath(0,3,30,seed+1,12,0.6),fill:"none",stroke:"#ffffff","stroke-width":2.2,opacity:".95","stroke-linejoin":"round"}));
  const rf=rng(seed*3+4);
  for(let i=0;i<7;i++){const a=(i/7)*6.28+rf()*0.4,rr=34+rf()*12;
    g.appendChild(el("circle",{cx:(Math.cos(a)*rr).toFixed(1),cy:(Math.sin(a)*rr*0.7+5).toFixed(1),r:(1.8+rf()*1.8).toFixed(1),fill:"#fff",opacity:".85"}));}
  return g;
}
function makeRipple(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:blobPath(0,0,24,seed+9,14,0.18),fill:"none",stroke:INK,"stroke-width":2.6,opacity:".7"}));
  g.appendChild(el("path",{d:blobPath(0,0,24,seed+9,14,0.18),fill:"none",stroke:"#FFE9A8","stroke-width":1.2,opacity:".9"}));
  return g;
}

// un "événement d'échouage" complet, indépendant, paramétré par l'impact + origine au large
function makeBeachEvent(idx){
  const impact=IMPACTS[idx];
  const seed=100+idx*57;
  // origine = position mappée de la cellule source (au large, plus haut/droite)
  const src=CELLS[[...BEACH_IDX][idx]];
  const origin={x:clamp(camX(src[0]),60,500), y:clamp(camY(src[1])-40,80,360)};
  const bank=makeBank(16,seed,true); get("splatBankLayer").appendChild(bank);
  const dep=makeDeposit(seed); dep.g.setAttribute("transform",`translate(${impact.x} ${impact.y}) rotate(${COAST_DEG})`);
  get("depositLayer").appendChild(dep.g);
  const foam=makeFoam(seed); foam.setAttribute("transform",`translate(${impact.x} ${impact.y})`); get("foamLayer").appendChild(foam);
  const ripple=makeRipple(seed); ripple.setAttribute("transform",`translate(${impact.x} ${impact.y})`); get("rippleLayer").appendChild(ripple);
  // speed-lines (par événement, dans dropLayer pour rester localisées)
  const lineG=el("g",{transform:`translate(${impact.x} ${impact.y})`,opacity:"0"}); get("lineLayer").appendChild(lineG);
  const lines=[]; const rl=rng(seed*3+9);
  for(let i=0;i<9;i++){const a=(i/9)*6.28+rl()*0.25;
    const x1=Math.cos(a)*22,y1=Math.sin(a)*22,x2=Math.cos(a)*(52+rl()*26),y2=Math.sin(a)*(52+rl()*26);
    const ln=el("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),stroke:"#FFE9A8","stroke-width":(2.2+rl()*1.3).toFixed(1),"stroke-linecap":"round",opacity:"0"});
    lineG.appendChild(ln); lines.push(ln);}
  return {impact,origin,bank,dep,foam,ripple,lineG,lines};
}
const events=[makeBeachEvent(0),makeBeachEvent(1)];

/* ─── timeline par événement (secondes locales) — LENT ─── */
const T_APPROACH=10.0, T_IMPACT=10.6, T_SETTLE=11.4, T_FADE=18.0, T_LOOP=24.0;
// décalage entre les 2 échouages
const EV_OFFSET=[0, 11.5];
const ease=p=>p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
const easeOut=p=>1-Math.pow(1-p,3);

function renderEvent(ev,lt){
  const {impact,origin,bank,dep,foam,ripple,lineG,lines}=ev;
  // BANC (approche LENTE le long du couloir de dérive)
  if(lt<T_IMPACT){
    const p=ease(clamp(lt/T_APPROACH,0,1));
    const x=origin.x+(impact.x-origin.x)*p, y=origin.y+(impact.y-origin.y)*p, sc=0.8+p*0.5;
    const squash=lt>T_APPROACH?1+(lt-T_APPROACH)/(T_IMPACT-T_APPROACH)*0.7:1;
    const bob=REDUCED?0:Math.sin(lt*1.6)*2.2*(1-p); // houle TRÈS douce
    bank.setAttribute("transform",`translate(${x.toFixed(1)} ${(y+bob).toFixed(1)}) scale(${(sc*squash).toFixed(3)} ${(sc/squash).toFixed(3)})`);
    bank.setAttribute("opacity",lt>T_APPROACH?(1-(lt-T_APPROACH)/(T_IMPACT-T_APPROACH)).toFixed(2):"1");
  } else bank.setAttribute("opacity","0");
  // DÉPÔT (rotate côte + halftone révélé + fade)
  if(lt>=T_IMPACT){
    const pg=clamp((lt-T_IMPACT)/(T_SETTLE-T_IMPACT),0,1);
    const sc=(0.3+easeOut(pg)*0.7)*(1+0.1*Math.sin(pg*Math.PI));
    let op=1; if(lt>T_FADE) op=clamp(1-(lt-T_FADE)/(T_LOOP-T_FADE),0,1);
    dep.g.setAttribute("transform",`translate(${impact.x} ${impact.y}) rotate(${COAST_DEG}) scale(${sc.toFixed(3)})`);
    dep.g.setAttribute("opacity",op.toFixed(2));
    dep.ht.setAttribute("opacity",(easeOut(pg)*0.32*op).toFixed(2));
  } else dep.g.setAttribute("opacity","0");
  // SPEED-LINES (flash court à l'impact)
  {const dt=lt-T_IMPACT; let lp=dt<0?0:dt<0.07?dt/0.07:dt<0.4?1-(dt-0.07)/0.33:0; lp=clamp(lp,0,1);
   lineG.setAttribute("transform",`translate(${impact.x} ${impact.y}) scale(${(0.6+lp*0.6).toFixed(3)})`);
   for(const ln of lines) ln.setAttribute("opacity",(lp*0.85).toFixed(2));}
  // ONDE concentrique
  {const dt=lt-T_IMPACT; let rp=dt<0||dt>0.32?0:1-dt/0.32;
   const rsc=1+easeOut(clamp(dt/0.32,0,1))*3;
   ripple.setAttribute("transform",`translate(${impact.x} ${impact.y}) scale(${rsc.toFixed(3)})`);
   ripple.setAttribute("opacity",clamp(rp,0,1).toFixed(2));}
  // ÉCUME impact
  {const dt=lt-T_IMPACT; let fp=dt<0?0:dt<0.6?Math.sin((dt/0.6)*Math.PI*0.9):0; fp=clamp(fp,0,1);
   foam.setAttribute("transform",`translate(${impact.x} ${impact.y}) scale(${(0.5+easeOut(clamp(dt/0.6,0,1))*0.9).toFixed(3)})`);
   foam.setAttribute("opacity",fp.toFixed(2));}
}
function renderEventFrozen(ev){
  // pose figée BELLE : dépôt déposé sur la côte, banc proche s'apprêtant à toucher
  const {impact,origin,bank,dep,foam,ripple,lineG,lines}=ev;
  bank.setAttribute("opacity","0");
  for(const ln of lines) ln.setAttribute("opacity","0");
  ripple.setAttribute("opacity","0"); foam.setAttribute("opacity","0");
  dep.g.setAttribute("transform",`translate(${impact.x} ${impact.y}) rotate(${COAST_DEG}) scale(1)`);
  dep.g.setAttribute("opacity","1"); dep.ht.setAttribute("opacity","0.32");
}

/* ═════════ DÉRIVE LENTE du champ + boucle d'animation (1 SEUL rAF) ═════════
   Vitesse : le champ doit traverser l'écran en ~plusieurs minutes.
   FIELD_W ≈ 1 période ; on veut ~3.5 min pour parcourir une période.
   Courant Caraïbe ≈ vers O/N-O → vecteur (-1, -0.18) normalisé, très lent. */
const DRIFT_PERIOD_S=210;                 // 3.5 min pour 1 période de champ
const DRIFT_VX=-FIELD_W/DRIFT_PERIOD_S;   // px/s vers l'ouest (lent)
const DRIFT_VY=DRIFT_VX*0.16;             // léger nord-ouest (vers le haut quand on va à l'ouest → vy négatif déjà via signe)
// modèle de temps accumulé : pause/reprise/onglet-caché sans saut de timeline
let raf=0, paused=false, acc=0, last=0;

function tick(t){
  // DÉRIVE : translate continu, wrap modulo FIELD_W (sans re-générer de path)
  let dx=(DRIFT_VX*t)%FIELD_W; if(dx>0)dx-=FIELD_W;   // garde dx ∈ (−FIELD_W,0]
  const dy=DRIFT_VY*t;
  // dérive verticale bornée (le champ ne doit pas sortir du cadre vers le haut) : douce oscillation lente
  const dyB=Math.sin(t/90)*10 + clamp(dy% (FIELD_W*0.16),-30,30);
  driftLayer.setAttribute("transform",`translate(${dx.toFixed(2)} ${dyB.toFixed(2)})`);
  // ÉCHOUAGES : chacun sur sa boucle décalée
  for(let i=0;i<events.length;i++){
    let lt=(t-EV_OFFSET[i])%T_LOOP; if(lt<0)lt+=T_LOOP;
    renderEvent(events[i],lt);
  }
  // pulse écume rivage à l'impact le plus proche
  let pulse=0;
  for(let i=0;i<events.length;i++){let lt=(t-EV_OFFSET[i])%T_LOOP;if(lt<0)lt+=T_LOOP;const dt=lt-T_IMPACT;if(dt>=0&&dt<0.2)pulse=Math.max(pulse,Math.sin(dt/0.2*Math.PI));}
  shoreFoam.setAttribute("stroke-width",(5+pulse*3.5).toFixed(2));
}

function frame(tms){
  if(!last) last=tms;
  acc+=(tms-last)/1000; last=tms;   // temps écoulé réel uniquement quand on tourne
  tick(acc);
  if(!paused) raf=requestAnimationFrame(frame);
}
function startLoop(){ if(raf)return; last=0; raf=requestAnimationFrame(frame); } // last=0 → pas de saut

function renderFrozen(){
  driftLayer.setAttribute("transform","translate(0 0)");
  shoreFoam.setAttribute("stroke-width","5");
  for(const ev of events) renderEventFrozen(ev);
}

if(REDUCED){ renderFrozen(); }
else { startLoop(); }

// clic = pause / reprise (jamais en reduced-motion) — sans saut de timeline
document.body.addEventListener("click",()=>{ if(REDUCED)return;
  paused=!paused;
  if(paused){ cancelAnimationFrame(raf); raf=0; }
  else { startLoop(); }
});

document.addEventListener("visibilitychange",()=>{ if(REDUCED)return;
  if(document.hidden){ cancelAnimationFrame(raf); raf=0; }
  else if(!paused){ startLoop(); }
});
</script>
</body></html>
