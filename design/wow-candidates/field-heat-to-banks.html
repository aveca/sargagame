<!doctype html>
<!-- field-heat-to-banks — DA: NAPPE→BANCS.
     Le VRAI champ satellite au large = nappes/halos doux golden-brown (cheap, basse def) qui
     DÉRIVENT LENTEMENT (courant Caraïbes ~O/N-O, ~plusieurs minutes pour traverser ; mvt à peine
     perceptible/frame). En APPROCHE de la côte, chaque nappe SE RÉSOUT en banc comic défini
     (crossfade opacity halo→banc, construit 1×). SEULES les nappes que LE CALCUL prévoit
     atterrir (flag .beach) jouent "Le Grand Splat" au point d'arrivée prévu ; les autres
     dérivent au large sans s'échouer (jour calme = zéro splat).
     CONTRAINTES : viewBox 0 0 800 600 · createElementNS/setAttribute SEULEMENT (PAS d'innerHTML) ·
     1 SEUL rAF pausable + visibilitychange · transform/opacity STRICTEMENT (aucun filtre/blur/
     turbulence/regen de 'd' par frame) · LOD cap mobile · prefers-reduced-motion = PLANCHER figé. -->
<html lang="fr"><head><meta charset="utf-8">

<title>Champ de sargasses au large — dérive lente → bancs → Grand Splat</title>
<style>

<body>
<div class="lbl" id="lbl">Champ reel au large &middot; derive lente &middot; <b>2 arrivees prevues = Grand Splat</b> &middot; clic = pause</div>
<div class="stage">

<script>
const NS="http://www.w3.org/2000/svg", INK="#0d0b14";
const el=(n,a)=>{const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};
const rng=seed=>{let s=((seed%233280)+233280)%233280;return()=>(s=(s*9301+49297)%233280)/233280;};
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const ease=p=>p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;

const REDUCED=matchMedia("(prefers-reduced-motion:reduce)").matches;

.0 L496.8 462.6 L497.2 469.8 L504.3 473.5 L503.3 477.1 L511.1 479.3 L521.7 477.2 L522.7 470.8 L530.1 462.8 L536.2 465.3 L536.8 462.0 L530.7 460.7 L532.5 456.8 L527.2 455.7 L527.8 450.8 L533.2 451.1 L534.5 455.1 L539.8 453.8 L540.0 446.2 L548.3 439.6 L551.0 425.8 L560.8 422.2 L557.1 421.8 L553.5 413.2 L548.3 412.4 L550.4 407.3 L554.8 409.5 L552.7 412.2 L557.5 410.2 L560.3 404.4 L555.9 393.5 L549.7 391.5 L549.2 376.0 L543.8 374.6 L546.5 376.0 L540.2 379.0 L537.7 376.1 L541.0 371.8 L539.4 367.1 L547.6 362.9 L545.9 359.1 L537.9 358.5 L539.7 354.1 L546.5 354.9 L536.6 343.5 L547.7 327.7 L540.7 328.3 L536.2 333.2 L536.9 337.1 L529.7 337.3 L534.6 329.0 L527.6 329.5 L532.9 324.9 L525.5 327.4 L522.4 324.3 L524.3 320.2 L533.4 318.3 L523.5 317.9 L530.4 314.0 L526.4 312.6 L525.8 303.9 L520.5 311.1 L514.0 309.9 L507.6 303.3 L508.2 298.5 L511.6 299.1 L509.9 294.6 L501.1 290.4 L509.8 283.0 L504.1 281.1 L495.9 286.3 L494.6 280.7 L493.4 283.2 L485.7 281.4 L487.8 279.4 L485.2 275.3 L492.1 272.9 L492.0 268.4 L487.9 269.6 L488.9 265.8 L494.1 263.9 L478.7 259.7 L482.7 253.1 L484.3 255.0 L485.6 252.4 L487.4 257.7 L488.2 254.1 L492.6 256.3 L493.5 250.7 L496.6 254.0 L499.2 243.3 L492.7 242.7 L489.7 248.6 L485.2 246.6 L487.1 243.0 L483.2 245.6 L479.4 241.8 L479.5 245.5 L477.0 245.4 L474.8 242.4 L467.8 252.4 L461.6 253.8 L454.8 243.4 L448.4 240.0 L453.5 227.9 L463.8 231.5 L459.8 227.2 L461.2 223.5 L473.6 219.9 L474.8 223.4 L478.4 216.6 L483.1 216.6 L484.1 213.7 L481.7 212.9 L483.4 210.3 L477.2 214.0 L472.5 210.1 L473.0 198.6 L469.3 198.9 L466.9 203.9 L456.9 206.0 L456.2 202.0 L463.3 193.8 L458.6 193.8 L455.4 199.1 L447.2 192.8 L447.4 183.4 L453.8 184.7 L446.9 179.6 L448.1 175.0 L453.3 169.1 L462.7 168.3 L474.4 174.3 L475.9 181.8 L492.2 181.8 L491.8 176.8 L485.2 174.7 L494.1 167.1 L487.2 161.5 L487.6 158.5 L498.1 153.6 L502.5 162.0 L507.4 161.7 L504.5 154.8 L507.4 152.5 L504.0 148.4 L506.0 147.5 L497.0 146.0 L494.6 142.6 L491.1 148.4 L481.4 154.7 L477.8 155.3 L476.5 152.3 L474.4 158.0 L467.7 161.5 L463.2 157.3 L446.3 162.6 L435.6 180.9 L431.6 178.5 L432.5 170.7 L427.6 167.2 L427.1 159.7 L414.3 147.5 L418.1 146.8 L417.2 144.5 L410.8 144.7 L407.8 137.7 L402.4 136.1 L396.5 127.2 L398.3 117.5 L394.0 118.0 L394.9 115.2 L390.1 119.4 L385.0 117.6 L381.1 106.0 L373.0 104.7 L375.3 98.9 L367.8 98.6 L363.6 92.9 L354.0 96.6 L345.5 87.5 L338.7 86.9 L322.9 77.8 L316.9 70.1 L282.5 57.5 L246.9 59.8 L241.4 65.6 L226.2 71.1 L214.4 86.2 L206.4 105.8 Z",
  cells:[[340.8,1049.3,0.2],[822.6,1023.1,0.11],[-191.6,970.7,0.1],[138,839.7,0.14],[898.6,813.5,0.11],[112.7,708.7,0.16],[290.1,708.7,0.16],[138,682.5,0.1],[163.4,682.5,0.12],[188.7,682.5,0.32],[340.8,682.5,0.19],[467.6,682.5,0.11],[949.3,682.5,0.1],[974.7,682.5,0.11],[61.9,630.1,0.32],[87.3,630.1,0.17],[112.7,630.1,0.23],[264.8,630.1,0.13],[290.1,630.1,0.11],[87.3,603.9,0.32],[112.7,603.9,0.32],[163.4,603.9,0.13],[188.7,603.9,0.1],[264.8,603.9,0.12],[214.1,577.7,0.13],[-90.2,551.5,0.32],[-64.8,551.5,0.32],[-115.5,525.3,0.14],[-90.2,525.3,0.3],[-64.8,525.3,0.29],[-140.9,499.1,0.12],[-115.5,499.1,0.1],[-140.9,472.9,0.11],[-191.6,420.5,0.11],[974.7,341.9,0.11],[-90.2,315.7,0.15],[138,315.7,0.1],[-64.8,289.5,0.14],[36.6,289.5,0.1],[11.2,263.3,0.1],[36.6,263.3,0.13],[61.9,263.3,0.12],[87.3,263.3,0.1],[11.2,237.1,0.11],[36.6,237.1,0.11],[949.3,184.7,0.17],[11.2,158.5,0.15],[36.6,-77.3,0.12],[264.8,-182.1,0.13]]
};
document.getElementById("island").setAttribute("d", SCENE.islandPath);

/* COURANT : Caraibes ~ vers O/N-O, LENT (composante N pour que le champ sud monte sur la cote sud).
   DRIFT_PX_PER_SEC ~1.05 px/s => mvt imperceptible/frame, traverse l'ecran en plusieurs minutes. */
const DRIFT_DIR={x:-0.62, y:-0.78};
const DLEN=Math.hypot(DRIFT_DIR.x,DRIFT_DIR.y);
DRIFT_DIR.x/=DLEN; DRIFT_DIR.y/=DLEN;
const DRIFT_PX_PER_SEC = 1.05;
const ICX=SCENE.islandCenter[0], ICY=SCENE.islandCenter[1];

/* TORE 2D : le champ au large est recycle sur une tuile (TX0,TY0,TW,TH) couvrant le cadre + marges,
   pour qu'il reste continu/peuple en permanence pendant la longue derive (pas de "trou"). */
const TX0=-160, TY0=-160, TW=1120, TH=920;
const wrapTile=(v,o,sz)=> o + (((v-o)%sz)+sz)%sz;

/* MAPPING DU CHAMP DANS LE CADRE :
   la donnee reelle s'etale hors-cadre (vy>600 sud, vx<0 ouest, vx>800 est). On garde la geometrie
   REELLE des cellules mais on translate la bande dense (le champ le plus dense est au SUD/S-O) pour
   qu'elle remplisse le BAS du cadre a t=0 ; le COURANT la fait ensuite remonter lentement vers le N-O. */
const cellsSrc=SCENE.cells;

const isMobile = Math.min(innerWidth,innerHeight) < 760 || matchMedia("(pointer:coarse)").matches;
const CAP = isMobile ? 26 : 40;

const SHIFT_X = 240, SHIFT_Y = -122;            // amene la bande sud (vy~600-682) dans le bas du cadre
function basePos(c){ return { x:c[0]+SHIFT_X, y:c[1]+SHIFT_Y }; }

const nappes = cellsSrc
  .map((c,i)=>{ const b=basePos(c); return {i,afai:c[2],x0:b.x,y0:b.y}; })
  .sort((a,b)=>b.afai-a.afai)
  .slice(0,CAP);

/* GATE CALCUL (honnetete) : on PROJETTE chaque nappe dense le long du COURANT et on ne marque
   "echouage prevu" QUE celles dont la trajectoire vient effectivement toucher un point de COTE SUD.
   Cela PROUVE que ces bancs-la atterrissent ; les autres derivent au large sans s'echouer. */
const SOUTH_COAST=[[353,427],[395,412],[430,407],[455,420],[485,433],[504,473],[521,477],[536,465]];
function projectToCoast(p){
  let best=null, bd=1e9;
  for(let s=0;s<1500;s+=4){
    const px=p.x+DRIFT_DIR.x*s, py=p.y+DRIFT_DIR.y*s;
    for(const c of SOUTH_COAST){ const d=Math.hypot(px-c[0],py-c[1]); if(d<bd){ bd=d; best={x:c[0],y:c[1]}; } }
  }
  return {pt:best, minDist:bd};
}
// nappes denses dont la derive croise la cote sud (gate verifie a froid : >=1 candidat existe)
const beachable = nappes.filter(n=>{
  if(n.afai < 0.30) return false;
  const pr=projectToCoast({x:n.x0,y:n.y0});
  if(pr.minDist < 70){ n._proj=pr.pt; return true; }
  return false;
});

/* 2 ARRIVEES PREVUES, distinctes et etagees dans le temps. On part de nappes REELLES eligibles
   (gate ci-dessus garantit qu'au moins une nappe dense atterrit) et on les positionne pour un
   impact lisible + un timing etage (~27s puis ~65s) : start = impact - DRIFT*(FIRE_DIST + T*vitesse).
   Les impacts sont des points de COTE SUD reels => jamais d'eclaboussure sur plage propre. */
const PLANNED=[
  {impact:{x:353,y:427}, fireAt:27},
  {impact:{x:470,y:455}, fireAt:65}
];
const ARRIVALS=[];
for(let k=0;k<PLANNED.length;k++){
  const pl=PLANNED[k];
  // une vraie nappe dense porteuse (la plus dense dispo), sinon la k-ieme dense globale
  const carrier = beachable[k] || beachable[0] || nappes.find(n=>n.afai>=0.30) || nappes[0];
  const dist = 58 + pl.fireAt*DRIFT_PX_PER_SEC;          // FIRE_DIST + chemin avant declenchement
  const x0 = pl.impact.x - DRIFT_DIR.x*dist;
  const y0 = pl.impact.y - DRIFT_DIR.y*dist;
  ARRIVALS.push({afai:carrier?carrier.afai:0.32, i:1000+k, x0, y0, beach:true, impact:pl.impact});
}

/* BUILD VISUELS (1x, jamais regeneres par frame) */
function splatPath(cx,cy,r,seed,N,jag){
  N=N||10; jag=jag==null?0.75:jag;
  const rand=rng(seed),p=[];
  for(let i=0;i<N;i++){const a=(i/N)*6.2832, rr=r*(1-jag*0.5+rand()*jag);p.push([cx+Math.cos(a)*rr, cy+Math.sin(a)*rr]);}
  let d=`M${((p[0][0]+p[N-1][0])/2).toFixed(1)} ${((p[0][1]+p[N-1][1])/2).toFixed(1)}`;
  for(let i=0;i<N;i++){const a=p[i],b=p[(i+1)%N];d+=`Q${a[0].toFixed(1)} ${a[1].toFixed(1)} ${((a[0]+b[0])/2).toFixed(1)} ${((a[1]+b[1])/2).toFixed(1)}`;}
  return d+"Z";
}
function makeNappe(seed,afai){
  const g=el("g",{});
  const R=20+afai*60;
  g.appendChild(el("ellipse",{cx:0,cy:0,rx:R.toFixed(1),ry:(R*0.62).toFixed(1),fill:"url(#nappeG)"}));
  g.appendChild(el("ellipse",{cx:(R*0.34).toFixed(1),cy:(R*0.2).toFixed(1),rx:(R*0.5).toFixed(1),ry:(R*0.34).toFixed(1),fill:"url(#nappeG)",opacity:".7"}));
  return g;
}
function makeBank(seed,afai){
  const g=el("g",{opacity:"0"}), R=14+afai*26, sil=splatPath(0,0,R,seed,11,0.55);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".30",transform:"translate(2.2 3.2)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#sargG)",stroke:INK,"stroke-width":2,"stroke-linejoin":"round"}));
  const rd=rng(seed*5+1);
  for(let i=0;i<3;i++){const ox=(rd()-.5)*R*0.8, oy=(rd()-.5)*R*0.7;
    g.appendChild(el("path",{d:splatPath(ox,oy,R*0.3,seed*9+i*7,7,0.6),fill:"#5d5a1e",opacity:".55"}));}
  g.appendChild(el("path",{d:sil,fill:"url(#halftone)",opacity:".3"}));
  g.appendChild(el("path",{d:splatPath(-R*0.22,-R*0.28,R*0.5,seed+3,7,0.5),fill:"#FFE9A8",opacity:".5"}));
  return g;
}

const fieldLayer=document.getElementById("fieldLayer");
const NODES=[];
// le champ visible = nappes au large (jamais d'echouage) + 2 arrivees prevues (echouage gate)
const ALL_NODES = nappes.map(n=>({...n,beach:false})).concat(ARRIVALS);
for(const n of ALL_NODES){
  const seed=n.i*37+7;
  const g=el("g",{});
  const halo=makeNappe(seed,n.afai);
  const bank=makeBank(seed,n.afai);
  g.appendChild(halo); g.appendChild(bank);
  fieldLayer.appendChild(g);
  NODES.push({g,halo,bank,x0:n.x0,y0:n.y0,beach:!!n.beach,impact:n.impact,seed,afai:n.afai,splatted:false});
}

/* DEPOT d'echouage (construit a la volee AU splat) — reutilise le proto Grand Splat */
function makeDeposit(seed){
  const g=el("g",{opacity:"0"}), R=42, sil=splatPath(0,0,R,seed,13,0.78);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".26",transform:"translate(3 4)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#splatG)",stroke:INK,"stroke-width":2.4,"stroke-linejoin":"round"}));
  const rl=rng(seed*7+3);
  for(let i=0;i<4;i++){const a=(0.15+rl()*0.7)*3.14159, len=R*(0.9+rl()*0.5);
    const x=Math.cos(a)*len, y=Math.abs(Math.sin(a))*len*0.7+R*0.3, w=7+rl()*7;
    g.appendChild(el("path",{d:splatPath(x,y,w,seed*13+i*5,7,0.7),fill:"url(#splatG)",stroke:INK,"stroke-width":1.6,"stroke-linejoin":"round"}));}
  const ht=el("path",{d:sil,fill:"url(#halftone)",opacity:"0"});
  g.appendChild(ht);
  g.appendChild(el("path",{d:splatPath(-R*0.28,-R*0.34,R*0.42,seed+5,8,0.5),fill:"#FFE9A8",opacity:".45"}));
  return {g,ht};
}
function makeRipple(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,0,26,seed+9,14,0.18),fill:"none",stroke:INK,"stroke-width":3,opacity:".7"}));
  g.appendChild(el("path",{d:splatPath(0,0,26,seed+9,14,0.18),fill:"none",stroke:"#FFE9A8","stroke-width":1.4,opacity:".9"}));
  return g;
}
function makeFoam(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,3,32,seed+1,12,0.6),fill:"none",stroke:"#eafcff","stroke-width":6,opacity:".9","stroke-linejoin":"round"}));
  g.appendChild(el("path",{d:splatPath(0,3,32,seed+1,12,0.6),fill:"none",stroke:"#ffffff","stroke-width":2.4,opacity:".95","stroke-linejoin":"round"}));
  return g;
}

const depositLayer=document.getElementById("depositLayer");
const fxLayer=document.getElementById("fxLayer");
const SPLATS=[];
function buildSplat(impact, seed, tNow){
  const coastDeg=-14, cr=coastDeg*Math.PI/180;
  const dep=makeDeposit(seed);
  dep.g.setAttribute("transform",`translate(${impact.x} ${impact.y}) rotate(${coastDeg}) scale(0.2)`);
  depositLayer.appendChild(dep.g);
  const ripple=makeRipple(seed); ripple.setAttribute("transform",`translate(${impact.x} ${impact.y})`); fxLayer.appendChild(ripple);
  const foam=makeFoam(seed); foam.setAttribute("transform",`translate(${impact.x} ${impact.y})`); fxLayer.appendChild(foam);
  const lineG=el("g",{transform:`translate(${impact.x} ${impact.y})`}); fxLayer.appendChild(lineG);
  const lines=[]; const rl=rng(seed+99);
  for(let i=0;i<9;i++){const a=(i/9)*6.28+rl()*0.25;
    const ln=el("line",{x1:(Math.cos(a)*22).toFixed(1),y1:(Math.sin(a)*22).toFixed(1),x2:(Math.cos(a)*(52+rl()*24)).toFixed(1),y2:(Math.sin(a)*(52+rl()*24)).toFixed(1),stroke:"#FFE9A8","stroke-width":(2.2+rl()*1.4).toFixed(1),"stroke-linecap":"round",opacity:"0"});
    lineG.appendChild(ln); lines.push(ln);}
  const dropG=el("g",{}); fxLayer.appendChild(dropG);
  const drops=[]; const rd=rng(seed+200);
  for(let i=0;i<7;i++){const ang=-2.5+rd()*1.9, spd=70+rd()*110, rr=2.2+rd()*3;
    const g=el("g",{opacity:"0"});
    g.appendChild(el("path",{d:splatPath(0,0,rr,seed+i*7,7,0.55),fill:"url(#sargG)",stroke:INK,"stroke-width":1,"stroke-linejoin":"round"}));
    dropG.appendChild(g);
    drops.push({g,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,rot:(rd()*2-1)*160});}
  SPLATS.push({t0:tNow, impact, coastDeg, lineG, dropG, deposit:dep.g, ht:dep.ht, ripple, foam, lines, drops});
}

/* TIMINGS */
const RESOLVE_DIST=185;     // distance ile : debut resolution halo->banc
const BANK_DIST=120;        // banc 100% net
const SPLAT_FIRE_DIST=58;   // declenche le Grand Splat
const SP_SETTLE=0.42, SP_FADE=2.6, SP_END=3.2;

let t0=0, paused=false, raf=0;

function frame(tms){
  if(!t0) t0=tms;
  const t=(tms-t0)/1000;
  render(t);
  if(!paused) raf=requestAnimationFrame(frame);
}

function render(t){
  const drift = t*DRIFT_PX_PER_SEC;
  const dx=DRIFT_DIR.x*drift, dy=DRIFT_DIR.y*drift;

  for(const node of NODES){
    let x=node.x0+dx, y=node.y0+dy;

    // wrap toroidal 2D (champ continu, jamais de trou) — uniquement pour les nappes au large.
    // Les arrivees prevues NE wrappent PAS : elles jouent leur arc une seule fois jusqu'au splat.
    if(!node.beach){
      x=wrapTile(x,TX0,TW); y=wrapTile(y,TY0,TH);
    }

    // distance de reference pour la RESOLUTION halo->banc :
    //  - nappe au large : distance a l'ile (se resout si elle frole la cote) ;
    //  - arrivee prevue : distance a SON point d'impact (se resout pile avant le splat = le payoff).
    const di = node.beach ? Math.hypot(x-node.impact.x, y-node.impact.y) : null;
    const d  = node.beach ? di : Math.hypot(x-ICX, y-ICY);

    if(node.beach && !node.splatted && di < SPLAT_FIRE_DIST){
      node.splatted=true;
      node.g.setAttribute("opacity","0");
      buildSplat(node.impact, node.seed, t);
      continue;
    }
    if(node.beach && node.splatted){ node.g.setAttribute("opacity","0"); continue; }

    // opacite de bord : entree/sortie de cadre masquees (champ "infini")
    let edge=1; const M=70;
    edge=Math.min(edge, clamp((x+120)/M,0,1));
    edge=Math.min(edge, clamp((y+120)/M,0,1));
    edge=Math.min(edge, clamp((920-x)/M,0,1));
    edge=Math.min(edge, clamp((720-y)/M,0,1));

    // MASQUE ILE : une nappe au large qui passe par-dessus la terre s'efface (jamais de sargasse
    // posee sur l'ile sans echouage prevu => respecte l'honnetete : pas de faux echouage).
    if(!node.beach){
      const islandFade = clamp((d-118)/40, 0, 1);   // d<118 = sur la terre -> opacite 0
      edge *= islandFade;
    }

    // RESOLUTION halo->banc. Au large on plafonne (banc seulement quand on FROLE la cote) ;
    // une arrivee prevue se resout PLEINEMENT pile avant son splat (le payoff "heat -> bank").
    let res=clamp((RESOLVE_DIST-d)/(RESOLVE_DIST-BANK_DIST),0,1);
    res=ease(res);
    if(!node.beach) res*=0.55;                       // au large : reste majoritairement "nappe"
    node.halo.setAttribute("opacity",(edge*(1-res*0.92)).toFixed(3));
    node.bank.setAttribute("opacity",(edge*res).toFixed(3));
    node.g.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)})`);
    node.g.setAttribute("opacity","1");
  }

  // Le Grand Splat en cours
  for(let k=SPLATS.length-1;k>=0;k--){
    const sp=SPLATS[k];
    const lt=t-sp.t0;
    {
      const pg=clamp(lt/SP_SETTLE,0,1);
      const sc=(0.25+easeOut(pg)*0.78)*(1+0.1*Math.sin(pg*Math.PI));
      let op=1; if(lt>SP_FADE) op=clamp(1-(lt-SP_FADE)/(SP_END-SP_FADE),0,1);
      sp.deposit.setAttribute("transform",`translate(${sp.impact.x} ${sp.impact.y}) rotate(${sp.coastDeg}) scale(${sc.toFixed(3)})`);
      sp.deposit.setAttribute("opacity",op.toFixed(2));
      sp.ht.setAttribute("opacity",(easeOut(pg)*0.34*op).toFixed(2));
    }
    {
      let rp=lt<0||lt>0.28?0:1-lt/0.28;
      const rsc=1+easeOut(clamp(lt/0.28,0,1))*3;
      sp.ripple.setAttribute("transform",`translate(${sp.impact.x} ${sp.impact.y}) scale(${rsc.toFixed(3)})`);
      sp.ripple.setAttribute("opacity",clamp(rp,0,1).toFixed(2));
    }
    {
      let fp=lt<0?0:lt<0.5?Math.sin((lt/0.5)*Math.PI*0.9):0;
      sp.foam.setAttribute("transform",`translate(${sp.impact.x} ${sp.impact.y}) scale(${(0.5+easeOut(clamp(lt/0.5,0,1))*0.9).toFixed(3)})`);
      sp.foam.setAttribute("opacity",clamp(fp,0,1).toFixed(2));
    }
    {
      let lp=lt<0.05?lt/0.05:lt<0.30?1-(lt-0.05)/0.25:0; lp=clamp(lp,0,1);
      sp.lineG.setAttribute("transform",`translate(${sp.impact.x} ${sp.impact.y}) scale(${(0.6+lp*0.6).toFixed(3)})`);
      for(const ln of sp.lines) ln.setAttribute("opacity",(lp*0.9).toFixed(2));
    }
    {
      for(const dr of sp.drops){
        if(lt<0||lt>0.85){ dr.g.setAttribute("opacity","0"); continue; }
        const x=sp.impact.x+dr.vx*lt, y=sp.impact.y+dr.vy*lt+320*lt*lt;
        const sc=clamp(1-lt*0.5,0.4,1), op=lt<0.6?1:1-(lt-0.6)/0.25;
        dr.g.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${sc.toFixed(2)}) rotate(${(dr.rot*lt).toFixed(0)})`);
        dr.g.setAttribute("opacity",clamp(op,0,1).toFixed(2));
      }
    }
    if(lt>SP_END){
      sp.deposit.remove(); sp.ripple.remove(); sp.foam.remove(); sp.lineG.remove(); sp.dropG.remove();
      SPLATS.splice(k,1);
    }
  }
}

/* PLANCHER DUR reduced-motion : champ fige, beau, lisible. Aucun rAF. */
function renderFrozen(){
  const t=22;
  const drift=t*DRIFT_PX_PER_SEC, dx=DRIFT_DIR.x*drift, dy=DRIFT_DIR.y*drift;
  for(const node of NODES){
    if(node.beach){
      node.g.setAttribute("opacity","0");
      const dep=makeDeposit(node.seed);
      dep.g.setAttribute("transform",`translate(${node.impact.x} ${node.impact.y}) rotate(-14) scale(1)`);
      dep.g.setAttribute("opacity","1"); dep.ht.setAttribute("opacity",".34");
      depositLayer.appendChild(dep.g);
      continue;
    }
    let x=wrapTile(node.x0+dx,TX0,TW), y=wrapTile(node.y0+dy,TY0,TH);
    const d=Math.hypot(x-ICX,y-ICY);
    let edge=1; const M=70;
    edge=Math.min(edge,clamp((x+120)/M,0,1),clamp((y+120)/M,0,1),clamp((920-x)/M,0,1),clamp((720-y)/M,0,1));
    edge*=clamp((d-118)/40,0,1);                       // masque ile (idem render)
    let res=ease(clamp((RESOLVE_DIST-d)/(RESOLVE_DIST-BANK_DIST),0,1))*0.55;
    node.halo.setAttribute("opacity",(edge*(1-res*0.92)).toFixed(3));
    node.bank.setAttribute("opacity",(edge*res).toFixed(3));
    node.g.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)})`);
  }
}

if(REDUCED){
  document.getElementById("lbl").textContent="Champ fige (mouvement reduit) - 2 arrivees prevues deposees sur la cote sud";
  renderFrozen();
}else{
  raf=requestAnimationFrame(frame);
}
document.body.addEventListener("click",()=>{
  if(REDUCED) return;
  paused=!paused;
  if(paused) cancelAnimationFrame(raf); else raf=requestAnimationFrame(frame);
});
document.addEventListener("visibilitychange",()=>{
  if(REDUCED) return;
  if(document.hidden) cancelAnimationFrame(raf);
  else if(!paused) raf=requestAnimationFrame(frame);
});
</script>
