<!doctype html>
<!-- ════════════════════════════════════════════════════════════════════════════
     FIELD "reveal-south" — Le VRAI champ de sargasses au large, révélé.

     DIRECTION : garder l'île centrale, RÉVÉLER LA BANDE SUD hors-cadre + SEUIL BAS
     (montrer aussi trace/modéré), DÉRIVE LENTE vers l'OUEST (courant Caraïbes),
     et SEULES les cellules que LE CALCUL prévoit atterrir s'échouent (Le Grand Splat).

     DONNÉES RÉELLES embarquées depuis design/wow-candidates/_mq-scene.json
     (49 cellules satellite ; ~24 ont vy>600 = AU SUD hors-cadre 0..600 = le champ à révéler).

     TECHNIQUE (contraintes dures) :
       · viewBox 0 0 800 600 · createElementNS/setAttribute SEULEMENT (zéro innerHTML)
       · 1 SEUL requestAnimationFrame, pausable + visibilitychange
       · STRICTEMENT transform/opacity par frame (aucun filtre/blur/turbulence,
         aucune régénération de path 'd' par frame)
       · DÉRIVE LENTE : le champ traverse l'écran en ~6 min (à peine perceptible/frame)
       · LOD/cap mobile · prefers-reduced-motion = PLANCHER DUR (champ figé, lisible)
     ════════════════════════════════════════════════════════════════════════════ -->

const NS="http://www.w3.org/2000/svg", INK="#0d0b14";
const el=(n,a)=>{const e=document.createElementNS(NS,n);if(a)for(const k in a)e.setAttribute(k,a[k]);return e;};
const rng=seed=>{let s=((seed%233280)+233280)%233280;return()=>(s=(s*9301+49297)%233280)/233280;};

// ── splat blob générique (path figé, jamais régénéré par frame) ──
function splatPath(cx,cy,r,seed,N,jag){
  N=N||10; jag=jag==null?0.75:jag;
  const rand=rng(seed),p=[];
  for(let i=0;i<N;i++){const a=(i/N)*6.2832, rr=r*(1-jag*0.5+rand()*jag);p.push([cx+Math.cos(a)*rr, cy+Math.sin(a)*rr]);}
  let d=`M${((p[0][0]+p[N-1][0])/2).toFixed(1)} ${((p[0][1]+p[N-1][1])/2).toFixed(1)}`;
  for(let i=0;i<N;i++){const a=p[i],b=p[(i+1)%N];d+=`Q${a[0].toFixed(1)} ${a[1].toFixed(1)} ${((a[0]+b[0])/2).toFixed(1)} ${((a[1]+b[1])/2).toFixed(1)}`;}
  return d+"Z";
}

7.7 161.5 L463.2 157.3 L446.3 162.6 L435.6 180.9 L431.6 178.5 L432.5 170.7 L427.6 167.2 L427.1 159.7 L414.3 147.5 L418.1 146.8 L417.2 144.5 L410.8 144.7 L407.8 137.7 L402.4 136.1 L396.5 127.2 L398.3 117.5 L394.0 118.0 L394.9 115.2 L390.1 119.4 L385.0 117.6 L381.1 106.0 L373.0 104.7 L375.3 98.9 L367.8 98.6 L363.6 92.9 L354.0 96.6 L345.5 87.5 L338.7 86.9 L322.9 77.8 L316.9 70.1 L282.5 57.5 L246.9 59.8 L241.4 65.6 L226.2 71.1 L214.4 86.2 L206.4 105.8 Z";

// cells = [vx, vy, afai] — coordonnées MONDE (vy peut dépasser 600 = au sud, hors-cadre)
const CELLS_RAW=[[340.8,1049.3,0.2],[822.6,1023.1,0.11],[-191.6,970.7,0.1],[138,839.7,0.14],[898.6,813.5,0.11],[112.7,708.7,0.16],[290.1,708.7,0.16],[138,682.5,0.1],[163.4,682.5,0.12],[188.7,682.5,0.32],[340.8,682.5,0.19],[467.6,682.5,0.11],[949.3,682.5,0.1],[974.7,682.5,0.11],[61.9,630.1,0.32],[87.3,630.1,0.17],[112.7,630.1,0.23],[264.8,630.1,0.13],[290.1,630.1,0.11],[87.3,603.9,0.32],[112.7,603.9,0.32],[163.4,603.9,0.13],[188.7,603.9,0.1],[264.8,603.9,0.12],[214.1,577.7,0.13],[-90.2,551.5,0.32],[-64.8,551.5,0.32],[-115.5,525.3,0.14],[-90.2,525.3,0.3],[-64.8,525.3,0.29],[-140.9,499.1,0.12],[-115.5,499.1,0.1],[-140.9,472.9,0.11],[-191.6,420.5,0.11],[974.7,341.9,0.11],[-90.2,315.7,0.15],[138,315.7,0.1],[-64.8,289.5,0.14],[36.6,289.5,0.1],[11.2,263.3,0.1],[36.6,263.3,0.13],[61.9,263.3,0.12],[87.3,263.3,0.1],[11.2,237.1,0.11],[36.6,237.1,0.11],[949.3,184.7,0.17],[11.2,158.5,0.15],[36.6,-77.3,0.12],[264.8,-182.1,0.13]];

/* ════════════════ PROJECTION MONDE → CADRE (révéler la bande Sud) ════════════════
   On garde l'île à sa position native. On COMPRESSE le monde Y au-delà de l'île pour
   amener la bande sud (vy 600..1080) dans le tiers inférieur visible (Y 470..596),
   et on borne le monde X (vx peut être négatif ou >800) dans une marge jouable.
   => zéro cellule hors-cadre involontaire ; le champ dense du sud devient visible. */
const SOUTH_START=560;            // au-delà : zone "hors-cadre sud" à comprimer
const VISIBLE_FLOOR=470, VISIBLE_BOTTOM=596;
function projY(vy){
  if(vy<=SOUTH_START) return vy;  // au-dessus du sud : identité (île + champ proche)
  // 560..1080 (monde) -> 470..596 (cadre), clampé
  const t=clamp((vy-SOUTH_START)/(1080-SOUTH_START),0,1);
  return VISIBLE_FLOOR + t*(VISIBLE_BOTTOM-VISIBLE_FLOOR);
}
function projX(vx){
  // borne X dans [40..760] en compressant doucement les débordements latéraux
  if(vx<40) return 40 + (vx-40)*0.18;     // tire les très-à-gauche vers le bord, sans empiler
  if(vx>760) return 760 + (vx-760)*0.18;
  return vx;
}

// SEUIL BAS : on montre dès afai>=0.10 (trace). Opacité/rayon montent avec l'afai.
const AFAI_MIN=0.10, AFAI_MAX=0.32;
const FIELD = CELLS_RAW.map((c,i)=>{
  const [vx,vy,afai]=c;
  const x=projX(vx), y=projY(vy);
  const dens=clamp((afai-AFAI_MIN)/(AFAI_MAX-AFAI_MIN),0,1);  // 0=trace .. 1=modéré
  return {i,x,y,afai,dens,vx,vy};
}).filter(c=>c.x>-30&&c.x<830&&c.y>-30&&c.y<630);

// LOD mobile : sur appareil faible, on garde les plus denses (cap au nombre)
let FIELD_LOD = FIELD.slice().sort((a,b)=>b.dens-a.dens);
const CAP = LOWPERF?28:FIELD.length;
FIELD_LOD = FIELD_LOD.slice(0,CAP);

   Le champ traverse l'écran (≈800px) en ~6 minutes => ~2.2 px/s. À peine perceptible.
   On dérive le GROUPE entier via 1 transform translate (pas de re-path).
   Wrap doux : quand le groupe a dérivé d'une période, on le remet (modulo) — invisible
   car les blobs sont denses et le champ est large. */
const DRIFT_VX = -2.2;            // px/seconde vers l'ouest (lent)
const DRIFT_VY = -0.5;            // léger vers le nord (NO)
const WRAP_X = 360;              // période de wrap horizontal
const WRAP_Y = 90;

  fill:"#B08A2A",opacity:".07",rx:24});
fieldLayer.insertBefore(southHaze, fieldGroup);

function makeFieldBlob(c){
  const g=el("g",{transform:`translate(${c.x.toFixed(1)} ${c.y.toFixed(1)})`});
  const R = 9 + c.dens*15;                     // trace petit, modéré gros
  const seed = c.i*97+13;
  const sil = splatPath(0,0,R,seed, c.dens>0.5?11:9, 0.62);
  // ombre encre
  g.appendChild(el("path",{d:sil,fill:INK,opacity:(0.16+c.dens*0.10).toFixed(2),transform:"translate(2 2.6)"}));
  // corps golden-brown
  g.appendChild(el("path",{d:sil,fill:"url(#sargG)",stroke:INK,"stroke-width":(1.3+c.dens*0.9).toFixed(2),"stroke-linejoin":"round","opacity":(0.5+c.dens*0.45).toFixed(2)}));
  // halftone (uniquement sur denses pour la perf, pas de filtre)
  if(!LOWPERF && c.dens>0.35) g.appendChild(el("path",{d:sil,fill:"url(#halftone)",opacity:(c.dens*0.30).toFixed(2)}));
  // reflet doré
  if(c.dens>0.25) g.appendChild(el("path",{d:splatPath(-R*0.24,-R*0.3,R*0.46,seed+5,7,0.5),fill:"#FFE9A8",opacity:(0.30+c.dens*0.20).toFixed(2)}));
  return g;
}
for(const c of FIELD_LOD) fieldGroup.appendChild(makeFieldBlob(c));

const islandLayer=document.getElementById("islandLayer");

/* ════════════════ Construction des effets Splat par zone ════════════════ */
function makeBank(seed){
  const g=el("g",{}), R=20, sil=splatPath(0,0,R,seed,11,0.55);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".30",transform:"translate(2.4 3.2)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#sargG)",stroke:INK,"stroke-width":2,"stroke-linejoin":"round"}));
  const rd=rng(seed*5+1);
  for(let i=0;i<3;i++){const ox=(rd()-.5)*R*0.8, oy=(rd()-.5)*R*0.7;
    g.appendChild(el("path",{d:splatPath(ox,oy,R*0.32,seed*9+i*7,7,0.6),fill:"#5d5a1e",opacity:".55"}));}
  g.appendChild(el("path",{d:sil,fill:"url(#halftone)",opacity:".26"}));
  g.appendChild(el("path",{d:splatPath(-R*0.22,-R*0.28,R*0.5,seed+3,7,0.5),fill:"#FFE9A8",opacity:".5"}));
  return g;
}
function makeDeposit(seed){
  const g=el("g",{opacity:"0"}), R=56, sil=splatPath(0,0,R,seed,13,0.78);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".26",transform:"translate(3 4)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#splatG)",stroke:INK,"stroke-width":2.4,"stroke-linejoin":"round"}));
  const rl=rng(seed*7+3);
  for(let i=0;i<4;i++){const a=(0.15+rl()*0.7)*3.14159, len=R*(0.95+rl()*0.6);
    const x=Math.cos(a)*len, y=Math.abs(Math.sin(a))*len*0.7+R*0.3, w=9+rl()*8;
    g.appendChild(el("path",{d:splatPath(x,y,w,seed*13+i*5,7,0.7),fill:"url(#splatG)",stroke:INK,"stroke-width":1.6,"stroke-linejoin":"round"}));}
  const rd=rng(seed*11+2);
  for(let i=0;i<5;i++){const ox=(rd()-.5)*R*1.1, oy=(rd()-.5)*R*0.9;
    g.appendChild(el("path",{d:splatPath(ox,oy,R*(0.18+rd()*0.12),seed*17+i*9,7,0.6),fill:"#5d5a1e",opacity:".5"}));}
  const ht=el("path",{d:sil,fill:"url(#halftone)",opacity:"0"});
  g.appendChild(ht);
  g.appendChild(el("path",{d:splatPath(-R*0.28,-R*0.34,R*0.42,seed+5,8,0.5),fill:"#FFE9A8",opacity:".45"}));
  return {g, ht};
}
function makeFoam(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,4,34,seed+1,12,0.6),fill:"none",stroke:"#eafcff","stroke-width":7,opacity:".9","stroke-linejoin":"round"}));
  g.appendChild(el("path",{d:splatPath(0,4,34,seed+1,12,0.6),fill:"none",stroke:"#ffffff","stroke-width":2.4,opacity:".95","stroke-linejoin":"round"}));
  const rf=rng(seed*3+4);
  for(let i=0;i<7;i++){const a=(i/7)*6.28+rf()*0.4, rr=40+rf()*14;
    g.appendChild(el("circle",{cx:(Math.cos(a)*rr).toFixed(1),cy:(Math.sin(a)*rr*0.7+6).toFixed(1),r:(2+rf()*2).toFixed(1),fill:"#fff",opacity:".85"}));}
  return g;
}
function makeRipple(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,0,26,seed+9,14,0.18),fill:"none",stroke:INK,"stroke-width":3,opacity:".7"}));
  g.appendChild(el("path",{d:splatPath(0,0,26,seed+9,14,0.18),fill:"none",stroke:"#FFE9A8","stroke-width":1.4,opacity:".9"}));
  return g;
}

// par zone : sable clippé + écume rivage + couches d'effet + timeline décalée
const depositLayer=document.getElementById("depositLayer");
const rippleLayer=document.getElementById("rippleLayer");
const foamLayer=document.getElementById("foamLayer");
const dropLayer=document.getElementById("dropLayer");
const bankLayer=document.getElementById("bankLayer");
const lineLayer=document.getElementById("lineLayer");
const coastLayer=document.getElementById("coastLayer");

const ZONES = ARRIVALS.map((A, zi)=>{
  const coastRad=A.coastDeg*Math.PI/180;
  const TAN={x:Math.cos(coastRad), y:Math.sin(coastRad)};
  // normale "vers le sable" (perpendiculaire, pointant côté terre = vers l'île/haut-gauche)
  const SINK={x:-Math.sin(coastRad), y:Math.cos(coastRad)};

  // petit croissant de sable local autour de l'impact (clip dépôt) — orienté tangente
  const L=64;                       // demi-longueur de plage
  const ax=A.impact.x - TAN.x*L, ay=A.impact.y - TAN.y*L;
  const bx=A.impact.x + TAN.x*L, by=A.impact.y + TAN.y*L;
  // bande de sable : ligne rivage -> décalée côté terre
  const inx=SINK.x*40, iny=SINK.y*40;
  const sandD=`M${ax.toFixed(1)} ${ay.toFixed(1)} L${bx.toFixed(1)} ${by.toFixed(1)} L${(bx+inx).toFixed(1)} ${(by+iny).toFixed(1)} L${(ax+inx).toFixed(1)} ${(ay+iny).toFixed(1)} Z`;
  const foamD=`M${ax.toFixed(1)} ${ay.toFixed(1)} L${bx.toFixed(1)} ${by.toFixed(1)}`;

  document.getElementById(zi===0?"sandClipPathA":"sandClipPathB").setAttribute("d",sandD);

  const cg=el("g",{});
  cg.appendChild(el("path",{d:sandD,fill:"url(#sand)",stroke:INK,"stroke-width":2.4,"stroke-linejoin":"round",opacity:".95"}));
  const shoreFoam=el("path",{d:foamD,fill:"none",stroke:"#eafcff","stroke-width":5,"stroke-linecap":"round",opacity:".85"});
  const shoreFoam2=el("path",{d:foamD,fill:"none",stroke:"#ffffff","stroke-width":2,"stroke-linecap":"round",opacity:".9"});
  cg.appendChild(shoreFoam); cg.appendChild(shoreFoam2);
  coastLayer.appendChild(cg);

  const depG=el("g",{"clip-path":`url(#${zi===0?"sandClipA":"sandClipB"})`});
  depositLayer.appendChild(depG);
  const dep=makeDeposit(A.seed); depG.appendChild(dep.g);

  const ripple=makeRipple(A.seed); ripple.setAttribute("transform",`translate(${A.impact.x} ${A.impact.y})`); rippleLayer.appendChild(ripple);
  const foam=makeFoam(A.seed); foam.setAttribute("transform",`translate(${A.impact.x} ${A.impact.y})`); foamLayer.appendChild(foam);
  const bank=makeBank(A.seed); bankLayer.appendChild(bank);

  // gouttes : 7 rivage (tangente+absorption) + 5 splash (parabole)
  const drops=[]; const dlg=el("g",{}); dropLayer.appendChild(dlg);
  for(let i=0;i<7;i++){
    const seed=A.seed+i*37+11, rand=rng(seed), Lp=(i/6-0.5)*2, dist=40+Math.abs(Lp)*90;
    const tx=A.impact.x + TAN.x*Lp*dist + SINK.x*(Math.abs(Lp)*9);
    const ty=A.impact.y + TAN.y*Lp*dist + SINK.y*(Math.abs(Lp)*9);
    const rr=2.4+rand()*3.2, g=el("g",{opacity:"0"});
    g.appendChild(el("path",{d:splatPath(0,0,rr,seed,7,0.55),fill:"url(#sargG)",stroke:INK,"stroke-width":1.1,"stroke-linejoin":"round"}));
    dlg.appendChild(g); drops.push({g,type:"shore",tx,ty,delay:Math.abs(Lp)*0.06,rot:(rand()*2-1)*120});
  }
  for(let i=0;i<5;i++){
    const seed=A.seed+i*53+200, rand=rng(seed), ang=-2.5+rand()*1.9, spd=80+rand()*120, rr=2.2+rand()*3, g=el("g",{opacity:"0"});
    g.appendChild(el("path",{d:splatPath(0,0,rr,seed,7,0.55),fill:"url(#sargG)",stroke:INK,"stroke-width":1.1,"stroke-linejoin":"round"}));
    dlg.appendChild(g);
    drops.push({g,type:"splash",vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,delay:rand()*0.05,rot:(rand()*2-1)*180});
  }

  // speed-lines
  const lines=[]; const llg=el("g",{transform:`translate(${A.impact.x} ${A.impact.y})`}); lineLayer.appendChild(llg);
  const rl=rng(A.seed+99);
  for(let i=0;i<9;i++){const a=(i/9)*6.28+rl()*0.25;
    const x1=Math.cos(a)*26,y1=Math.sin(a)*26,x2=Math.cos(a)*(60+rl()*28),y2=Math.sin(a)*(60+rl()*28);
    const ln=el("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),stroke:"#FFE9A8","stroke-width":(2.4+rl()*1.4).toFixed(1),"stroke-linecap":"round",opacity:"0"});
    llg.appendChild(ln); lines.push(ln);}

  // PHASE décalée par zone pour ne pas synchroniser les 2 splats
  return { A, TAN, SINK, dep, ripple, foam, bank, drops, lines, llg, shoreFoam,
           phase: zi*4.0 };   // zone B démarre 4s après A
});

/* ════════════════ Timeline d'un échouage (en sec, dans un cycle de 9s) ════════════════ */
const T_APPROACH=2.6, T_IMPACT=2.8, T_SETTLE=3.3, T_FADE=7.2, T_CYCLE=9.0;
const ease=p=>p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
const easeOut=p=>1-Math.pow(1-p,3);

function renderZone(Z, tc){
  const A=Z.A, IM=A.impact, OR=A.origin;
  // BANC : dérive LENTE depuis le large vers l'impact, puis squash
  if(tc<T_IMPACT){
    const p=ease(clamp(tc/T_APPROACH,0,1));
    const x=OR.x+(IM.x-OR.x)*p, y=OR.y+(IM.y-OR.y)*p, sc=0.7+p*0.5;
    const squash=tc>T_APPROACH?1+(tc-T_APPROACH)/(T_IMPACT-T_APPROACH)*0.7:1;
    Z.bank.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${(sc*squash).toFixed(3)} ${(sc/squash).toFixed(3)})`);
    Z.bank.setAttribute("opacity",tc>T_APPROACH?(1-(tc-T_APPROACH)/(T_IMPACT-T_APPROACH)).toFixed(2):"1");
  } else Z.bank.setAttribute("opacity","0");

  // DÉPÔT (rotate côte + halftone révélé)
  if(tc>=T_IMPACT){
    const pg=clamp((tc-T_IMPACT)/(T_SETTLE-T_IMPACT),0,1);
    const sc=(0.25+easeOut(pg)*0.75)*(1+0.10*Math.sin(pg*Math.PI));
    let op=1; if(tc>T_FADE) op=clamp(1-(tc-T_FADE)/(T_CYCLE-T_FADE),0,1);
    Z.dep.g.setAttribute("transform",`translate(${IM.x} ${IM.y}) rotate(${A.coastDeg}) scale(${sc.toFixed(3)})`);
    Z.dep.g.setAttribute("opacity",op.toFixed(2));
    Z.dep.ht.setAttribute("opacity",(easeOut(pg)*0.32*op).toFixed(2));
  } else Z.dep.g.setAttribute("opacity","0");

  // SPEED-LINES
  {const dt=tc-T_IMPACT; let lp=dt<0?0:dt<0.05?dt/0.05:dt<0.30?1-(dt-0.05)/0.25:0; lp=clamp(lp,0,1);
   Z.llg.setAttribute("transform",`translate(${IM.x} ${IM.y}) scale(${(0.6+lp*0.6).toFixed(3)})`);
   for(const ln of Z.lines) ln.setAttribute("opacity",(lp*0.9).toFixed(2));}

  // ONDE
  {const dt=tc-T_IMPACT; let rp=dt<0||dt>0.26?0:1-dt/0.26;
   const rsc=1+easeOut(clamp(dt/0.26,0,1))*3;
   Z.ripple.setAttribute("transform",`translate(${IM.x} ${IM.y}) scale(${rsc.toFixed(3)})`);
   Z.ripple.setAttribute("opacity",clamp(rp,0,1).toFixed(2));}

  // ÉCUME impact
  {const dt=tc-T_IMPACT; let fp=dt<0?0:dt<0.5?Math.sin((dt/0.5)*Math.PI*0.9):0; fp=clamp(fp,0,1);
   Z.foam.setAttribute("transform",`translate(${IM.x} ${IM.y}) scale(${(0.5+easeOut(clamp(dt/0.5,0,1))*0.9).toFixed(3)})`);
   Z.foam.setAttribute("opacity",fp.toFixed(2));}

  // PULSE écume rivage
  {const dt=tc-T_IMPACT; const pulse=dt>=0&&dt<0.18?Math.sin(dt/0.18*Math.PI):0;
   Z.shoreFoam.setAttribute("stroke-width",(5+pulse*4).toFixed(2));}

  // GOUTTES
  {const dt=tc-T_IMPACT;
   for(const d of Z.drops){
     const lt=dt-d.delay;
     if(lt<0||lt>0.9){ d.g.setAttribute("opacity","0"); continue; }
     if(d.type==="shore"){
       const fly=easeOut(clamp(lt/0.34,0,1));
       const x=IM.x+(d.tx-IM.x)*fly, y=IM.y+(d.ty-IM.y)*fly;
       const ab=clamp((lt-0.55)/0.3,0,1);
       const sc=clamp(1-lt*0.45,0.4,1)*(1-ab*0.55), op=ab<1?1-ab:0;
       d.g.setAttribute("transform",`translate(${x.toFixed(1)} ${(y+ab*4).toFixed(1)}) scale(${sc.toFixed(2)}) rotate(${(d.rot*fly).toFixed(0)})`);
       d.g.setAttribute("opacity",clamp(op,0,1).toFixed(2));
     } else {
       const x=IM.x+d.vx*lt, y=IM.y+d.vy*lt+300*lt*lt;
       const sc=clamp(1-lt*0.5,0.4,1), op=lt<0.6?1:1-(lt-0.6)/0.25;
       d.g.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${sc.toFixed(2)}) rotate(${(d.rot*lt).toFixed(0)})`);
       d.g.setAttribute("opacity",clamp(op,0,1).toFixed(2));
     }
   }}
}
function freezeZone(Z){
  const A=Z.A, IM=A.impact;
  Z.bank.setAttribute("opacity","0");
  for(const ln of Z.lines) ln.setAttribute("opacity","0");
  for(const d of Z.drops) d.g.setAttribute("opacity","0");
  Z.ripple.setAttribute("opacity","0");
  Z.foam.setAttribute("transform",`translate(${IM.x} ${IM.y}) scale(1.05)`); Z.foam.setAttribute("opacity",".28");
  Z.dep.g.setAttribute("transform",`translate(${IM.x} ${IM.y}) rotate(${A.coastDeg}) scale(1)`);
  Z.dep.g.setAttribute("opacity","1"); Z.dep.ht.setAttribute("opacity","0.32");
  Z.shoreFoam.setAttribute("stroke-width","5");
}

/* ════════════════ 1 SEUL rAF ════════════════ */
let raf=0, paused=false, t0=0;
function render(t){
  // DÉRIVE LENTE du champ entier (translate + wrap doux, transform only)
  let dx=(DRIFT_VX*t)%WRAP_X, dy=(DRIFT_VY*t)%WRAP_Y;
  fieldGroup.setAttribute("transform",`translate(${dx.toFixed(2)} ${dy.toFixed(2)})`);
  // échouages : chaque zone sur son cycle décalé
  for(const Z of ZONES){
    let tc=(t - Z.phase)%T_CYCLE; if(tc<0) tc+=T_CYCLE;
    renderZone(Z, tc);
  }
}
function frame(tms){ if(!t0)t0=tms; const t=(tms-t0)/1000; render(t); if(!paused) raf=requestAnimationFrame(frame); }
function freezeAll(){
  fieldGroup.setAttribute("transform","translate(0 0)");
  for(const Z of ZONES) freezeZone(Z);
}

if(REDUCED){ freezeAll(); }
else { raf=requestAnimationFrame(frame); }

const lbl=document.getElementById("lbl");
document.body.addEventListener("click",()=>{
  if(REDUCED) return;
  paused=!paused;
  if(paused){ cancelAnimationFrame(raf); raf=0; }
  else { t0=0; raf=requestAnimationFrame(frame); }
});
document.addEventListener("visibilitychange",()=>{
  if(REDUCED) return;
  if(document.hidden){ if(raf){cancelAnimationFrame(raf); raf=0;} }
  else if(!paused){ t0=0; raf=requestAnimationFrame(frame); }
});
</script>
