<!doctype html>
<!-- field-depth-lod — LE CHAMP AU LARGE révélé + dérive LENTE + échouage gaté "prévu".
     DIRECTION : PROFONDEUR / LOD.
       · bancs LOINTAINS (loin de l'île) = petits, pâles, peu détaillés, dérive plus lente → moins de
         paint au loin (perf) + lisibilité (le regard va vers la côte).
       · bancs PROCHES de la côte = plus gros, nets, détaillés, halftone + reflet.
       · ÉCHOUAGE "Le Grand Splat" UNIQUEMENT sur les bancs que le calcul prévoit atterrir (predicted)
         → squash → splat + onde + speed-lines + spray → dépôt figé incliné côte → fade.
       · les autres bancs dérivent au large SANS jamais s'échouer (jour calme = champ qui glisse, 0 splat).
     DONNÉES RÉELLES embarquées depuis _mq-scene.json (cells satellite afai + islandPath + island center).
     CONTRAINTES : 1 seul rAF pausable + visibilitychange ; transform/opacity UNIQUEMENT (aucun filtre/
     blur/turbulence par frame, aucun path 'd' régénéré par frame) ; createElementNS/setAttribute SEUL
     (PAS d'innerHTML) ; dérive LENTE (champ traverse en ~plusieurs minutes) ; LOD cap mobile ;
     prefers-reduced-motion = PLANCHER DUR (champ figé, beau, lisible). -->

const lerp=(a,b,p)=>a+(b-a)*p;

7.7 161.5 L463.2 157.3 L446.3 162.6 L435.6 180.9 L431.6 178.5 L432.5 170.7 L427.6 167.2 L427.1 159.7 L414.3 147.5 L418.1 146.8 L417.2 144.5 L410.8 144.7 L407.8 137.7 L402.4 136.1 L396.5 127.2 L398.3 117.5 L394.0 118.0 L394.9 115.2 L390.1 119.4 L385.0 117.6 L381.1 106.0 L373.0 104.7 L375.3 98.9 L367.8 98.6 L363.6 92.9 L354.0 96.6 L345.5 87.5 L338.7 86.9 L322.9 77.8 L316.9 70.1 L282.5 57.5 L246.9 59.8 L241.4 65.6 L226.2 71.1 L214.4 86.2 L206.4 105.8 Z";
const ISLAND_CENTER={x:400,y:300};
// cells [vx, vy, afai]  (afai 0.10..0.32 = trace→modéré). ~moitié vy>600 = AU SUD, hors-cadre.
const CELLS=[[340.8,1049.3,0.2],[822.6,1023.1,0.11],[-191.6,970.7,0.1],[138,839.7,0.14],[898.6,813.5,0.11],[112.7,708.7,0.16],[290.1,708.7,0.16],[138,682.5,0.1],[163.4,682.5,0.12],[188.7,682.5,0.32],[340.8,682.5,0.19],[467.6,682.5,0.11],[949.3,682.5,0.1],[974.7,682.5,0.11],[61.9,630.1,0.32],[87.3,630.1,0.17],[112.7,630.1,0.23],[264.8,630.1,0.13],[290.1,630.1,0.11],[87.3,603.9,0.32],[112.7,603.9,0.32],[163.4,603.9,0.13],[188.7,603.9,0.1],[264.8,603.9,0.12],[214.1,577.7,0.13],[-90.2,551.5,0.32],[-64.8,551.5,0.32],[-115.5,525.3,0.14],[-90.2,525.3,0.3],[-64.8,525.3,0.29],[-140.9,499.1,0.12],[-115.5,499.1,0.1],[-140.9,472.9,0.11],[-191.6,420.5,0.11],[974.7,341.9,0.11],[-90.2,315.7,0.15],[138,315.7,0.1],[-64.8,289.5,0.14],[36.6,289.5,0.1],[11.2,263.3,0.1],[36.6,263.3,0.13],[61.9,263.3,0.12],[87.3,263.3,0.1],[11.2,237.1,0.11],[36.6,237.1,0.11],[949.3,184.7,0.17],[11.2,158.5,0.15],[36.6,-77.3,0.12],[264.8,-182.1,0.13]];

/* ───────────── CÔTE (réutilise la géométrie du proto beaching) ─────────────
   1 rivage SVG simplifié qui passe par chaque point d'arrivée prévu. Comme les arrivées prévues
   sont au SUD de l'île (côte sud MQ ~ y 470..520, x 340..520), je trace une côte locale par impact. */
const ISLAND_R = 150;   // rayon "côte" approx pour la jauge de profondeur

/* ───────────── PROJECTION : worldspace → frame, dérive LENTE NW ─────────────
   Le champ vit dans un worldspace qui s'étend AU SUD (vy>600). Une "caméra" lente glisse vers le
   sud/ouest (= le champ apparaît dériver vers le NORD-OUEST dans le cadre, courant Caraïbes lent).
   On NE bouge PAS les paths : on translate les <g> conteneurs (transform only). Wrap modulo pour
   un flux infini sans re-render. */
// L'île occupe le haut-centre (y~70..480). La MER OUVERTE = la bande basse (y~330..600) + les flancs.
// On projette la bande SUD dense du monde (vy ~520..1080) dans cette mer ouverte, du plus proche de la
// côte sud (haut de la bande mer) au plus loin au large (bas de cadre). Les cellules très au nord/dans
// l'île sont écartées (filtrées plus bas) : on ne dessine QUE le champ AU LARGE.
const WORLD={ x0:-220, x1:1010, y0:500, y1:1090 };   // bande monde = le champ sud à révéler
const SPANX=WORLD.x1-WORLD.x0, SPANY=WORLD.y1-WORLD.y0;
const SEA_TOP=345, SEA_BOT=596;                       // mer ouverte dans le cadre (sous la côte sud)
const PROJ_W=1040;   // largeur projetée du tapis de champ (px) — > 800 pour wrap horizontal
function worldToBase(vx,vy){
  // x : la bande monde étalée sur PROJ_W (déborde le cadre → wrap) ;
  // y : plus au sud (grand vy) = plus loin au large = plus bas dans la mer ouverte.
  const fy = clamp((vy-WORLD.y0)/SPANY, 0, 1);
  const bx = (vx-WORLD.x0)/SPANX * PROJ_W;
  const by = lerp(SEA_TOP, SEA_BOT, fy);
  return {bx,by,fy};
}

/* ───────────── BANC offshore (paint comic, niveau de détail = LOD) ─────────────
   detail 0 (loin) : silhouette + ombre, pâle.  detail 1 (proche) : + clumps + halftone + reflet. */
function makeOffshoreBank(seed, R, detail, afai){
  const g=el("g",{}), rand=rng(seed);
  const N = detail? 11 : 8;
  const sil=splatPath(0,0,R,seed,N,0.5+0.1*detail);
  // ombre portée douce (offset constant, pas de blur)
  g.appendChild(el("path",{d:sil,fill:INK,opacity:(0.16+0.12*detail).toFixed(2),transform:"translate(2 3)"}));
  // corps golden-brown
  g.appendChild(el("path",{d:sil,fill:"url(#sargG)",stroke:INK,"stroke-width":(1.1+1.0*detail).toFixed(2),"stroke-linejoin":"round"}));
  if(detail){
    // clumps internes (densité ~ afai)
    const nC = afai>0.26?3:(afai>0.16?2:1);
    for(let i=0;i<nC;i++){const ox=(rand()-.5)*R*0.8, oy=(rand()-.5)*R*0.7;
      g.appendChild(el("path",{d:splatPath(ox,oy,R*0.30,seed*9+i*7,7,0.6),fill:"#5d5a1e",opacity:".5"}));}
    g.appendChild(el("path",{d:sil,fill:"url(#halftone)",opacity:".26"}));
    g.appendChild(el("path",{d:splatPath(-R*0.22,-R*0.26,R*0.46,seed+3,7,0.5),fill:"#FFE9A8",opacity:".5"}));
  }
  return g;
}
function splatPath(cx,cy,r,seed,N,jag){
  N=N||10; jag=jag==null?0.75:jag;
  const rand=rng(seed),p=[];
  for(let i=0;i<N;i++){const a=(i/N)*6.2832, rr=r*(1-jag*0.5+rand()*jag);p.push([cx+Math.cos(a)*rr, cy+Math.sin(a)*rr]);}
  let d=`M${((p[0][0]+p[N-1][0])/2).toFixed(1)} ${((p[0][1]+p[N-1][1])/2).toFixed(1)}`;
  for(let i=0;i<N;i++){const a=p[i],b=p[(i+1)%N];d+=`Q${a[0].toFixed(1)} ${a[1].toFixed(1)} ${((a[0]+b[0])/2).toFixed(1)} ${((a[1]+b[1])/2).toFixed(1)}`;}
  return d+"Z";
}

/* ───────────── ÎLE jade ───────────── */
(function buildIsland(){
  const L=document.getElementById("islandLayer");
  L.appendChild(el("path",{d:ISLAND_PATH,fill:INK,opacity:".22",transform:"translate(3 5)"}));
  L.appendChild(el("path",{d:ISLAND_PATH,fill:"url(#islG)",stroke:INK,"stroke-width":3.2,"stroke-linejoin":"round"}));
  // liseré d'écume autour de l'île (statique)
  L.appendChild(el("path",{d:ISLAND_PATH,fill:"none",stroke:"#eafcff","stroke-width":2.2,opacity:".4"}));
})();

/* ───────────── HAZE de profondeur (bande pâle au loin = haut de cadre) ───────────── */
(function buildHaze(){
  const L=document.getElementById("hazeLayer");
  L.appendChild(el("rect",{x:0,y:0,width:800,height:220,fill:"url(#hazeG)"}));
})();

/* ───────────── CONSTRUCTION DU CHAMP avec LOD ─────────────
   Pour chaque cellule réelle, projeter en base, calculer la profondeur = distance à l'île (après
   la projection le sud est en bas = "proche côte sud"). On range en 2 calques :
   - FAR  (loin de l'île / faible afai) : petit, pâle, sans détail, dérive un peu plus lente.
   - NEAR (proche côte / fort afai)     : gros, net, détaillé.
   Cap LOD mobile : limite le nombre de bancs détaillés. */
const FAR=document.getElementById("fieldFar"), NEAR=document.getElementById("fieldNear");
const isMobile = Math.min(window.innerWidth,window.innerHeight) < 540 || matchMedia("(pointer:coarse)").matches;
const NEAR_CAP = isMobile? 6 : 11;   // bancs détaillés max
const FAR_CAP  = isMobile? 12 : 22;  // bancs lointains max

// pré-projeter. depth01 : 0 = PROCHE côte (haut de la mer ouverte, fy petit) → 1 = LOIN au large (bas).
const banks=[];
let bi=0;
for(const [vx,vy,afai] of CELLS){
  const {bx,by,fy}=worldToBase(vx,vy);
  // n'embarquer que les cellules de la bande SUD (le vrai champ au large). Les cellules nord/dans
  // l'île (vy < WORLD.y0) sont écartées : pas de banc qui chevauche l'île.
  if(vy < WORLD.y0 - 20) continue;
  const depth01 = fy;   // proximité côte → profondeur
  banks.push({vx,vy,afai,bx,by,depth01,seed:(bi*131+17)});
  bi++;
}
// tri : lointains (depth01 grand) d'abord → proches dessinés au-dessus (occlusion correcte)
banks.sort((a,b)=>b.depth01-a.depth01);

let nearCount=0, farCount=0;
const fieldGroups=[];   // {g, baseX, baseY, depth01, vmul}
for(const bk of banks){
  // PROCHE = dans le tiers haut de la mer ouverte (près de la côte) ET afai pas négligeable.
  const wantNear = bk.depth01 < 0.40 && bk.afai >= 0.12;
  let detail = wantNear && nearCount < NEAR_CAP ? 1 : 0;
  if(!detail && farCount >= FAR_CAP) continue;          // cap LOD loin (perf mobile)
  if(detail && nearCount >= NEAR_CAP) detail = 0;        // bascule en loin si cap proche atteint

  // taille : proche = gros (afai amplifie), loin = petit (LOD = moins de surface peinte au loin)
  const afai01 = clamp((bk.afai-0.1)/0.22, 0, 1);
  const sizeNear = lerp(15, 32, clamp((0.40-bk.depth01)/0.40,0,1)) * lerp(0.85,1.30, afai01);
  const sizeFar  = lerp(6, 15, 1-bk.depth01) * lerp(0.85,1.18, afai01);
  const R = detail? sizeNear : sizeFar;

  const g = makeOffshoreBank(bk.seed, R, detail, bk.afai);
  // pâleur au loin (opacité globale) — profondeur atmosphérique + lisibilité (le regard va à la côte)
  const op = detail? lerp(0.86,1,afai01) : lerp(0.28, 0.60, 1-bk.depth01);
  g.setAttribute("opacity", op.toFixed(2));
  (detail?NEAR:FAR).appendChild(g);
  // parallaxe douce : le lointain glisse plus lentement que le proche (depth cue en mouvement)
  const vmul = lerp(0.55, 1.0, 1-bk.depth01);
  fieldGroups.push({g, baseX:bk.bx, baseY:bk.by, depth01:bk.depth01, vmul});
  if(detail) nearCount++; else farCount++;
}

/* ───────────── DÉRIVE LENTE ─────────────
   Courant Caraïbes ≈ vers l'OUEST/NORD-OUEST, LENT. Le champ doit traverser en plusieurs minutes :
   PROJ_W≈1000px parcourus en ~DRIFT_PERIOD secondes. On translate les <g> et on wrap modulo PROJ_W
   en X (flux infini) + une légère remontée Y (vers le nord). Mouvement à peine perceptible/frame. */
const DRIFT_PERIOD = 220;     // s pour qu'un banc traverse toute la largeur projetée (~3.7 min) → LENT
const DRIFT_VX = -PROJ_W/DRIFT_PERIOD;   // px/s vers l'OUEST (négatif)
const DRIFT_VY = -7.0/60;                // px/s très légère remontée nord (≈ -0.12 px/s)
const FRAME_W = 800;
// breathing imperceptible (houle lente) : amplitude minuscule, période longue
const SWAY_AMP = 2.2, SWAY_T = 26;

/* ───────────── ÉCHOUAGE GATÉ : seuls les bancs "prévus" s'échouent ─────────────
   GATE CALCUL (démo honnête) : on sélectionne 2 cellules réelles dont la trajectoire de dérive
   (vers NW) recoupe la côte sud → predicted=true. arrivalsExampleVB du JSON = [340.8,560] (côte sud).
   J'ajoute un 2e impact côté sud-ouest. Tout le reste du champ dérive SANS s'échouer (jour calme = 0).
   Chaque échouage joue Le Grand Splat à un point d'impact côtier, en boucle décalée. */
const IMPACTS=[
  // {impact côte, origine au large (entrée par le bas/large), côte tangente deg, seed, phase}
  { x:360, y:470, ox:300, oy:610, coastDeg:-12, seed:42,  phase:0.0 },   // ← arrivalsExampleVB sud
  { x:512, y:452, ox:560, oy:600, coastDeg:18,  seed:71,  phase:0.5 }    // sud-est, 2e arrivée prévue
];

// Construit, par impact, les éléments du Grand Splat (réutilise la grammaire du proto beaching).
function buildSplat(im){
  const o={};
  // côte locale (segment) passant par l'impact, pour clipper le dépôt sur "le sable"
  const cr=im.coastDeg*Math.PI/180, tx=Math.cos(cr), ty=Math.sin(cr);
  // demi-plan "terre" = du côté de l'île (vers islandCenter)
  const toIsland={x:ISLAND_CENTER.x-im.x, y:ISLAND_CENTER.y-im.y};
  const tl=Math.hypot(toIsland.x,toIsland.y)||1; const nx=toIsland.x/tl, ny=toIsland.y/tl;
  o.coastDeg=im.coastDeg; o.tan={x:tx,y:ty}; o.norm={x:nx,y:ny};

  // clip : large wedge côté terre du segment côte (le dépôt ne déborde jamais en mer)
  const cid="clip_"+im.seed;
  const cp=el("clipPath",{id:cid});
  const far=900;
  const a={x:im.x-tx*far, y:im.y-ty*far}, b={x:im.x+tx*far, y:im.y+ty*far};
  const c={x:b.x+nx*far, y:b.y+ny*far}, d={x:a.x+nx*far, y:a.y+ny*far};
  cp.appendChild(el("path",{d:`M${a.x.toFixed(1)} ${a.y.toFixed(1)} L${b.x.toFixed(1)} ${b.y.toFixed(1)} L${c.x.toFixed(1)} ${c.y.toFixed(1)} L${d.x.toFixed(1)} ${d.y.toFixed(1)} Z`}));
  document.getElementById("scene").querySelector("defs").appendChild(cp);

  // dépôt (clippé)
  const depWrap=el("g",{"clip-path":`url(#${cid})`});
  const dep=makeDeposit(im.seed); o.deposit=dep.g; o.depHt=dep.ht;
  depWrap.appendChild(dep.g);
  document.getElementById("depositLayer").appendChild(depWrap);

  o.ripple=makeRipple(im.seed); o.ripple.setAttribute("transform",`translate(${im.x} ${im.y})`);
  document.getElementById("rippleLayer").appendChild(o.ripple);
  o.foam=makeFoam(im.seed); o.foam.setAttribute("transform",`translate(${im.x} ${im.y})`);
  document.getElementById("foamLayer").appendChild(o.foam);

  // banc en approche (depuis le large vers l'impact)
  o.bank=makeOffshoreBank(im.seed, 20, 1, 0.28);
  document.getElementById("splatBankLayer").appendChild(o.bank);

  // gouttes + speed-lines, propres à l'impact
  o.drops=[]; o.lineG=el("g",{transform:`translate(${im.x} ${im.y})`}); o.lines=[];
  const dl=document.getElementById("dropLayer"), ll=document.getElementById("lineLayer");
  for(let i=0;i<8;i++){
    const seed=im.seed*7+i*37+11, rand=rng(seed), L=(i/7-0.5)*2, dist=40+Math.abs(L)*90;
    const dtx=im.x+tx*L*dist + nx*(Math.abs(L)*9), dty=im.y+ty*L*dist + ny*(Math.abs(L)*9);
    const rr=2.4+rand()*3.2, g=el("g",{opacity:"0"});
    g.appendChild(el("path",{d:splatPath(0,0,rr,seed,7,0.55),fill:"url(#sargG)",stroke:INK,"stroke-width":1.1,"stroke-linejoin":"round"}));
    dl.appendChild(g); o.drops.push({g,type:"shore",tx:dtx,ty:dty,delay:Math.abs(L)*0.06,rot:(rand()*2-1)*110});
  }
  for(let i=0;i<5;i++){
    const seed=im.seed*53+200+i, rand=rng(seed), ang=-2.5+rand()*1.9, spd=80+rand()*120, rr=2.2+rand()*3, g=el("g",{opacity:"0"});
    g.appendChild(el("path",{d:splatPath(0,0,rr,seed,7,0.55),fill:"url(#sargG)",stroke:INK,"stroke-width":1.1,"stroke-linejoin":"round"}));
    dl.appendChild(g); o.drops.push({g,type:"splash",vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,delay:rand()*0.05,rot:(rand()*2-1)*160});
  }
  const lr=rng(im.seed*3+9);
  for(let i=0;i<9;i++){const a=(i/9)*6.28+lr()*0.25, x1=Math.cos(a)*26,y1=Math.sin(a)*26,x2=Math.cos(a)*(60+lr()*30),y2=Math.sin(a)*(60+lr()*30);
    const ln=el("line",{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),stroke:"#FFE9A8","stroke-width":(2.4+lr()*1.4).toFixed(1),"stroke-linecap":"round",opacity:"0"});
    o.lineG.appendChild(ln); o.lines.push(ln);}
  ll.appendChild(o.lineG);
  // pin (point d'arrivée prévu)
  document.getElementById("pinLayer").appendChild(makePin(im.x,im.y));
  return o;
}

function makeDeposit(seed){
  const g=el("g",{opacity:"0"}), R=58, sil=splatPath(0,0,R,seed,13,0.78);
  g.appendChild(el("path",{d:sil,fill:INK,opacity:".26",transform:"translate(3 4)"}));
  g.appendChild(el("path",{d:sil,fill:"url(#splatG)",stroke:INK,"stroke-width":2.4,"stroke-linejoin":"round"}));
  const rl=rng(seed*7+3);
  for(let i=0;i<4;i++){const a=(0.15+rl()*0.7)*3.14159, len=R*(0.95+rl()*0.6);
    const x=Math.cos(a)*len, y=Math.abs(Math.sin(a))*len*0.7+R*0.3, w=9+rl()*8;
    g.appendChild(el("path",{d:splatPath(x,y,w,seed*13+i*5,7,0.7),fill:"url(#splatG)",stroke:INK,"stroke-width":1.6,"stroke-linejoin":"round"}));}
  const rd=rng(seed*11+2);
  for(let i=0;i<5;i++){const ox=(rd()-.5)*R*1.1, oy=(rd()-.5)*R*0.9;
    g.appendChild(el("path",{d:splatPath(ox,oy,R*(0.18+rd()*0.12),seed*17+i*9,7,0.6),fill:"#5d5a1e",opacity:".5"}));}
  const ht=el("path",{d:sil,fill:"url(#halftone)",opacity:"0"});
  g.appendChild(ht);
  g.appendChild(el("path",{d:splatPath(-R*0.28,-R*0.34,R*0.42,seed+5,8,0.5),fill:"#FFE9A8",opacity:".45"}));
  return {g, ht};
}
function makeFoam(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,4,36,seed+1,12,0.6),fill:"none",stroke:"#eafcff","stroke-width":7,opacity:".9","stroke-linejoin":"round"}));
  g.appendChild(el("path",{d:splatPath(0,4,36,seed+1,12,0.6),fill:"none",stroke:"#ffffff","stroke-width":2.6,opacity:".95","stroke-linejoin":"round"}));
  const rf=rng(seed*3+4);
  for(let i=0;i<8;i++){const a=(i/8)*6.28+rf()*0.4, rr=42+rf()*14;
    g.appendChild(el("circle",{cx:(Math.cos(a)*rr).toFixed(1),cy:(Math.sin(a)*rr*0.7+6).toFixed(1),r:(2+rf()*2).toFixed(1),fill:"#fff",opacity:".85"}));}
  return g;
}
function makeRipple(seed){
  const g=el("g",{opacity:"0"});
  g.appendChild(el("path",{d:splatPath(0,0,28,seed+9,14,0.18),fill:"none",stroke:INK,"stroke-width":3,opacity:".7"}));
  g.appendChild(el("path",{d:splatPath(0,0,28,seed+9,14,0.18),fill:"none",stroke:"#FFE9A8","stroke-width":1.4,opacity:".9"}));
  return g;
}
function makePin(x,y){
  const g=el("g",{transform:`translate(${x} ${y})`});
  g.appendChild(el("ellipse",{cx:0,cy:1,rx:6,ry:2.4,fill:"#062033",opacity:".4"}));
  g.appendChild(el("path",{d:"M0 0 C-6 -8 -9 -11.6 -9 -16 A9 9 0 1 1 9 -16 C9 -11.6 6 -8 0 0 Z",fill:"#E8472A",stroke:INK,"stroke-width":1.8,"stroke-linejoin":"round"}));
  g.appendChild(el("circle",{cx:0,cy:-16,r:3.4,fill:"#fff",stroke:INK,"stroke-width":.8}));
  return g;
}

const splats = IMPACTS.map(buildSplat);

/* ───────────── TIMELINE ÉCHOUAGE (par impact, cycle long et décalé) ─────────────
   Cycle long (≈ DRIFT lent) : approche douce → impact → settle → long séjour figé → fade lent → repos.
   On NE déclenche QUE pour les impacts prévus (= ceux dans IMPACTS). */
const ease=p=>p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
const easeOut=p=>1-Math.pow(1-p,3);
const REDUCED=matchMedia("(prefers-reduced-motion:reduce)").matches;

// fenêtres temporelles (s) au sein d'un cycle de CYCLE secondes
const CYCLE=34;
const W_APPROACH=5.0, W_IMPACT=5.6, W_SETTLE=7.2, W_HOLD=26, W_FADE=31;  // dépôt visible longtemps

function renderSplat(o, im, lt){
  // lt = temps local dans le cycle [0..CYCLE)
  // BANC en approche depuis le large
  if(lt<W_IMPACT){
    const p=ease(clamp(lt/W_APPROACH,0,1));
    const x=lerp(im.ox,im.x,p), y=lerp(im.oy,im.y,p), sc=0.7+p*0.6;
    const squash=lt>W_APPROACH?1+(lt-W_APPROACH)/(W_IMPACT-W_APPROACH)*0.7:1;
    o.bank.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${(sc*squash).toFixed(3)} ${(sc/squash).toFixed(3)})`);
    o.bank.setAttribute("opacity", lt>W_APPROACH?(1-(lt-W_APPROACH)/(W_IMPACT-W_APPROACH)).toFixed(2):"1");
  } else o.bank.setAttribute("opacity","0");

  // DÉPÔT figé incliné côte + halftone révélé, long hold puis fade
  if(lt>=W_IMPACT){
    const pg=clamp((lt-W_IMPACT)/(W_SETTLE-W_IMPACT),0,1);
    const sc=(0.25+easeOut(pg)*0.75)*(1+0.10*Math.sin(pg*Math.PI));
    let op=1; if(lt>W_FADE) op=clamp(1-(lt-W_FADE)/(CYCLE-W_FADE),0,1);
    o.deposit.setAttribute("transform",`translate(${im.x} ${im.y}) rotate(${im.coastDeg}) scale(${sc.toFixed(3)})`);
    o.deposit.setAttribute("opacity",op.toFixed(2));
    o.depHt.setAttribute("opacity",(easeOut(pg)*0.34*op).toFixed(2));
  } else o.deposit.setAttribute("opacity","0");

  // SPEED-LINES (burst court à l'impact)
  {const dt=lt-W_IMPACT; let lp=dt<0?0:dt<0.05?dt/0.05:dt<0.32?1-(dt-0.05)/0.27:0; lp=clamp(lp,0,1);
   o.lineG.setAttribute("transform",`translate(${im.x} ${im.y}) scale(${(0.6+lp*0.6).toFixed(3)})`);
   for(const ln of o.lines) ln.setAttribute("opacity",(lp*0.9).toFixed(2));}

  // ONDE concentrique
  {const dt=lt-W_IMPACT; let rp=dt<0||dt>0.3?0:1-dt/0.3; const rsc=1+easeOut(clamp(dt/0.3,0,1))*3;
   o.ripple.setAttribute("transform",`translate(${im.x} ${im.y}) scale(${rsc.toFixed(3)})`);
   o.ripple.setAttribute("opacity",clamp(rp,0,1).toFixed(2));}

  // ÉCUME impact
  {const dt=lt-W_IMPACT; let fp=dt<0?0:dt<0.55?Math.sin((dt/0.55)*Math.PI*0.9):0; fp=clamp(fp,0,1);
   o.foam.setAttribute("transform",`translate(${im.x} ${im.y}) scale(${(0.5+easeOut(clamp(dt/0.55,0,1))*0.9).toFixed(3)})`);
   o.foam.setAttribute("opacity",fp.toFixed(2));}

  // GOUTTES
  {const dt=lt-W_IMPACT;
   for(const dd of o.drops){
     const t2=dt-dd.delay;
     if(t2<0||t2>0.95){ dd.g.setAttribute("opacity","0"); continue; }
     if(dd.type==="shore"){
       const fly=easeOut(clamp(t2/0.34,0,1));
       const x=lerp(im.x,dd.tx,fly), y=lerp(im.y,dd.ty,fly);
       const ab=clamp((t2-0.55)/0.32,0,1), sc=clamp(1-t2*0.45,0.4,1)*(1-ab*0.55), op=ab<1?1-ab:0;
       dd.g.setAttribute("transform",`translate(${x.toFixed(1)} ${(y+ab*4).toFixed(1)}) scale(${sc.toFixed(2)}) rotate(${(dd.rot*fly).toFixed(0)})`);
       dd.g.setAttribute("opacity",clamp(op,0,1).toFixed(2));
     } else {
       const x=im.x+dd.vx*t2, y=im.y+dd.vy*t2+300*t2*t2, sc=clamp(1-t2*0.5,0.4,1), op=t2<0.6?1:1-(t2-0.6)/0.3;
       dd.g.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${sc.toFixed(2)}) rotate(${(dd.rot*t2).toFixed(0)})`);
       dd.g.setAttribute("opacity",clamp(op,0,1).toFixed(2));
     }
   }}
}

/* ───────────── RENDER GLOBAL : 1 SEUL rAF ───────────── */
const WRAPW = PROJ_W+240;              // période de wrap horizontal
const XOFF  = (PROJ_W-FRAME_W)/2;      // recentrage du tapis projeté sur le cadre 800
function fieldX(baseX, t, vmul){
  // dérive LENTE vers l'ouest + wrap horizontal infini (transform only, jamais de re-path)
  let x = ((baseX + DRIFT_VX*t*vmul) + 120) % WRAPW;
  if(x<0) x+=WRAPW;
  return x - 120 - XOFF;
}
function renderField(t){
  // sway imperceptible (houle lente, amplitude minuscule) ; profondeur module l'amplitude.
  const sway = Math.sin(t/SWAY_T*6.2832)*SWAY_AMP;
  for(const fg of fieldGroups){
    const X = fieldX(fg.baseX, t, fg.vmul);
    // pas de wrap vertical : chaque banc garde sa profondeur (baseY). Seule une houle minuscule + une
    // très légère remontée nord bornée (le champ ne quitte pas sa bande mer) animent Y.
    const northCreep = clamp(DRIFT_VY*t*fg.vmul, -26, 0);   // borné : reste dans la mer ouverte
    const Y = fg.baseY + northCreep + sway*(0.5+0.5*(1-fg.depth01));
    fg.g.setAttribute("transform",`translate(${X.toFixed(1)} ${Y.toFixed(1)})`);
  }
}

function render(t){
  renderField(t);
  // échouages prévus : chacun sur son cycle décalé
  for(let i=0;i<splats.length;i++){
    const im=IMPACTS[i];
    const lt = ((t + im.phase*CYCLE) % CYCLE);
    renderSplat(splats[i], im, lt);
  }
}

function renderFrozen(){
  // PLANCHER DUR : champ figé à sa pose de base (beau, lisible), dépôts posés, 0 anim.
  for(const fg of fieldGroups){
    const X = fieldX(fg.baseX, 0, fg.vmul);
    fg.g.setAttribute("transform",`translate(${X.toFixed(1)} ${fg.baseY.toFixed(1)})`);
  }
  for(let i=0;i<splats.length;i++){
    const o=splats[i], im=IMPACTS[i];
    o.bank.setAttribute("opacity","0");
    for(const ln of o.lines) ln.setAttribute("opacity","0");
    for(const dd of o.drops) dd.g.setAttribute("opacity","0");
    o.ripple.setAttribute("opacity","0");
    o.foam.setAttribute("transform",`translate(${im.x} ${im.y}) scale(1.05)`); o.foam.setAttribute("opacity",".28");
    o.deposit.setAttribute("transform",`translate(${im.x} ${im.y}) rotate(${im.coastDeg}) scale(1)`);
    o.deposit.setAttribute("opacity","1"); o.depHt.setAttribute("opacity","0.34");
  }
}

let raf=0, paused=false, t0=0;
function frame(tms){ if(!t0)t0=tms; const t=(tms-t0)/1000; render(t); if(!paused)raf=requestAnimationFrame(frame); }
if(REDUCED) renderFrozen();
else raf=requestAnimationFrame(frame);

document.body.addEventListener("click",()=>{ if(REDUCED)return; paused=!paused;
  if(paused)cancelAnimationFrame(raf); else raf=requestAnimationFrame(frame); });
document.addEventListener("visibilitychange",()=>{ if(REDUCED)return;
  if(document.hidden)cancelAnimationFrame(raf); else if(!paused)raf=requestAnimationFrame(frame); });
</script>
</body></html>
