<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Le Veilleur — mascotte v2</title>
<style>
  html,body{margin:0;height:100%;background:#0d0b14;display:grid;place-items:center;font-family:"Arial Black",Impact,sans-serif}
  .stage{width:390px;height:720px;position:relative;overflow:hidden;
    background:
      radial-gradient(60% 40% at 78% 20%, rgba(255,121,198,.45), transparent 60%),
      radial-gradient(55% 45% at 18% 30%, rgba(43,182,196,.40), transparent 60%),
      radial-gradient(70% 55% at 50% 16%, #ffe6a8 0%, #ffb45e 42%, #ff8a52 74%, #ff6f4d 100%);}
  .sea{position:absolute;left:0;right:0;bottom:0;height:30%;
    background:linear-gradient(180deg, rgba(43,182,196,0) 0%, #2bb6c4 40%, #1577a0 100%);}
  .sea:after{content:"";position:absolute;inset:0;background:
    repeating-linear-gradient(180deg, rgba(255,255,255,.12) 0 2px, transparent 2px 12px);opacity:.5}
  .rays{position:absolute;left:50%;top:18%;width:760px;height:760px;transform:translate(-50%,-50%);opacity:.13;
    background:repeating-conic-gradient(from 0deg,#fff6d8 0deg 8deg,transparent 8deg 16deg);
    -webkit-mask:radial-gradient(circle,transparent 26%,#000 27%);mask:radial-gradient(circle,transparent 26%,#000 27%)}
  .halftone{position:absolute;inset:0;opacity:.12;background:radial-gradient(rgba(13,11,20,.9) 2px,transparent 2.4px) 0 0/15px 15px}
  .bokeh{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.7),rgba(255,255,255,0) 70%);filter:blur(1px)}
  svg.char{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%) rotate(-4deg);width:340px;height:auto}
  .wm{position:absolute;left:0;right:0;bottom:42px;text-align:center;color:#0d0b14;z-index:3}
  .wm h1{margin:0;font-size:48px;letter-spacing:-1px;line-height:.9;text-shadow:3px 3px 0 #fff}
  .wm h1 b{color:#fff;-webkit-text-stroke:2.5px #0d0b14}
  .wm p{margin:7px 0 0;font:800 13px/1 ui-monospace,monospace;letter-spacing:3px;opacity:.85}
</style></head>
<body>
<div class="stage">
  <div class="rays"></div>
  <div class="bokeh" style="width:70px;height:70px;left:34px;top:90px"></div>
  <div class="bokeh" style="width:40px;height:40px;left:300px;top:130px"></div>
  <div class="bokeh" style="width:26px;height:26px;left:250px;top:70px;opacity:.7"></div>
  <div class="bokeh" style="width:18px;height:18px;left:80px;top:200px;opacity:.7"></div>
  <div class="sea"></div>
  <div class="halftone"></div>

  <svg class="char" viewBox="0 0 360 480" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="ir2" cx="42%" cy="32%" r="72%"><stop offset="0" stop-color="#7af0b0"/><stop offset="1" stop-color="#1c8f4e"/></radialGradient>
      <clipPath id="eyeclip"><ellipse cx="182" cy="172" rx="58" ry="56"/></clipPath>
    </defs>
    <g stroke="#0d0b14" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
      <!-- ombre portée (flotte) -->
      <ellipse cx="180" cy="452" rx="74" ry="12" fill="#0d0b14" stroke="none" opacity=".22"/>

      <!-- panneaux solaires -->
      <rect x="14" y="158" width="52" height="70" rx="9" fill="#27a9e3" transform="rotate(-12 40 193)"/>
      <path d="M20 176 L58 168 M22 196 L60 188 M40 160 L42 226" stroke-width="4" transform="rotate(-12 40 193)"/>
      <rect x="294" y="158" width="52" height="70" rx="9" fill="#27a9e3" transform="rotate(12 320 193)"/>
      <path d="M300 168 L338 176 M298 188 L336 196 M320 160 L318 226" stroke-width="4" transform="rotate(12 320 193)"/>
      <line x1="66" y1="196" x2="104" y2="202"/><line x1="294" y1="196" x2="256" y2="202"/>

      <!-- BRAS GAUCHE levé (coucou) -->
      <path d="M128 318 q-34 -22 -40 -64 q-3 -20 10 -22" fill="#27c46b"/>
      <g transform="translate(92 222) rotate(-6)">
        <circle cx="0" cy="0" r="17" fill="#fdf0d6"/>
        <path d="M-9 -6 q-3 -16 3 -18 M-1 -9 q-2 -19 5 -19 M7 -8 q1 -17 7 -15" stroke-width="5" fill="none"/>
      </g>
      <!-- bras droit relax -->
      <path d="M236 320 q30 14 26 54 q-2 16 -16 14" fill="#27c46b"/>
      <ellipse cx="246" cy="384" rx="14" ry="13" fill="#fdf0d6"/>

      <!-- CORPS hoodie (cel-shade) -->
      <path d="M122 304 q-8 92 58 96 q66 -4 58 -96 q-2 -32 -58 -32 q-56 0 -58 32 Z" fill="#27c46b"/>
      <path d="M122 304 q-8 92 58 96 q-38 -2 -50 -50 q-10 -38 -8 -46 Z" fill="#1c8f4e" stroke="none"/>
      <path d="M140 358 q40 20 80 0" stroke-width="5"/>
      <path d="M122 308 q58 -28 116 0 q-12 -24 -58 -24 q-46 0 -58 24Z" fill="#27c46b"/>
      <!-- chaîne or -->
      <g stroke-width="3.5"><circle cx="152" cy="322" r="6" fill="#ffd23f"/><circle cx="167" cy="329" r="6" fill="#ffd23f"/><circle cx="180" cy="332" r="6" fill="#ffd23f"/><circle cx="193" cy="329" r="6" fill="#ffd23f"/><circle cx="208" cy="322" r="6" fill="#ffd23f"/></g>

      <!-- antenne -->
      <path d="M182 72 q8 -26 -2 -42" stroke-width="7"/>
      <circle cx="178" cy="24" r="13" fill="#ffd23f"/><circle cx="174" cy="20" r="3.5" fill="#fff" stroke="none"/>

      <!-- TÊTE -->
      <ellipse cx="180" cy="180" rx="118" ry="110" fill="#fdf6e3"/>
      <path d="M74 206 a118 110 0 0 0 206 56 a118 110 0 0 1 -206 -56Z" fill="#ece0c4" stroke="none"/>
      <ellipse cx="92" cy="210" rx="16" ry="10" fill="#ff8f73" stroke="none" opacity=".5"/>
      <ellipse cx="266" cy="210" rx="16" ry="10" fill="#ff8f73" stroke="none" opacity=".5"/>

      <!-- ŒIL-ÉCRAN qui REFLÈTE la plage (clin d'œil produit) -->
      <ellipse cx="180" cy="172" rx="84" ry="78" fill="#0d0b14"/>
      <g clip-path="url(#eyeclip)" stroke="none">
        <rect x="124" y="116" width="116" height="112" fill="url(#ir2)"/>
        <!-- mini plage dans l'iris : ciel doré + mer + sable + soleil -->
        <rect x="124" y="116" width="116" height="40" fill="#ffd98a"/>
        <circle cx="210" cy="138" r="13" fill="#fff3c0"/>
        <rect x="124" y="156" width="116" height="34" fill="#2bb6c4"/>
        <path d="M124 188 q58 -14 116 0 v40 h-116Z" fill="#ffe6a8"/>
      </g>
      <ellipse cx="180" cy="172" rx="58" ry="56" fill="none"/>
      <!-- pupille -->
      <circle cx="190" cy="180" r="24" fill="#0d0b14" stroke="none"/>
      <circle cx="200" cy="170" r="8" fill="#fff" stroke="none"/>
      <circle cx="180" cy="190" r="4" fill="#fff" stroke="none" opacity=".7"/>
      <!-- paupière half-lid cool -->
      <path d="M96 152 q84 -42 168 0 q-10 -32 -84 -32 q-74 0 -84 32Z" fill="#fdf6e3"/>
      <path d="M98 154 q82 -38 164 0" stroke-width="7" fill="none"/>
      <path d="M122 122 q34 -14 64 -2" stroke-width="8"/>

      <!-- smirk -->
      <path d="M152 250 q28 18 60 4" stroke-width="7"/>
      <path d="M212 254 q6 4 12 1" stroke-width="6"/>
    </g>
    <!-- étincelles -->
    <g fill="#fff"><path d="M300 250 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3Z"/><path d="M64 286 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2Z"/></g>
  </svg>
  <div class="wm"><h1>LE <b>VEILLEUR</b></h1><p>TON GARDIEN DES PLAGES</p></div>
</div>
</body></html>
