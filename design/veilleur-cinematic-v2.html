<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Le Veilleur — hero cinématique v2</title>
<style>
  html,body{margin:0;height:100%;background:#0b0716;display:grid;place-items:center;font-family:"Arial Black",Impact,sans-serif}
  .stage{width:390px;height:844px;position:relative;overflow:hidden}
  svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .grain{position:absolute;inset:0;opacity:.06;mix-blend-mode:overlay;pointer-events:none}
  .wm{position:absolute;left:0;right:0;bottom:120px;text-align:center;z-index:5}
  .wm h1{margin:0;font-size:58px;line-height:.84;letter-spacing:-2px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.3),0 0 34px rgba(255,150,90,.6)}
  .wm h1 b{color:#ffd27a}
  .wm p{margin:14px 0 0;font:800 12px/1 ui-monospace,monospace;letter-spacing:4px;color:#ffe0bf}
  .cta{position:absolute;left:24px;right:24px;bottom:52px;z-index:5;text-align:center;background:linear-gradient(180deg,#ffe07a,#ffb338);color:#2a1230;border:0;border-radius:16px;padding:16px;font:900 16px/1 system-ui;box-shadow:0 12px 32px rgba(255,140,60,.45),0 2px 0 rgba(0,0,0,.22)}
</style></head>
<body>
<div class="stage">
  <svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#37205f"/><stop offset=".20" stop-color="#732c7c"/>
        <stop offset=".40" stop-color="#c1457f"/><stop offset=".57" stop-color="#ff7656"/>
        <stop offset=".72" stop-color="#ffa647"/><stop offset=".82" stop-color="#ffe0a0"/><stop offset="1" stop-color="#ffd175"/></linearGradient>
      <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffd789"/><stop offset=".1" stop-color="#ff9f5e"/>
        <stop offset=".36" stop-color="#c8487f"/><stop offset=".72" stop-color="#5a2a72"/><stop offset="1" stop-color="#27123c"/></linearGradient>
      <radialGradient id="sun" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#fff7df"/><stop offset=".3" stop-color="#ffe7a8"/><stop offset=".62" stop-color="#ffb14d" stop-opacity=".66"/><stop offset="1" stop-color="#ff8a4d" stop-opacity="0"/></radialGradient>
      <radialGradient id="eyeglow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#c5fff0" stop-opacity=".9"/><stop offset="1" stop-color="#c5fff0" stop-opacity="0"/></radialGradient>
      <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1"><stop offset=".66" stop-color="#ffd27a" stop-opacity="0"/><stop offset=".74" stop-color="#ffe6b0" stop-opacity=".5"/><stop offset=".82" stop-color="#ffb24d" stop-opacity="0"/></linearGradient>
      <filter id="blurS"><feGaussianBlur stdDeviation="10"/></filter>
      <filter id="blurM"><feGaussianBlur stdDeviation="3.5"/></filter>
      <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="grainF"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/></filter>
      <radialGradient id="vig" cx="50%" cy="44%" r="72%"><stop offset=".58" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#0b0716" stop-opacity=".5"/></radialGradient>
    </defs>

    <rect width="390" height="556" fill="url(#sky)"/>
    <!-- nuages stratifiés, sous-éclairés -->
    <g filter="url(#blurS)">
      <ellipse cx="90" cy="110" rx="135" ry="20" fill="#8c3580" opacity=".6"/>
      <ellipse cx="310" cy="74" rx="120" ry="15" fill="#5e2a78" opacity=".6"/>
      <ellipse cx="250" cy="165" rx="160" ry="18" fill="#d75986" opacity=".55"/>
      <ellipse cx="60" cy="215" rx="130" ry="15" fill="#ff8466" opacity=".5"/>
      <ellipse cx="330" cy="250" rx="120" ry="14" fill="#ffa15e" opacity=".45"/>
    </g>
    <!-- oiseaux -->
    <g stroke="#3a1c52" stroke-width="2.4" fill="none" stroke-linecap="round" opacity=".7">
      <path d="M120 150 q8 -7 16 0 q8 -7 16 0"/><path d="M150 175 q6 -5 12 0 q6 -5 12 0"/>
    </g>

    <!-- soleil + bloom + reflet -->
    <circle cx="200" cy="452" r="200" fill="url(#sun)"/>
    <circle cx="200" cy="452" r="56" fill="#fff4d0"/><circle cx="200" cy="452" r="56" fill="#ffe69a" opacity=".45"/>

    <!-- skyline lointaine -->
    <g fill="#34194c" opacity=".6"><rect x="2" y="430" width="10" height="40"/><rect x="16" y="418" width="8" height="52"/><rect x="28" y="438" width="12" height="32"/>
      <rect x="352" y="424" width="9" height="46"/><rect x="364" y="436" width="11" height="34"/><rect x="378" y="418" width="8" height="52"/></g>

    <rect y="468" width="390" height="376" fill="url(#sea)"/>
    <path d="M186 468 q16 100 -12 376 l52 0 q24 -286 0 -376Z" fill="#ffd27a" filter="url(#blurM)" opacity=".5"/>
    <g stroke="#ffe6b0" stroke-width="1.4" opacity=".32"><line x1="44" y1="498" x2="120" y2="498"/><line x1="252" y1="510" x2="346" y2="510"/><line x1="120" y1="540" x2="240" y2="540"/><line x1="64" y1="582" x2="150" y2="582"/></g>
    <!-- voilier (yole) silhouette -->
    <g fill="#2a1240" opacity=".9"><path d="M300 520 l0 -34 l22 30Z"/><path d="M298 520 l26 0 l-5 9 l-16 0Z"/></g>

    <!-- VEILLEUR œil-satellite -->
    <g transform="translate(304 150)">
      <circle r="60" fill="url(#eyeglow)"/>
      <g filter="url(#glow)"><circle r="29" fill="#190f2c"/><circle r="18" fill="#34e0b0"/><circle cx="4" cy="3" r="8.5" fill="#08121f"/><circle cx="8" cy="-2" r="3.2" fill="#eafff8"/></g>
      <path d="M-25 13 A29 29 0 0 1 -7 -27" fill="none" stroke="#ffd27a" stroke-width="3" stroke-linecap="round"/>
      <rect x="-56" y="-9" width="13" height="18" rx="3" fill="#190f2c"/><line x1="-29" y1="0" x2="-44" y2="-3" stroke="#190f2c" stroke-width="4"/>
    </g>

    <!-- PREMIER PLAN : coastline + 2 palmiers nets, rim doré -->
    <path d="M0 720 q110 -64 226 -34 q92 24 164 4 L390 844 L0 844Z" fill="#190c2c"/>
    <path d="M0 720 q110 -64 226 -34" fill="none" stroke="#ff9f5e" stroke-width="2.4" opacity=".65"/>

    <!-- palmier gauche (grand) -->
    <g>
      <path d="M58 844 C 60 760, 74 706, 64 648" fill="none" stroke="#140a24" stroke-width="13" stroke-linecap="round"/>
      <path d="M58 844 C 60 760, 74 706, 64 648" fill="none" stroke="#ff9a4d" stroke-width="3" stroke-linecap="round" transform="translate(-4 0)" opacity=".8"/>
      <g fill="#140a24">
        <path d="M64 646 C 26 632, 6 640, -10 660 C 22 636, 48 636, 66 654Z"/>
        <path d="M64 646 C 98 628, 124 634, 142 654 C 110 632, 80 634, 62 654Z"/>
        <path d="M64 646 C 40 612, 12 600, -8 600 C 26 614, 48 626, 66 652Z"/>
        <path d="M64 646 C 88 612, 116 602, 138 604 C 104 614, 80 626, 62 652Z"/>
        <path d="M64 646 C 60 612, 62 596, 70 580 C 72 606, 70 628, 66 650Z"/>
      </g>
      <path d="M64 646 C 98 628, 124 634, 142 654" fill="none" stroke="#ffb24d" stroke-width="2.4" opacity=".75"/>
      <path d="M64 646 C 88 612, 116 602, 138 604" fill="none" stroke="#ffb24d" stroke-width="2" opacity=".6"/>
      <circle cx="64" cy="648" r="5" fill="#ffd23f"/>
    </g>
    <!-- palmier droit (moyen) -->
    <g>
      <path d="M338 844 C 332 766, 322 716, 332 672" fill="none" stroke="#140a24" stroke-width="10" stroke-linecap="round"/>
      <g fill="#140a24">
        <path d="M332 670 C 300 658, 282 664, 268 680 C 296 660, 318 662, 334 676Z"/>
        <path d="M332 670 C 364 656, 386 662, 400 678 C 372 658, 348 662, 330 676Z"/>
        <path d="M332 670 C 312 642, 290 632, 272 632 C 300 644, 318 656, 334 674Z"/>
        <path d="M332 670 C 352 642, 376 634, 394 636 C 366 644, 346 656, 330 674Z"/>
      </g>
      <path d="M332 670 C 364 656, 386 662, 400 678" fill="none" stroke="#ffb24d" stroke-width="2" opacity=".6"/>
    </g>

    <rect width="390" height="844" fill="url(#haze)" style="mix-blend-mode:screen"/>
    <rect width="390" height="844" fill="url(#vig)"/>
  </svg>
  <svg class="grain" preserveAspectRatio="none" viewBox="0 0 390 844"><rect width="390" height="844" filter="url(#grainF)"/></svg>
  <div class="wm"><h1>LE <b>VEILLEUR</b></h1><p>OÙ TE BAIGNER · AUJOURD'HUI</p></div>
  <div class="cta">🛟 Voir les plages propres →</div>
</div>
</body></html>
