<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LE VEILLEUR — 3D stylisé (proto)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0d0b14;overflow:hidden;font-family:"Arial Black",Impact,system-ui,sans-serif}
  #app{position:fixed;inset:0}
  .ui{position:fixed;inset:0;pointer-events:none}
  .top{position:absolute;top:max(16px,env(safe-area-inset-top));left:0;right:0;display:flex;justify-content:space-between;padding:0 18px}
  .top .l{font:800 12px/1 ui-monospace,monospace;letter-spacing:3px;color:#ffe39a;text-shadow:0 0 14px rgba(255,200,80,.8)}
  .top .r{font:900 12px/1 ui-monospace,monospace;color:#0d0b14;background:#2bff88;border:2px solid #0d0b14;border-radius:999px;padding:6px 12px;box-shadow:3px 3px 0 #0d0b14}
  .foot{position:absolute;left:0;right:0;bottom:8vh;text-align:center}
  .foot h1{font-weight:900;color:#fff;font-size:13vw;line-height:.88;letter-spacing:-1px;text-shadow:3px 4px 0 rgba(0,0,0,.5),0 0 30px rgba(255,120,180,.5)}
  .foot h1 b{color:#ffd23f}
  .foot p{margin-top:10px;font:800 13px/1.2 ui-monospace,monospace;letter-spacing:3px;color:#ff9ad1}
</style>
<script type="importmap">
{ "imports": {
  "three": "/node_modules/three/build/three.module.js",
  "three/addons/": "/node_modules/three/examples/jsm/"
}}
</script>
</head>
<body>
<div id="app"></div>
<div class="ui">
  <div class="top"><div class="l">◍ LE VEILLEUR · SCAN 3D</div><div class="r">53 PROPRES</div></div>
  <div class="foot"><h1>LE <b>VEILLEUR</b></h1><p>MARTINIQUE · AUJOURD'HUI</p></div>
</div>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.15;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
// ---- ciel dégradé coucher de soleil (texture canvas) ----
const sky=document.createElement('canvas'); sky.width=4; sky.height=256; const sx=sky.getContext('2d');
const gg=sx.createLinearGradient(0,0,0,256);
gg.addColorStop(0,'#2a1a52'); gg.addColorStop(.32,'#b23a7a'); gg.addColorStop(.55,'#ff6f5e');
gg.addColorStop(.72,'#ff9f1c'); gg.addColorStop(.85,'#ffd23f'); gg.addColorStop(1,'#ffe6a8');
sx.fillStyle=gg; sx.fillRect(0,0,4,256);
const skyTex=new THREE.CanvasTexture(sky); skyTex.colorSpace=THREE.SRGBColorSpace;
scene.background=skyTex;
scene.fog=new THREE.Fog(0xff8a4d, 14, 46);

const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,.1,200);

// ---- lumières ----
scene.add(new THREE.HemisphereLight(0xffe0b0, 0x20304a, .9));
const sun=new THREE.DirectionalLight(0xffd9a0, 2.2); sun.position.set(6,5,-8); scene.add(sun);
const rim=new THREE.DirectionalLight(0xff5fae, 1.0); rim.position.set(-7,3,5); scene.add(rim);

// ---- SOLEIL (sphère émissive + bloom) ----
const sunBall=new THREE.Mesh(new THREE.SphereGeometry(3.0,32,32),
  new THREE.MeshBasicMaterial({color:0xfff0c0})); sunBall.position.set(7,3.2,-22); scene.add(sunBall);

// ---- MER stylisée (plan ondulant) ----
const seaGeo=new THREE.PlaneGeometry(120,120,90,90);
const seaMat=new THREE.MeshStandardMaterial({color:0x14b3c4,roughness:.25,metalness:.15,flatShading:true,transparent:true,opacity:.96});
const sea=new THREE.Mesh(seaGeo,seaMat); sea.rotation.x=-Math.PI/2; sea.position.y=-0.6; scene.add(sea);
const base=seaGeo.attributes.position.array.slice();

// ---- ÎLE low-poly stylisée ----
const island=new THREE.Group();
const land=new THREE.Mesh(new THREE.ConeGeometry(5.2,3.0,9,3),
  new THREE.MeshStandardMaterial({color:0x2bd46e,roughness:.85,flatShading:true}));
land.position.y=0.4; land.scale.set(1,1,1); island.add(land);
const sand=new THREE.Mesh(new THREE.CylinderGeometry(5.7,6.2,.5,9),
  new THREE.MeshStandardMaterial({color:0xffe2a8,roughness:1,flatShading:true}));
sand.position.y=-0.45; island.add(sand);
// palmiers low-poly
function palm(px,pz){ const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(.08,.16,1.4,5),new THREE.MeshStandardMaterial({color:0x7a4a22,flatShading:true}));
  tr.position.y=1.0; g.add(tr);
  for(let i=0;i<5;i++){ const fr=new THREE.Mesh(new THREE.ConeGeometry(.22,1.3,4),new THREE.MeshStandardMaterial({color:0x1fcf6a,flatShading:true}));
    fr.position.set(Math.cos(i/5*6.28)*.5,1.7,Math.sin(i/5*6.28)*.5); fr.rotation.z=1.1; fr.rotation.y=i/5*6.28; g.add(fr); }
  g.position.set(px,0.2,pz); g.scale.setScalar(.9+Math.random()*.3); return g; }
island.add(palm(2.2,1.4)); island.add(palm(-2.6,-1.0)); island.add(palm(.4,-2.8)); island.add(palm(-1.4,2.4));
scene.add(island);

// ---- PLAGES : pastilles émissives qui flottent + brillent (bloom) ----
const pins=[];
const pinPos=[[3.2,.7,2.0],[-3.4,.7,1.2],[1.0,.7,-3.4],[-2.0,.7,-2.8],[3.6,.7,-1.0],[-3.8,.7,-0.6],[0.2,.7,3.6]];
for(const [px,py,pz] of pinPos){ const m=new THREE.Mesh(new THREE.SphereGeometry(.34,18,18),
    new THREE.MeshStandardMaterial({color:0x2bff88,emissive:0x1bff7a,emissiveIntensity:2.4,roughness:.4}));
  m.position.set(px,py,pz); scene.add(m); pins.push(m); }

// ---- LE VEILLEUR : œil-satellite flottant ----
const veil=new THREE.Group();
const eyeW=new THREE.Mesh(new THREE.SphereGeometry(.95,32,32),new THREE.MeshStandardMaterial({color:0xfdf4dc,roughness:.5,emissive:0x332a10,emissiveIntensity:.3}));
const iris=new THREE.Mesh(new THREE.SphereGeometry(.5,24,24),new THREE.MeshStandardMaterial({color:0x27a9e3,emissive:0x0a3a55,emissiveIntensity:.6}));
iris.position.z=.62; const pup=new THREE.Mesh(new THREE.SphereGeometry(.24,16,16),new THREE.MeshBasicMaterial({color:0x0d0b14})); pup.position.z=.95;
const ring=new THREE.Mesh(new THREE.TorusGeometry(1.25,.10,12,40),new THREE.MeshStandardMaterial({color:0xffd23f,emissive:0xffb000,emissiveIntensity:1.4,roughness:.4}));
ring.rotation.x=1.2; veil.add(eyeW,iris,pup,ring);
veil.position.set(0,5.4,0); veil.scale.setScalar(.9); scene.add(veil);

// ---- bloom ----
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.9,0.6,0.85);
composer.addPass(bloom); composer.addPass(new OutputPass());

let t0=0;
function frame(ts){ if(!t0)t0=ts; const t=(ts-t0)/1000;
  // caméra : orbite lente + léger bob
  const R=15, ang=t*0.18;
  camera.position.set(Math.sin(ang)*R, 6.2+Math.sin(t*0.5)*0.4, Math.cos(ang)*R);
  camera.lookAt(0,1.2,0);
  // mer ondulante
  const p=seaGeo.attributes.position.array;
  for(let i=0;i<p.length;i+=3){ const X=base[i],Y=base[i+1];
    p[i+2]=Math.sin(X*0.25+t*1.4)*0.35+Math.cos(Y*0.3-t*1.1)*0.3; }
  seaGeo.attributes.position.needsUpdate=true; seaGeo.computeVertexNormals();
  // pins qui pulsent + flottent
  pins.forEach((m,i)=>{ m.position.y=0.7+Math.sin(t*2+i)*0.12; m.material.emissiveIntensity=2.0+Math.sin(t*3+i)*0.8; });
  // veilleur : bob + regarde autour
  veil.position.y=5.4+Math.sin(t*0.9)*0.25; veil.rotation.y=Math.sin(t*0.4)*0.5; ring.rotation.z=t*0.6;
  composer.render(); requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); });
</script>
</body>
</html>
