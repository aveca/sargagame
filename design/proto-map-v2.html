<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sargasses — Carte Martinique (v2, vraie géographie golden-hour)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bricolage+Grotesque:wght@600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky0:#0B2230; --sky1:#155A5A; --sky2:#C97E3A; --sky3:#F2B05E;
  --glint:#FFD884; --gold:#E8A800; --goldL:#FFC72C; --goldS:#FFE47A;
  --ink:#EAF7F4; --green:#22C55E; --amber:#E8A800; --coral:#E8522A; --tealL:#5FD3C9; --mid:#9DB4B0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body{height:100%}
body{background:#06140f;color:var(--ink);overflow:hidden;font-family:"Bricolage Grotesque",system-ui,-apple-system,"Segoe UI",sans-serif}
.anton{font-family:'Anton',"Haettenschweiler","Arial Narrow Bold",Impact,sans-serif;font-weight:400;letter-spacing:-.01em;text-transform:uppercase}
.mono{font-family:'JetBrains Mono',monospace}
/* MER golden-hour plein écran (CSS) : l'île flotte dedans, jamais rognée */
#stage{position:fixed;inset:0;overflow:hidden;
  background:radial-gradient(130% 70% at 76% 4%, rgba(255,224,160,.16), transparent 48%),
             linear-gradient(158deg,#1f6157 0%,#114440 44%,#072019 100%)}
#stage .sun{position:absolute;top:-16%;right:-10%;width:82%;height:64%;pointer-events:none;z-index:0;
  background:radial-gradient(closest-side, rgba(255,243,214,.52), rgba(255,216,132,.22) 46%, transparent 72%);
  animation:sunBreath 11s ease-in-out infinite}
@keyframes sunBreath{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
svg.scene{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;z-index:1}
.pin{cursor:pointer}.pin .core{transition:transform .15s cubic-bezier(.34,1.56,.64,1)}.pin:hover .core{transform:scale(1.28)}
.pinhalo{animation:halo 3.6s ease-in-out infinite}@keyframes halo{0%,100%{opacity:.45}50%{opacity:.8}}
.plabel{font:800 10px/1 "Bricolage Grotesque";fill:#fff;paint-order:stroke;stroke:#06140f;stroke-width:3px;stroke-linejoin:round;stroke-opacity:.9;pointer-events:none}

/* chrome */
.chrome{position:fixed;inset:0;pointer-events:none;z-index:5}
.top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;max-width:560px;margin:0 auto}
.live{display:inline-flex;align-items:center;gap:7px;pointer-events:auto;padding:6px 12px 6px 10px;border-radius:999px;background:rgba(8,18,16,.5);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.14)}
.live .pulse{width:8px;height:8px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 0 rgba(232,82,42,.6);animation:lp 2.4s ease-out infinite}
@keyframes lp{0%{box-shadow:0 0 0 0 rgba(232,82,42,.55)}70%{box-shadow:0 0 0 9px rgba(232,82,42,0)}100%{box-shadow:0 0 0 0 rgba(232,82,42,0)}}
.live .t{font:800 11px/1 "Bricolage Grotesque";letter-spacing:.08em;text-transform:uppercase;color:#fff}
.live .h{font:700 11px/1 'JetBrains Mono';color:var(--tealL);margin-left:2px}
.langs{display:flex;gap:4px;pointer-events:auto}
.langs button{border:1px solid rgba(255,255,255,.14);background:rgba(8,18,16,.5);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);color:var(--ink);font:800 11px/1 "Bricolage Grotesque";padding:7px 9px;border-radius:9px;cursor:pointer}
.langs button[aria-pressed="true"]{background:var(--goldL);color:#1A2B26;border-color:transparent}
.head{position:absolute;top:calc(58px + env(safe-area-inset-top));left:0;right:0;max-width:560px;margin:0 auto;padding:0 18px;pointer-events:none}
.head h1{font-size:clamp(26px,7vw,34px);line-height:.96;color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.5)}
.head h1 .d{color:var(--goldS)}
.gauge{margin-top:9px;display:inline-flex;align-items:center;gap:9px;pointer-events:auto;background:rgba(8,18,16,.42);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 13px}
.gauge .bar{width:108px;height:7px;border-radius:4px;background:rgba(255,255,255,.14);overflow:hidden}
.gauge .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--goldL));border-radius:4px}
.gauge .txt{font:700 12.5px/1 "Bricolage Grotesque";color:#fff}.gauge .txt b{color:var(--goldS)}
.dock{position:absolute;left:0;right:0;bottom:calc(16px + env(safe-area-inset-bottom));display:flex;justify-content:center;pointer-events:none}
.dock .pill{pointer-events:auto;display:flex;gap:3px;background:rgba(8,18,16,.62);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px}
.dock .pill button{display:flex;align-items:center;gap:6px;border:0;background:transparent;color:rgba(255,255,255,.7);font:800 12px/1 "Bricolage Grotesque";padding:9px 15px;border-radius:999px;cursor:pointer}
.dock .pill button[aria-pressed="true"]{background:var(--goldL);color:#16241f}
.legend{position:absolute;left:16px;bottom:calc(74px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:5px;pointer-events:none}
.legend .row{display:flex;align-items:center;gap:7px;font:700 10.5px/1 "Bricolage Grotesque";color:rgba(255,255,255,.8);text-shadow:0 1px 4px #000}
.legend .row i{width:9px;height:9px;border-radius:50%}
.near{position:absolute;right:16px;bottom:calc(74px + env(safe-area-inset-bottom));pointer-events:auto;display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--goldS),var(--goldL) 45%,var(--gold));color:#16241f;border:0;font:800 12.5px/1 "Bricolage Grotesque";padding:11px 14px;border-radius:999px;cursor:pointer;box-shadow:0 8px 22px rgba(232,168,0,.34)}
.tag{position:absolute;z-index:6;pointer-events:none;transform:translate(-50%,-100%);background:rgba(8,18,16,.84);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:8px 11px;opacity:0;transition:opacity .25s ease;white-space:nowrap}
.tag.on{opacity:1}
.tag .n{font:800 12.5px/1.1 "Bricolage Grotesque";color:#fff}
.tag .s{font:800 10.5px/1 "Bricolage Grotesque";letter-spacing:.04em;text-transform:uppercase;margin-top:4px;display:flex;align-items:center;gap:5px}
.tag .s i{width:7px;height:7px;border-radius:50%}
.tag .f{font:700 10px/1 'JetBrains Mono';color:var(--mid);margin-top:4px}
.veil{position:absolute;inset:0;pointer-events:none;z-index:1;background:linear-gradient(180deg, rgba(7,18,15,0) 50%, rgba(7,18,15,.30) 100%)}
@media (prefers-reduced-motion:reduce){.sun,.pinhalo,.live .pulse{animation:none!important}.pin .core{transition:none}}
</style>
</head>
<body>
<div id="stage">
  <div class="sun"></div>
  <svg class="scene" id="scene" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"
       role="img" aria-label="Carte de la Martinique golden-hour : chaque plage est une pastille colorée selon l'état des sargasses aujourd'hui.">
    <defs>
      <radialGradient id="phalo" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FFE6A8" stop-opacity=".55"/><stop offset="1" stop-color="#FFE6A8" stop-opacity="0"/></radialGradient>
      <linearGradient id="land" x1="0" y1="0" x2=".8" y2="1">
        <stop offset="0" stop-color="#37471f"/><stop offset=".22" stop-color="#2c3b1c"/><stop offset=".62" stop-color="#1b2a18"/><stop offset="1" stop-color="#111b13"/>
      </linearGradient>
      <linearGradient id="warm" x1="1" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#E8A23A" stop-opacity=".34"/><stop offset=".42" stop-color="#C97E3A" stop-opacity="0"/>
      </linearGradient>
      <filter id="rim" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3"/></filter>
      <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6"/></filter>
      <filter id="shlw" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="12"/></filter>
      <filter id="shlw2" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4.5"/></filter>
      <linearGradient id="sailR" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF6A3D"/><stop offset="1" stop-color="#D8431F"/></linearGradient>
      <linearGradient id="sailY" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD45A"/><stop offset="1" stop-color="#F0A81E"/></linearGradient>
    </defs>

    <!-- courants doux (statiques au repos) -->
    <g stroke="#5FD3C9" stroke-width="2" stroke-linecap="round" fill="none" opacity=".07">
      <path d="M40 250 q60 -16 120 -4"/><path d="M70 340 q70 -18 140 -2"/><path d="M520 120 q60 -14 120 0"/><path d="M600 470 q70 -16 130 -2"/>
    </g>
    <!-- oiseaux lointains (vie discrète) -->
    <g stroke="#0B2230" stroke-width="2.2" stroke-linecap="round" fill="none" opacity=".5">
      <path d="M120 120 q6 -5 12 0 q6 -5 12 0"/><path d="M170 140 q5 -4 10 0 q5 -4 10 0"/>
    </g>

    <!-- ÎLE (vraie géo, injectée) -->
    <g id="islandG">
      <path id="shallowFar" fill="none" stroke="#3fb9ad" stroke-width="26" stroke-opacity=".32" filter="url(#shlw)"/>
      <path id="shallowNear" fill="none" stroke="#9aead9" stroke-width="10" stroke-opacity=".5" filter="url(#shlw2)"/>
      <path id="islandShadow" fill="#03110d" opacity=".5" filter="url(#soft)" transform="translate(6 11)"/>
      <path id="islandRimGlow" fill="none" stroke="#FFE6A8" stroke-width="6" stroke-opacity=".55" filter="url(#rim)"/>
      <path id="island" fill="url(#land)" stroke="#FFE6A8" stroke-width="1.5" stroke-opacity=".9"/>
      <path id="islandWarm" fill="url(#warm)" opacity=".85"/>
      <g id="relief" fill="#0c1710" opacity=".42"></g>
      <g id="ridge" stroke="#46582c" stroke-width="1.4" fill="none" opacity=".3"></g>
    </g>

    <!-- yole (vie + échelle) -->
    <g id="yole" transform="translate(150 470) scale(.58)" opacity=".95">
      <ellipse cx="0" cy="26" rx="46" ry="6" fill="#06201c" opacity=".5"/>
      <g><line x1="-2" y1="4" x2="-2" y2="-64" stroke="#241608" stroke-width="3"/>
        <path d="M-2 -62 L-2 -6 L42 -6 Z" fill="url(#sailR)"/><path d="M-2 -44 L-2 -6 L28 -6 Z" fill="url(#sailY)"/>
        <path d="M-4 -52 L-4 -8 L-32 -8 Z" fill="#1EC8B0" opacity=".94"/></g>
      <path d="M-46 4 Q0 24 46 4 Q40 14 32 16 L-32 16 Q-40 14 -46 4 Z" fill="#0f5d54"/>
      <path d="M-46 4 Q0 18 46 4" fill="none" stroke="#FFD884" stroke-width="1.6" stroke-opacity=".6"/>
    </g>

    <g id="pins"></g>
    <g id="labels"></g>

    <!-- Le Veilleur : petit, serein, coin haut-droit (regarde la mer) -->
    <g id="veilleur" transform="translate(726 104) scale(.46)" opacity=".95" aria-hidden="true">
      <circle cx="0" cy="0" r="42" fill="url(#phalo)"/>
      <rect x="-58" y="-6" width="34" height="20" rx="3" fill="#163a4f" transform="rotate(-8 -41 4)"/>
      <rect x="24" y="-6" width="34" height="20" rx="3" fill="#163a4f" transform="rotate(8 41 4)"/>
      <path d="M0 -22 C14 -22 22 -14 22 2 C22 18 14 30 0 30 C-14 30 -22 18 -22 2 C-22 -14 -14 -22 0 -22 Z" fill="#102622" stroke="#FFD884" stroke-width="1.1" stroke-opacity=".5"/>
      <circle cx="0" cy="4" r="15" fill="#0d3a39"/><circle cx="0" cy="4" r="15" fill="none" stroke="#E8A800" stroke-width="2.4"/>
      <ellipse cx="0" cy="9" rx="15" ry="9" fill="#102622"/>
      <circle cx="2" cy="3" r="5.4" fill="#0a3a39"/><circle cx="0.5" cy="1.2" r="2" fill="#cff4ff"/>
      <line x1="0" y1="-22" x2="0" y2="-34" stroke="#0e2622" stroke-width="2.4"/><circle cx="0" cy="-36" r="3.4" fill="#22C55E"/>
    </g>
  </svg>

  <div class="veil"></div>

  <div class="chrome">
    <div class="top">
      <div class="live"><span class="pulse"></span><span class="t">EN DIRECT</span><span class="h" id="fresh">·</span></div>
      <div class="langs"><button data-l="fr" aria-pressed="true">FR</button><button data-l="en">EN</button><button data-l="es">ES</button></div>
    </div>
    <div class="head">
      <h1 class="anton">Martinique <span class="d">aujourd'hui</span></h1>
      <div class="gauge"><span class="bar"><i id="gbar"></i></span><span class="txt"><b id="gnum">—</b> plages propres ce matin</span></div>
    </div>
    <div class="legend">
      <div class="row"><i style="background:#22C55E"></i> Propre</div>
      <div class="row"><i style="background:#E8A800"></i> Modéré</div>
      <div class="row"><i style="background:#E8522A"></i> À éviter</div>
    </div>
    <button class="near" id="nearBtn">📍 Près de moi</button>
    <div class="dock"><div class="pill"><button aria-pressed="true">🗺️ Carte</button><button>🏝️ Zones</button><button>⭐ Moi</button></div></div>
  </div>
  <div class="tag" id="tag"><div class="n" id="tagN"></div><div class="s" id="tagS"><i></i><span></span></div><div class="f" id="tagF"></div></div>
</div>

<script>
(function(){
  "use strict";
  var C={clean:"#22C55E",moderate:"#E8A800",avoid:"#E8522A"};
  var LBL={clean:["Propre","Clean","Limpia"],moderate:["Modéré","Moderate","Moderado"],avoid:["À éviter","Avoid","Evitar"]};
  var LANG="fr", scene=document.getElementById("scene"), NS="http://www.w3.org/2000/svg";
  function ti(arr){return arr[LANG==="en"?1:LANG==="es"?2:0];}
  /* plages notables à nommer au repos (lisibilité + vie) — sous-chaîne + côté du label */
  var NAMED=[["Salines",1,1],["Diamant",-1,1],["Tartane",1,0],["Dufour",-1,0],["Anse Mitan",-1,1],["Anse Noire",-1,0],["Caravelle",1,-1]];

  Promise.all([
    fetch("/design/mq-outline.json").then(r=>r.json()),
    fetch("/public/data/beaches-list.json").then(r=>r.json())
  ]).then(function(res){
    var O=res[0], raw=res[1];
    var arr=Array.isArray(raw)?raw:(raw.beaches||Object.values(raw).find(Array.isArray)||[]);
    var beaches=arr.filter(function(b){return (b.island==="mq"||b.island==="martinique"||!b.island)&&b.lat&&b.lng;});
    var bb=O.bbox, pj=O.proj;
    function toVB(la,lo){return [pj.offX+(lo-bb.minLng)*pj.kx*pj.sc, pj.offY+(bb.maxLat-la)*pj.sc];}

    ["shallowFar","shallowNear","islandShadow","islandRimGlow","island","islandWarm"].forEach(function(id){document.getElementById(id).setAttribute("d",O.path);});
    // relief intérieur + crêtes (mornes : Pelée nord, Carbet centre, sud)
    var relief=document.getElementById("relief"), ridge=document.getElementById("ridge");
    [[14.79,-61.10,24],[14.74,-61.10,18],[14.70,-61.07,20],[14.52,-61.06,15],[14.47,-60.92,12]].forEach(function(m){
      var v=toVB(m[0],m[1]);var e=document.createElementNS(NS,"ellipse");
      e.setAttribute("cx",v[0]);e.setAttribute("cy",v[1]);e.setAttribute("rx",m[2]);e.setAttribute("ry",m[2]*0.66);relief.appendChild(e);
      var hl=document.createElementNS(NS,"path");hl.setAttribute("d","M"+(v[0]-m[2]*0.6)+" "+(v[1]-m[2]*0.2)+" Q"+v[0]+" "+(v[1]-m[2]*0.7)+" "+(v[0]+m[2]*0.6)+" "+(v[1]-m[2]*0.2));ridge.appendChild(hl);
    });

    var pins=document.getElementById("pins"), labels=document.getElementById("labels");
    var cleanCount=beaches.filter(function(b){return b.status==="clean";}).length;
    document.getElementById("gnum").textContent=cleanCount;
    document.getElementById("gbar").style.width=Math.round(cleanCount/Math.max(1,beaches.length)*100)+"%";

    beaches.forEach(function(b){
      var v=toVB(b.lat,b.lng), col=C[b.status]||"#888";
      var g=document.createElementNS(NS,"g");g.setAttribute("class","pin");g.setAttribute("transform","translate("+v[0].toFixed(1)+" "+v[1].toFixed(1)+")");
      var halo=document.createElementNS(NS,"circle");halo.setAttribute("class","pinhalo");halo.setAttribute("r","13");halo.setAttribute("fill","url(#phalo)");g.appendChild(halo);
      var core=document.createElementNS(NS,"circle");core.setAttribute("class","core");core.setAttribute("r","6");core.setAttribute("fill",col);core.setAttribute("stroke","#06121A");core.setAttribute("stroke-width","1.3");g.appendChild(core);
      if(b.status==="clean"){var ring=document.createElementNS(NS,"circle");ring.setAttribute("r","6");ring.setAttribute("fill","none");ring.setAttribute("stroke","#fff");ring.setAttribute("stroke-opacity",".55");ring.setAttribute("stroke-width","1");g.appendChild(ring);}
      g.addEventListener("click",function(e){e.stopPropagation();showTag(b,v);});
      g.addEventListener("mouseenter",function(){showTag(b,v);});
      pins.appendChild(g);
      // label au repos si plage notable
      var nm=NAMED.find(function(n){return (b.name||"").indexOf(n[0])>=0;});
      if(nm){var t=document.createElementNS(NS,"text");t.setAttribute("class","plabel");
        t.setAttribute("x",(v[0]+nm[1]*11).toFixed(1));t.setAttribute("y",(v[1]+nm[2]*4-(nm[2]<0?6:-3)).toFixed(1));
        t.setAttribute("text-anchor",nm[1]<0?"end":"start");t.textContent=b.name;labels.appendChild(t);}
    });

    var tag=document.getElementById("tag");
    function showTag(b,v){
      document.getElementById("tagN").textContent=b.name||"";
      var s=document.getElementById("tagS");s.querySelector("i").style.background=C[b.status]||"#888";s.querySelector("span").textContent=ti(LBL[b.status]||["—","—","—"]);
      document.getElementById("tagF").textContent=(b.commune||"")+(b.score!=null?" · score "+b.score:"");
      // position écran depuis coords viewBox (MEET = contain : scale min)
      var r=scene.getBoundingClientRect(),sc=Math.min(r.width/800,r.height/600);
      var dw=800*sc,dh=600*sc,ox=(r.width-dw)/2,oy=(r.height-dh)/2;
      tag.style.left=(r.left+ox+v[0]*sc)+"px";tag.style.top=(r.top+oy+v[1]*sc-12)+"px";
      tag.classList.add("on");clearTimeout(tag._t);tag._t=setTimeout(function(){tag.classList.remove("on");},2600);
    }
    scene.addEventListener("click",function(){tag.classList.remove("on");});
    document.getElementById("fresh").textContent="il y a 3 h";
  }).catch(function(e){document.getElementById("fresh").textContent="hors-ligne";console.error(e);});

  document.querySelectorAll(".langs button").forEach(function(btn){
    btn.addEventListener("click",function(){LANG=btn.getAttribute("data-l");
      document.querySelectorAll(".langs button").forEach(function(x){x.setAttribute("aria-pressed",x===btn?"true":"false");});});
  });
})();
</script>
</body>
</html>
