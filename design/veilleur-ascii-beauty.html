<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LE VEILLEUR — coucher de soleil ASCII (proto v4)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#070611;overflow:hidden;font-family:ui-monospace,Menlo,monospace}
  #c{position:fixed;inset:0;display:block}
  .foot{position:fixed;left:0;right:0;bottom:8vh;text-align:center;pointer-events:none;
        opacity:0;transition:1.4s ease 1.2s;transform:translateY(14px)}
  .foot.on{opacity:1;transform:none}
  .foot h1{font-family:"Arial Black",Impact,sans-serif;font-weight:900;color:#fff;font-size:12vw;line-height:.9;
        letter-spacing:-1px;text-shadow:2px 3px 0 rgba(0,0,0,.55),0 0 30px rgba(255,180,90,.5)}
  .foot h1 b{color:#ffce5a}
  .foot p{margin-top:10px;font:800 13px/1.3 ui-monospace,monospace;letter-spacing:4px;color:#ffd9a8}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="foot" id="foot"><h1>LE <b>VEILLEUR</b></h1><p>OÙ TE BAIGNER · AUJOURD'HUI</p></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const DPR=Math.min(devicePixelRatio||1,2);
const W=innerWidth,H=innerHeight, charW=4.7, charH=7.6;
const cols=Math.ceil(W/charW), rows=Math.ceil(H/charH);
const F=8, RAMP=" .`':-^=+ox*#%@█";
cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);
ctx.font=`${F}px ui-monospace,Menlo,monospace`; ctx.textBaseline='top';
const s=document.createElement('canvas'); s.width=cols; s.height=rows; const x=s.getContext('2d');
console.log('DIMS', JSON.stringify({W,H,cols,rows,charW,charH}));
function RG(cx,cy,r){ if(!(isFinite(cx)&&isFinite(cy)&&isFinite(r)&&r>0)){ console.log('BAD_RG',cx,cy,r); r=Math.max(1,Math.abs(r)||1); cx=cx||0; cy=cy||0; } return x.createRadialGradient(cx,cy,0,cx,cy,r); }
const HZ=Math.round(rows*0.54);            // ligne d'horizon
const sunX=cols*0.5, sunY=HZ-rows*0.02, sunR=rows*0.10;

function scene(t){
  // CIEL — dégradé coucher de soleil (rose → mandarine → or)
  const sky=x.createLinearGradient(0,0,0,HZ);
  sky.addColorStop(0,'#3a2a5e'); sky.addColorStop(.30,'#9d3a73'); sky.addColorStop(.58,'#ff6f5e');
  sky.addColorStop(.80,'#ffaf43'); sky.addColorStop(1,'#ffd27a');
  x.fillStyle=sky; x.fillRect(0,0,cols,HZ);
  // SOLEIL bas sur l'horizon + bloom
  const bloom=RG(sunX,sunY,sunR*3.4);
  bloom.addColorStop(0,'#fff6d8'); bloom.addColorStop(.22,'#ffe9a6'); bloom.addColorStop(.5,'rgba(255,180,90,.45)'); bloom.addColorStop(1,'rgba(255,140,60,0)');
  x.fillStyle=bloom; x.beginPath(); x.arc(sunX,sunY,sunR*3.4,0,7); x.fill();
  const disc=RG(sunX,sunY,sunR);
  disc.addColorStop(0,'#fff7e2'); disc.addColorStop(.7,'#ffdf86'); disc.addColorStop(1,'#ffb347');
  x.fillStyle=disc; x.beginPath(); x.arc(sunX,sunY,sunR,0,7); x.fill();
  // ÎLE lointaine (silhouette douce à droite)
  x.fillStyle='#5a2f55'; x.beginPath(); x.moveTo(cols*0.62,HZ);
  x.quadraticCurveTo(cols*0.78,HZ-rows*0.06,cols*0.9,HZ-rows*0.018); x.lineTo(cols*0.98,HZ); x.closePath(); x.fill();
  // MER — turquoise → bleu profond
  const sea=x.createLinearGradient(0,HZ,0,rows);
  sea.addColorStop(0,'#ffd9a0'); sea.addColorStop(.08,'#7fd9cf'); sea.addColorStop(.4,'#2bb6c4'); sea.addColorStop(1,'#0b2f4a');
  x.fillStyle=sea; x.fillRect(0,HZ,cols,rows-HZ);
  // REFLET DORÉ DU SOLEIL — la colonne scintillante (le clou de la beauté)
  for(let yy=HZ; yy<rows; yy++){
    const d=(yy-HZ)/(rows-HZ);
    const wob=Math.sin(yy*0.55+t*2.4)*(1.5+d*6) + Math.sin(yy*0.21-t*1.6)*2;
    const w=1.4+d*6, a=0.55*(1-d*0.92)*(0.7+0.3*Math.sin(t*3+yy));
    x.fillStyle='rgba(255,224,150,'+Math.max(0,a)+')'; x.fillRect(sunX+wob-w/2,yy,w,1);
  }
  // VAGUES scintillantes qui défilent
  for(let i=0;i<14;i++){ const yy=HZ+(((i*7-t*13)%(rows-HZ))+(rows-HZ))%(rows-HZ);
    x.strokeStyle='rgba(220,255,250,'+(0.05+0.05*Math.abs(Math.sin(t*2+i)))+')'; x.lineWidth=1; x.beginPath();
    for(let c=0;c<=cols;c+=2){ const py=yy+Math.sin(c*0.3+t*2.6+i)*1.1; c===0?x.moveTo(c,py):x.lineTo(c,py);} x.stroke(); }
  // VEILLEUR — lune-œil satellite, haut-gauche, halo qui respire
  const vx=cols*0.19, vy=rows*0.15+Math.sin(t*1.1)*rows*0.01, vr=rows*0.04;
  const hl=RG(vx,vy,vr*3.2); hl.addColorStop(0,'rgba(255,238,196,.7)'); hl.addColorStop(1,'rgba(255,238,196,0)');
  x.fillStyle=hl; x.beginPath(); x.arc(vx,vy,vr*3.2,0,7); x.fill();
  x.fillStyle='#fef3d6'; x.beginPath(); x.arc(vx,vy,vr,0,7); x.fill();                    // lune crème
  x.fillStyle='#0d0b14'; x.beginPath(); x.arc(vx,vy,vr*0.40,0,7); x.fill();               // pupille
  x.fillStyle='#fff'; x.beginPath(); x.arc(vx+vr*0.20,vy-vr*0.20,vr*0.16,0,7); x.fill();  // étincelle
  // PALMIER silhouette premier plan (bas-droite) qui ondule
  const px=cols*0.86, py=rows; x.strokeStyle='#0a1622'; x.lineWidth=Math.max(1,rows*0.006); x.lineCap='round';
  const tx=px-rows*0.02+Math.sin(t*0.9)*rows*0.01, ty=rows*0.62;
  x.beginPath(); x.moveTo(px,py); x.quadraticCurveTo(px-rows*0.03,rows*0.8,tx,ty); x.stroke();
  for(let a=-2;a<=2;a++){ x.beginPath(); x.moveTo(tx,ty);
    x.quadraticCurveTo(tx+a*rows*0.05,ty-rows*0.03+Math.sin(t*1.6+a)*rows*0.01,tx+a*rows*0.09,ty+rows*0.02); x.stroke(); }
  // OISEAUX lointains (2 petits v qui glissent)
  x.strokeStyle='rgba(40,20,40,.7)'; x.lineWidth=1;
  for(let k=0;k<2;k++){ const bx=(cols*0.3+k*cols*0.12+t*4)%(cols*0.5)+cols*0.3, by=rows*0.26+k*rows*0.03+Math.sin(t+k)*1.5;
    x.beginPath(); x.moveTo(bx-2,by); x.lineTo(bx,by-1.4); x.lineTo(bx+2,by); x.stroke(); }
}
function render(){
  const d=x.getImageData(0,0,cols,rows).data; ctx.fillStyle='#070611'; ctx.fillRect(0,0,W,H);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){ const i=(r*cols+c)*4, R=d[i],G=d[i+1],B=d[i+2];
    const lum=(0.299*R+0.587*G+0.114*B)/255, ch=RAMP[(lum*(RAMP.length-1))|0]; if(ch===' ')continue;
    const avg=(R+G+B)/3, sat=1.32, cl=v=>Math.max(0,Math.min(255,30+(avg+(v-avg)*sat)*0.95));
    ctx.fillStyle=`rgb(${cl(R)|0},${cl(G)|0},${cl(B)|0})`; ctx.fillText(ch,c*charW,r*charH);
  }
}
let t0; const foot=document.getElementById('foot'); setTimeout(()=>foot.classList.add('on'),1400);
(function loop(ts){ if(!t0)t0=ts; let t=(ts-t0)/1000; if(!isFinite(t))t=0; scene(t); render(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
