<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sargasses — Fiche plage en PLONGÉE (scène SVG plein écran, 6 stages) · Le Veilleur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bricolage+Grotesque:wght@600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FICHE PLAGE EN PLONGÉE — proto standalone validé.
   Reprend le moteur de design/proto-home-az.html (Veilleur v2,
   scroll sticky→opacités de beats, dolly spring, toVB cover-math,
   plancher reduced-motion) et la scène BeachScene de Sargasses_PROD.jsx
   (archétypes PRNG par beach.id, états clean/moderate/avoid, waterTint).
   Palette golden-hour = source de vérité du repo.
   ============================================================ */
:root{
  --sky0:#0B2230; --sky1:#155A5A; --sky2:#C97E3A; --sky3:#F2B05E;
  --seaT:#1A5852; --seaB:#08251F; --glint:#FFD884; --sand:#1C1712;
  --ink:#EAF7F4; --gold:#E8A800; --goldL:#FFC72C; --goldS:#FFE47A;
  --teal:#009E8E; --tealL:#5FD3C9; --green:#22C55E; --amber:#B87A00; --coral:#E8522A;
  --mid:#9DB4B0; --rim:#FFD884;
  /* moteur scroll (comme home-az) */
  --gp:0; --p0:0; --p1:0; --p2:0; --p3:0; --p4:0; --p5:0;
  --e0:1; --e1:0; --e2:0; --e3:0; --e4:0; --e5:0;
  --camS:1; --camY:0; --hs:0; --alert:0;
  /* humeur du Veilleur (mutée par JS pour crossfade) */
  --mood:#1FB6A6; --moodHalo:#1FB6A6; --moodDot:#22C55E;
  /* teinte mer pilotée par le SCRUB de prévision (status réel, jamais cleanFloor) */
  --seaTint:#1A5852;
  /* micro-tween d'ouverture de la fiche (spring) */
  --camOpenS:1; --camOpenY:0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html{scroll-behavior:auto}
body{background:#02060A;color:var(--ink);
  font-family:"Bricolage Grotesque",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  overflow-x:hidden}
.anton{font-family:'Anton',"Haettenschweiler","Arial Narrow Bold","Impact",system-ui,sans-serif;font-weight:400;letter-spacing:-.02em;text-transform:uppercase}
.mono{font-family:'JetBrains Mono',monospace}

/* ===================== STRUCTURE SCROLL ===================== */
.scroller{position:relative;width:100%}
.spans{position:absolute;inset:0;z-index:0;pointer-events:none}
.span{width:100%}
#sp0{height:120vh}  /* ARRIVÉE */
#sp1{height:128vh}  /* VERDICT (preuve gratuite) */
#sp2{height:178vh}  /* PREUVE-MESURE = le plus long (3 sous-beats) */
#sp3{height:158vh}  /* PRÉVISION (timeline 7j scrub) */
#sp4{height:140vh}  /* PLAN-B + SANTÉ */
#sp5{height:118vh}  /* PREUVE SOCIALE + nearby + footer */

.viewport{position:sticky;top:0;height:100svh;width:100%;overflow:hidden;z-index:1;background:var(--sky0)}

/* caméra dolly (spring) + micro-tween d'ouverture combinés */
.cam{position:absolute;inset:0;will-change:transform;
  transform:translateY(calc(var(--camY) + var(--camOpenY))) scale(calc(var(--camS) * var(--camOpenS)));
  transform-origin:50% 64%;
  transition:transform .5s cubic-bezier(.34,1.4,.64,1)}

svg.scene{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:pan-y}

/* parallaxe (pilotée par --hs au scroll de l'arrivée) */
.lyr-sky{transform:translateY(calc(var(--hs) * -24px))}
.lyr-sea{transform:translateY(calc(var(--hs) * 8px)) scale(calc(1 + var(--hs)*0.08));transform-origin:50% 52%}
.lyr-sand{transform:translateY(calc(var(--hs) * 16px)) scale(calc(1 + var(--hs)*0.18));transform-origin:50% 100%}

/* voile de lisibilité bas d'écran + lavage alerte */
.veil{position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(180deg,
    rgba(7,18,15,0) 0%,
    rgba(7,18,15,calc(.10 + var(--gp)*.08)) 42%,
    rgba(7,18,15,calc(.44 + var(--p1)*.14 + var(--p4)*.10)) 70%,
    rgba(7,18,15,calc(.80 + var(--gp)*.10)) 100%)}
.alertwash{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:var(--alert);
  background:linear-gradient(180deg,rgba(232,82,42,.15) 0%,rgba(232,82,42,0) 34%)}

/* ===================== CHROME persistant (fraîcheur + retour + langue) ===================== */
.chrome{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;justify-content:space-between;
  align-items:center;padding:12px 14px;max-width:560px;margin:0 auto;pointer-events:none;gap:8px}
.backbtn{display:inline-flex;align-items:center;gap:6px;pointer-events:auto;cursor:pointer;
  padding:7px 12px 7px 9px;border-radius:999px;background:rgba(8,18,16,.5);border:1px solid rgba(255,255,255,.14);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);color:var(--ink);
  font:800 12px/1 "Bricolage Grotesque";letter-spacing:.01em}
.backbtn .ar{color:var(--goldS);font-weight:800}
.freshpill{display:inline-flex;align-items:center;gap:7px;pointer-events:auto;cursor:pointer;
  padding:6px 12px 6px 10px;border-radius:999px;background:rgba(8,18,16,.5);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.14)}
.freshpill .dot{width:8px;height:8px;border-radius:50%;background:var(--moodDot);
  box-shadow:0 0 0 0 rgba(95,211,201,.5);animation:freshpulse 2.6s ease-out infinite}
@keyframes freshpulse{0%{box-shadow:0 0 0 0 rgba(95,211,201,.5)}70%{box-shadow:0 0 0 8px rgba(95,211,201,0)}100%{box-shadow:0 0 0 0 rgba(95,211,201,0)}}
.freshpill .t{font:700 11px/1 'JetBrains Mono';color:var(--tealL);white-space:nowrap}
.langs{display:flex;gap:4px;pointer-events:auto}
.langs button{border:1px solid rgba(255,255,255,.14);background:rgba(8,18,16,.5);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);color:var(--ink);
  font:800 11px/1 "Bricolage Grotesque";letter-spacing:.04em;padding:7px 8px;border-radius:9px;cursor:pointer}
.langs button[aria-pressed="true"]{background:var(--goldL);color:#1A2B26;border-color:transparent}

/* ===================== OVERLAY DE COPY (6 beats, ancrée bas) ===================== */
.copylayer{position:absolute;inset:0;z-index:6;pointer-events:none}
.beatcopy{position:absolute;left:0;right:0;bottom:0;padding:0 20px 38px;
  max-width:560px;margin:0 auto;will-change:opacity,transform;
  opacity:0;transform:translateY(14px);transition:opacity .25s linear}
#bc0{opacity:var(--e0)} #bc1{opacity:var(--e1)} #bc2{opacity:var(--e2)}
#bc3{opacity:var(--e3)} #bc4{opacity:var(--e4)} #bc5{opacity:var(--e5)}
.beatcopy.on{pointer-events:auto;transform:translateY(0)}

.eyebrow{font:800 11px/1.3 "Bricolage Grotesque";letter-spacing:.18em;text-transform:uppercase;
  color:var(--tealL);margin-bottom:9px;text-shadow:0 1px 6px rgba(0,0,0,.6)}
.eyebrow .dt{color:var(--goldS)}
/* VERDICT VERBAL géant Anton (stage ARRIVÉE) */
.verdictverbal{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:-.015em;text-transform:uppercase;
  font-size:clamp(34px,9.6vw,58px);line-height:.92;color:#fff;margin:0 0 12px;
  text-shadow:0 2px 24px rgba(0,0,0,.55);max-width:13ch}
.verdictverbal .hl{color:var(--green)}
h2.head{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:-.02em;text-transform:uppercase;
  font-size:clamp(29px,7.6vw,46px);line-height:.98;color:#fff;margin:0 0 11px;
  text-shadow:0 2px 22px rgba(0,0,0,.55);max-width:14ch}
.head .b{color:var(--goldL)} .head .pl{color:var(--goldS)}
.sub{font:600 14px/1.5 "Bricolage Grotesque";color:rgba(255,255,255,.82);
  margin:0 0 16px;max-width:39ch;text-shadow:0 1px 10px rgba(0,0,0,.5)}

/* CTA doré */
.cta{display:block;width:100%;border:none;cursor:pointer;font-family:inherit;text-align:center;
  border-radius:15px;padding:15px 18px;color:#1A2B26;
  background:linear-gradient(135deg,var(--goldS),var(--goldL) 40%,var(--gold));
  box-shadow:0 12px 34px rgba(232,168,0,.32),inset 0 1px 0 rgba(255,255,255,.5);transition:transform .12s ease}
.cta:active{transform:scale(.985)}
.cta .t{font:800 16px/1.1 "Bricolage Grotesque";letter-spacing:.005em}
.cta .s{font:600 12px/1.3 "Bricolage Grotesque";opacity:.78;margin-top:3px}
.linkcta{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:none;border:none;
  cursor:pointer;font:800 13px/1 "Bricolage Grotesque";color:var(--ink);opacity:.78;padding:6px 0;text-decoration:none}
.linkcta:hover{opacity:1}
.linkcta .ar{color:var(--goldS)}
.reassure{text-align:center;margin-top:11px;font:600 11px/1.4 "Bricolage Grotesque";
  color:rgba(234,247,244,.55);letter-spacing:.015em}

/* STATUS PILL (arrivée) */
.statuspill{display:inline-flex;align-items:center;gap:9px;margin-bottom:14px;cursor:pointer;
  padding:8px 14px 8px 11px;border-radius:13px;background:rgba(8,18,16,.42);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.13)}
.statuspill .pd{width:9px;height:9px;border-radius:50%;background:var(--green)}
.statuspill .pt{font:800 12px/1 "Bricolage Grotesque";letter-spacing:.05em;text-transform:uppercase;color:var(--green)}
.statuspill .pf{font:700 11px/1 'JetBrains Mono';color:#fff;opacity:.9}

/* SCOREBLOB (verdict / preuve gratuite) */
.scorewrap{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.scoreblob{position:relative;flex:0 0 92px;width:92px;height:92px}
.scoreblob svg{width:100%;height:100%;transform:rotate(-90deg)}
.scoreblob .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.scoreblob .num b{font-family:'Anton',sans-serif;font-size:31px;line-height:1;color:#fff}
.scoreblob .num span{font:700 9px/1 'JetBrains Mono';color:var(--mid);margin-top:2px;letter-spacing:.04em}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:999px;
  font:700 11.5px/1 "Bricolage Grotesque";border:1px solid rgba(255,255,255,.12);background:rgba(8,18,16,.42);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.chip.good{color:#A8F0C8;border-color:rgba(34,197,94,.4)} .chip.good .i{color:var(--green)}
.chip.bad{color:#FFC9B6;border-color:rgba(232,82,42,.4)} .chip.bad .i{color:var(--coral)}

/* PREUVE-MESURE : 3 sous-beats sobres, switch par --p2 */
.measureblock{margin-bottom:16px}
.subdots{display:flex;gap:6px;margin-bottom:12px}
.subdots i{width:22px;height:3px;border-radius:2px;background:rgba(255,255,255,.18);transition:background .3s,width .3s}
.subdots i.on{background:var(--goldL);width:30px}
.subpanel{display:none}
.subpanel.show{display:block;animation:subin .4s cubic-bezier(.22,1,.36,1) both}
@keyframes subin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* facteurs en barres */
.factors{display:flex;flex-direction:column;gap:7px;margin:4px 0 4px}
.fct{display:flex;align-items:center;gap:9px}
.fct .fl{flex:0 0 88px;font:700 11px/1.2 "Bricolage Grotesque";color:rgba(234,247,244,.8)}
.fct .ftrack{flex:1;height:8px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
.fct .ffill{height:100%;border-radius:5px;transform-origin:left;transform:scaleX(0);transition:transform .6s cubic-bezier(.34,1.3,.64,1)}
.fct .fv{flex:0 0 30px;text-align:right;font:700 11px/1 'JetBrains Mono';color:#fff;opacity:.9}
/* anneau régime + fiabilité par régime */
.regimebox{display:flex;align-items:center;gap:14px;cursor:pointer;
  padding:12px 14px;border-radius:14px;background:rgba(8,18,16,.46);border:1px solid rgba(255,255,255,.12);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.regimering{flex:0 0 70px;width:70px;height:70px;position:relative}
.regimering svg{width:100%;height:100%;transform:rotate(-90deg)}
.regimering .rn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.regimering .rn b{font-family:'Anton',sans-serif;font-size:21px;color:#fff;line-height:1}
.regimering .rn span{font:700 8px/1 'JetBrains Mono';color:var(--tealL)}
.regimebox .rtxt b{display:block;font:800 13px/1.2 "Bricolage Grotesque";color:#fff;margin-bottom:3px}
.regimebox .rtxt span{font:600 12px/1.4 "Bricolage Grotesque";color:rgba(234,247,244,.74)}
.regimebox .rtxt .more{display:inline-block;margin-top:5px;font:800 11px/1 "Bricolage Grotesque";color:var(--goldS)}

/* PRÉVISION : timeline 7j + scrub */
.fcstrip{display:flex;gap:6px;align-items:flex-end;margin:2px 0 14px;height:96px}
.fcday{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;position:relative}
.fcday .fcbarbox{width:100%;display:flex;align-items:flex-end;justify-content:center;height:70px}
.fcday .fbar{width:64%;max-width:30px;border-radius:5px 5px 0 0;transform-origin:bottom;transform:scaleY(.05);
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .3s}
.fcday .fcl{font:700 9.5px/1 "Bricolage Grotesque";color:rgba(234,247,244,.7);letter-spacing:.02em}
.fcday.locked .fbar{opacity:.42;filter:blur(1.2px)}
.fcday.locked .fcl{opacity:.5}
.fcday.cursor::after{content:"";position:absolute;left:50%;top:-6px;transform:translateX(-50%);
  width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid var(--goldS)}
.fclockhint{display:flex;align-items:center;gap:7px;margin:-4px 0 14px;font:700 11px/1.3 "Bricolage Grotesque";color:var(--goldS)}
.fclockhint .lk{font-size:13px}

/* PLAN-B + nearby */
.planbrow{display:flex;gap:9px;overflow-x:auto;margin:0 -20px 14px;padding:2px 20px 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.planbrow::-webkit-scrollbar{display:none}
.pbcard{scroll-snap-align:start;flex:0 0 150px;border-radius:14px;padding:11px 13px;cursor:pointer;
  background:rgba(8,18,16,.5);border:1px solid rgba(255,255,255,.12);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);transition:transform .14s ease,border-color .14s}
.pbcard:active{transform:scale(.97)}
.pbthumb{height:54px;border-radius:9px;overflow:hidden;margin-bottom:8px;position:relative;background:#08251F}
.pbthumb svg{position:absolute;inset:0;width:100%;height:100%;display:block}
.pbcard .pn{font:800 13px/1.15 "Bricolage Grotesque";color:#fff;margin-bottom:4px}
.pbcard .ps{display:inline-flex;align-items:center;gap:5px;font:800 10.5px/1 "Bricolage Grotesque";letter-spacing:.03em;text-transform:uppercase}
.pbcard .ps .d{width:7px;height:7px;border-radius:50%}
.pbcard .pf{font:700 10px/1 'JetBrains Mono';color:var(--mid);margin-top:5px}
.st-clean{color:var(--green)} .st-clean .d{background:var(--green)}
.st-mod{color:#E8B23A} .st-mod .d{background:#E8B23A}
.st-avoid{color:var(--coral)} .st-avoid .d{background:var(--coral)}
.h2sbadge{display:inline-flex;align-items:center;gap:8px;margin-bottom:13px;
  padding:9px 13px;border-radius:12px;background:rgba(8,18,16,.46);border:1px solid rgba(255,255,255,.12);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.h2sbadge .lvl{font:800 11px/1 "Bricolage Grotesque";letter-spacing:.04em;text-transform:uppercase}
.h2sbadge .lvltxt{font:600 11.5px/1.3 "Bricolage Grotesque";color:rgba(234,247,244,.78)}

.safebadge{display:flex;align-items:flex-start;gap:11px;margin-bottom:14px;
  padding:11px 13px;border-radius:12px;background:rgba(8,18,16,.46);border:1px solid rgba(255,255,255,.12);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.safebadge .icon{font-size:18px;line-height:1}
.safebadge .txt{font:600 12.5px/1.3 "Bricolage Grotesque";color:rgba(234,247,244,.85)}
.safebadge .txt b{display:block;font-size:13px;color:#fff;margin-bottom:2px}

/* PREUVE SOCIALE + footer */
.social{display:flex;align-items:center;gap:11px;margin-bottom:14px;
  padding:12px 14px;border-radius:14px;background:rgba(8,18,16,.46);border:1px solid rgba(255,255,255,.12);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.social .stars{font-size:14px;color:var(--goldL);letter-spacing:1px}
.social b{font:800 13px/1.2 "Bricolage Grotesque";color:#fff;display:block;margin-bottom:2px}
.social span{font:600 11.5px/1.35 "Bricolage Grotesque";color:rgba(234,247,244,.72)}
.zonelinks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.zonelinks a{font:800 11.5px/1 "Bricolage Grotesque";color:var(--ink);opacity:.82;text-decoration:none;
  padding:7px 11px;border-radius:9px;border:1px solid rgba(255,255,255,.12);background:rgba(8,18,16,.4)}
.zonelinks a .ar{color:var(--goldS)}
.breadcrumb{font:600 11px/1.4 "Bricolage Grotesque";color:rgba(234,247,244,.5);margin-bottom:14px}
.breadcrumb a{color:rgba(234,247,244,.7);text-decoration:none}
.breadcrumb .sep{opacity:.4;margin:0 5px}
.footwrap{padding-top:4px}
.wordmark{font-family:'Anton',sans-serif;font-size:34px;line-height:.9;color:#fff;text-transform:uppercase;letter-spacing:-.02em;margin-bottom:9px}
.foot-credit{font:600 12px/1.5 "Bricolage Grotesque";color:rgba(234,247,244,.7);margin-bottom:12px}

/* indicateur scroll */
.scrollhint{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);z-index:7;
  display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;
  opacity:calc(1 - var(--gp)*9);transition:opacity .2s}
.scrollhint .lab{font:800 9.5px/1 "Bricolage Grotesque";letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.7)}
.scrollhint .chev{width:20px;height:20px;border-right:2px solid rgba(255,255,255,.8);border-bottom:2px solid rgba(255,255,255,.8);transform:rotate(45deg);animation:bob 1.8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(3px,3px)}}
.touchhint{position:absolute;left:16px;bottom:16px;z-index:7;display:flex;align-items:center;gap:7px;pointer-events:none;opacity:0;transition:opacity .5s}
.touchhint.on{opacity:.62}
.touchhint .ring{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--tealL);animation:tap 2.6s ease-out infinite}
@keyframes tap{0%{transform:scale(.6);opacity:1}60%{transform:scale(1.5);opacity:0}100%{opacity:0}}
.touchhint span{font:700 10.5px/1 "Bricolage Grotesque";letter-spacing:.04em;color:var(--tealL);text-shadow:0 1px 4px #000}

/* whisper in-scene (ancré, pas un popup flottant) */
.whisper{position:absolute;z-index:8;max-width:240px;padding:11px 13px;border-radius:13px;cursor:pointer;
  background:rgba(8,18,16,.8);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border:1px solid rgba(255,216,132,.32);color:#fff;font:700 12px/1.4 "Bricolage Grotesque";
  opacity:0;transform:translateY(8px) scale(.97);transition:opacity .35s ease,transform .35s ease;pointer-events:none}
.whisper.on{opacity:1;transform:none;pointer-events:auto}
.whisper .ar{color:var(--goldS);font-weight:800}
.whisper small{display:block;margin-top:5px;font:700 11px/1.2 "Bricolage Grotesque";color:var(--goldS)}

/* ===================== ELEMENTS SVG (doctrine calme : tableau au repos) ===================== */
.sgh-cloud1{animation:cloud1 132s ease-in-out infinite alternate}
.sgh-cloud2{animation:cloud2 168s ease-in-out infinite alternate}
@keyframes cloud1{from{transform:translateX(0)}to{transform:translateX(56px)}}
@keyframes cloud2{from{transform:translateX(0)}to{transform:translateX(-42px)}}
#sunGlow{animation:sunBreath 11s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes sunBreath{0%,100%{opacity:.86;transform:scale(1)}50%{opacity:1;transform:scale(1.045)}}
#yoleSails{animation:yoleLuff 9s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:left bottom}
@keyframes yoleLuff{0%{transform:skewX(0deg)}100%{transform:skewX(-2deg)}}
.ring{opacity:0}
.ring.go{animation:ringgo 1.1s ease-out forwards}
@keyframes ringgo{0%{opacity:.7;transform:scale(.3)}100%{opacity:0;transform:scale(1.8)}}
.nearbyhalo .nh{opacity:0;transition:opacity .5s ease}
.nearbyhalo.on .nh{opacity:1}
.nearbyhalo .nhpulse{transform-origin:center}

/* ===================== DESKTOP full-bleed ===================== */
@media(min-width:680px){
  .beatcopy{padding-bottom:52px}
  h2.head{font-size:clamp(38px,4.8vw,54px)}
  .verdictverbal{font-size:clamp(46px,5.6vw,66px)}
  .sub{font-size:15.5px}
}

/* ===================== REDUCED-MOTION = PLANCHER DUR ===================== */
@media(prefers-reduced-motion:reduce){
  .sgh-cloud1,.sgh-cloud2,.freshpill .dot,.scrollhint .chev,.touchhint .ring,#sunGlow,#yoleSails{animation:none!important}
  .ring{animation:none!important}
  .scroller{position:static}
  .spans{display:none}
  .viewport{position:relative;height:auto;min-height:auto}
  .cam{position:relative;transform:none!important;transition:none!important}
  svg.scene{position:relative;height:80vh}
  .veil,.alertwash{position:absolute}
  .copylayer{position:static;pointer-events:auto}
  .beatcopy{position:static;opacity:1!important;transform:none!important;max-width:620px;margin:0 auto;
    padding:32px 20px;border-top:1px solid rgba(255,255,255,.08);pointer-events:auto}
  .subpanel{display:block!important;animation:none!important;border-top:1px dashed rgba(255,255,255,.1);padding-top:12px;margin-top:12px}
  .subpanel:first-of-type{border-top:none;padding-top:0;margin-top:0}
  .fct .ffill{transform:scaleX(var(--rmw,1))!important;transition:none!important}
  .fcday .fbar{transform:scaleY(var(--rmh,1))!important;transition:none!important}
  .fcday.locked .fbar{filter:none}
  .scrollhint,.touchhint{display:none}
  .lyr-sky,.lyr-sea,.lyr-sand{transform:none!important}
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>
<body>

<h1 class="sr-only">Sargasses — fiche plage : faites défiler pour voir l'état mesuré au satellite, le score, la prévision 7 jours, et des plages propres à proximité.</h1>

<!-- ============================ CHROME persistant ============================ -->
<div class="chrome">
  <div class="backbtn" id="backBtn" role="button" tabindex="0">
    <span class="ar">←</span><span id="backTxt">Carte</span>
  </div>
  <div class="freshpill" id="freshPill" role="button" tabindex="0" aria-label="Fraîcheur de la donnée">
    <span class="dot"></span><span class="t" id="freshTxt"></span>
  </div>
  <div class="langs" role="group" aria-label="Langue">
    <button data-lang="fr" aria-pressed="true">FR</button>
    <button data-lang="en" aria-pressed="false">EN</button>
    <button data-lang="es" aria-pressed="false">ES</button>
  </div>
</div>

<!-- ============================ SCROLLER ============================ -->
<div class="scroller" id="scroller">

  <div class="spans" id="spans">
    <div class="span" id="sp0"></div>
    <div class="span" id="sp1"></div>
    <div class="span" id="sp2"></div>
    <div class="span" id="sp3"></div>
    <div class="span" id="sp4"></div>
    <div class="span" id="sp5"></div>
  </div>

  <!-- VIEWPORT STICKY -->
  <div class="viewport" id="viewport">
    <div class="cam" id="cam">

      <!-- ===================== SCÈNE BEACHSCENE PLEIN ÉCRAN (viewBox 800x600) ===================== -->
      <svg class="scene" id="scene" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice"
           xmlns="http://www.w3.org/2000/svg" role="img"
           aria-label="Scène de la plage golden-hour mesurée au satellite : ciel, mer, sable, relief de la plage, une yole et Le Veilleur satellite qui veille la mer.">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#0B2230"/><stop offset=".42" stop-color="#155A5A"/>
            <stop offset=".74" stop-color="#C97E3A"/><stop offset="1" stop-color="#F2B05E"/>
          </linearGradient>
          <linearGradient id="warmG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#3a2a18" stop-opacity="0"/>
            <stop offset=".6" stop-color="#C97E3A" stop-opacity=".20"/>
            <stop offset="1" stop-color="#F2B05E" stop-opacity=".42"/>
          </linearGradient>
          <!-- mer : teinte du SOMMET pilotée par --seaTint (scrub prévision = status réel) -->
          <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="var(--seaTint)"/><stop offset=".55" stop-color="#0f3b34"/>
            <stop offset="1" stop-color="#08251F"/>
          </linearGradient>
          <radialGradient id="sun" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#FFF6E0"/>
            <stop offset=".46" stop-color="#FFD884" stop-opacity=".62"/>
            <stop offset="1" stop-color="#F2B05E" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#241A12"/><stop offset="1" stop-color="#120D08"/>
          </linearGradient>
          <linearGradient id="rockG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#1d2f33"/><stop offset="1" stop-color="#12222A"/>
          </linearGradient>
          <radialGradient id="anchorGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#FFE6A8" stop-opacity=".5"/>
            <stop offset="1" stop-color="#FFE6A8" stop-opacity="0"/>
          </radialGradient>
          <!-- halo "plan-B" pour plages proches (repris de map-grounding #shore) -->
          <radialGradient id="shore" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#FFE6A8" stop-opacity=".40"/>
            <stop offset=".55" stop-color="#5FD3C9" stop-opacity=".10"/>
            <stop offset="1" stop-color="#5FD3C9" stop-opacity="0"/>
          </radialGradient>
          <!-- voile yole -->
          <linearGradient id="sailR" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF6A3D"/><stop offset="1" stop-color="#D8431F"/></linearGradient>
          <linearGradient id="sailY" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD45A"/><stop offset="1" stop-color="#F0A81E"/></linearGradient>
          <linearGradient id="hullG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#13776B"/><stop offset="1" stop-color="#0A463F"/></linearGradient>
          <!-- œil Veilleur -->
          <radialGradient id="lens" cx="38%" cy="32%" r="72%"><stop offset="0" stop-color="#CFF4FF"/><stop offset=".34" stop-color="#16b9c9"/><stop offset="1" stop-color="#052b2b"/></radialGradient>
          <radialGradient id="irisG" cx="42%" cy="38%" r="62%"><stop offset="0" stop-color="#0a3a39"/><stop offset="1" stop-color="#03100f"/></radialGradient>
          <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1b4763"/><stop offset="1" stop-color="#0B2230"/></linearGradient>
          <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1d3c38"/><stop offset=".55" stop-color="#102622"/><stop offset="1" stop-color="#0A1714"/></linearGradient>
          <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="var(--moodHalo)" stop-opacity=".55"/>
            <stop offset=".5" stop-color="var(--moodHalo)" stop-opacity=".18"/>
            <stop offset="1" stop-color="var(--moodHalo)" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="beamGrad" cx="50%" cy="0%" r="100%">
            <stop offset="0" stop-color="var(--glint)" stop-opacity=".5"/>
            <stop offset=".7" stop-color="var(--glint)" stop-opacity=".12"/>
            <stop offset="1" stop-color="var(--glint)" stop-opacity="0"/>
          </radialGradient>
          <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
          <filter id="softS" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3"/></filter>
        </defs>

        <!-- ===== CIEL ===== -->
        <g class="lyr-sky">
          <rect x="-40" y="-40" width="880" height="420" fill="url(#sky)"/>
          <rect x="-40" y="-40" width="880" height="420" fill="url(#warmG)"/>
          <!-- soleil : glisse J0→J6 au scrub (translateX via #sunGroup) + monte au scroll -->
          <g id="sunGroup">
            <circle id="sunGlow" cx="540" cy="300" r="150" fill="url(#sun)"/>
            <circle cx="540" cy="300" r="40" fill="#FFF7E2"/>
          </g>
          <g class="sgh-cloud1" opacity=".46">
            <ellipse cx="180" cy="118" rx="120" ry="13" fill="#10333E"/>
            <ellipse cx="250" cy="128" rx="64" ry="8" fill="#10333E" opacity=".7"/>
          </g>
          <g class="sgh-cloud2" opacity=".34">
            <ellipse cx="610" cy="92" rx="86" ry="9" fill="#0d2c36"/>
            <ellipse cx="556" cy="100" rx="44" ry="7" fill="#0d2c36" opacity=".7"/>
          </g>
          <path d="M700 132 q7 -6 14 0 q7 -6 14 0" fill="none" stroke="#0B2230" stroke-width="2.4" stroke-linecap="round" opacity=".5"/>
          <path d="M120 150 q5 -4 10 0 q5 -4 10 0" fill="none" stroke="#0B2230" stroke-width="2" stroke-linecap="round" opacity=".4"/>
        </g>

        <!-- ===== MER ===== -->
        <g class="lyr-sea">
          <rect x="-40" y="300" width="880" height="260" fill="url(#sea)"/>
          <!-- grain raster satellite (révélé au sous-beat "satellite scanne") -->
          <g id="rasterGrain" opacity="0">
            <line x1="0" y1="320" x2="800" y2="320" stroke="#5FD3C9" stroke-width="1"/>
            <line x1="0" y1="344" x2="800" y2="344" stroke="#5FD3C9" stroke-width="1"/>
            <line x1="0" y1="368" x2="800" y2="368" stroke="#5FD3C9" stroke-width="1"/>
            <line x1="0" y1="392" x2="800" y2="392" stroke="#5FD3C9" stroke-width="1"/>
            <line x1="0" y1="416" x2="800" y2="416" stroke="#5FD3C9" stroke-width="1"/>
            <line x1="0" y1="440" x2="800" y2="440" stroke="#5FD3C9" stroke-width="1"/>
            <line x1="0" y1="464" x2="800" y2="464" stroke="#5FD3C9" stroke-width="1"/>
          </g>
          <!-- allée scintillante du soleil -->
          <g id="sunPath" opacity=".92">
            <ellipse cx="540" cy="330" rx="80" ry="6" fill="#FFD884" opacity=".42"/>
            <ellipse cx="538" cy="350" rx="62" ry="5" fill="#FFD884" opacity=".34"/>
            <ellipse cx="535" cy="372" rx="48" ry="5" fill="#FFD884" opacity=".26"/>
            <ellipse cx="532" cy="396" rx="34" ry="4.5" fill="#FFD884" opacity=".19"/>
          </g>
          <!-- houle douce -->
          <g stroke="#0c302b" stroke-width="2" stroke-linecap="round" opacity=".5">
            <line x1="70" y1="392" x2="160" y2="392"/>
            <line x1="232" y1="430" x2="320" y2="430"/>
            <line x1="430" y1="468" x2="540" y2="468"/>
            <line x1="110" y1="500" x2="220" y2="500"/>
          </g>

          <!-- RELIEF de plage (archétype PRNG injecté par JS dans #reliefG, repris de BeachScene) -->
          <g id="reliefG"></g>

          <!-- ÉTAT MER (clean/moderate/avoid) injecté par JS dans #seaStateG (baigneurs / filet / nappes) -->
          <g id="seaStateG"></g>

          <!-- YOLE RONDE Martinique (asset #yole de proto-home-az) -->
          <g id="yole" transform="translate(642,352) scale(.62)" style="cursor:pointer">
            <ellipse cx="0" cy="30" rx="60" ry="8" fill="#06201c" opacity=".55"/>
            <ellipse cx="2" cy="40" rx="30" ry="4" fill="#FFD884" opacity=".18"/>
            <g id="yoleSails">
              <line x1="-2" y1="6" x2="-2" y2="-86" stroke="#241608" stroke-width="3.4" stroke-linecap="round"/>
              <path d="M-2 -84 L-2 -6 L56 -6 Z" fill="url(#sailR)"/>
              <path d="M-2 -58 L-2 -6 L38 -6 Z" fill="url(#sailY)"/>
              <path d="M-2 -84 L-2 -6 L56 -6 Z" fill="none" stroke="#7a2a16" stroke-width="1.3" stroke-opacity=".55"/>
              <path d="M-2 -78 Q12 -42 30 -8" fill="none" stroke="#9c2f17" stroke-width="1" stroke-opacity=".4"/>
              <path d="M-4 -70 L-4 -8 L-44 -8 Z" fill="#1EC8B0" opacity=".94"/>
              <path d="M-4 -70 L-4 -8 L-44 -8 Z" fill="none" stroke="#0b5147" stroke-width="1.1" stroke-opacity=".5"/>
            </g>
            <path d="M-62 4 Q0 30 62 4 Q56 16 46 18 L-46 18 Q-56 16 -62 4 Z" fill="url(#hullG)"/>
            <path d="M-62 4 Q0 22 62 4" fill="none" stroke="#FFD884" stroke-width="2" stroke-opacity=".62"/>
            <path d="M-46 18 L46 18 Q40 24 0 24 Q-40 24 -46 18 Z" fill="#08332e"/>
            <circle cx="14" cy="-2" r="4.2" fill="#1a120b"/>
            <rect x="11" y="2" width="7" height="13" rx="3" fill="#1a120b"/>
          </g>

          <!-- ===== PLAN-B : 3 plages propres proches en halo (stage 4) ===== -->
          <g id="nearbyHalos"></g>
        </g>

        <!-- ===== SABLE ===== -->
        <g class="lyr-sand">
          <path d="M-40 482 Q300 450 840 500 L840 600 L-40 600 Z" fill="url(#land)"/>
          <path d="M-40 482 Q300 450 840 500" fill="none" stroke="#FFD884" stroke-width="1.6" opacity=".24"/>
          <!-- amas échoués sur le sable (state avoid/moderate) injecté par JS dans #shoreStateG -->
          <g id="shoreStateG"></g>
          <!-- badge H2S gradué ancré sur l'amas (stage 4) -->
          <g id="h2sAnchor" opacity="0">
            <g id="h2sMark" transform="translate(360,512)">
              <circle cx="0" cy="0" r="15" fill="#08120E" fill-opacity=".88" stroke="#E8522A" stroke-width="1.6"/>
              <text x="0" y="4.5" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" fill="#E8522A">H₂S</text>
            </g>
          </g>
        </g>

        <!-- ===== LE VEILLEUR (satellite-mascotte v2) ===== -->
        <circle id="halo" cx="400" cy="200" r="120" fill="url(#haloG)" filter="url(#soft)" opacity=".5"/>
        <g id="beamG"><polygon id="beam" points="0,0 -70,210 70,210" fill="url(#beamGrad)" opacity="0"/></g>
        <ellipse id="scanRing" cx="400" cy="362" rx="40" ry="8" fill="none" stroke="var(--glint)" stroke-width="2" opacity="0"/>

        <g id="gPose" transform="translate(400 200)" style="cursor:pointer">
         <g id="gLife">
          <g id="gBody" transform="scale(1.30)">
            <g>
              <rect x="-86" y="-8" width="56" height="30" rx="3" fill="url(#panel)" transform="rotate(-7 -58 7)"/>
              <rect x="30" y="-8" width="56" height="30" rx="3" fill="url(#panel)" transform="rotate(7 58 7)"/>
              <g stroke="#2f7390" stroke-width="1" opacity=".65">
                <line x1="-72" y1="-6" x2="-72" y2="24"/><line x1="-55" y1="-6" x2="-55" y2="24"/><line x1="-40" y1="-6" x2="-40" y2="24"/>
                <line x1="44" y1="-6" x2="44" y2="24"/><line x1="61" y1="-6" x2="61" y2="24"/><line x1="76" y1="-6" x2="76" y2="24"/>
              </g>
            </g>
            <rect x="-32" y="2" width="64" height="6" rx="3" fill="#0e2622"/>
            <path d="M0 -30 C20 -30 32 -20 32 0 C32 24 22 42 0 42 C-22 42 -32 24 -32 0 C-32 -20 -20 -30 0 -30 Z"
                  fill="url(#bodyG)" stroke="var(--rim)" stroke-width="1.3" stroke-opacity=".5"/>
            <path d="M26 -16 C33 -10 33 22 22 32" fill="none" stroke="var(--rim)" stroke-width="2.4" stroke-opacity=".55" stroke-linecap="round"/>
            <circle cx="0" cy="4" r="22" fill="url(#lens)"/>
            <circle id="lensTint" cx="0" cy="4" r="22" fill="var(--mood)" opacity=".42"/>
            <circle cx="0" cy="4" r="22" fill="none" stroke="var(--gold)" stroke-width="3"/>
            <circle cx="0" cy="4" r="22" fill="none" stroke="#06201f" stroke-width="1" stroke-opacity=".8"/>
            <circle cx="0" cy="4" r="16.5" fill="none" stroke="var(--gold)" stroke-width="1.1" stroke-opacity=".5"/>
            <g id="gIris">
              <circle id="iris" cx="0" cy="0" r="8" fill="url(#irisG)"/>
              <circle id="irisTint" cx="0" cy="0" r="8" fill="var(--mood)" opacity=".55"/>
              <circle id="pupil" cx="0" cy="0" r="3.4" fill="#02100f"/>
              <circle id="catchA" cx="-3" cy="-3.4" r="2.8" fill="#fff7e2"/>
              <circle id="catchB" cx="3.4" cy="2.6" r="1.3" fill="#dff6ff" opacity=".85"/>
            </g>
            <path id="lidTop" d="M-22 4 Q0 -20 22 4 L22 -20 L-22 -20 Z" fill="url(#bodyG)"/>
            <path id="lidBot" d="M-22 4 Q0 28 22 4 L22 28 L-22 28 Z" fill="url(#bodyG)"/>
            <circle cx="0" cy="4" r="22.2" fill="none" stroke="url(#bodyG)" stroke-width="6" opacity="1"/>
            <circle cx="0" cy="4" r="22" fill="none" stroke="var(--gold)" stroke-width="3"/>
            <path id="brow" d="M-15 -19 Q0 -25 15 -19" fill="none" stroke="#0a1f1c" stroke-width="3.4" stroke-linecap="round" opacity=".9"/>
            <line x1="0" y1="-30" x2="0" y2="-46" stroke="#0e2622" stroke-width="3"/>
            <circle id="antGlow" cx="0" cy="-49" r="10" fill="var(--moodDot)" opacity=".22" filter="url(#softS)"/>
            <circle id="ant" cx="0" cy="-49" r="4.6" fill="var(--moodDot)"/>
            <circle class="ring ringV" cx="0" cy="4" r="30" fill="none" stroke="var(--moodHalo)" stroke-width="2" style="transform-origin:0px 4px"/>
          </g>
         </g>
        </g>
      </svg>

    </div><!-- /.cam -->

    <div class="veil"></div>
    <div class="alertwash"></div>

    <!-- ===================== OVERLAY DE COPY (6 stages) ===================== -->
    <div class="copylayer" id="copylayer">

      <!-- STAGE 0 — ARRIVÉE : verdict verbal géant + status pill -->
      <div class="beatcopy" id="bc0">
        <div class="statuspill" id="statusPill" role="button" tabindex="0">
          <span class="pd"></span><span class="pt" id="spStatus"></span><span class="pf" id="spFresh"></span>
        </div>
        <div class="eyebrow" id="eb0"></div>
        <div class="verdictverbal anton" id="verdictVerbal"></div>
        <p class="sub" id="s0"></p>
        <button class="cta" id="ctaArrive" data-src="arrive">
          <span class="t" id="ctaArriveT"></span>
          <span class="s" id="ctaArriveS"></span>
        </button>
      </div>

      <!-- STAGE 1 — VERDICT / preuve gratuite : ScoreBlob + chips -->
      <div class="beatcopy" id="bc1">
        <div class="eyebrow" id="eb1"></div>
        <div class="scorewrap">
          <div class="scoreblob" id="scoreBlob" role="button" tabindex="0">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="9"/>
              <circle id="scoreArc" cx="50" cy="50" r="42" fill="none" stroke="var(--green)" stroke-width="9"
                      stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="264"/>
            </svg>
            <div class="num"><b id="scoreNum">0</b><span id="scoreLab"></span></div>
          </div>
          <div>
            <h2 class="head anton" id="h1" style="margin-bottom:6px"></h2>
            <p class="sub" id="s1" style="margin-bottom:0"></p>
          </div>
        </div>
        <div class="chiprow" id="chipRow"></div>
        <button class="cta" id="ctaVerdict" data-src="verdict"><span class="t" id="ctaVerdictT"></span></button>
      </div>

      <!-- STAGE 2 — PREUVE-MESURE : 3 sous-beats -->
      <div class="beatcopy" id="bc2">
        <div class="eyebrow" id="eb2"></div>
        <div class="subdots" id="subDots"><i class="on"></i><i></i><i></i></div>
        <div class="measureblock">
          <!-- sous-beat A : satellite scanne -> AFAI -->
          <div class="subpanel show" id="sub0">
            <h2 class="head anton" id="m2aH"></h2>
            <p class="sub" id="m2aS"></p>
          </div>
          <!-- sous-beat B : score = 7 facteurs en barres -->
          <div class="subpanel" id="sub1">
            <h2 class="head anton" id="m2bH"></h2>
            <div class="factors" id="factors"></div>
          </div>
          <!-- sous-beat C : anneau régime + fiabilité PAR RÉGIME -->
          <div class="subpanel" id="sub2">
            <h2 class="head anton" id="m2cH"></h2>
            <div class="regimebox" id="regimeBox" role="button" tabindex="0">
              <div class="regimering">
                <svg viewBox="0 0 100 100">
                  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="8"/>
                  <circle id="regimeArc" cx="50" cy="50" r="40" fill="none" stroke="var(--tealL)" stroke-width="8"
                          stroke-linecap="round" stroke-dasharray="251" stroke-dashoffset="251"/>
                </svg>
                <div class="rn"><b id="regimePct">79%</b><span id="regimePctL"></span></div>
              </div>
              <div class="rtxt">
                <b id="regimeT"></b><span id="regimeS"></span>
                <span class="more" id="regimeMore"></span>
              </div>
            </div>
          </div>
        </div>
        <button class="cta" id="ctaMethode" data-src="methode"><span class="t" id="ctaMethodeT"></span></button>
      </div>

      <!-- STAGE 3 — PRÉVISION : timeline 7 jours barres SVG + scrub -->
      <div class="beatcopy" id="bc3">
        <div class="eyebrow" id="eb3"></div>
        <h2 class="head anton" id="h3"></h2>
        <p class="sub" id="s3"></p>
        <div class="fcstrip" id="fcStrip"></div>
        <div class="fclockhint" id="fcLockHint"><span class="lk">🔒</span><span id="fcLockTxt"></span></div>
        <button class="cta" id="ctaForecast" data-src="forecast"><span class="t" id="ctaForecastT"></span></button>
      </div>

      <!-- STAGE 4 — PLAN-B + SANTÉ -->
      <div class="beatcopy" id="bc4">
        <div class="eyebrow" id="eb4"></div>
        <h2 class="head anton" id="h4"></h2>
        <p class="sub" id="s4"></p>
        <div class="h2sbadge" id="h2sBadge"><span class="lvl" id="h2sLvl"></span><span class="lvltxt" id="h2sTxt"></span></div>

  /* SCRUB de prévision : index de jour visé par le scroll du stage 3 (0..6),

  var fcCursor=0, fcCrossedFired=false;
  var SEA_TINT = {clean:"#1A5852", moderate:"#19453d", avoid:"#2c3b1a"};
  function applyForecastScrub(p){ /* p = progression du stage 3 (0..1) */
    // on autorise le scrub J0..J1 librement ; au-delà = locked (premium)
    var cont = p*2; // 0..2 sur la 1re moitié -> J0..J1
    var idx = clamp(Math.round(cont),0,6);
    // visuellement on laisse le scrub aller jusqu'à J6 mais on marque la barrière à J1
    var visIdx = clamp(Math.floor(p*6+0.001),0,6);
    if(visIdx!==fcCursor){
      fcCursor=visIdx;
      var days=document.querySelectorAll("#fcStrip .fcday");
      for(var i=0;i<days.length;i++) days[i].classList.toggle("cursor", i===visIdx);
      var f=DATA.forecast[visIdx];
      // re-teinte la mer UNIQUEMENT sur status/regime réels (jamais cleanFloor atlantique)
      rootStyle.setProperty("--seaTint", SEA_TINT[stKey(f.status)]);
      // humeur du Veilleur suit le jour scruté
      if(performance.now()-lastTap>2500) setMoodFromScore(stKey(f.status)==="avoid"?20:stKey(f.status)==="moderate"?55:85);
      // glisse le soleil J0(droite haut)->J6(gauche bas) : "le temps qui passe"
      var sunX = 540 - visIdx*64; // viewBox units
      $("sunGroup").setAttribute("transform","translate("+(sunX-540).toFixed(1)+","+(-prog0*26).toFixed(1)+")");
    }
    // franchir au-delà de J1 dans le scrub = porte premium (1 seule fois)
    if(p>0.30 && !fcCrossedFired){ fcCrossedFired=true; openPremium("forecast_scrub"); }
  }

  var prog0=0;
  function sizeScroller(){
    var total=0; for(var i=0;i<spans.length;i++){ total+=spans[i].offsetHeight; }

  function computeScroll(){
    var scrollY=window.pageYOffset||document.documentElement.scrollTop;
    var scroller=$("scroller");
    var base=scroller.getBoundingClientRect().top+scrollY;
    var prog=[0,0,0,0,0,0], acc=base;
    for(var i=0;i<spans.length;i++){ var h=spans[i].offsetHeight; prog[i]=clamp((scrollY-acc)/h,0,1); acc+=h; }
    for(var j=0;j<6;j++){ root.style.setProperty("--p"+j, smooth(prog[j]).toFixed(4)); }
    prog0=prog[0];

    var active=0;
    for(var k=0;k<6;k++){ if(prog[k]>0.001 && prog[k]<0.999){ active=k; } }
    for(var m=0;m<5;m++){ if(prog[m]>=0.999 && prog[m+1]<=0.001){ active=m+1; } }
    if(prog[5]>=0.999) active=5;

    var pa=prog[active];
    var hoStart=0.86;
    var handoff=(active<5 && pa>hoStart)? smooth((pa-hoStart)/(1-hoStart)) : 0;
    for(var n=0;n<6;n++){
      var e=0; if(n===active){ e=1-handoff; } else if(n===active+1){ e=handoff; }
      root.style.setProperty("--e"+n, e.toFixed(3));
      copies[n].classList.toggle("on", e>0.15);
    }

    var gp=(active+prog[active])/5;
    root.style.setProperty("--gp", clamp(gp,0,1).toFixed(4));
    root.style.setProperty("--hs", prog[0].toFixed(4));

    /* DOLLY */
    var a=DOLLY[active], b=DOLLY[Math.min(active+1,5)], t=smooth(prog[active]);
    var cs=a.s+(b.s-a.s)*t, cy2=a.y+(b.y-a.y)*t;
    cam.style.transformOrigin="50% "+(t<0.5?a.oy:b.oy);
    cam.style.transform="translateY(calc("+cy2.toFixed(3)+"% + var(--camOpenY))) scale(calc("+cs.toFixed(4)+" * var(--camOpenS)))";

    /* soleil monte au scroll de l'arrivée (sauf si scrub stage 3 le pilote) */
    if(active!==3) $("sunGroup").setAttribute("transform","translate(0,"+(-prog[0]*26).toFixed(1)+")");

    /* stage 2 : raster satellite + barres facteurs + arc régime, par sous-beat */
    handleMeasure(active, prog[2]);

    /* stage 1 : ScoreBlob anim */
    if(active===1 && prog[1]>0.12 && !revealed.score){ revealed.score=true; animScore(); }

    /* stage 3 : barres prévision montent + SCRUB */
    if(active===3){
      if(!revealed.fc){ revealed.fc=true; raiseForecastBars(); }
      applyForecastScrub(prog[3]);
    }

    /* stage 4 : halos nearby + badge H2S ancré */
    var nh=$("nearbyHalos");
    if(active>=4 && prog[4]>0.12){ nh.classList.add("on"); $("h2sAnchor").style.opacity=(STATUS==="clean"?0.55:1).toFixed(2); }
    else { nh.classList.remove("on"); $("h2sAnchor").style.opacity="0"; }
    if(active===4 && prog[4]>0.3 && !revealed.nhpulse){ revealed.nhpulse=true; pulseNearby(); }

    /* alerte wash si la plage/forecast scruté est avoid */
    root.style.setProperty("--alert", (STATUS==="avoid" && active===0)? clamp((prog[0]-0.1),0,0.6).toFixed(3) : "0");

    $("touchHint").classList.toggle("on", active===0 && prog[0]>0.25 && prog[0]<0.85 && !pointerActive);

    /* analytics par stage (1×) */
    [["verdict",1],["measure",2],["forecast",3],["planb",4],["social",5]].forEach(function(s){
      if(active===s[1] && prog[s[1]]>0.2 && !fired[s[0]]){ fired[s[0]]=true; track("sg_page_view",{s:s[0],beach:DATA.beach.id}); }
    });

    /* HUMEUR du Veilleur pilotée par le stage (sauf tap récent) */
    var want=stageMood(active);
    if(active!==3 && want!==curMoodName && (performance.now()-lastTap>2500)){ setMoodTarget(want); }
  }

    if(sub===0 && !revealed.scan){ revealed.scan=true; setMoodTarget("scan"); }
    // sous-beat B : barres facteurs

  }

  /* ====================================================================
     PREMIER PAINT + micro-tween d'ouverture de la fiche (spring --camOpen)
     ==================================================================== */
  setMoodFromScore(SCORE); M=clone(MOODS[curMoodName]);
  rootStyle.setProperty('--mood',M.mood); rootStyle.setProperty('--moodHalo',M.halo); rootStyle.setProperty('--moodDot',M.dot);
  iris.setAttribute('r',M.irisR); irisTint.setAttribute('r',M.irisR); pupil.setAttribute('r',(M.irisR*0.42).toFixed(2));
  setLids(0);
  rootStyle.setProperty("--seaTint", SEA_TINT[STATUS]);
  gPose.setAttribute('transform','translate('+EYE.x+' '+EYE_BASE+') rotate(0)');
  sizeScroller(); computeScroll(); needScroll=false; lastInput=nowt();

  /* micro-tween d'ouverture : la fiche "plonge" (scale 1.06->1, slide léger) en 1s */
  (function openTween(){
    rootStyle.setProperty("--camOpenS","1.06");
    rootStyle.setProperty("--camOpenY","-1.4%");
    cam.style.transition="none";
    requestAnimationFrame(function(){
      cam.style.transition="transform 1.0s cubic-bezier(.34,1.4,.64,1)";
      rootStyle.setProperty("--camOpenS","1");
      rootStyle.setProperty("--camOpenY","0");
      setTimeout(function(){ cam.style.transition="transform .5s cubic-bezier(.34,1.4,.64,1)"; }, 1050);
    });
  })();

  track("sg_page_shown", {beach:DATA.beach.id, name:DATA.beach.name, score:SCORE, status:STATUS});
  wake();

})();
</script>
</body>
