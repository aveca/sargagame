<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Le Veilleur — coupe verticale de l'écosystème (auto, pièce de vision)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bricolage+Grotesque:wght@600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   « CE QUE LE VEILLEUR VEILLE » — coupe verticale de l'orbite
   au fond marin. 10 bandes, UNE seule vue (pas de scroll requis),
   chaque bande auto-anime son acteur (mouvement continu type
   "physique" : orbite, vol, tangage, roulage, nage, dérive).
   Artefact de bibliothèque design (design/), HORS FUNNEL,
   PAS importé par l'app, PAS déployé. reduced-motion = plancher dur.
   ============================================================ */
:root{
  --gold:#E8A800; --goldL:#FFC72C; --goldS:#FFE47A;
  --ink:#0D0D0D; --paper:#FDFCF7;
  --green:#22C55E; --amber:#B87A00; --coral:#E8522A; --teal:#009E8E; --tealL:#1EC8B0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body{height:100%;background:#02040a;overflow:hidden}
body{font-family:"Bricolage Grotesque",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:#EAF7F4}
.anton{font-family:'Anton',"Haettenschweiler","Arial Narrow Bold","Impact",system-ui,sans-serif;
  font-weight:400;letter-spacing:-.01em;text-transform:uppercase}
.mono{font-family:'JetBrains Mono',monospace}

#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:56px 10px 46px}
#poster{width:min(94vw, 420px);height:100%;max-height:980px;position:relative}
#poster svg{width:100%;height:100%;display:block}

/* chrome */
.chrome{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;
  align-items:flex-start;padding:12px 14px;pointer-events:none}
.wm{font-family:'Anton',sans-serif;font-size:15px;color:#fff;letter-spacing:-.01em;text-shadow:0 1px 8px rgba(0,0,0,.6)}
.wm b{display:block;margin-top:2px;font:700 8.5px/1 "Bricolage Grotesque";letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,216,132,.8)}
.tag{font:700 9px/1 'JetBrains Mono';letter-spacing:.06em;color:rgba(234,247,244,.5);text-align:right}

@media (prefers-reduced-motion:reduce){
  [class^="anim-"]{animation:none!important}
}
/* ---- mouvements "physiques" par acteur (boucles indépendantes) ---- */
@keyframes orbit{
  0%{transform:translate(0,0)} 25%{transform:translate(10px,-4px)}
  50%{transform:translate(0,-7px)} 75%{transform:translate(-10px,-4px)} 100%{transform:translate(0,0)}
}
@keyframes flyacross{ from{transform:translateX(-40px)} to{transform:translateX(340px)} }
@keyframes bob{ 0%,100%{transform:translate(0,0) rotate(0deg)} 50%{transform:translate(0,-5px) rotate(-1.4deg)} }
@keyframes roll{ from{transform:translateX(-30px)} to{transform:translateX(330px)} }
@keyframes walk{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(0,-2.2px)} }
@keyframes swim{ 0%,100%{transform:translate(0,0) scaleX(1)} 48%{transform:translate(140px,-4px) scaleX(1)}
  50%{transform:translate(140px,-4px) scaleX(-1)} 98%{transform:translate(0,-4px) scaleX(-1)} 100%{transform:translate(0,0) scaleX(1)} }
@keyframes sway{ 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
@keyframes glint{ 0%,100%{opacity:.35} 50%{opacity:.85} }
@keyframes twinkle{ 0%,100%{opacity:.25} 50%{opacity:1} }

.anim-orbit{animation:orbit 9s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.anim-fly{animation:flyacross 14s linear infinite;transform-box:fill-box}
.anim-bob{animation:bob 5.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.anim-roll-fast{animation:roll 5s linear infinite;transform-box:fill-box}
.anim-roll-mid{animation:roll 7.5s linear infinite;transform-box:fill-box}
.anim-roll-slow{animation:roll 10.5s linear infinite;transform-box:fill-box}
.anim-walk{animation:roll 13s linear infinite, walk .5s ease-in-out infinite;transform-box:fill-box}
.anim-swim{animation:swim 12s ease-in-out infinite;transform-box:fill-box}
.anim-sway{animation:sway 6.4s ease-in-out infinite;transform-box:fill-box;transform-origin:bottom center}
.anim-sway2{animation:sway 7.8s ease-in-out infinite .6s;transform-box:fill-box;transform-origin:bottom center}
.anim-glint{animation:glint 4.2s ease-in-out infinite}
.anim-twinkle{animation:twinkle 3.1s ease-in-out infinite}

/* labels */
.blabel{font:800 14px/1 "Bricolage Grotesque";letter-spacing:.04em;text-transform:uppercase}
.bsub{font:600 10px/1 "Bricolage Grotesque";letter-spacing:.02em;opacity:.7}

.foot{position:fixed;left:0;right:0;bottom:0;z-index:5;text-align:center;padding:8px 14px 10px;
  font:600 9.5px/1.4 "Bricolage Grotesque";color:rgba(234,247,244,.4)}
</style>
</head>
<body>

<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">
Le Veilleur — coupe verticale de tout ce que le satellite veille, de l'orbite au fond marin.
</h1>

<div class="chrome">
  <div class="wm">LE VEILLEUR<b>Bibliothèque design · coupe verticale</b></div>
  <div class="tag">10 COUCHES · AUTO</div>
</div>

<div id="stage">
  <div id="poster">
    <svg viewBox="0 0 400 900" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"
         aria-label="Coupe verticale : satellite, avion, bateau, voiture, moto, vélo, piéton, animaux, végétaux et algues, minéraux et roches — de l'orbite au fond marin.">
      <defs>
        <!-- fond continu orbite -> abysse, 10 bandes de 120px -->
        <linearGradient id="col" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0"    stop-color="#050912"/>   <!-- 1 satellite: espace -->
          <stop offset=".10"  stop-color="#12203a"/>
          <stop offset=".18"  stop-color="#3a3a63"/>   <!-- 2 avion: aube -->
          <stop offset=".24"  stop-color="#7a4f6e"/>
          <stop offset=".30"  stop-color="#c97e3a"/>   <!-- 3 bateau: mer dorée -->
          <stop offset=".36"  stop-color="#a86a3e"/>
          <stop offset=".44"  stop-color="#8a5a3a"/>   <!-- 4-7 route côtière -->
          <stop offset=".62"  stop-color="#6b4a30"/>
          <stop offset=".70"  stop-color="#1f5a52"/>   <!-- 8 animaux: eau peu profonde -->
          <stop offset=".80"  stop-color="#123f3a"/>   <!-- 9 algues -->
          <stop offset=".90"  stop-color="#081f22"/>   <!-- 10 minéraux/roches -->
          <stop offset="1"    stop-color="#01060a"/>
        </linearGradient>
        <radialGradient id="sunR" cx="72%" cy="16%" r="30%">
          <stop offset="0" stop-color="#FFE9B8" stop-opacity=".85"/><stop offset="1" stop-color="#FFE9B8" stop-opacity="0"/>
        </radialGradient>
        <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
      </defs>

      <rect x="0" y="0" width="400" height="900" fill="url(#col)"/>
      <circle cx="300" cy="58" r="100" fill="url(#sunR)" opacity=".8"/>

      <!-- guides de bande très discrets -->
      <g stroke="rgba(255,255,255,.06)" stroke-width="1">
        <line x1="0" y1="90" x2="400" y2="90"/><line x1="0" y1="180" x2="400" y2="180"/>
        <line x1="0" y1="270" x2="400" y2="270"/><line x1="0" y1="360" x2="400" y2="360"/>
        <line x1="0" y1="450" x2="400" y2="450"/><line x1="0" y1="540" x2="400" y2="540"/>
        <line x1="0" y1="630" x2="400" y2="630"/><line x1="0" y1="720" x2="400" y2="720"/>
        <line x1="0" y1="810" x2="400" y2="810"/>
      </g>

      <!-- =============== 1. SATELLITE — orbite (espace, y 0-90) =============== -->
      <g>
        <g class="anim-twinkle" fill="#fff"><circle cx="40" cy="22" r="1.3"/><circle cx="110" cy="41" r="1"/><circle cx="330" cy="18" r="1.4"/><circle cx="220" cy="52" r="1"/><circle cx="60" cy="67" r="1.1"/></g>
        <g class="anim-orbit" transform="translate(210,54)">
          <line x1="0" y1="-16" x2="0" y2="-24" stroke="#0e2622" stroke-width="2"/>
          <circle cx="0" cy="-27" r="3.2" fill="var(--green)"/>
          <rect x="-30" y="-3" width="16" height="10" rx="1.5" fill="#1b2a4a" stroke="#3a5aa0" stroke-width="1" transform="rotate(-8 -22 2)"/>
          <rect x="14" y="-3" width="16" height="10" rx="1.5" fill="#1b2a4a" stroke="#3a5aa0" stroke-width="1" transform="rotate(8 22 2)"/>
          <path d="M0 -16 C10 -16 16 -10 16 0 C16 12 10 21 0 21 C-10 21 -16 12 -16 0 C-16 -10 -10 -16 0 -16 Z" fill="#0f1a2e" stroke="var(--goldL)" stroke-width="1.4"/>
          <circle cx="0" cy="2" r="8" fill="var(--goldL)"/>
          <circle cx="2" cy="-1" r="2" fill="#fff" opacity=".9"/>
        </g>
      </g>
      <text x="18" y="72" class="blabel" fill="#EAF7F4">Satellite</text>
      <text x="18" y="83" class="bsub" fill="#EAF7F4">orbite · mesure</text>

      <!-- =============== 2. AVION — ciel (y 90-180) =============== -->
      <g class="anim-fly">
        <path d="M0 0 l22 5 l-3 -9 l7 2 l5 8 l12 2 l-12 3 l-5 8 l-7 2 l3 -9 z" fill="#12262B" opacity=".85" transform="translate(30,135)"/>
      </g>
      <text x="18" y="162" class="blabel" fill="#fff">Avion</text>
      <text x="18" y="173" class="bsub" fill="#fff">ciel · ambiance</text>

      <!-- =============== 3. BATEAU — surface mer (y 180-270) =============== -->
      <g class="anim-bob" transform="translate(230,240)">
        <path d="M-20 0 l40 0 l-6 14 l-28 0 z" fill="#0E1F25"/>
        <line x1="0" y1="-26" x2="0" y2="0" stroke="#0E1F25" stroke-width="2"/>
        <path d="M0 -24 l20 22 l-20 0 z" fill="var(--goldS)" opacity=".85"/>
      </g>
      <ellipse cx="230" cy="252" rx="60" ry="5" fill="var(--goldS)" opacity=".22"/>
      <text x="18" y="252" class="blabel" fill="#fff">Bateau</text>
      <text x="18" y="263" class="bsub" fill="#fff">surface · yole</text>

      <!-- =============== 4. VOITURE — route côtière (y 270-360) =============== -->
      <line x1="0" y1="338" x2="400" y2="338" stroke="rgba(255,255,255,.12)" stroke-width="2" stroke-dasharray="10 8"/>
      <g class="anim-roll-fast" transform="translate(0,324)">
        <rect x="0" y="0" width="34" height="14" rx="4" fill="#1a1410"/>
        <rect x="5" y="-6" width="18" height="8" rx="2" fill="#1a1410"/>
        <circle cx="8" cy="15" r="4" fill="#0a0a0a"/><circle cx="27" cy="15" r="4" fill="#0a0a0a"/>
        <rect x="7" y="2" width="6" height="5" fill="var(--goldS)" opacity=".8"/>
      </g>
      <text x="18" y="351" class="blabel" fill="#fff">Voiture</text>
      <text x="18" y="358" class="bsub" fill="#fff">route · côte</text>

      <!-- =============== 5. MOTO — route (y 360-450) =============== -->
      <line x1="0" y1="428" x2="400" y2="428" stroke="rgba(255,255,255,.1)" stroke-width="2" stroke-dasharray="10 8"/>
      <g class="anim-roll-fast" transform="translate(0,417)">
        <circle cx="6" cy="14" r="3.6" fill="#0a0a0a"/><circle cx="24" cy="14" r="3.6" fill="#0a0a0a"/>
        <path d="M6 14 L14 4 L24 14" fill="none" stroke="#1a1410" stroke-width="2.4" stroke-linecap="round"/>
        <circle cx="14" cy="2" r="2.6" fill="#1a1410"/>
      </g>
      <text x="18" y="441" class="blabel" fill="#fff">Moto</text>
      <text x="18" y="448" class="bsub" fill="#fff">route · côte</text>

      <!-- =============== 6. VÉLO — route (y 450-540) =============== -->
      <line x1="0" y1="518" x2="400" y2="518" stroke="rgba(255,255,255,.09)" stroke-width="2" stroke-dasharray="10 8"/>
      <g class="anim-roll-slow" transform="translate(0,508)">
        <circle cx="6" cy="12" r="6" fill="none" stroke="#1a1410" stroke-width="1.8"/>
        <circle cx="24" cy="12" r="6" fill="none" stroke="#1a1410" stroke-width="1.8"/>
        <path d="M6 12 L15 3 L24 12 M15 3 L15 12 M11 12 L19 12" stroke="#1a1410" stroke-width="1.8" fill="none"/>
      </g>
      <text x="18" y="531" class="blabel" fill="#fff">Vélo</text>
      <text x="18" y="538" class="bsub" fill="#fff">route · côte</text>

      <!-- =============== 7. PIÉTON — chemin sablonneux (y 540-630) =============== -->
      <g class="anim-walk" transform="translate(0,605)">
        <circle cx="14" cy="0" r="3.4" fill="#1a1410"/>
        <path d="M14 3 L14 16 M14 8 L7 14 M14 8 L21 4 M14 16 L9 26 M14 16 L19 26" stroke="#1a1410" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      </g>
      <text x="18" y="621" class="blabel" fill="#fff">Piéton</text>
      <text x="18" y="628" class="bsub" fill="#fff">sable · pas</text>

      <!-- =============== 8. ANIMAUX — eau peu profonde (y 630-720) =============== -->
      <g class="anim-swim" transform="translate(50,683)">
        <path d="M0 0 q14 -9 30 0 q-14 9 -30 0 z" fill="var(--tealL)"/>
        <path d="M0 0 l-12 -7 l3 7 l-3 7 z" fill="#0f8f7e"/>
        <circle cx="22" cy="-1" r="2" fill="#06140f"/>
      </g>
      <text x="18" y="711" class="blabel" fill="#fff">Animaux</text>
      <text x="18" y="718" class="bsub" fill="#fff">faune · lagon</text>

      <!-- =============== 9. VÉGÉTAUX / ALGUES — pleine eau (y 720-810) =============== -->
      <g transform="translate(90,788)">
        <path class="anim-sway" d="M0 0 C -4 -14 4 -26 -2 -42" fill="none" stroke="#3e5a24" stroke-width="5" stroke-linecap="round"/>
        <path class="anim-sway2" d="M20 0 C 24 -12 16 -24 22 -38" fill="none" stroke="#4a6a2a" stroke-width="4" stroke-linecap="round"/>
        <path class="anim-sway" d="M42 0 C 38 -16 46 -28 40 -44" fill="none" stroke="#546e2e" stroke-width="4.5" stroke-linecap="round"/>
      </g>
      <ellipse cx="200" cy="795" rx="90" ry="8" fill="#3e4d29" opacity=".3"/>
      <text x="18" y="801" class="blabel" fill="#EAF7F4">Végétaux · algues</text>
      <text x="18" y="808" class="bsub" fill="#EAF7F4">dérive du sargasse</text>

      <!-- =============== 10. MINÉRAUX / ROCHES — fond marin (y 810-900) =============== -->
      <g fill="#1c3833" stroke="rgba(255,216,132,.24)" stroke-width="1.5" stroke-linejoin="round">
        <path d="M15 900 L15 858 L48 838 L80 862 L80 900 Z"/>
        <path d="M115 900 L127 848 L172 852 L192 900 Z"/>
        <path d="M225 900 L237 866 L295 855 L335 900 Z"/>
      </g>
      <circle class="anim-glint" cx="55" cy="855" r="2.4" fill="var(--goldS)"/>
      <circle class="anim-glint" cx="178" cy="860" r="2" fill="var(--tealL)" style="animation-delay:1.4s"/>
      <circle class="anim-glint" cx="270" cy="868" r="2.2" fill="var(--goldS)" style="animation-delay:2.6s"/>
      <text x="18" y="880" class="blabel" fill="#EAF7F4">Minéraux · roches</text>
      <text x="18" y="890" class="bsub" fill="#EAF7F4">fond marin</text>
    </svg>
  </div>
</div>

<div class="foot">Pièce de bibliothèque design · hors funnel, pas déployée · auto-joue, aucune interaction requise · <span class="mono">prefers-reduced-motion</span> = pose figée</div>

</body>
</html>
