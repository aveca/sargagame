<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Le Veilleur — mascotte 2D cartoon (style Nathan Love)</title>
<style>
  html,body{margin:0;height:100%;background:#0d0b14;display:grid;place-items:center;font-family:"Arial Black",Impact,sans-serif}
  .stage{width:390px;height:720px;position:relative;overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% 22%, #ffd98a 0%, #ffb45e 38%, #ff8f57 70%, #ff7a4d 100%);}
  .halftone{position:absolute;inset:0;opacity:.16;
    background:radial-gradient(rgba(13,11,20,.9) 2px,transparent 2.4px) 0 0/16px 16px;}
  .rays{position:absolute;left:50%;top:26%;width:680px;height:680px;transform:translate(-50%,-50%);opacity:.18;
    background:repeating-conic-gradient(from 0deg, #fff6d8 0deg 9deg, transparent 9deg 18deg);
    border-radius:50%;-webkit-mask:radial-gradient(circle,transparent 30%,#000 31%);mask:radial-gradient(circle,transparent 30%,#000 31%);}
  svg{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:330px;height:auto;filter:drop-shadow(0 18px 0 rgba(0,0,0,.10))}
  .wm{position:absolute;left:0;right:0;bottom:46px;text-align:center;color:#0d0b14}
  .wm h1{margin:0;font-size:46px;letter-spacing:-1px;line-height:.9;text-shadow:3px 3px 0 #fff}
  .wm h1 b{color:#fff;-webkit-text-stroke:2px #0d0b14}
  .wm p{margin:8px 0 0;font:800 13px/1 ui-monospace,monospace;letter-spacing:3px;opacity:.8}
</style></head>
<body>
<div class="stage">
  <div class="rays"></div><div class="halftone"></div>
  <!-- MASCOTTE — outline gras, aplats cel-shade, proportions stylisées, swagger -->
  <svg viewBox="0 0 360 440" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#0d0b14" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
      <!-- ombre portée -->
      <ellipse cx="180" cy="416" rx="92" ry="15" fill="#0d0b14" stroke="none" opacity=".22"/>

      <!-- PANNEAUX SOLAIRES (ailes) -->
      <g>
        <rect x="14" y="150" width="56" height="74" rx="9" fill="#27a9e3" transform="rotate(-10 42 187)"/>
        <path d="M20 168 L62 160 M22 188 L64 180 M24 208 L66 200 M42 152 L44 222" stroke-width="4" transform="rotate(-10 42 187)"/>
        <rect x="290" y="150" width="56" height="74" rx="9" fill="#27a9e3" transform="rotate(10 318 187)"/>
        <path d="M298 160 L340 168 M296 180 L338 188 M294 200 L336 208 M318 152 L316 222" stroke-width="4" transform="rotate(10 318 187)"/>
        <line x1="70" y1="190" x2="104" y2="196"/><line x1="290" y1="190" x2="256" y2="196"/>
      </g>

      <!-- CORPS (petit, slouch) — hoodie vert "mer propre" -->
      <path d="M120 300 q-8 96 60 100 q68 -4 60 -100 q-2 -34 -60 -34 q-58 0 -60 34 Z" fill="#27c46b"/>
      <path d="M120 300 q-8 96 60 100 q-40 -2 -52 -52 q-10 -40 -8 -48 Z" fill="#1c8f4e" stroke="none"/>
      <!-- poche kangourou -->
      <path d="M138 360 q42 22 84 0" stroke-width="5"/>
      <!-- capuche -->
      <path d="M120 304 q60 -30 120 0 q-12 -26 -60 -26 q-48 0 -60 26Z" fill="#27c46b"/>
      <!-- bras (chill) -->
      <path d="M126 318 q-30 14 -26 52 q2 16 16 14" fill="#27c46b"/>
      <path d="M234 318 q30 14 26 52 q-2 16 -16 14" fill="#27c46b"/>
      <ellipse cx="116" cy="380" rx="14" ry="13" fill="#fdf0d6"/>
      <ellipse cx="244" cy="380" rx="14" ry="13" fill="#fdf0d6"/>

      <!-- CHAÎNE EN OR (swagger) -->
      <g stroke-width="3.5">
        <circle cx="150" cy="320" r="6" fill="#ffd23f"/><circle cx="166" cy="328" r="6" fill="#ffd23f"/>
        <circle cx="180" cy="331" r="6" fill="#ffd23f"/><circle cx="194" cy="328" r="6" fill="#ffd23f"/>
        <circle cx="210" cy="320" r="6" fill="#ffd23f"/>
      </g>

      <!-- ANTENNE -->
      <path d="M180 70 q6 -26 -2 -40" stroke-width="7"/>
      <circle cx="176" cy="24" r="13" fill="#ffd23f"/>
      <circle cx="172" cy="20" r="3.5" fill="#fff" stroke="none"/>

      <!-- TÊTE (grosse, crème) -->
      <ellipse cx="180" cy="178" rx="120" ry="112" fill="#fdf6e3"/>
      <!-- cel-shadow tête (croissant bas-gauche) -->
      <path d="M70 200 a120 112 0 0 0 210 60 a120 112 0 0 1 -210 -60Z" fill="#ece0c4" stroke="none"/>
      <!-- joues blush -->
      <ellipse cx="92" cy="206" rx="17" ry="11" fill="#ff8f73" stroke="none" opacity=".55"/>
      <ellipse cx="268" cy="206" rx="17" ry="11" fill="#ff8f73" stroke="none" opacity=".55"/>

      <!-- GROS ŒIL-ÉCRAN -->
      <ellipse cx="180" cy="170" rx="86" ry="80" fill="#0d0b14"/>
      <!-- iris vert (mer propre) -->
      <circle cx="186" cy="178" r="52" fill="#27c46b"/>
      <circle cx="186" cy="178" r="52" fill="url(#ir)"/>
      <!-- pupille -->
      <circle cx="194" cy="184" r="26" fill="#0d0b14" stroke="none"/>
      <circle cx="205" cy="173" r="9" fill="#fff" stroke="none"/>
      <circle cx="183" cy="195" r="4.5" fill="#fff" stroke="none" opacity=".7"/>
      <!-- PAUPIÈRE half-lidded (le "cool") -->
      <path d="M94 150 q86 -44 172 0 q-10 -34 -86 -34 q-76 0 -86 34Z" fill="#fdf6e3"/>
      <path d="M96 152 q84 -40 168 0" stroke-width="7" fill="none"/>
      <!-- sourcil attitude -->
      <path d="M120 120 q34 -14 64 -2" stroke-width="8"/>

      <!-- SMIRK (sourire en coin) -->
      <path d="M150 250 q28 18 60 4" stroke-width="7"/>
      <path d="M210 254 q6 4 12 1" stroke-width="6"/>
    </g>
    <defs>
      <radialGradient id="ir" cx="40%" cy="35%" r="70%">
        <stop offset="0" stop-color="#5be39a"/><stop offset="1" stop-color="#1c8f4e"/>
      </radialGradient>
    </defs>
  </svg>
  <div class="wm"><h1>LE <b>VEILLEUR</b></h1><p>TON GARDIEN DES PLAGES</p></div>
</div>
</body></html>
