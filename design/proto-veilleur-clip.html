<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Le Veilleur — clip SVG propriétaire (proto)</title>
<style>
  /* ---- Tokens marque ---- */
  :root{
    --bg:#FDFCF7; --gold:#E8A800; --goldL:#FFC72C; --goldLL:#FFE47A;
    --teal:#009E8E; --green:#22C55E; --amber:#B87A00; --coral:#E8522A;
    --ink:#0D0D0D; --mid:#686868;
    --sky0:#0B2230; --sky1:#155A5A; --sky2:#C97E3A; --sky3:#F2B05E;
    --seaT:#1A5852; --seaB:#08251F; --glit:#FFD884; --sand:#1C1712; --rim:#FFD884;
    /* Anton-like condensed stack, zéro réseau */
    --display:"Anton","Haettenschweiler","Arial Narrow Bold","Impact",system-ui,sans-serif;
    --ui:"Bricolage Grotesque",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#06140f;color:#fff;font-family:var(--ui);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  #stage{position:fixed;inset:0;overflow:hidden}
  svg#scene{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}

  /* ---- Intro cinématique (joue 1×) ---- */
  @keyframes vDrop{from{transform:translateY(-46px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes vIn{from{opacity:0}to{opacity:1}}
  @keyframes skyWarm{from{opacity:0}to{opacity:1}}
  @keyframes beamSweep{
    0%{opacity:0;transform:rotate(-13deg)}
    18%{opacity:.0}
    40%{opacity:.85;transform:rotate(10deg)}
    100%{opacity:.62;transform:rotate(0deg)}
  }
  #veil{animation:vDrop 1.5s cubic-bezier(.22,1,.36,1) both;transform-box:fill-box;transform-origin:50% 0}
  #warm{animation:skyWarm 2.2s ease both}
  #beamG{animation:beamSweep 3.4s cubic-bezier(.4,0,.2,1) both;transform-box:fill-box;transform-origin:var(--bx) var(--by)}
  .fadeIn{animation:vIn 1.8s ease .5s both}

  /* ---- Ambient lent autorisé (doctrine calme) ---- */
  @keyframes cloud{from{transform:translateX(0)}to{transform:translateX(70px)}}
  @keyframes breathe{0%,100%{opacity:.55}50%{opacity:.85}}
  .cloud{animation:cloud 110s linear infinite alternate}
  #sunGlow{animation:breathe 9s ease-in-out infinite}

  /* ---- Ripple barrage (au clic, transitoire) ---- */
  @keyframes ripple{from{r:2;opacity:.7}to{r:46;opacity:0}}
  .ripple{animation:ripple 1.1s ease-out forwards}
  @keyframes boomIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  .boom{animation:boomIn .4s cubic-bezier(.34,1.56,.64,1) both;transform-box:fill-box;transform-origin:center}

  /* ---- Overlay UI ---- */
  .ov{position:absolute;left:0;right:0;pointer-events:none}
  .top{top:0;padding:16px 18px;display:flex;align-items:center;gap:12px}
  .live{pointer-events:auto;display:inline-flex;align-items:center;gap:7px;background:rgba(8,20,15,.42);border:1px solid rgba(255,216,132,.28);backdrop-filter:blur(6px);padding:6px 11px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:.08em}
  .live i{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:dot 2.4s ease-out infinite}
  @keyframes dot{0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}70%{box-shadow:0 0 0 9px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .wm{font-family:var(--display);font-size:15px;letter-spacing:.04em;opacity:.9;text-transform:uppercase}
  .bottom{bottom:0;padding:0 20px max(22px,env(safe-area-inset-bottom)) 20px;display:flex;flex-direction:column;gap:10px}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;color:var(--goldLL);text-transform:uppercase;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .title{font-family:var(--display);font-weight:400;text-transform:uppercase;letter-spacing:-.01em;line-height:.92;margin:0;font-size:clamp(38px,11vw,76px);text-shadow:0 2px 22px rgba(0,0,0,.45)}
  .sub{max-width:30ch;font-size:15px;line-height:1.45;color:rgba(255,255,255,.9);text-shadow:0 1px 10px rgba(0,0,0,.55)}
  .cta{pointer-events:auto;align-self:flex-start;margin-top:6px;border:0;cursor:pointer;font-family:var(--ui);font-weight:800;font-size:16px;color:#1a1300;padding:14px 22px;border-radius:100px;background:linear-gradient(158deg,#FFE47A 0%,#FFC72C 40%,#E89400 100%);box-shadow:0 8px 24px rgba(232,148,0,.35),inset 0 1px 0 rgba(255,255,255,.5);transition:transform .16s cubic-bezier(.175,.885,.32,1.275)}
  .cta:active{transform:scale(.96)}
  .hint{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);font-size:11.5px;letter-spacing:.06em;color:rgba(255,255,255,.6);pointer-events:none}

  @media (min-width:740px){
    .bottom{padding-bottom:38px} .sub{font-size:17px}
  }

  /* ---- Plancher dur reduced-motion : tableau figé, scrollable, cliquable ---- */
  @media (prefers-reduced-motion:reduce){
    #veil,#warm,#beamG,.fadeIn,.cloud,#sunGlow,.live i{animation:none!important;opacity:1!important;transform:none!important}
    #warm{opacity:1!important}
  }
</style>
</head>
<body>
<div id="stage">
  <svg id="scene" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" aria-label="Le Veilleur scanne la mer au lever du jour">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--sky0)"/>
        <stop offset=".42" stop-color="var(--sky1)"/>
        <stop offset=".74" stop-color="var(--sky2)"/>
        <stop offset="1" stop-color="var(--sky3)"/>
      </linearGradient>
      <linearGradient id="warmG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3a2a18" stop-opacity="0"/>
        <stop offset=".6" stop-color="#C97E3A" stop-opacity=".25"/>
        <stop offset="1" stop-color="#F2B05E" stop-opacity=".5"/>
      </linearGradient>
      <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--seaT)"/>
        <stop offset="1" stop-color="var(--seaB)"/>
      </linearGradient>
      <radialGradient id="sunG" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#FFF3D6"/>
        <stop offset=".5" stop-color="var(--glit)"/>
        <stop offset="1" stop-color="#F2B05E" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="beamGrad" cx="50%" cy="0%" r="100%">
        <stop offset="0" stop-color="var(--glit)" stop-opacity=".55"/>
        <stop offset="1" stop-color="var(--glit)" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="lens" cx="38%" cy="34%" r="70%">
        <stop offset="0" stop-color="#BFefff"/>
        <stop offset=".34" stop-color="#16b9c9"/>
        <stop offset="1" stop-color="#052b2b"/>
      </radialGradient>
      <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#173a52"/>
        <stop offset="1" stop-color="#0B2230"/>
      </linearGradient>
      <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#1d3c38"/>
        <stop offset="1" stop-color="#0A1714"/>
      </linearGradient>
      <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
      <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope=".035"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
    </defs>

    <!-- Ciel -->
    <rect x="0" y="0" width="800" height="360" fill="url(#sky)"/>
    <rect id="warm" x="0" y="0" width="800" height="360" fill="url(#warmG)"/>

    <!-- Soleil bas + halo -->
    <circle id="sunGlow" cx="638" cy="212" r="120" fill="url(#sunG)"/>
    <circle cx="638" cy="212" r="46" fill="#FFF4DA"/>

    <!-- Nuages longs lents -->
    <g class="cloud" opacity=".5">
      <ellipse cx="180" cy="120" rx="120" ry="11" fill="#10333E"/>
      <ellipse cx="470" cy="158" rx="90" ry="8" fill="#10333E" opacity=".7"/>
    </g>

    <!-- Oiseau lointain -->
    <path d="M700 138 q7 -6 14 0 q7 -6 14 0" fill="none" stroke="#0B2230" stroke-width="2.4" stroke-linecap="round" opacity=".55"/>

    <!-- Mer -->
    <rect x="0" y="330" width="800" height="270" fill="url(#sea)"/>
    <!-- Reflet du soleil sur l'eau -->
    <g opacity=".9">
      <ellipse cx="638" cy="356" rx="70" ry="6" fill="var(--glit)" opacity=".5"/>
      <ellipse cx="638" cy="372" rx="48" ry="4" fill="var(--glit)" opacity=".4"/>
      <ellipse cx="638" cy="388" rx="30" ry="3" fill="var(--glit)" opacity=".3"/>
    </g>

    <!-- Faisceau de scan (pivote vers le curseur) -->
    <g id="beamG" style="--bx:380px;--by:172px">
      <polygon id="beam" points="380,172 312,362 448,362" fill="url(#beamGrad)"/>
    </g>
    <!-- Anneau de scan sur l'eau -->
    <ellipse id="scanRing" cx="380" cy="362" rx="40" ry="8" fill="none" stroke="var(--glit)" stroke-width="2" opacity=".5"/>

    <!-- Radeau de sargasses qui dérive -->
    <g id="raft" opacity=".95">
      <ellipse cx="560" cy="408" rx="40" ry="8" fill="#3a4a1e"/>
      <ellipse cx="540" cy="404" rx="16" ry="6" fill="#4d6326"/>
      <ellipse cx="576" cy="411" rx="14" ry="5" fill="#2f3d18"/>
      <ellipse cx="558" cy="413" rx="20" ry="5" fill="#56702c"/>
    </g>

    <!-- Tortue qui glisse -->
    <g id="turtle" transform="translate(150 486)" opacity=".92">
      <ellipse cx="0" cy="0" rx="30" ry="19" fill="#0c4b44"/>
      <ellipse cx="0" cy="-2" rx="22" ry="13" fill="#11635a"/>
      <path d="M-2 -13 l4 0 l3 8 l-10 0 z" fill="#0a423c"/>
      <path d="M-9 9 l5 8 M9 9 l5 8 M-22 -4 l-9 3 M22 -4 l9 3" stroke="#0c4b44" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="26" cy="-3" rx="8" ry="6" fill="#0c4b44"/>
    </g>

    <!-- Poisson (s'éloigne au tap) -->
    <g id="fish" transform="translate(430 444)" style="cursor:pointer;transition:transform .9s cubic-bezier(.22,1,.36,1)">
      <path d="M0 0 q14 -9 30 0 q-14 9 -30 0 z" fill="#1EC8B0"/>
      <path d="M0 0 l-12 -7 l3 7 l-3 7 z" fill="#0f8f7e"/>
      <circle cx="22" cy="-1" r="2" fill="#06140f"/>
    </g>

    <!-- LE VEILLEUR (perso) — g externe = position/échelle, g#veil = anim (évite le conflit transform CSS↔SVG) -->
    <g transform="translate(380 130) scale(1.45)">
    <g id="veil">
      <!-- panneaux solaires -->
      <g>
        <rect x="-86" y="-6" width="58" height="30" rx="3" fill="url(#panel)" transform="rotate(-6 -57 9)"/>
        <rect x="30" y="-6" width="58" height="30" rx="3" fill="url(#panel)" transform="rotate(6 59 9)"/>
        <g stroke="#2b6b86" stroke-width="1" opacity=".7">
          <line x1="-72" y1="-4" x2="-72" y2="26"/><line x1="-54" y1="-4" x2="-54" y2="26"/><line x1="-40" y1="-4" x2="-40" y2="26"/>
          <line x1="44" y1="-4" x2="44" y2="26"/><line x1="60" y1="-4" x2="60" y2="26"/><line x1="74" y1="-4" x2="74" y2="26"/>
        </g>
      </g>
      <!-- bras -->
      <rect x="-32" y="4" width="64" height="6" rx="3" fill="#0e2622"/>
      <!-- corps -->
      <rect x="-34" y="-22" width="68" height="64" rx="22" fill="url(#bodyG)" stroke="var(--rim)" stroke-width="1.4" stroke-opacity=".5"/>
      <!-- rim light chaud -->
      <path d="M28 -16 a22 22 0 0 1 0 44" fill="none" stroke="var(--rim)" stroke-width="2.4" stroke-opacity=".55" stroke-linecap="round"/>
      <!-- lentille / œil expressif -->
      <circle cx="0" cy="6" r="20" fill="url(#lens)"/>
      <circle cx="0" cy="6" r="20" fill="none" stroke="var(--gold)" stroke-width="3"/>
      <circle id="iris" cx="-4" cy="2" r="8" fill="#04201f"/>
      <circle id="glint" cx="-7" cy="-1" r="3.2" fill="#eafcff"/>
      <!-- antenne -->
      <line x1="0" y1="-22" x2="0" y2="-40" stroke="#0e2622" stroke-width="3"/>
      <circle id="ant" cx="0" cy="-43" r="4.5" fill="var(--goldL)"/>
      <circle cx="0" cy="-43" r="9" fill="var(--goldL)" opacity=".25" filter="url(#soft)"/>
    </g>
    </g>

    <!-- couche grain -->
    <rect x="0" y="0" width="800" height="600" filter="url(#grain)" opacity=".5" pointer-events="none"/>
  </svg>

  <!-- Overlay marque -->
  <div class="ov top fadeIn">
    <span class="live"><i></i> EN TEMPS RÉEL</span>
    <span class="wm">Sargasses</span>
  </div>

  <div class="hint fadeIn">touche la mer · suis le Veilleur du regard</div>

  <div class="ov bottom fadeIn">
    <span class="eyebrow">Martinique · Aujourd'hui</span>
    <h1 class="title">La mer,<br>en direct.</h1>
    <p class="sub">Le Veilleur scanne tes plages au lever du jour. Propre, ou pas — tu le sais avant d'y aller.</p>
    <button class="cta" id="cta">Voir ma plage →</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  var svg=document.getElementById("scene");
  var veil=document.getElementById("veil");
  var iris=document.getElementById("iris");
  var glint=document.getElementById("glint");
  var beamG=document.getElementById("beamG");
  var scanRing=document.getElementById("scanRing");
  var fish=document.getElementById("fish");
  var cta=document.getElementById("cta");
  var RM=false; try{RM=window.matchMedia("(prefers-reduced-motion: reduce)").matches}catch(e){}

  // Pivot du faisceau = lentille du Veilleur (en coords viewBox)
  var PIV={x:250,y:196};
  // cible de regard lissée
  var tx=250,ty=420, cx=250,cy=420;
  var paused=false, raf=0;

  // clientXY -> coords viewBox (slice = cover)
  function toVB(clientX,clientY){
    var r=svg.getBoundingClientRect();
    var vw=800,vh=600, sc=Math.max(r.width/vw,r.height/vh);
    var dw=vw*sc,dh=vh*sc, ox=(r.width-dw)/2, oy=(r.height-dh)/2;
    return {x:(clientX-r.left-ox)/sc, y:(clientY-r.top-oy)/sc};
  }

  function onMove(e){
    var p=toVB(e.clientX,e.clientY);
    tx=p.x; ty=p.y;
  }
  if(!RM){
    window.addEventListener("pointermove",onMove,{passive:true});
  }

  // Clic sur la mer = poser un "barrage" + ripple (incident, non bloquant, sans score)
  svg.addEventListener("pointerdown",function(e){
    var p=toVB(e.clientX,e.clientY);
    if(p.y<334) return;            // seulement sur la mer
    if(e.target===fish||fish.contains(e.target)) return;
    dropBarrage(p.x,p.y);
  });

  function dropBarrage(x,y){
    y=Math.max(338,Math.min(560,y));
    var ns="http://www.w3.org/2000/svg";
    // ondulation
    var rip=document.createElementNS(ns,"circle");
    rip.setAttribute("cx",x);rip.setAttribute("cy",y);
    rip.setAttribute("fill","none");rip.setAttribute("stroke","var(--glit)");
    rip.setAttribute("stroke-width","2");rip.setAttribute("class","ripple");
    svg.appendChild(rip);
    setTimeout(function(){rip.remove()},1100);
    if(RM) return;
    // petit barrage flottant (bouées reliées)
    var g=document.createElementNS(ns,"g");g.setAttribute("class","boom");g.setAttribute("opacity",".95");
    var line=document.createElementNS(ns,"line");
    line.setAttribute("x1",x-26);line.setAttribute("y1",y);line.setAttribute("x2",x+26);line.setAttribute("y2",y);
    line.setAttribute("stroke","#0e2622");line.setAttribute("stroke-width","3");g.appendChild(line);
    for(var i=-2;i<=2;i++){
      var b=document.createElementNS(ns,"circle");
      b.setAttribute("cx",x+i*13);b.setAttribute("cy",y);b.setAttribute("r","4.5");
      b.setAttribute("fill",i%2?"#FFC72C":"#E8522A");g.appendChild(b);
    }
    svg.appendChild(g);
    if(svg.querySelectorAll(".boom").length>6) svg.querySelector(".boom").remove();
  }

  // Tap poisson = il s'éloigne doucement (calme)
  fish.addEventListener("pointerdown",function(e){
    e.stopPropagation();
    var dx=(Math.random()*120-30), dy=(Math.random()*40-30);
    fish.style.transform="translate("+(430+dx)+"px,"+(444+dy)+"px) scaleX("+(dx<0?-1:1)+")";
  });

  cta.addEventListener("click",function(){
    cta.textContent="✓ (ici : ouverture de ta plage)";
    setTimeout(function(){cta.textContent="Voir ma plage →"},1400);
  });

  // Boucle unique : lisse le regard + faisceau + anneau de scan
  function lerp(a,b,t){return a+(b-a)*t}
  function tick(){
    raf=0; if(paused){return}
    cx=lerp(cx,tx,.08); cy=lerp(cy,ty,.08);
    // iris/glint suivent (amplitude réduite)
    var ex=Math.max(-7,Math.min(7,(cx-PIV.x)/40));
    var ey=Math.max(-5,Math.min(6,(cy-PIV.y)/60));
    iris.setAttribute("cx",-4+ex); iris.setAttribute("cy",2+ey);
    glint.setAttribute("cx",-7+ex*.7); glint.setAttribute("cy",-1+ey*.7);
    // faisceau pivote vers la cible
    var ang=Math.atan2(cy-PIV.y,cx-PIV.x)*180/Math.PI-90;
    ang=Math.max(-26,Math.min(26,ang));
    beamG.setAttribute("transform","rotate("+ang+" "+PIV.x+" "+PIV.y+")");
    // anneau de scan posé sous le faisceau, au niveau de l'eau
    var hitX=PIV.x+Math.tan(ang*Math.PI/180)*(360-PIV.y);
    scanRing.setAttribute("cx",hitX);
    if(!RM) requestAnimationFrame(tick);
  }
  if(!RM){ requestAnimationFrame(tick); }

  document.addEventListener("visibilitychange",function(){
    paused=document.hidden;
    if(!paused && !RM && !raf){ raf=requestAnimationFrame(tick); }
  });
})();
</script>
</body>
</html>
