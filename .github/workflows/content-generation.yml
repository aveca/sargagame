name: Content Generation (SEO)

on:
  schedule:
    # 3x/sem : Lun + Mer + Ven à 8h UTC. Reverté 2026-04-17 :
    # Anthropic API coûte de l'argent (pas le forfait Max Claude Code),
    # user ne veut pas injecter de budget supplémentaire sur ce projet.
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: content-generation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-content:
    runs-on: ubuntu-latest
    # 15 → 30 : marge pour que le timeout PROPRE du step Deploy FTPS (15 min) tape
    # avant ce timeout de job — timeout de JOB = "cancelled", timeout de STEP
    # continue-on-error = toléré → "success". generate+build+commit ≪ 15 min.
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 1. Scrape web + generate article via Claude ──────────
      - name: Generate SEO article (scrape + Claude)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/automation/auto-web-content.cjs

      # ── 2. Build site (inclut les nouveaux articles dans dist/) ─
      - name: Build site (Vite)
        run: npm run build

      # ── 3. Prépare FTP (split MQ / GP) ──────────────────────
      - name: Prepare FTP dirs
        run: node scripts/prepare-ftp.cjs

      # ── 4. Commit les nouveaux articles ─────────────────────
      - name: Commit generated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/articles/ scripts/automation/data/automation-log.json
          git diff --cached --quiet || git commit -m "content: auto-article $(date -u +'%Y-%m-%d')"
          git stash push -u -m "actions-pre-rebase" || true
          BRANCH="${GITHUB_REF_NAME:-main}"
          push_ok=0
          for i in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            git rebase -X theirs "origin/$BRANCH" || { echo "::warning::rebase failed ($i/5)"; git rebase --abort || true; sleep 10; continue; }
            if git push origin "HEAD:$BRANCH"; then push_ok=1; break; fi
            echo "::warning::git push failed ($i/5), sleep 20s"; sleep 20
          done
          [ "$push_ok" = "1" ] || { echo "::error::git push failed after 5 attempts"; exit 1; }

      # ── 5–6. FTPS sessions fragmentées
      - name: Deploy FTPS Martinique + Guadeloupe
        continue-on-error: true
        # Timeout PROPRE au step (cf. weekly-optimize) : un blocage FTPS était
        # "cancelled" par le timeout du job ; ici il est toléré → "success".
        # L'article est déjà commité + push → redéployé via daily-copernicus.
        timeout-minutes: 15
        env:
          FTP_SERVER_MQ: ${{ secrets.FTP_SERVER_MQ }}
          FTP_USERNAME_MQ: ${{ secrets.FTP_USERNAME_MQ }}
          FTP_PASSWORD_MQ: ${{ secrets.FTP_PASSWORD_MQ }}
          FTP_SERVER_GP: ${{ secrets.FTP_SERVER_GP }}
          FTP_USERNAME_GP: ${{ secrets.FTP_USERNAME_GP }}
          FTP_PASSWORD_GP: ${{ secrets.FTP_PASSWORD_GP }}
        run: node scripts/manual-ftp-deploy.cjs

  notify-failure:
    needs: generate-content
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Send failure alert
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          WORKFLOW_NAME: 'Content Generation'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/automation/notify-failure.cjs
