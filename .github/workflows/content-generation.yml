name: Content Generation (SEO)

on:
  schedule:
    # 3x/sem articles : Lun + Mer + Ven à 8h UTC
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      # ── 1. Scrape web + generate article via Claude ──────────
      - name: Generate SEO article (scrape + Claude)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/automation/auto-web-content.cjs

      # ── 2. Build site (inclut les nouveaux articles dans dist/) ─
      - name: Build site (Vite)
        run: npm run build

      # ── 3. Prépare FTP (split MQ / GP) ──────────────────────
      - name: Prepare FTP dirs
        run: node scripts/prepare-ftp.cjs

      # ── 4. Commit les nouveaux articles ─────────────────────
      - name: Commit generated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/articles/ scripts/automation/data/automation-log.json
          git diff --cached --quiet || git commit -m "content: auto-article $(date -u +'%Y-%m-%d')"
          git push || (git pull --rebase --autostash && git push)

      # ── 5. Deploy Martinique ─────────────────────────────────
      - name: Deploy Martinique (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_MQ }}
          username: ${{ secrets.FTP_USERNAME_MQ }}
          password: ${{ secrets.FTP_PASSWORD_MQ }}
          local-dir: ./martinique-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      # ── 6. Deploy Guadeloupe ─────────────────────────────────
      - name: Deploy Guadeloupe (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_GP }}
          username: ${{ secrets.FTP_USERNAME_GP }}
          password: ${{ secrets.FTP_PASSWORD_GP }}
          local-dir: ./guadeloupe-ftp/
          server-dir: ./
          dangerous-clean-slate: false

  notify-failure:
    needs: generate-content
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Send failure alert
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WORKFLOW_NAME: 'Content Generation'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/automation/notify-failure.cjs
