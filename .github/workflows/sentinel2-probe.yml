# TEMPORAIRE — sonde de calibration Sentinel-2. Checkout la branche de dev pour
# itérer le masquage/seuils sans merger. À supprimer une fois le flag activé.
name: Sentinel-2 CDSE auth probe (throwaway)
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/sargatrack-data-integration-500shl
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe CDSE token + Sentinel-2 call
        env:
          SENTINEL_HUB_CLIENT_ID: ${{ secrets.SENTINEL_HUB_CLIENT_ID }}
          SENTINEL_HUB_CLIENT_SECRET: ${{ secrets.SENTINEL_HUB_CLIENT_SECRET }}
          CDSE_USERNAME: ${{ secrets.CDSE_USERNAME }}
          CDSE_PASSWORD: ${{ secrets.CDSE_PASSWORD }}
        run: node scripts/fetch-sentinel2.cjs
