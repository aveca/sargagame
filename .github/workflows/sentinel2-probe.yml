# TEMPORAIRE — sonde d'authentification CDSE. À SUPPRIMER après lecture du résultat.
# Vérifie si le compte Copernicus Marine existant (secrets COPERNICUS_USERNAME/PASSWORD)
# authentifie aussi sur CDSE (le système qui sert Sentinel-2). Aucun deploy, aucun commit.
name: Sentinel-2 CDSE auth probe (throwaway)
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe CDSE token + un vrai appel Sentinel-2
        env:
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: node scripts/fetch-sentinel2.cjs
