name: Daily Social Reservoir

# Génère quotidiennement les cartes sociales HONNÊTES (verdict / saga / wordle)
# pour chaque région LIVE et les BANQUE dans une GitHub Release `social-reservoir`
# (zéro binaire committé → pas de bloat d'historique git). Index dans
# scripts/automation/data/social-outbox.json (état "staged").
#
# ⚠️ ZÉRO PUBLICATION. Le lock social reste fermé jusqu'au valve manuel
#    (release-social-reservoir.yml). Le commit de l'index porte [skip ci] pour
#    ne PAS déclencher le deploy prod de daily-copernicus (push→build+FTP).

on:
  schedule:
    # 13:17 UTC = 09:17 MQ (UTC-4). Créneau libre (aucun autre workflow à 13:xx ;
    # clair des ticks pipeline 00/06/12/18, veilleurs 06:23, briefs 11:00/11:57).
    - cron: '17 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: social-reservoir
  cancel-in-progress: false

jobs:
  reservoir:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Build social reservoir (staged, never published)
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/automation/build-social-reservoir.cjs

      - name: Commit outbox index ([skip ci] — no deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/automation/data/social-outbox.json
          if git diff --cached --quiet; then
            echo "Rien à committer."
          else
            git commit -m "reservoir: stage cards $(date -u +'%Y-%m-%d') [skip ci]"
            git pull --rebase --autostash -X theirs origin main || true
            git push || (git pull --rebase --autostash -X theirs origin main && git push)
          fi
