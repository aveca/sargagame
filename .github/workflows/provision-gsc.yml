# Provisioning GSC one-shot des nouvelles régions (Site Verification API + FTPS).
# workflow_dispatch uniquement — pas de cron, pas de notif, pas de retry (one-shot outillage).
name: Provision GSC (new regions)

on:
  workflow_dispatch:
    inputs:
      regions:
        description: "Régions séparées par des espaces (défaut: puntacana florida rivieramaya)"
        required: false
        default: "puntacana florida rivieramaya"

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Provision GSC
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_HUMAN_OWNER: ${{ secrets.GSC_HUMAN_OWNER }}
          FTP_SERVER_PUNTACANA: ${{ secrets.FTP_SERVER_PUNTACANA }}
          FTP_USERNAME_PUNTACANA: ${{ secrets.FTP_USERNAME_PUNTACANA }}
          FTP_PASSWORD_PUNTACANA: ${{ secrets.FTP_PASSWORD_PUNTACANA }}
          FTP_SERVER_FLORIDA: ${{ secrets.FTP_SERVER_FLORIDA }}
          FTP_USERNAME_FLORIDA: ${{ secrets.FTP_USERNAME_FLORIDA }}
          FTP_PASSWORD_FLORIDA: ${{ secrets.FTP_PASSWORD_FLORIDA }}
          FTP_SERVER_RIVIERAMAYA: ${{ secrets.FTP_SERVER_RIVIERAMAYA }}
          FTP_USERNAME_RIVIERAMAYA: ${{ secrets.FTP_USERNAME_RIVIERAMAYA }}
          FTP_PASSWORD_RIVIERAMAYA: ${{ secrets.FTP_PASSWORD_RIVIERAMAYA }}
        run: node scripts/automation/provision-gsc.cjs ${{ inputs.regions }}
