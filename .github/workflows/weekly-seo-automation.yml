name: Weekly SEO Automation

on:
  schedule:
    # Cut 2026-04-13 (quota 100%) : Mon+Thu -> Mon only. The 22-step
    # workflow grew to ~12 min/run after 11 new analyzers landed, so
    # 8 runs/mo = 96 min/mo. Mon only = 4 runs/mo ≈ 48 min/mo.
    # Re-enable Thu when budget allows.
    - cron: '0 11 * * 1'
  workflow_dispatch: # Déclenchement manuel possible

permissions:
  contents: write

jobs:
  seo-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      # ── 0. Register GA4 custom dimensions (idempotent) ───
      - name: Register GA4 A/B test dimensions
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID_MQ: ${{ secrets.GA4_PROPERTY_ID_MQ }}
          GA4_PROPERTY_ID_GP: ${{ secrets.GA4_PROPERTY_ID_GP }}
        run: node scripts/automation/register-ga4-dimensions.cjs

      # ── 1. Collect SEO data from GSC + GA4 + CrUX ────────
      - name: SEO Audit (data collection)
        id: seo-audit
        timeout-minutes: 20
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID_MQ: ${{ secrets.GA4_PROPERTY_ID_MQ }}
          GA4_PROPERTY_ID_GP: ${{ secrets.GA4_PROPERTY_ID_GP }}
        run: node scripts/automation/seo-audit.cjs
        continue-on-error: true

      # ── 1b. UX Audit (from audit data) ───────────────────
      - name: UX Audit (analyze UX issues)
        if: steps.seo-audit.outcome == 'success'
        run: node scripts/automation/ux-audit.cjs

      # ── 1b2. Position Tracker (rolling 90d history + drop alerts) ─
      - name: Track GSC positions over time
        if: steps.seo-audit.outcome == 'success'
        continue-on-error: true
        run: node scripts/automation/seo-position-tracker.cjs

      # ── 1b3. Orphan Detector (sitemap pages with no GSC traffic) ─
      - name: Detect orphan pages
        if: steps.seo-audit.outcome == 'success'
        continue-on-error: true
        run: node scripts/automation/seo-orphan-detector.cjs

      # ── 1b4. CTR diagnostic (position-vs-CTR gap detection) ──────
      - name: CTR diagnostic (AWR curve)
        if: steps.seo-audit.outcome == 'success'
        continue-on-error: true
        run: node scripts/automation/seo-ctr-diagnostic.cjs

      # ── 1b5. Cannibalization (queries with multiple competing pages)
      - name: Detect keyword cannibalization
        if: steps.seo-audit.outcome == 'success'
        continue-on-error: true
        run: node scripts/automation/seo-cannibalization.cjs

      # ── 1b6. CWV tracker (rolling 90d CrUX history) ──────────────
      - name: Track Core Web Vitals over time
        if: steps.seo-audit.outcome == 'success'
        continue-on-error: true
        run: node scripts/automation/seo-cwv-tracker.cjs

      # ── 1b7. Link Graph (structural orphans + phantom hrefs) ─────
      # Runs after the build so the FTP folders exist (the analyzer
      # walks martinique-ftp/ and guadeloupe-ftp/). Wired in step 6.5.

      # ── 1c. Auto-Optimize (data-driven self-improvement) ─
      - name: Auto-Optimize (apply data-driven fixes)
        continue-on-error: true
        run: node scripts/automation/auto-optimize.cjs

      # ── 1d. Auto-Copywriting (GSC-driven meta optimization)
      - name: Auto-copywriting (GSC-driven)
        continue-on-error: true
        run: node scripts/automation/auto-copywriting.cjs

      # ── 2. Auto-fix 404 errors ───────────────────────────
      - name: Fix 404 errors (auto-redirect)
        run: node scripts/automation/seo-fix-404.cjs

      # ── 3. Optimize meta titles/descriptions ─────────────
      - name: Optimize meta (CTR-based)
        run: node scripts/automation/seo-optimize-meta.cjs

      # ── 4. Enrich beach page content ─────────────────────
      - name: Enrich content (FAQ + noscript + links)
        run: node scripts/automation/seo-enrich-content.cjs

      # ── 5. Generate new SEO pages ────────────────────────
      - name: Generate new pages (keyword gaps)
        run: node scripts/automation/generate-seo-pages.cjs

      # ── 6. Rebuild with all SEO changes ──────────────────
      - name: Build site (Vite) + prepare FTP
        run: |
          npm run build
          node scripts/prepare-ftp.cjs

      # ── 6.5. Link Graph (post-build, reads martinique-ftp/) ─────
      - name: Analyze internal link graph
        continue-on-error: true
        run: node scripts/automation/seo-link-graph.cjs

      # ── 6.6. Broken links (0-tolerance: hard fail in CI) ────────
      - name: Check for broken internal links
        continue-on-error: true
        run: node scripts/automation/seo-broken-links.cjs

      # ── 6.7. JSON-LD schema validator ───────────────────────────
      - name: Validate JSON-LD schemas
        continue-on-error: true
        run: node scripts/automation/seo-schema-validator.cjs

      # ── 6.8. Meta uniqueness (duplicate titles/descriptions) ────
      - name: Check meta title/description uniqueness
        continue-on-error: true
        run: node scripts/automation/seo-meta-uniqueness.cjs

      # ── 6.9. Canonical + hreflang validation ────────────────────
      - name: Validate canonical and hreflang
        continue-on-error: true
        run: node scripts/automation/seo-canonical-hreflang.cjs

      # ── 6.10. Content depth (thin pages + rich winners) ─────────
      - name: Audit content depth
        continue-on-error: true
        run: node scripts/automation/seo-content-depth.cjs

      # ── 6.11. Sitemap completeness check ────────────────────────
      - name: Cross-check sitemap vs disk
        continue-on-error: true
        run: node scripts/automation/seo-sitemap-check.cjs

      # ── 6.12. Image alt audit ───────────────────────────────────
      - name: Audit image alt text
        continue-on-error: true
        run: node scripts/automation/seo-image-audit.cjs

      # ── 6.13. Orphan healer (inject related-links into donors) ──
      # Modifies HTML in martinique-ftp/ and guadeloupe-ftp/, must
      # run AFTER orphan-detector + link-graph and BEFORE FTP deploy.
      - name: Heal orphan pages (inject related-links blocks)
        continue-on-error: true
        run: node scripts/automation/seo-orphan-healer.cjs

      # ── 4. Submit URLs to Google Indexing API ─────────────
      - name: Submit URLs to Google Indexing
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/automation/seo-submit-urls.cjs
        continue-on-error: true

      # ── 7. A/B Test: auto-fetch from GA4 then evaluate ──
      - name: Fetch A/B test data from GA4
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID_MQ: ${{ secrets.GA4_PROPERTY_ID_MQ }}
        run: node scripts/automation/ab-fetch-ga4.cjs

      - name: Evaluate A/B tests
        continue-on-error: true
        run: node scripts/automation/ab-evaluate.cjs

      # ── 8. Commit all SEO changes ────────────────────────
      - name: Commit SEO automation changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in public/.htaccess vite.config.js scripts/automation/data/automation-log.json scripts/automation/data/meta-overrides.json scripts/automation/data/enrichments.json scripts/automation/data/new-pages.json scripts/automation/data/audit-summary.json scripts/automation/data/audit-full.json scripts/automation/data/ux-report.json scripts/automation/data/optimization-log.json scripts/automation/data/copywriting-log.json scripts/automation/data/position-history.json scripts/automation/data/position-changes.json scripts/automation/data/orphan-pages.json scripts/automation/data/link-graph.json scripts/automation/data/broken-links.json scripts/automation/data/orphan-healer.json scripts/automation/data/schema-validation.json scripts/automation/data/meta-uniqueness.json scripts/automation/data/canonical-hreflang.json scripts/automation/data/content-depth.json scripts/automation/data/ctr-diagnostic.json scripts/automation/data/cannibalization.json scripts/automation/data/sitemap-check.json scripts/automation/data/image-audit.json scripts/automation/data/cwv-history.json scripts/automation/data/cwv-changes.json; do
            [ -f "$f" ] && git add "$f"
          done
          [ -f scripts/automation/data/ab-results.json ] && git add scripts/automation/data/ab-results.json
          [ -f scripts/automation/ab-results.json ] && git add scripts/automation/ab-results.json
          git diff --cached --quiet || git commit -m "seo: weekly automation $(date -u +'%Y-%m-%d')"
          git push || (echo "::warning::git push failed — retrying with rebase" && git pull --rebase --autostash && git push)

      # ── 9. Deploy via FTP (with retry on timeout) ─────────
      - name: Deploy Martinique (FTP) — attempt 1
        id: ftp_mq_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_MQ }}
          username: ${{ secrets.FTP_USERNAME_MQ }}
          password: ${{ secrets.FTP_PASSWORD_MQ }}
          local-dir: ./martinique-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      - name: Deploy Martinique (FTP) — retry
        if: steps.ftp_mq_1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_MQ }}
          username: ${{ secrets.FTP_USERNAME_MQ }}
          password: ${{ secrets.FTP_PASSWORD_MQ }}
          local-dir: ./martinique-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      - name: Deploy Guadeloupe (FTP) — attempt 1
        id: ftp_gp_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_GP }}
          username: ${{ secrets.FTP_USERNAME_GP }}
          password: ${{ secrets.FTP_PASSWORD_GP }}
          local-dir: ./guadeloupe-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      - name: Deploy Guadeloupe (FTP) — retry
        if: steps.ftp_gp_1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_GP }}
          username: ${{ secrets.FTP_USERNAME_GP }}
          password: ${{ secrets.FTP_PASSWORD_GP }}
          local-dir: ./guadeloupe-ftp/
          server-dir: ./
          dangerous-clean-slate: false

  # ── Notify on failure ──────────────────────────────────
  notify-failure:
    needs: seo-automation
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Send failure alert email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WORKFLOW_NAME: 'Weekly SEO Automation'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/automation/notify-failure.cjs
