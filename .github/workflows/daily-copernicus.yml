name: Daily Copernicus + Deploy

on:
  push:
    branches: [main]
  schedule:
    # 8x/jour toutes les 3h — max freshness données sargasses
    # Heures MQ (UTC-4): 20h, 23h, 2h, 5h, 8h, 11h, 14h, 17h
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch: # Déclenchement manuel possible

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Determine day of week and hour
        id: check_day
        run: |
          echo "dow=$(date -u +%u)" >> $GITHUB_OUTPUT
          echo "hour=$(date -u +%H)" >> $GITHUB_OUTPUT

      # ── 1. Fetch LIVE sargassum data (ERDDAP + fallback) ──
      - name: Fetch LIVE sargassum data from ERDDAP
        id: erddap
        continue-on-error: true
        run: node scripts/fetch-sargassum-live.cjs

      - name: Check if ERDDAP produced live data
        id: check_live
        run: |
          if [ -f public/api/copernicus/sargassum.json ]; then
            SOURCE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('public/api/copernicus/sargassum.json','utf-8')).source)")
            echo "source=$SOURCE" >> $GITHUB_OUTPUT
            echo "ERDDAP result: source=$SOURCE"
          else
            echo "source=none" >> $GITHUB_OUTPUT
            echo "No sargassum.json found"
          fi

      - name: Fallback to Node.js scraper (only if ERDDAP failed)
        if: steps.check_live.outputs.source != 'erddap-live'
        run: |
          echo "${{ secrets.COPERNICUS_USERNAME }}" > copernicustxt.txt
          echo "${{ secrets.COPERNICUS_PASSWORD }}" >> copernicustxt.txt
          node scripts/scrape-copernicus.cjs
          rm -f copernicustxt.txt

      # Year-round beach weather (Open-Meteo) — refreshes daily so the build-time
      # SEO meta + noscript "Conditions du jour" blocks stay current. Free API,
      # no key, ~4s for 136 beaches via batched coords.
      - name: Fetch beach weather (Open-Meteo)
        continue-on-error: true
        run: node scripts/fetch-beach-weather.cjs

      - name: Send notifications (push + email)
        continue-on-error: true
        env:
          ONESIGNAL_API_KEY_MQ: ${{ secrets.ONESIGNAL_API_KEY_MQ }}
          ONESIGNAL_API_KEY_GP: ${{ secrets.ONESIGNAL_API_KEY_GP }}
        run: node scripts/automation/send-notifications.cjs

      # ── Email pipeline: clean bounces → fetch → send ──
      - name: Clean bounced emails from Sheet
        continue-on-error: true
        run: |
          echo "Calling clean_bounces on Apps Script..."
          RESULT=$(curl -sL --max-time 30 "https://script.google.com/macros/s/AKfycbwkV1tQSEmrZ_zFPcIHBXh1EidFy16z72lx6ztABtVp4Ae3AikFHeGwN6JFMccbpoU07w/exec?action=clean_bounces")
          echo "Result: $RESULT"

      - name: Fetch subscriber list
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/automation/fetch-subscribers.cjs

      # Weekend email: schedule-only, Friday 12h UTC (= 8h MQ).
      # NEVER on workflow_dispatch — retry-on-failure re-triggers via workflow_dispatch
      # and manual reruns would duplicate sends. To force-send, run email-weekend.cjs
      # locally with --force, or delete weekend-sent.json and dispatch manually.
      - name: Send weekend email bulletin (Friday 12h UTC = 8h MQ only)
        if: github.event_name == 'schedule' && steps.check_day.outputs.dow == '5' && steps.check_day.outputs.hour == '12'
        continue-on-error: true
        run: node scripts/automation/email-weekend.cjs

      - name: Send welcome emails (Resend)
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/automation/welcome-email.cjs

      - name: Send drip emails (J+3, J+7, J+14)
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/automation/drip-email.cjs

      - name: Health check (uptime monitoring + staleness alerts)
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/automation/health-check.cjs

      - name: Backtest forecast accuracy (archive vs observations)
        continue-on-error: true
        run: node scripts/automation/backtest-forecast.cjs

      - name: Check email delivery stats (opens, clicks, bounces)
        continue-on-error: true
        run: node scripts/automation/check-email-status.cjs

      - name: Daily stats check (metrics + trend detection)
        continue-on-error: true
        run: node scripts/automation/daily-stats-check.cjs

      # ── 2. Build (full rebuild 1x/day at 9h UTC = 5h MQ, or manual) ──
      - name: Check if full build needed
        id: check_build
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "09" ] || [ "$HOUR" = "21" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "full=true" >> $GITHUB_OUTPUT
          else
            echo "full=false" >> $GITHUB_OUTPUT
          fi
          echo "Hour: $HOUR, Full build: $([ "$HOUR" = "09" ] || [ "$HOUR" = "21" ] && echo yes || echo no)"

      - name: Build site (Vite)
        if: steps.check_build.outputs.full == 'true'
        run: npm run build

      - name: Prepare FTP folders
        if: steps.check_build.outputs.full == 'true'
        run: node scripts/prepare-ftp.cjs

      - name: Submit URLs to Google Indexing
        if: steps.check_build.outputs.full == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/automation/seo-submit-urls.cjs
        continue-on-error: true

      # ── 2b. Data-only deploy (3x/day — just copy fresh JSON to FTP folders) ──
      - name: Quick data deploy (no full build)
        if: steps.check_build.outputs.full == 'false'
        run: |
          for DIR in martinique-ftp guadeloupe-ftp; do
            if [ -d "$DIR" ]; then
              mkdir -p "$DIR/api/copernicus"
              cp public/api/copernicus/sargassum.json "$DIR/api/copernicus/"
              cp public/api/copernicus/sargassum-grid.json "$DIR/api/copernicus/"
              cp public/api/copernicus/history.json "$DIR/api/copernicus/"
              cp public/api/copernicus/sargassum-banks.json "$DIR/api/copernicus/" 2>/dev/null || true
              cp public/api/copernicus/forecast-archive.json "$DIR/api/copernicus/" 2>/dev/null || true
              echo "Updated data in $DIR"
            fi
          done
          # If FTP dirs don't exist yet (first run), do full build
          if [ ! -d "martinique-ftp" ]; then
            npm run build
            node scripts/prepare-ftp.cjs
            echo "First run — did full build"
          fi

      # ── 3. Commit updated data to repo ────────────────────
      - name: Commit updated sargassum.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/api/copernicus/sargassum.json public/api/copernicus/history.json public/api/copernicus/sargassum-grid.json
          [ -f scripts/automation/data/daily-metrics.json ] && git add scripts/automation/data/daily-metrics.json
          [ -f scripts/automation/data/subscribers.json ] && git add scripts/automation/data/subscribers.json
          [ -f scripts/automation/data/welcome-sent.json ] && git add scripts/automation/data/welcome-sent.json
          [ -f scripts/automation/data/drip-sent.json ] && git add scripts/automation/data/drip-sent.json
          [ -f scripts/automation/data/bounced-emails.json ] && git add scripts/automation/data/bounced-emails.json
          [ -f scripts/automation/data/backtest-results.json ] && git add scripts/automation/data/backtest-results.json
          [ -f scripts/automation/data/weekend-sent.json ] && git add scripts/automation/data/weekend-sent.json
          [ -f public/api/copernicus/forecast-archive.json ] && git add public/api/copernicus/forecast-archive.json
          git diff --cached --quiet || git commit -m "chore: update Copernicus data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || (echo "::warning::git push failed — retrying with rebase" && git pull --rebase && git push) || echo "::error::git push failed after rebase"

      # ── 4. Deploy Martinique via FTP (with retry on timeout) ──
      - name: Deploy Martinique (FTP) — attempt 1
        id: ftp_mq_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_MQ }}
          username: ${{ secrets.FTP_USERNAME_MQ }}
          password: ${{ secrets.FTP_PASSWORD_MQ }}
          local-dir: ./martinique-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      - name: Wait 30s before FTP retry
        if: steps.ftp_mq_1.outcome == 'failure'
        run: sleep 30

      - name: Deploy Martinique (FTP) — retry after 30s
        id: ftp_mq_2
        if: steps.ftp_mq_1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_MQ }}
          username: ${{ secrets.FTP_USERNAME_MQ }}
          password: ${{ secrets.FTP_PASSWORD_MQ }}
          local-dir: ./martinique-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      # ── 5. Deploy Guadeloupe via FTP (with retry on timeout) ──
      - name: Deploy Guadeloupe (FTP) — attempt 1
        id: ftp_gp_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_GP }}
          username: ${{ secrets.FTP_USERNAME_GP }}
          password: ${{ secrets.FTP_PASSWORD_GP }}
          local-dir: ./guadeloupe-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      - name: Wait 30s before FTP retry
        if: steps.ftp_gp_1.outcome == 'failure'
        run: sleep 30

      - name: Deploy Guadeloupe (FTP) — retry after 30s
        id: ftp_gp_2
        if: steps.ftp_gp_1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_GP }}
          username: ${{ secrets.FTP_USERNAME_GP }}
          password: ${{ secrets.FTP_PASSWORD_GP }}
          local-dir: ./guadeloupe-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      # ── 6. Final health check — fail workflow only if sites actually down ──
      # FTP can be flaky; data is already committed to git so next run redeploys.
      # We only want to fail the workflow (and alert) when the live sites are
      # actually broken, not when FTP had a transient hiccup.
      - name: Health check after deploy
        run: |
          sleep 10
          MQ_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 15 https://sargasses-martinique.com || echo 000)
          GP_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 15 https://sargasses-guadeloupe.com || echo 000)
          echo "MQ: $MQ_STATUS | GP: $GP_STATUS"
          MQ_DATA=$(curl -sL --max-time 15 https://sargasses-martinique.com/api/copernicus/sargassum.json | node -e "let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{try{const j=JSON.parse(d);const h=(Date.now()-new Date(j.updatedAt))/3.6e6;console.log(h.toFixed(1))}catch{console.log('NaN')}})" || echo NaN)
          GP_DATA=$(curl -sL --max-time 15 https://sargasses-guadeloupe.com/api/copernicus/sargassum.json | node -e "let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{try{const j=JSON.parse(d);const h=(Date.now()-new Date(j.updatedAt))/3.6e6;console.log(h.toFixed(1))}catch{console.log('NaN')}})" || echo NaN)
          echo "MQ data age: ${MQ_DATA}h | GP data age: ${GP_DATA}h"
          if [ "$MQ_STATUS" != "200" ] || [ "$GP_STATUS" != "200" ]; then
            echo "::error::One or both sites are down — FTP deploys failed and sites not serving"
            exit 1
          fi
          # If FTP attempt 2 also failed AND data is stale (>6h), alert
          if [ "${{ steps.ftp_mq_2.outcome }}" = "failure" ] || [ "${{ steps.ftp_gp_2.outcome }}" = "failure" ]; then
            echo "::warning::FTP deploys failed both attempts — sites up but data may be stale. Next run will redeploy from git-committed data."
          fi

  # ── Notify on failure ──────────────────────────────────
  notify-failure:
    needs: update-and-deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Send failure alert email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WORKFLOW_NAME: 'Daily Copernicus + Deploy'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/automation/notify-failure.cjs

  # ── Auto-retry on failure (once, after 5 min) ─────────
  retry-on-failure:
    needs: update-and-deploy
    if: failure() && github.run_attempt == '1'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Wait 5 minutes before retry
        run: sleep 300
      - name: Retry workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run daily-copernicus.yml --repo ${{ github.repository }} --ref ${{ github.ref }}
