name: Daily Copernicus + Deploy

on:
  schedule:
    # 6h heure Martinique (UTC-4) = 10h UTC
    - cron: '0 10 * * *'
  workflow_dispatch: # Déclenchement manuel possible

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ── 1. Fetch LIVE Copernicus data (Python) ────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Copernicus Marine toolbox
        run: pip install copernicusmarine xarray numpy

      - name: Fetch LIVE sargassum data from Copernicus
        continue-on-error: true
        env:
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python3 scripts/fetch-copernicus-live.py

      - name: Fallback to Node.js scraper if Python failed
        run: |
          echo "${{ secrets.COPERNICUS_USERNAME }}" > copernicustxt.txt
          echo "${{ secrets.COPERNICUS_PASSWORD }}" >> copernicustxt.txt
          node scripts/scrape-copernicus.cjs

      - name: Send notifications (push + email)
        continue-on-error: true
        env:
          ONESIGNAL_API_KEY_MQ: ${{ secrets.ONESIGNAL_API_KEY_MQ }}
          ONESIGNAL_API_KEY_GP: ${{ secrets.ONESIGNAL_API_KEY_GP }}
        run: node scripts/automation/send-notifications.cjs

      # ── 2. Build ──────────────────────────────────────────
      - name: Build site (Vite)
        run: npm run build

      - name: Prepare FTP folders
        run: node scripts/prepare-ftp.cjs

      # ── 2b. Submit URLs to Google Indexing API ─────────────
      - name: Submit URLs to Google Indexing
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/automation/seo-submit-urls.cjs
        continue-on-error: true

      # ── 3. Commit updated data to repo ────────────────────
      - name: Commit updated sargassum.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/api/copernicus/sargassum.json public/api/copernicus/history.json
          git diff --cached --quiet || git commit -m "chore: update Copernicus data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true

      # ── 4. Deploy Martinique via FTP ──────────────────────
      - name: Deploy Martinique (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_MQ }}
          username: ${{ secrets.FTP_USERNAME_MQ }}
          password: ${{ secrets.FTP_PASSWORD_MQ }}
          local-dir: ./martinique-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      # ── 5. Deploy Guadeloupe via FTP ──────────────────────
      - name: Deploy Guadeloupe (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_GP }}
          username: ${{ secrets.FTP_USERNAME_GP }}
          password: ${{ secrets.FTP_PASSWORD_GP }}
          local-dir: ./guadeloupe-ftp/
          server-dir: ./
          dangerous-clean-slate: false
