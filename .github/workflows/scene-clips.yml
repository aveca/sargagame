name: Scene-Clips — petites vidéos, sujets divers (zéro-IA)

# Produit ~100 PETITES vidéos (micro 1-3s + court 5-10s) sur des SUJETS DIVERS = les vraies plages
# (buildHeroSvg par plage) + caméra documentaire. Cloud, minutes illimitées, ZÉRO PC, ZÉRO IA.
# Déclenchable au doigt depuis GitHub mobile. Sortie = artefact (mp4 + gif + poster + galerie).
on:
  workflow_dispatch:
    inputs:
      islands:
        description: "Îles (csv) — mq,gp"
        default: "mq,gp"
      beaches:
        description: "Plages max par île (0 = toutes ; 25 ≈ 100 clips sur 2 durées)"
        default: "25"
      durations:
        description: "Durées (csv) — micro,short"
        default: "micro,short"
      ratios:
        description: "Ratios (csv) — 9x16,16x9"
        default: "9x16"
      limit:
        description: "Cap de clips ce run (0 = tout)"
        default: "0"
      no_gif:
        description: "Sauter les GIF (plus rapide) — true/false"
        default: "false"

concurrency:
  group: scene-clips
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: deps
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Rendre les clips-sujets (usine idempotente)
        run: >-
          node scripts/design/scene-clips-batch.mjs
          --island "${{ github.event.inputs.islands }}"
          --beaches "${{ github.event.inputs.beaches }}"
          --durations "${{ github.event.inputs.durations }}"
          --ratios "${{ github.event.inputs.ratios }}"
          --limit "${{ github.event.inputs.limit }}"
          ${{ github.event.inputs.no_gif == 'true' && '--no-gif' || '' }}
      - name: Régénérer la galerie
        run: node scripts/design/gen-scene-atlas.cjs
      - name: Résumé
        run: |
          echo "clips=$(ls public/scene-atlas/*.mp4 2>/dev/null | wc -l)"
          echo "manifest=$(node -e "console.log(JSON.parse(require('fs').readFileSync('public/scene-atlas/manifest.json')).length)")"
      - name: Artefact (clips + galerie)
        uses: actions/upload-artifact@v4
        with:
          name: scene-clips
          path: |
            public/scene-atlas/**
            design/scene-atlas/index.html
          retention-days: 14
          if-no-files-found: error
