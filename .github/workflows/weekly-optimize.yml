name: Weekly Optimization

on:
  schedule:
    # Lundi 10h UTC (6h MQ) — SEO + A/B + rebuild
    - cron: '0 10 * * 1'
    # Mardi 10h UTC — Email cleanup + drip check
    - cron: '0 10 * * 2'
    # Mercredi 10h UTC — Data quality + forecast accuracy
    - cron: '0 10 * * 3'
    # Vendredi 14h UTC (10h MQ) — Weekend prep
    - cron: '0 14 * * 5'
  workflow_dispatch:
    inputs:
      day_override:
        description: 'Force a specific day task (monday/tuesday/wednesday/friday)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Determine day
        id: day
        run: |
          if [ -n "${{ github.event.inputs.day_override }}" ]; then
            echo "task=${{ github.event.inputs.day_override }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%u)
            case $DOW in
              1) echo "task=monday" >> $GITHUB_OUTPUT ;;
              2) echo "task=tuesday" >> $GITHUB_OUTPUT ;;
              3) echo "task=wednesday" >> $GITHUB_OUTPUT ;;
              5) echo "task=friday" >> $GITHUB_OUTPUT ;;
              *) echo "task=none" >> $GITHUB_OUTPUT ;;
            esac
          fi
          echo "Running: $(cat $GITHUB_OUTPUT)"

      # ── LUNDI: SEO optimization + full rebuild ──
      - name: "[Monday] SEO enrichment — regenerate beach content"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        run: node scripts/automation/seo-enrich-content.cjs

      - name: "[Monday] Auto-optimize — CTR analysis + meta rewrite"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        run: node scripts/automation/auto-optimize.cjs

      - name: "[Monday] Fetch A/B data from GA4"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID_MQ: ${{ secrets.GA4_PROPERTY_ID_MQ }}
        run: node scripts/automation/ab-fetch-ga4.cjs

      - name: "[Monday] A/B test evaluate"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        run: node scripts/automation/ab-evaluate.cjs

      - name: "[Monday] Full rebuild"
        if: steps.day.outputs.task == 'monday'
        run: |
          npm run build
          node scripts/prepare-ftp.cjs

      - name: "[Monday] Submit URLs to Google"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/automation/seo-submit-urls.cjs

      # ── MARDI: Email optimization ──
      - name: "[Tuesday] Bounce cleanup via Apps Script"
        if: steps.day.outputs.task == 'tuesday'
        continue-on-error: true
        run: |
          RESULT=$(curl -sL "${{ secrets.APPS_SCRIPT_URL }}?action=clean_bounces")
          echo "Bounce cleanup: $RESULT"

      - name: "[Tuesday] Drip check via Apps Script"
        if: steps.day.outputs.task == 'tuesday'
        continue-on-error: true
        run: |
          RESULT=$(curl -sL "${{ secrets.APPS_SCRIPT_URL }}?action=drip_check")
          echo "Drip check: $RESULT"

      - name: "[Tuesday] Email stats snapshot"
        if: steps.day.outputs.task == 'tuesday'
        continue-on-error: true
        run: |
          RESULT=$(curl -sL "${{ secrets.APPS_SCRIPT_URL }}?action=email_stats")
          echo "Email stats: $RESULT"

      # ── MERCREDI: Data quality + forecast accuracy ──
      - name: "[Wednesday] Backtest forecast accuracy"
        if: steps.day.outputs.task == 'wednesday'
        continue-on-error: true
        run: node scripts/automation/backtest-forecast.cjs

      - name: "[Wednesday] Health check both sites + staleness"
        if: steps.day.outputs.task == 'wednesday'
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/automation/health-check.cjs

      - name: "[Wednesday] Daily stats + trend detection"
        if: steps.day.outputs.task == 'wednesday'
        continue-on-error: true
        run: node scripts/automation/daily-stats-check.cjs

      - name: "[Wednesday] Commit data quality snapshot"
        if: steps.day.outputs.task == 'wednesday'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/automation/data/daily-metrics.json scripts/automation/data/backtest-results.json || true
          git diff --cached --quiet || git commit -m "chore: wednesday data quality check $(date -u +'%Y-%m-%d')"
          git push || true

      # ── VENDREDI: Weekend prep ──
      - name: "[Friday] Fetch fresh data"
        if: steps.day.outputs.task == 'friday'
        continue-on-error: true
        run: node scripts/fetch-sargassum-live.cjs

      - name: "[Friday] Weekend email bulletin"
        if: steps.day.outputs.task == 'friday'
        continue-on-error: true
        run: node scripts/automation/email-weekend.cjs

      - name: "[Friday] Full rebuild for weekend traffic"
        if: steps.day.outputs.task == 'friday'
        run: |
          npm run build
          node scripts/prepare-ftp.cjs

      # ── Deploy (Monday + Friday) ──
      - name: Commit changes
        if: steps.day.outputs.task == 'monday' || steps.day.outputs.task == 'friday'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: weekly ${{ steps.day.outputs.task }} optimization $(date -u +'%Y-%m-%d')"
          git push || (echo "::warning::git push failed — retrying with rebase" && git pull --rebase && git push)

      - name: Deploy Martinique (FTP)
        if: steps.day.outputs.task == 'monday' || steps.day.outputs.task == 'friday'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_MQ }}
          username: ${{ secrets.FTP_USERNAME_MQ }}
          password: ${{ secrets.FTP_PASSWORD_MQ }}
          local-dir: ./martinique-ftp/
          server-dir: ./
          dangerous-clean-slate: false

      - name: Deploy Guadeloupe (FTP)
        if: steps.day.outputs.task == 'monday' || steps.day.outputs.task == 'friday'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_GP }}
          username: ${{ secrets.FTP_USERNAME_GP }}
          password: ${{ secrets.FTP_PASSWORD_GP }}
          local-dir: ./guadeloupe-ftp/
          server-dir: ./
          dangerous-clean-slate: false

  # ── Notify on failure ──────────────────────────────────
  notify-failure:
    needs: optimize
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Send failure alert email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WORKFLOW_NAME: 'Weekly Optimization'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/automation/notify-failure.cjs
