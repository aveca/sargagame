name: Weekly Optimization

on:
  schedule:
    # Mardi + Mercredi + Vendredi 10h UTC (6h MQ) — les autres jours sont couverts
    # par weekly-seo-automation (Lun+Jeu), weekly-ux-report (Mar+Ven),
    # weekly-outreach (Mar+Jeu). Weekend bonus Vendredi 14h UTC conservé.
    # Cf. quota GH Actions 2000 min/mo.
    - cron: '0 10 * * 2,3,5'
    - cron: '0 14 * * 5'
  workflow_dispatch:
    inputs:
      day_override:
        description: 'Force a specific day task (monday/tuesday/wednesday/friday)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: weekly-optimize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    # 15 → 30 : le step Deploy FTPS a désormais son propre timeout (15 min). Ce
    # timeout de JOB doit laisser assez de marge pour que le timeout DU STEP tape
    # en premier — un timeout de JOB = run "cancelled" ; un timeout de STEP
    # continue-on-error = toléré → "success". build+commit ≪ 15 min.
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine day
        id: day
        run: |
          if [ -n "${{ github.event.inputs.day_override }}" ]; then
            echo "task=${{ github.event.inputs.day_override }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%u)
            case $DOW in
              1) echo "task=monday" >> $GITHUB_OUTPUT ;;
              2) echo "task=tuesday" >> $GITHUB_OUTPUT ;;
              3) echo "task=wednesday" >> $GITHUB_OUTPUT ;;
              4) echo "task=thursday" >> $GITHUB_OUTPUT ;;
              5) echo "task=friday" >> $GITHUB_OUTPUT ;;
              6) echo "task=saturday" >> $GITHUB_OUTPUT ;;
              0) echo "task=sunday" >> $GITHUB_OUTPUT ;;
            esac
          fi
          echo "Running: $(cat $GITHUB_OUTPUT)"

      # ── LUNDI: SEO optimization + full rebuild ──
      - name: "[Monday] SEO enrichment — regenerate beach content"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        run: node scripts/automation/seo-enrich-content.cjs

      - name: "[Monday] Auto-optimize — CTR analysis + meta rewrite"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        run: node scripts/automation/auto-optimize.cjs

      - name: "[Monday] Fetch A/B data from GA4"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID_MQ: ${{ secrets.GA4_PROPERTY_ID_MQ }}
        run: node scripts/automation/ab-fetch-ga4.cjs

      - name: "[Monday] A/B test evaluate"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        run: node scripts/automation/ab-evaluate.cjs

      - name: "[Monday] Full rebuild"
        if: steps.day.outputs.task == 'monday'
        run: |
          npm run build
          node scripts/prepare-ftp.cjs

      - name: "[Monday] Submit URLs to Google"
        if: steps.day.outputs.task == 'monday'
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/automation/seo-submit-urls.cjs

      # ── MARDI: Email optimization ──
      - name: "[Tuesday] Bounce cleanup via Apps Script"
        if: steps.day.outputs.task == 'tuesday'
        continue-on-error: true
        run: |
          RESULT=$(curl -sL "${{ secrets.APPS_SCRIPT_URL }}?action=clean_bounces")
          echo "Bounce cleanup: $RESULT"

      # [Tuesday] Drip check Apps Script SUPPRIMÉ (2026-06-10) : runDripEmails()
      # legacy n'a ni garde île (envoyait du FR "Sargasses Martinique" aux leads
      # PUNTACANA/FLORIDA/RIVIERAMAYA) ni filtre unsubscribed/bounced, et
      # dupliquait drip-email.cjs (Resend, daily-copernicus) qui tracke
      # drip-sent.json. Le drip Resend est l'unique chemin désormais.

      - name: "[Tuesday] Email stats snapshot"
        if: steps.day.outputs.task == 'tuesday'
        continue-on-error: true
        run: |
          RESULT=$(curl -sL "${{ secrets.APPS_SCRIPT_URL }}?action=email_stats")
          echo "Email stats: $RESULT"

      # ── MERCREDI: Data quality + forecast accuracy ──
      - name: "[Wednesday] Backtest forecast accuracy"
        if: steps.day.outputs.task == 'wednesday'
        continue-on-error: true
        run: node scripts/automation/backtest-forecast.cjs

      - name: "[Wednesday] Health check both sites + staleness"
        if: steps.day.outputs.task == 'wednesday'
        continue-on-error: true
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node scripts/automation/health-check.cjs

      - name: "[Wednesday] Daily stats + trend detection"
        if: steps.day.outputs.task == 'wednesday'
        continue-on-error: true
        run: node scripts/automation/daily-stats-check.cjs

      - name: "[Wednesday] Commit data quality snapshot"
        if: steps.day.outputs.task == 'wednesday'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/automation/data/daily-metrics.json scripts/automation/data/backtest-results.json || true
          git diff --cached --quiet || git commit -m "chore: wednesday data quality check $(date -u +'%Y-%m-%d')"
          git push || true

      # ── JEUDI: A/B mid-week check + email stats ──
      - name: "[Thursday] Fetch A/B data from GA4 (mid-week)"
        if: steps.day.outputs.task == 'thursday'
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID_MQ: ${{ secrets.GA4_PROPERTY_ID_MQ }}
        run: node scripts/automation/ab-fetch-ga4.cjs

      - name: "[Thursday] A/B test evaluate (mid-week)"
        if: steps.day.outputs.task == 'thursday'
        continue-on-error: true
        run: node scripts/automation/ab-evaluate.cjs

      - name: "[Thursday] Email stats snapshot"
        if: steps.day.outputs.task == 'thursday'
        continue-on-error: true
        run: |
          RESULT=$(curl -sL "${{ secrets.APPS_SCRIPT_URL }}?action=email_stats")
          echo "Email stats: $RESULT"

      - name: "[Thursday] Health check"
        if: steps.day.outputs.task == 'thursday'
        continue-on-error: true
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node scripts/automation/health-check.cjs

      - name: "[Thursday] Commit A/B data"
        if: steps.day.outputs.task == 'thursday'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f scripts/automation/data/ab-results.json ] && git add scripts/automation/data/ab-results.json
          git diff --cached --quiet || git commit -m "chore: thursday A/B mid-week check $(date -u +'%Y-%m-%d')"
          git push || true

      # ── VENDREDI: Weekend prep ──
      - name: "[Friday] Fetch fresh data"
        if: steps.day.outputs.task == 'friday'
        continue-on-error: true
        run: node scripts/fetch-sargassum-live.cjs

      # Weekend email bulletin is sent by daily-copernicus.yml (Friday 12h UTC)
      # Removed from here to prevent duplicate sends

      - name: "[Friday] Full rebuild for weekend traffic"
        if: steps.day.outputs.task == 'friday'
        run: |
          npm run build
          node scripts/prepare-ftp.cjs

      # ── SAMEDI: Weekend monitoring actif ──
      - name: "[Saturday] Health check (weekend monitoring)"
        if: steps.day.outputs.task == 'saturday'
        continue-on-error: true
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node scripts/automation/health-check.cjs

      - name: "[Saturday] Backtest forecast accuracy"
        if: steps.day.outputs.task == 'saturday'
        continue-on-error: true
        run: node scripts/automation/backtest-forecast.cjs

      - name: "[Saturday] Daily stats + trend detection"
        if: steps.day.outputs.task == 'saturday'
        continue-on-error: true
        run: node scripts/automation/daily-stats-check.cjs

      - name: "[Saturday] Bounce cleanup"
        if: steps.day.outputs.task == 'saturday'
        continue-on-error: true
        run: |
          RESULT=$(curl -sL "${{ secrets.APPS_SCRIPT_URL }}?action=clean_bounces")
          echo "Bounce cleanup: $RESULT"

      - name: "[Saturday] Commit weekend data"
        if: steps.day.outputs.task == 'saturday'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/automation/data/daily-metrics.json scripts/automation/data/backtest-results.json || true
          git diff --cached --quiet || git commit -m "chore: saturday monitoring $(date -u +'%Y-%m-%d')"
          git push || true

      # ── DIMANCHE: Pre-Monday prep (données fraîches pour SEO lundi) ──
      - name: "[Sunday] Health check"
        if: steps.day.outputs.task == 'sunday'
        continue-on-error: true
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node scripts/automation/health-check.cjs

      - name: "[Sunday] Daily stats snapshot (pre-Monday baseline)"
        if: steps.day.outputs.task == 'sunday'
        continue-on-error: true
        run: node scripts/automation/daily-stats-check.cjs

      - name: "[Sunday] Forecast backtest"
        if: steps.day.outputs.task == 'sunday'
        continue-on-error: true
        run: node scripts/automation/backtest-forecast.cjs

      - name: "[Sunday] Commit Sunday data"
        if: steps.day.outputs.task == 'sunday'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/automation/data/daily-metrics.json scripts/automation/data/backtest-results.json || true
          git diff --cached --quiet || git commit -m "chore: sunday pre-monday prep $(date -u +'%Y-%m-%d')"
          git push || true

      # ── Deploy (Monday + Friday) ──
      - name: Commit changes
        if: steps.day.outputs.task == 'monday' || steps.day.outputs.task == 'friday'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: weekly ${{ steps.day.outputs.task }} optimization $(date -u +'%Y-%m-%d')"
          git stash push -u -m "actions-pre-rebase" || true
          BRANCH="${GITHUB_REF_NAME:-main}"
          push_ok=0
          for i in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            git rebase -X theirs "origin/$BRANCH" || { echo "::warning::rebase failed ($i/5)"; git rebase --abort || true; sleep 10; continue; }
            if git push origin "HEAD:$BRANCH"; then push_ok=1; break; fi
            echo "::warning::git push failed ($i/5), sleep 20s"; sleep 20
          done
          [ "$push_ok" = "1" ] || { echo "::error::git push failed after 5 attempts"; exit 1; }

      - name: Deploy FTPS Martinique + Guadeloupe
        if: steps.day.outputs.task == 'monday' || steps.day.outputs.task == 'friday'
        continue-on-error: true
        # Timeout PROPRE au step : une session FTPS morte pendait jusqu'au timeout
        # du job → run "cancelled" cosmétique (la donnée est déjà commitée + le push
        # redéploie via daily-copernicus). Avec ce timeout-step + continue-on-error,
        # un blocage FTP est toléré → job "success". 15 min ≫ deploy MQ+GP normal.
        timeout-minutes: 15
        env:
          FTP_SERVER_MQ: ${{ secrets.FTP_SERVER_MQ }}
          FTP_USERNAME_MQ: ${{ secrets.FTP_USERNAME_MQ }}
          FTP_PASSWORD_MQ: ${{ secrets.FTP_PASSWORD_MQ }}
          FTP_SERVER_GP: ${{ secrets.FTP_SERVER_GP }}
          FTP_USERNAME_GP: ${{ secrets.FTP_USERNAME_GP }}
          FTP_PASSWORD_GP: ${{ secrets.FTP_PASSWORD_GP }}
        run: node scripts/manual-ftp-deploy.cjs

  # ── Notify on failure ──────────────────────────────────
  notify-failure:
    needs: optimize
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Send failure alert email
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          WORKFLOW_NAME: 'Weekly Optimization'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/automation/notify-failure.cjs
