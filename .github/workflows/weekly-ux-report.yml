name: Weekly UX Report

on:
  schedule:
    # Jeudi 7h Martinique (UTC-4) = 11h UTC
    - cron: '0 11 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ux-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ── 1. Collect data ──────────────────────────────────
      - name: SEO Audit (data collection)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID_MQ: ${{ secrets.GA4_PROPERTY_ID_MQ }}
          GA4_PROPERTY_ID_GP: ${{ secrets.GA4_PROPERTY_ID_GP }}
        run: node scripts/automation/seo-audit.cjs

      # ── 2. Generate UX report ────────────────────────────
      - name: UX Audit (report)
        run: node scripts/automation/ux-audit.cjs

      # ── 3. Commit report ─────────────────────────────────
      - name: Commit UX report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/automation/data/automation-log.json scripts/automation/data/ux-report.json scripts/automation/data/audit-summary.json scripts/automation/data/audit-full.json
          git diff --cached --quiet || git commit -m "ux: weekly report $(date -u +'%Y-%m-%d')"
          git push || true
