name: Weekly UX Report

on:
  schedule:
    # Cut 2026-04-13 (quota 100%): Tue+Fri -> Fri only. 8 runs/mo -> 4.
    # Fri keeps the weekend-prep signal, Tue was redundant with Mon SEO.
    - cron: '0 11 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ux-report:
    runs-on: ubuntu-latest
    # 25 min : l'install Chromium du capture audit peut dépasser 10 min à froid
    # (run 27381454264 annulé par timeout en plein download, 2026-06-11)
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 1. Collect data ──────────────────────────────────
      - name: SEO Audit (data collection)
        id: seo-audit
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID_MQ: ${{ secrets.GA4_PROPERTY_ID_MQ }}
          GA4_PROPERTY_ID_GP: ${{ secrets.GA4_PROPERTY_ID_GP }}
        run: node scripts/automation/seo-audit.cjs

      # ── 2. Generate UX report ────────────────────────────
      - name: UX Audit (report)
        if: steps.seo-audit.outcome == 'success'
        run: node scripts/automation/ux-audit.cjs

      # ── 2b. Capture intelligence audit (checklist géants — Playwright live) ──
      # 13 checks mesurables sur les 5 domaines (reference_capture_intelligence) :
      # LCP, verdict visible, fraîcheur, fausse rareté (bloquant), prix transparent
      # (bloquant), CTA fold, etc. → scripts/automation/data/capture-audit.json
      - name: Capture audit (5 domaines live)
        continue-on-error: true
        run: |
          npx playwright install chromium --with-deps
          node scripts/audit-capture.cjs

      # ── 3. Commit report ─────────────────────────────────
      - name: Commit UX report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in scripts/automation/data/automation-log.json scripts/automation/data/ux-report.json scripts/automation/data/audit-summary.json scripts/automation/data/audit-full.json scripts/automation/data/capture-audit.json; do
            [ -f "$f" ] && git add -f "$f"
          done
          git diff --cached --quiet || git commit -m "ux: weekly report $(date -u +'%Y-%m-%d')"
          git push || (echo "::warning::git push failed — retrying with rebase" && git pull --rebase && git push)
