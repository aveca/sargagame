name: Weekly Outreach (Backlinks + Social)

on:
  schedule:
    # Mardi 10h UTC (6h Martinique) — outreach emails
    - cron: '0 10 * * 2'
    # Jeudi 14h UTC (10h Martinique) — relance des cibles
    - cron: '0 14 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      # ── 1. Scrape targets + send outreach emails ────────────
      - name: Auto-outreach (scrape + email backlink requests)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/automation/auto-outreach.cjs

      # ── 2. Commit outreach log ──────────────────────────────
      - name: Commit outreach log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/automation/data/outreach-log.json
          git diff --cached --quiet || git commit -m "outreach: auto-backlink $(date -u +'%Y-%m-%d')"
          git push || (git pull --rebase --autostash && git push)

  notify-failure:
    needs: outreach
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Send failure alert
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WORKFLOW_NAME: 'Weekly Outreach'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/automation/notify-failure.cjs
