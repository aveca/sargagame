name: UX Alert Brain (funnel first-party)
# NB: nom historique trompeur (« A/B Test Evaluator »). Ce workflow est le SEUL
# trigger planifié du cerveau d'alerte UX : analyze-ux.cjs lit stats.php (first-party,
# zéro Google) → ux-alerts.json, consommé par pulse.cjs. NE PAS supprimer.

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 8 AM
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Run UX alert brain (analyze-ux → ux-alerts.json)
        run: node scripts/analyze-ux.cjs
        env:
          # analyze-ux.cjs lit process.env.SG_STATS_KEY (l.44) ; sans clé = no-op.
          SG_STATS_KEY: ${{ secrets.SG_STATS_KEY }}
      - name: Upload UX alerts
        uses: actions/upload-artifact@v4
        with:
          name: ux-alerts
          path: scripts/automation/data/ux-alerts.json
          if-no-files-found: ignore
