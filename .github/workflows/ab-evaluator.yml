name: UX Alert Brain (funnel first-party)
# NB: nom historique trompeur (« A/B Test Evaluator »). Ce workflow est le SEUL
# trigger planifié du cerveau d'alerte UX : analyze-ux.cjs lit stats.php (first-party,
# zéro Google) → ux-alerts.json, consommé par pulse.cjs. NE PAS supprimer.

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 8 AM
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Run UX alert brain (analyze-ux → ux-alerts.json)
        run: node scripts/analyze-ux.cjs
        env:
          # analyze-ux.cjs lit SG_STATS_KEY (fallback) + reconstruit la map par région
          # depuis SG_STATS_KEY_<REGION> (stats-keys.json gitignored = absent en CI).
          SG_STATS_KEY: ${{ secrets.SG_STATS_KEY }}
          SG_STATS_KEY_MQ: ${{ secrets.SG_STATS_KEY_MQ }}
          SG_STATS_KEY_GP: ${{ secrets.SG_STATS_KEY_GP }}
          SG_STATS_KEY_FLORIDA: ${{ secrets.SG_STATS_KEY_FLORIDA }}
          SG_STATS_KEY_PUNTACANA: ${{ secrets.SG_STATS_KEY_PUNTACANA }}
          SG_STATS_KEY_RIVIERAMAYA: ${{ secrets.SG_STATS_KEY_RIVIERAMAYA }}
      - name: Upload UX alerts
        uses: actions/upload-artifact@v4
        with:
          name: ux-alerts
          path: scripts/automation/data/ux-alerts.json
          if-no-files-found: ignore
      # A/B VERDICT (ab-eval) — moisson des tests paywall. Mêmes secrets stats que
      # analyze-ux (fallback env : stats-keys.json gitignored = absent en CI).
      # Verdict par variante (lift + z-test) sur mq+gp (seules régions à trafic).
      # Sortie = logs du run + artifact ab-verdict. Ne bloque jamais (|| true).
      - name: A/B verdict (ab-eval mq+gp)
        run: |
          node scripts/automation/ab-eval.cjs --region=mq | tee ab-verdict-mq.txt || true
          node scripts/automation/ab-eval.cjs --region=gp | tee ab-verdict-gp.txt || true
        env:
          SG_STATS_KEY: ${{ secrets.SG_STATS_KEY }}
          SG_STATS_KEY_MQ: ${{ secrets.SG_STATS_KEY_MQ }}
          SG_STATS_KEY_GP: ${{ secrets.SG_STATS_KEY_GP }}
      - name: Upload A/B verdict
        uses: actions/upload-artifact@v4
        with:
          name: ab-verdict
          path: ab-verdict-*.txt
          if-no-files-found: ignore
