name: Apply Supabase schema

# Applique supabase/schema.sql à la base Supabase LIVE (tables photos / planner_alerts /
# beach_reports + RLS + bucket) via l'API Management, SANS que le fondateur touche le
# SQL Editor du dashboard. Idempotent (create ... if not exists / on conflict /
# drop policy if exists) → safe à (re)lancer.
#
# Déclencheurs :
#   • push sur main quand supabase/schema.sql change → la prod suit le repo automatiquement.
#   • workflow_dispatch → application manuelle à la demande.
#
# Inerte tant que le secret SUPABASE_ACCESS_TOKEN n'est pas posé (le script exit 1 ; ce
# secret est déjà provisionné, cf. deploy-edge-function.yml).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/schema.sql'
      - 'scripts/automation/apply-supabase-schema.cjs'

permissions:
  contents: read

concurrency:
  group: apply-supabase-schema
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply schema (Management API, idempotent)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/automation/apply-supabase-schema.cjs
